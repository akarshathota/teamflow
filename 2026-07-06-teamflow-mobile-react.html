<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>TeamFlow Mobile — React</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:wght@500;600;700&family=IBM+Plex+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.5/babel.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<script src="./shared.js"></script>
<link rel="stylesheet" href="./shared.css">
<style>
  body{margin:0;font-family:'IBM Plex Sans',-apple-system,"Segoe UI",Roboto,sans-serif;color:var(--ink);
    background:var(--bg);-webkit-font-smoothing:antialiased}
  h3,.brandfont{font-family:'Bricolage Grotesque','IBM Plex Sans',sans-serif}
  svg.i{width:20px;height:20px;stroke:currentColor;fill:none;stroke-width:1.9;stroke-linecap:round;stroke-linejoin:round;display:block;flex:0 0 auto}
  .caption{display:none}
  .caption b{color:#45423a}

  /* mobile-first: on a real phone the app fills the actual viewport, no decorative bezel.
     The "phone in a box" mockup look (fixed size, dark frame, fake notch) only applies on
     desktop-width viewports — see the @media block at the end of this stylesheet. */
  .phone{width:100vw;height:100dvh;background:var(--bg);position:relative}
  .notch{display:none}
  .screen{background:var(--bg);width:100%;height:100%;overflow:hidden;position:relative;display:flex;flex-direction:column}

  .top{padding:calc(14px + env(safe-area-inset-top)) 18px 14px;background:var(--card);border-bottom:1px solid var(--line);z-index:5}
  .top .row{display:flex;align-items:center;justify-content:space-between}
  .hello{font-size:13px;color:var(--muted);line-height:1.45}
  .hello b{color:var(--ink);font-weight:700}
  .av{width:40px;height:40px;border-radius:50%;background:var(--accent);color:#fff;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:14px}
  .bell-btn{position:relative;background:none;border:none;padding:6px;color:var(--ink);cursor:pointer}
  .bell-badge{position:absolute;top:0;right:0;background:var(--red);color:#fff;font-size:9.5px;font-weight:700;
    border-radius:8px;min-width:15px;height:15px;padding:0 3px;display:flex;align-items:center;justify-content:center;line-height:1}
  .rolebar{display:flex;align-items:center;gap:8px;margin-top:12px;background:#f1f0e9;border-radius:9px;padding:8px 10px}
  .rolebar .demo{font-size:10px;font-weight:700;letter-spacing:.5px;color:var(--accent-ink);background:var(--accent-soft);padding:3px 7px;border-radius:6px;white-space:nowrap}
  .rolesel{flex:1;border:none;background:none;font-family:inherit;font-size:13.5px;font-weight:700;color:var(--ink);outline:none;cursor:pointer}
  .summary{margin-top:12px;background:var(--accent-soft);border:1px solid var(--accent-border);
    border-radius:11px 11px 11px 3px;padding:11px 13px;font-size:13px;line-height:1.5;color:#134f48}
  .summary b{color:#0c3b35}

  .content{flex:1;overflow-y:auto;padding:15px 15px 100px}
  .content::-webkit-scrollbar{display:none}
  .sec{font-size:11px;font-weight:800;text-transform:uppercase;letter-spacing:.9px;color:var(--muted);margin:10px 2px 10px}

  .task{background:var(--card);border-radius:13px;padding:14px;margin-bottom:11px;box-shadow:0 2px 8px rgba(27,30,33,.05);border:1px solid var(--line);position:relative;overflow:hidden}
  .task.done .tt{text-decoration:line-through;color:var(--muted)}
  .stripe{position:absolute;left:0;top:0;bottom:0;width:4px}
  .pill{display:inline-flex;align-items:center;gap:5px;font-size:11px;font-weight:700;padding:3px 8px;border-radius:5px}
  .pill.over{background:var(--red-soft);color:var(--red)}
  .pill.today{background:var(--amber-soft);color:var(--amber)}
  .pill.done{background:var(--green-soft);color:var(--green)}
  .pill.open{background:#efeee7;color:#5d6367}
  .tt{font-size:15px;font-weight:600;margin:8px 0 6px;line-height:1.35}
  .meta{display:flex;align-items:center;gap:7px;font-size:12.5px;color:var(--muted);flex-wrap:wrap}
  .who{width:24px;height:24px;border-radius:50%;background:#e6e4da;color:var(--ink2);display:inline-flex;align-items:center;justify-content:center;font-size:10.5px;font-weight:700;flex:0 0 auto}
  .tag2{display:inline-block;font-size:10.5px;font-weight:700;padding:2px 7px;border-radius:5px}
  .tag2.green{background:var(--green-soft);color:var(--green)}
  .tag2.amber{background:var(--amber-soft);color:var(--amber)}
  .tag2.red{background:var(--red-soft);color:var(--red)}
  .tag2.blue{background:var(--blue-soft);color:var(--blue)}
  .tag2.gray{background:#efeee7;color:#5d6367}
  .notepv{font-size:12.5px;color:var(--ink2);background:#f7f6f1;border-radius:7px;padding:7px 10px;margin-top:7px;line-height:1.4;font-style:italic}
  .attrow{display:flex;gap:6px;flex-wrap:wrap;margin-top:7px}
  .filechip{font-size:11.5px;font-weight:600;color:var(--ink2);background:#efeee7;padding:6px 10px;border-radius:6px;display:inline-flex;align-items:center;gap:4px}
  .cardbtns{display:flex;gap:8px;margin-top:12px}
  .btn{flex:1;border:none;border-radius:9px;padding:12px;font-size:13.5px;font-weight:700;cursor:pointer;min-height:44px;display:flex;align-items:center;justify-content:center;gap:6px}
  .btn:active{transform:scale(.97)}
  .btn.primary{background:var(--green);color:#fff}
  .btn.ghost{background:#efeee7;color:var(--ink2);flex:0 0 50px}
  .btn.accent{background:var(--accent);color:#fff}

  .insight{background:#20312e;color:#eef5f3;border-radius:14px;padding:16px;margin-bottom:14px}
  .insight .lab{font-size:10.5px;letter-spacing:1px;text-transform:uppercase;opacity:.75;display:flex;align-items:center;gap:6px}
  .insight p{margin:8px 0 0;font-size:14px;line-height:1.55}
  .attn{background:var(--card);border-radius:12px;padding:12px 13px;margin-bottom:10px;border:1px solid var(--line);display:flex;align-items:center;gap:12px}
  .ring{width:40px;height:40px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:700;color:#fff;font-size:13px;flex:0 0 auto}
  .attn .nm{font-size:14px;font-weight:600}
  .attn .rs{font-size:12px;color:var(--muted);margin-top:2px;line-height:1.35}
  .free{display:inline-block;font-size:10px;font-weight:700;color:var(--green);background:var(--green-soft);padding:2px 7px;border-radius:6px;margin-left:6px}

  .att-sum{display:flex;gap:9px;margin-bottom:14px}
  .att-sum .box{flex:1;background:var(--card);border:1px solid var(--line);border-radius:11px;padding:12px;text-align:center}
  .att-sum .n{font-size:21px;font-weight:700;font-family:'Bricolage Grotesque',sans-serif}
  .att-sum .l{font-size:11px;color:var(--muted);margin-top:2px}
  .prow{background:var(--card);border:1px solid var(--line);border-radius:11px;padding:11px 13px;margin-bottom:8px;display:flex;align-items:center;gap:11px}
  .dot{width:9px;height:9px;border-radius:50%;flex:0 0 auto}

  .nav{position:absolute;bottom:0;left:0;right:0;background:rgba(255,255,255,.95);backdrop-filter:blur(10px);
    border-top:1px solid var(--line);display:flex;justify-content:space-around;padding:8px 6px calc(8px + env(safe-area-inset-bottom));z-index:30}
  .nav button{background:none;border:none;display:flex;flex-direction:column;align-items:center;gap:4px;
    font-size:10.5px;color:var(--muted);cursor:pointer;flex:1;font-weight:600;padding:2px 0;min-height:50px}
  .nav button.on{color:var(--accent-ink)}
  .nav .ic{width:50px;height:29px;display:flex;align-items:center;justify-content:center;border-radius:9px}
  .nav button.on .ic{background:var(--accent-soft)}
  .fab{position:absolute;bottom:calc(78px + env(safe-area-inset-bottom));right:16px;width:60px;height:60px;border-radius:18px 18px 18px 5px;
    background:var(--accent);color:#fff;border:none;box-shadow:0 12px 26px rgba(14,122,111,.4);cursor:pointer;z-index:35;
    display:flex;align-items:center;justify-content:center}
  .fab:active{transform:scale(.93)}

  .sheet-wrap{position:absolute;inset:0;background:rgba(20,25,28,.5);backdrop-filter:blur(2px);z-index:50;display:flex;align-items:flex-end}
  .sheet{background:var(--card);width:100%;border-radius:22px 22px 0 0;padding:20px 18px 28px;animation:up .25s ease;max-height:88%;overflow-y:auto}
  @keyframes up{from{transform:translateY(60%)}to{transform:none}}
  .grab{width:44px;height:5px;border-radius:5px;background:#dcd9cd;margin:-6px auto 14px}
  .sheet h3{margin:2px 0 4px;font-size:18px}
  .sheet .sub{color:var(--muted);font-size:13px;margin-bottom:14px;line-height:1.4}
  .x{position:absolute;right:16px;background:none;border:none;color:var(--muted);cursor:pointer;padding:4px}
  .sheet .xrow{display:flex;justify-content:flex-end;margin:-6px -6px 0 0}

  .actbtn{width:100%;display:flex;align-items:center;gap:13px;background:var(--card);border:1.5px solid var(--line);
    border-radius:12px;padding:14px;margin-bottom:10px;cursor:pointer;text-align:left}
  .actbtn:active{transform:scale(.98)}
  .actbtn b{font-size:14.5px;display:block;color:var(--ink)}
  .actbtn small{font-size:12px;color:var(--muted)}
  .actic{width:44px;height:44px;border-radius:11px;display:flex;align-items:center;justify-content:center;flex:0 0 auto}

  .modetabs{display:flex;gap:6px;background:#efeee7;border-radius:9px;padding:4px;margin-bottom:14px}
  .mtab{flex:1;border:none;background:none;font-size:13.5px;font-weight:700;color:var(--muted);padding:9px;border-radius:7px;cursor:pointer}
  .mtab.on{background:var(--card);color:var(--ink);box-shadow:0 1px 4px rgba(27,30,33,.12)}
  .typein{width:100%;border:1.5px solid var(--line);border-radius:9px;padding:12px;font-size:14.5px;
    font-family:inherit;outline:none;resize:none;color:var(--ink);line-height:1.45}
  .typein:focus{border-color:var(--accent)}
  .understand{width:100%;margin-top:10px;background:var(--accent);color:#fff;border:none;border-radius:9px;
    padding:13px;font-size:14.5px;font-weight:700;cursor:pointer}
  .mic{width:98px;height:98px;border-radius:50%;margin:6px auto 14px;background:var(--accent-soft);color:var(--accent-ink);
    display:flex;align-items:center;justify-content:center;cursor:pointer;position:relative}
  .mic svg{width:40px;height:40px;stroke-width:1.7}
  .mic.rec{background:var(--red-soft);color:var(--red)}
  .mic.rec::after{content:"";position:absolute;inset:-8px;border-radius:50%;border:3px solid var(--red);animation:pulse 1s infinite}
  @keyframes pulse{0%{transform:scale(1);opacity:.7}100%{transform:scale(1.25);opacity:0}}
  .heard{background:#f4f3ec;border-radius:9px;padding:12px 14px;font-size:14px;line-height:1.5;color:var(--ink2);min-height:20px}
  .heard .ph{color:var(--muted)}
  .typechips{display:flex;flex-wrap:wrap;gap:7px;margin-bottom:14px}
  .tchip{border:1.5px solid var(--line);background:var(--card);border-radius:7px;padding:7px 12px;
    font-size:12.5px;font-weight:600;color:var(--ink2);cursor:pointer}
  .tchip.on{border-color:var(--accent);background:var(--accent-soft);color:var(--accent-ink)}
  .field{display:flex;align-items:flex-start;gap:10px;padding:11px 0;border-bottom:1px solid var(--line)}
  .field .k{font-size:12px;color:var(--muted);width:76px;flex:0 0 auto;padding-top:3px}
  .field .v{font-size:14px;font-weight:600;flex:1}
  .chipbtn{display:inline-flex;align-items:center;gap:5px;background:var(--card);border:1.5px dashed #b6d3cd;border-radius:7px;padding:4px 10px;font-size:13px;font-weight:600;cursor:pointer;color:var(--ink)}
  .aibadge{font-size:11px;color:var(--accent-ink);font-weight:700;background:var(--accent-soft);padding:3px 9px;border-radius:6px}
  .reason{font-size:11.5px;color:var(--muted);margin-top:5px;line-height:1.35}
  .reason b{color:var(--accent-ink)}
  .picker{display:flex;flex-wrap:wrap;gap:6px;margin-top:9px}
  .pickchip{border:1.5px solid var(--line);background:var(--card);border-radius:7px;padding:7px 11px;
    font-size:12.5px;font-weight:600;color:var(--ink2);cursor:pointer;text-align:left}
  .pickchip.cur{border-color:var(--accent);background:var(--accent-soft);color:var(--accent-ink)}
  .pickchip .emprole{display:block;font-size:11px;color:var(--muted);font-weight:500;margin-top:2px}
  .empsearch{width:100%;border:1.5px solid var(--line);border-radius:8px;padding:9px 11px;font-family:inherit;font-size:13.5px;color:var(--ink);outline:none;margin-bottom:8px}
  .empsearch:focus{border-color:var(--accent)}
  .empcol{display:flex;flex-direction:column;gap:6px;max-height:200px;overflow-y:auto;width:100%}
  .send{width:100%;margin-top:16px;background:var(--green);color:#fff;border:none;border-radius:10px;padding:14px;font-size:15px;font-weight:700;cursor:pointer}
  .send:active{transform:scale(.98)}
  .optst{width:100%;display:flex;justify-content:space-between;align-items:center;background:#f1f0e9;border:none;border-radius:9px;padding:12px 14px;font-size:13.5px;font-weight:700;color:var(--ink2);cursor:pointer;margin-top:12px}
  .uploadbtn{display:inline-flex;align-items:center;gap:6px;font-size:12.5px;font-weight:700;color:var(--accent-ink);
    background:var(--accent-soft);padding:11px 6px;border-radius:9px;cursor:pointer;flex:1;justify-content:center}
  .attachrow{display:flex;gap:8px;margin-top:12px}
  .filelist{display:flex;gap:8px;flex-wrap:wrap;margin-top:10px}
  .selsel{width:100%;border:1.5px solid var(--line);border-radius:8px;padding:9px;font-family:inherit;font-size:13px;font-weight:600;color:var(--ink);background:var(--card);outline:none}

  .calwrap{background:var(--card);border:1px solid var(--line);border-radius:12px;padding:12px;margin-bottom:14px}
  .calhead{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}
  .calhead button{border:none;background:#f1f0e9;width:30px;height:30px;border-radius:7px;cursor:pointer;color:var(--ink2);display:flex;align-items:center;justify-content:center}
  .calmon{font-weight:700;font-size:15px;font-family:'Bricolage Grotesque',sans-serif}
  .calgrid{display:grid;grid-template-columns:repeat(7,minmax(0,1fr));gap:3px}
  .caldow{text-align:center;font-size:10px;font-weight:700;color:var(--muted);padding:2px 0}
  .calcell{min-height:50px;background:#f7f6f1;border-radius:6px;padding:3px}
  .calcell.empty2{background:transparent}
  .calcell.today{background:var(--accent-soft);outline:1.5px solid var(--accent)}
  .caldate{font-size:10.5px;font-weight:700;color:var(--ink2);margin-bottom:2px}
  .calev{font-size:8.5px;color:#fff;border-radius:4px;padding:2px 4px;margin-bottom:2px;line-height:1.35;cursor:pointer;
    display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;word-break:break-word}
  .calev:active{opacity:.75}
  .calmore{font-size:8.5px;color:var(--muted);font-weight:700}
  .callegend{display:flex;flex-wrap:wrap;gap:5px 11px;margin-top:10px}
  .callegend span{font-size:10px;color:var(--muted);font-weight:600;display:inline-flex;align-items:center;gap:5px}
  .ldot{width:8px;height:8px;border-radius:50%;flex:0 0 auto}
  .syncrow{margin-top:12px;border-top:1px solid var(--line);padding-top:11px}
  .synctitle{font-size:12px;font-weight:700;color:var(--ink2);margin-bottom:8px}
  .syncbtns{display:flex;gap:8px}
  .syncb{flex:1;border:1.5px solid var(--line);background:var(--card);border-radius:8px;padding:10px 6px;font-size:12px;font-weight:700;color:var(--ink2);cursor:pointer}

  .empty{display:flex;flex-direction:column;align-items:center;gap:8px;text-align:center;color:var(--muted);font-size:13.5px;padding:28px 10px}
  .empty .em-ic{font-size:26px;line-height:1}
  .empty b{color:var(--ink);display:block;font-size:14px;margin-bottom:2px}
  .toast{position:absolute;bottom:150px;left:50%;transform:translateX(-50%);background:#22262a;color:#fff;
    padding:12px 17px;border-radius:10px;font-size:13px;font-weight:600;z-index:60;max-width:92%;width:max-content;text-align:center;line-height:1.45;animation:up .2s ease}

  /* desktop-width viewports (i.e. not a real phone): restore the decorative "phone in a box"
     mockup look this was originally built with, instead of a full-bleed app. */
  @media (min-width:600px){
    body{min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:30px 14px}
    .caption{display:block;font-size:12px;color:#6d6a5f;margin-top:16px;text-align:center;max-width:390px;line-height:1.5}
    .phone{width:392px;max-width:96vw;height:806px;background:#23262a;border-radius:46px;padding:12px;box-shadow:0 30px 80px rgba(27,30,33,.35);flex:0 0 auto}
    .notch{display:block}
    .screen{border-radius:36px}
    .top{padding:44px 18px 14px}
    .nav{padding:8px 6px 20px}
    .fab{bottom:78px}
  }
</style>
</head>
<body>
<div id="root"></div>
<div id="err-overlay"></div>
<script>
window.onerror=function(msg,src,line){
  var el=document.getElementById('err-overlay');
  el.style.display='block';
  el.textContent='Runtime error — please report this to Claude:\n'+msg+' (line '+line+')\n\n(tap to dismiss)';
  el.onclick=function(){el.style.display='none';};
};
</script>

/* Walks the REAL boss_id chain upward from a real person (by short name), collecting
   {n: raw name, label: "Name (Role)"} for every real boss above them. Replaces a static
   4-name/4-rank array that only ever covered the original demo data — same bug class already
   fixed once for canApproveFrom below (its own comment explains: the old map "silently failed for
   anyone hired since" the first ~10 demo names). admin/mgmt are org-wide with no meaningful single
   boss chain here. seen guards against a bad boss_id cycle ever infinite-looping the UI.
   Returns {n,label} pairs rather than a single formatted string — n is what gets stored in
   instructedBy (must equal a real staff.n/short name for findPerson/concernedForM to resolve it
   later), label is the "(Role)" decoration for display only. Storing the formatted label directly
   was the same bug console's BOSS_LABEL had: it broke instructedBy matching for anyone the label
   applied to. */
const bossesFor=(role,self)=>{
  if(role==='admin'||role==='mgmt'||!self)return [];
  const out=[],seen=new Set();
  let cur=findPerson(self);
  while(cur&&cur.boss&&!seen.has(cur.boss)){
    seen.add(cur.boss);
    const boss=findPerson(cur.boss);
    out.push(boss?{n:boss.n,label:boss.n+' ('+boss.role+')'}:{n:cur.boss,label:cur.boss});
    cur=boss;
  }
  return out;
};
/* "On instruction of" in the New Task form: all leadership (Administrator/Director/Management), not
   just the creator's boss chain — anyone at that tier can hand a task down. Excludes the creator
   ("own initiative" covers that). Kept separate from bossesFor(), which stays a real boss chain for
   approval routing (its .slice(-1)[0] = the topmost boss who approves). self is a short name. */
const INSTRUCT_RANK_M={Administrator:0,Director:1,Management:2};
const instructorsFor=self=>ALL_PEOPLE.filter(p=>p.role in INSTRUCT_RANK_M&&p.s!==self)
  .sort((a,b)=>INSTRUCT_RANK_M[a.role]-INSTRUCT_RANK_M[b.role]||a.n.localeCompare(b.n))
  .map(p=>({n:p.n,label:p.n+' ('+p.role+')'}));
/* same approval model as the console's canApprove: admin/mgmt approve anything, otherwise only the
   person's real direct boss (checked live via ALL_PEOPLE/findPerson, matching console's
   `p.boss===viewer.n` exactly) — not a hardcoded name→role table. The old BOSS_ROLE map only ever
   covered the original ~10 demo first names and silently failed (denied) for anyone hired since,
   e.g. Chandu (Construction) or Prashant (IT & Systems). viewerShort is the short name of whoever
   is actually viewing (real login or Preview As person), passed in by each call site. */
/* Issuer-based approval (matches console's canApprove): admin/mgmt approve anything; otherwise the
   person who ISSUED the task approves its completion — t.instructedBy is a full name, compared to
   the viewer's full name (viewerName). Legacy tasks with no instructedBy (and purchase requests,
   which pass no task) fall back to the old direct-boss rule so nothing already in flight breaks. */
const canApproveFrom=(role,from,viewerShort,t,viewerName)=>{
  if(role==='admin'||role==='mgmt')return true;
  if(t&&t.instructedBy)return viewerName===t.instructedBy;
  const p=findPerson(from);return !!(p&&p.boss===viewerShort);};
/* the staff object a maintenance report resolves to — its category's CURRENT admin-configured
   recipient (issueRecipientId lives in shared.js, reads the ROUTING_RULES global). Replaces the old
   deptHeadM() dept-head lookup: recipients are now specific, admin-picked staff, not derived from a
   department. Returns null when nothing resolves (no config / unset recipient). */
function issueRecipientM(q){const id=issueRecipientId(q);return id?ALL_PEOPLE.find(p=>p.id===id)||null:null;}
/* Supply two-stage. supplyApproverIdM resolves the stage-1 approver, in priority order: (1) the
   approver STORED on the request at creation (approver_staff_id) — the configured approver for the
   requester's department, snapshotted; (2) the currently-configured supply_approver rule for the
   requester's department (covers legacy requests with no stored id); (3) FALLBACK to the Sr. Manager
   of the requester's department (role='Manager' AND same department), escalating to their boss if the
   requester IS that Sr. Manager / none exists, so it never dead-ends. supplyRecipientId (shared.js) is
   the single configured procurement recipient. */
function supplyApproverIdM(q){
  if(q.approver_staff_id)return q.approver_staff_id;
  const req=findPerson(q.from);if(!req)return null;
  const cfg=supplyApproverIdForDept(req.department);if(cfg)return cfg;
  // multi-dept aware: the Sr. Manager who HEADS the requester's department (head_departments), else the legacy dept match
  const mgr=ALL_PEOPLE.find(p=>p.role==='Manager'&&Array.isArray(p.headDepartments)&&p.headDepartments.includes(req.department))
    ||ALL_PEOPLE.find(p=>p.role==='Manager'&&p.department===req.department);
  if(mgr&&mgr.s!==req.s)return mgr.id;

   recipient sees ONLY the reports routed to them (identity-based — surfaces reports filed by someone

function issuesForViewer(role,self){

   requests awaiting the requester's Sr. Manager approval; fulfil = approved supply requests routed
   to the configured supply recipient to procure; issues = maintenance reports routed to this viewer.
   Also used by NotifSheet's bell so the two screens can't drift apart. */
function approvalQueue(role,self,name){
  const me=findPerson(self);const meId=me?me.id:null;const all=role==='admin'||role==='mgmt';

function attentionList(scope){

     loads org-wide non-leadership staff into MEMBERS (RLS widened for cross-department ASSIGNMENT)
     — their oversight surfaces must still show only their subtree. admin/mgmt pass their org-wide
     team (ALL_STAFF), so they are unchanged; without a scope arg it falls back to all MEMBERS. */
  const pool=scope?MEMBERS.filter(m=>scope.includes(m.n)):MEMBERS;
  return pool.map(m=>{
    const mine=tasks.filter(t=>!t.done&&hasWhoM(t,m.n));
    const od=mine.filter(t=>t.date&&t.date<iso(TODAY));
    const worst=od.length?Math.max(...od.map(t=>Math.round((TODAY-new Date(t.date+'T00:00:00'))/86400000))):0;
    const rs=[];

/* task creation should only offer departments that actually have real staff in them, and the
   Administrator's own department alone shouldn't count — same policy as console's realDeptKeys() */
/* scope, when given, restricts which departments count to the caller's own team (short names) —
   without it, a Manager creating a task saw every department org-wide, including ones with no one

const realDeptKeys=(scope)=>{const pool=(scope?MEMBERS.filter(m=>scope.includes(m.n)):MEMBERS).filter(p=>p.role!=='Administrator');
  const has=new Set(pool.map(p=>p.dept));return Object.keys(BUCKETS).filter(k=>has.has(BUCKETS[k]));};
/* for recurring tasks: schedule the next occurrence after completion, returns its date */
function spawnNextRecur(t){
  if(!t.recur)return null;
  const base=t.date&&t.date>iso(TODAY)?t.date:iso(TODAY);
  const d=new Date(base+'T00:00:00');
  let nd;
  if(t.recur==='daily'){d.setDate(d.getDate()+1);nd=iso(d);}
  else if(t.recur==='weekly'){if(t.recurOn!=null){d.setDate(d.getDate()+1);nd=nextAnchor('weekly',t.recurOn,iso(d));}else{d.setDate(d.getDate()+7);nd=iso(d);}}
  else if(t.recur==='monthly'){const y=d.getFullYear(),m=d.getMonth()+1,day=t.recurOn!=null?t.recurOn:d.getDate();
    nd=iso(new Date(y,m,Math.min(day,new Date(y,m+1,0).getDate())));}
  else{const y=d.getFullYear()+1,mm=t.recurOn?t.recurOn.m:d.getMonth(),dd=t.recurOn?t.recurOn.d:d.getDate();
    nd=iso(new Date(y,mm,Math.min(dd,new Date(y,mm+1,0).getDate())));}
  tasks.push({t:t.t,who:t.who,init:t.init,coWho:t.coWho?t.coWho.slice():undefined,
    due:'Due '+fmtD(nd),date:nd,bucket:t.bucket,type:t.type,done:false,recur:t.recur,recurOn:t.recurOn,
    selfAssigned:t.selfAssigned,instructedBy:t.instructedBy});

function suggestAssignee(type,bucket){

  if(!pool.length){pool=MEMBERS.slice();basis='any';}
  pool=pool.slice().sort((a,b)=>load[a.n]-load[b.n]);
  let pick=pool[0];
  let reason=basis==='type'?`Handles ${TYPES[type].l.toLowerCase()} tasks · ${load[pick.n]} open now`
    :basis==='bucket'?`Owns the ${BUCKETS[bucket]||bucket} department · ${load[pick.n]} open now`
    :`Lightest workload · ${load[pick.n]} open now`;

function suggestFixer(text){const t=(text||'').toLowerCase();
  if(/fan|light|electric|wiring|socket|projector|power/.test(t))return{n:'Hari',why:'electrical work'};
  if(/tap|leak|water|pipe|plumb|toilet|drain/.test(t))return{n:'Suresh',why:'plumbing work'};
  if(/clean|dust|sweep|garbage|dirty/.test(t))return{n:'Latha',why:'housekeeping'};
  const s=suggestAssignee('repair','maintenance');return{n:s.n,why:'lightest workload'};}
function guessBucket(t){t=t.toLowerCase();
  if(/\b(exam|class|academic|timetable|teacher|lesson|syllabus|library)\b/.test(t))return 'academic';
  if(/\b(projector|wifi|network|computer|laptop|desktop|monitor|smart ?board|cctv|printer|software|hardware|server|rack|router|switch|internet|panel|wiring)\b/.test(t))return 'it';
  if(/\b(bus|driver|vehicle|transport|route)\b/.test(t))return 'transport';
  if(/\b(leave|recruit|salary|payroll|appraisal|hiring)\b/.test(t))return 'hr';
  if(/\b(invoice|payment|purchase|order|buy|cash|fees?|budget|supplies|stock)\b/.test(t))return 'accounts';
  if(/\b(build|construction|civil|wall|cement|slab|elevation|surveyor|turf)\b/.test(t))return 'construction';
  if(/\b(repair|fix|broken|leak|clean|service|maintain)\b/.test(t))return 'maintenance';
  return 'administration';}
function suggestDue(type,text){const t=(text||'').toLowerCase();
  if(/\b(urgent|asap|immediately|now|today)\b/.test(t))return{when:"Today · 5:00 PM",reason:"Sounds urgent"};
  if(type==="repair")return{when:"Tomorrow · 9:00 AM",reason:"Repairs are usually next-day"};
  if(type==="purchase")return{when:"This week",reason:"Purchases typically allow a few days"};
  if(type==="maint")return{when:"Next week",reason:"Maintenance can be scheduled ahead"};
  return{when:"Tomorrow · 9:00 AM",reason:"Default next-day"};}
const DATE_OPTS=["Today · 5:00 PM","Tomorrow · 9:00 AM","This week","Friday · 5:00 PM","Next week"];
function whenToDate(when){const w=(when||'').toLowerCase();const d=new Date(TODAY);
  if(w.includes('today')){}
  else if(w.includes('tomorrow'))d.setDate(d.getDate()+1);
  else if(w.includes('friday')||w.includes('this week')){const df=(5-d.getDay()+7)%7||7;d.setDate(d.getDate()+df);}
  else if(w.includes('next week'))d.setDate(d.getDate()+7);

function parseText(txt){
  const low=txt.toLowerCase();

  let when=null,dateIso=null,dateWhy=null;
  const abs=guessAbsoluteDate(low);
  if(abs){dateIso=abs.date;dateWhy=abs.why;}
  else if(low.includes('today'))when='Today · 5:00 PM';
  else if(low.includes('tomorrow'))when='Tomorrow · 9:00 AM';
  else if(low.includes('friday'))when='Friday · 5:00 PM';
  else if(low.includes('this week'))when='This week';
  else if(low.includes('next week'))when='Next week';
  let recur=guessRecur(low),recurOn=null;
  const wm=low.match(/\bevery\s+(sunday|monday|tuesday|wednesday|thursday|friday|saturday)s?\b/);
  if(wm){recur='weekly';recurOn={sunday:0,monday:1,tuesday:2,wednesday:3,thursday:4,friday:5,saturday:6}[wm[1]];}
  const tm=guessTime(low);
  if(tm){const lbl=fmtTime(tm);when=when?when.split(' · ')[0]+' · '+lbl:'Today · '+lbl;}
  const END=/\s*\b(?:by|before|at)?\s*(?:today|tomorrow|this week|next week|friday|every ?day|daily|every week|weekly|every month|monthly|every year|yearly|annually|every\s+(?:sunday|monday|tuesday|wednesday|thursday|friday|saturday)s?|noon|\d{1,2}(?::\d{2})?\s*(?:am|pm))\b\.?\s*$/i;
  let task=txt.replace(/^(please\s+)?(tell|ask|remind|get)\s+\w+(\s+and\s+\w+)*\s+(to\s+)?/i,'').replace(/^\w+\s+should\s+/i,'');
  task=task.replace(END,'').replace(END,'').replace(/[,.]\s*$/,'').trim()||txt;
  task=task.charAt(0).toUpperCase()+task.slice(1);

       own list and clears the request. */
    fulfilReq:qi=>{if(previewing){say("You're previewing — switch back to fulfil for real");return;}
      const q=pendingReqs.splice(qi,1)[0];if(!q)return;
      const rec=q.target_staff_id?ALL_PEOPLE.find(p=>p.id===q.target_staff_id):null;
      const m=rec?findMember(rec.s):null;const s=m||suggestAssignee('purchase','accounts');
      const nt={t:"Buy: "+q.t,who:s.n,init:s.i,due:"This week",date:whenToDate("this week"),
        bucket:"accounts",type:"purchase",done:false,origin:"request",
        note:'Approved supply request from '+q.from+(q.note?' — “'+q.note+'”':'')};
      tasks.unshift(nt);
      R();
      saveTask(nt).catch(console.error);deleteRequestRow(q).catch(console.error);
      say('Marked for procurement 📦 · added to '+s.n+'’s list');},
    declineReq:qi=>{if(previewing){say("You're previewing — switch back to decide for real");return;}
      const q=pendingReqs[qi];if(q){q.declined_at=new Date().toISOString();q.declined_by=r.id;R();declineRequestRow(q).catch(console.error);say('Request declined — '+q.from.split(' ')[0]+' will be notified');}},
    assignIssue:(qi,who)=>{if(previewing){say("You're previewing — switch back to assign for real");return;}
      const q=pendingIssues.splice(qi,1)[0];if(!q)return;const m=findMember(who);
      const nt={t:q.t,who:m.n,init:m.i,due:"Tomorrow · 9:00 AM",date:whenToDate("tomorrow"),
        bucket:"maintenance",type:"repair",done:false,origin:"issue",note:'Reported by '+q.from,files:q.files};
      tasks.unshift(nt);
      R();
      saveTask(nt).catch(console.error);deleteRequestRow(q).catch(console.error);
      say('Assigned to '+who+' 🔧 · notified in TeamFlow');},
    approveExt:i=>{if(previewing){say("You're previewing — switch back to approve for real");return;}
      const t=tasks[i];if(!t||!t.extReq)return;
      t.date=t.extReq.newDate;t.due='Due '+fmtD(t.extReq.newDate);delete t.extReq;R();
      saveTask(t).catch(console.error);
      notifyEvent(t.id,r.id,'approved the extension — new due '+fmtD(t.date),concernedForM(t,r.self));
      say('Extension approved ⏳ · assignee notified');},
    rejectExt:i=>{if(previewing){say("You're previewing — switch back to decide for real");return;}
      const t=tasks[i];if(!t||!t.extReq)return;delete t.extReq;R();
      saveTask(t).catch(console.error);
      notifyEvent(t.id,r.id,'rejected the extension request',concernedForM(t,r.self));
      say('Extension rejected — original due date stands');},
    /* completion-approval actions — same shape as approveExt/rejectExt above, just for the
       completionPending marker instead of extReq. Approving is the only place that actually runs
       the done-flip + recurrence spawn (spawnNextRecur); a rejected completion should never have
       already generated its next occurrence. */
    approveCompletion:i=>{if(previewing){say("You're previewing — switch back to approve for real");return;}
      const t=tasks[i];if(!t||!t.completionPending)return;
      delete t.completionPending;
      if(t.coWho&&t.coWho.length)t.doneBy=assigneesM(t).slice();
      t.done=true;t.doneWhen='just now';delete t.extReq;
      const nd=spawnNextRecur(t);
      persistComplete(t,nd);R();
      notifyEvent(t.id,r.id,'approved completion',concernedForM(t,r.self));
      say(nd?'Completion approved ✓ · next '+RECURS[t.recur].toLowerCase()+' on '+fmtD(nd):'Completion approved — task closed ✓');},
    rejectCompletion:i=>{if(previewing){say("You're previewing — switch back to decide for real");return;}
      const t=tasks[i];if(!t||!t.completionPending)return;
      /* leaves status as-is (inprogress, from the bump at submission time) rather than forcing it
         back to open — same "still-open/in-progress" behavior as console's rejectCompletion. */
      delete t.completionPending;t.doneBy=[];R();
      saveTask(t).catch(console.error);
      notifyEvent(t.id,r.id,'rejected completion — sent back for rework',concernedForM(t,r.self));
      say('Completion rejected — sent back to '+t.who.split(' ')[0]);},
    needExt,
    /* opening a notification always jumps to the real signed-in user's own task, regardless of
       whatever role "Preview As" is currently simulating — the notification IS theirs (RLS-scoped) */
    openNotif:n=>{markNotifRead(n).catch(console.error);n.read_at=new Date().toISOString();R();
      const idx=tasks.findIndex(x=>x.id===n.task_id);if(idx>=0)setSheet({kind:'update',idx});else setSheet(null);},
    markAllNotifsSeen:()=>{const unread=notifs.filter(n=>!n.read_at);
      if(!unread.length)return;markAllNotifsRead(unread).catch(console.error);
      unread.forEach(n=>{n.read_at=new Date().toISOString();});R();},
  };

  return <>
  <div className="phone"><div className="notch"/><div className="screen">
    <div className="top">

          </button>

      </div>
      <div className="rolebar">

          // object identity, so indexOf is exact (and === qi for admin/mgmt, where the list is full).

  </div>;
}

/* ---- checklist write helpers (mobile copies; separate page from console, no global collision) ---- */
const clDefAnchor=f=>f==='weekly'?{dow:0}:f==='monthly'?{dom:1}:f==='yearly'?{y_day:1,y_mon:1}:{};
const clNextFreq={daily:'weekly',weekly:'monthly',monthly:'yearly',yearly:'daily'};
async function clTick(item,date,on,R){const owner=item.staff_id;
  if(on)clDone.push({id:'tmp'+Date.now(),item_id:item.id,staff_id:owner,occ_date:date});
  else{const i=clDone.findIndex(c=>c.item_id===item.id&&c.occ_date===date);if(i>=0)clDone.splice(i,1);}
  R();
  try{if(on)await sb.from('checklist_completions').upsert({item_id:item.id,staff_id:owner,occ_date:date},{onConflict:'item_id,occ_date'});
      else await sb.from('checklist_completions').delete().eq('item_id',item.id).eq('occ_date',date);}catch(e){console.error(e);}}
async function clAdd(staffId,body,freq,anchor,R){
  const row={staff_id:staffId,body,freq,sort_order:clItems.filter(i=>i.staff_id===staffId&&!i.archived).length,...anchor};
  const {data,error}=await sb.from('checklist_items').insert(row).select().single();
  if(error){console.error(error);return;}clItems.push(data);R();}
async function clPatch(id,patch,R){const it=clItems.find(i=>i.id===id);if(it)Object.assign(it,patch);R();
  const {error}=await sb.from('checklist_items').update(patch).eq('id',id);if(error)console.error(error);}
async function clArchive(id,R){const i=clItems.findIndex(x=>x.id===id);if(i>=0)clItems.splice(i,1);R();
  const {error}=await sb.from('checklist_items').update({archived:true}).eq('id',id);if(error)console.error(error);}
async function clReorder(staffId,id,dir,R){const arr=clItemsFor(staffId),it=arr.find(x=>x.id===id);
  const same=arr.filter(x=>x.freq===it.freq),p=same.indexOf(it),sw=dir<0?same[p-1]:same[p+1];if(!sw)return;
  const a=it.sort_order,b=sw.sort_order;it.sort_order=b;sw.sort_order=a;R();
  await sb.from('checklist_items').update({sort_order:it.sort_order}).eq('id',it.id);
  await sb.from('checklist_items').update({sort_order:sw.sort_order}).eq('id',sw.id);}
async function clMarkAbsent(staffId,date,on,markedBy,R){
  if(on)clAbs.push({id:'tmp'+Date.now(),staff_id:staffId,absent_date:date,marked_by:markedBy});
  else{const i=clAbs.findIndex(a=>a.staff_id===staffId&&a.absent_date===date);if(i>=0)clAbs.splice(i,1);}
  R();
  try{if(on)await sb.from('checklist_absences').upsert({staff_id:staffId,absent_date:date,marked_by:markedBy},{onConflict:'staff_id,absent_date'});
      else await sb.from('checklist_absences').delete().eq('staff_id',staffId).eq('absent_date',date);}catch(e){console.error(e);}}
function clPeriodDates(mode,anchorISO){const a=new Date(anchorISO+'T00:00:00'),out=[];
  if(mode==='week'){const dow=(a.getDay()+6)%7,mon=new Date(a);mon.setDate(a.getDate()-dow);
    for(let i=0;i<7;i++){const d=new Date(mon);d.setDate(mon.getDate()+i);out.push(iso(d));}}
  else{const y=a.getFullYear(),m=a.getMonth(),last=new Date(y,m+1,0).getDate();for(let i=1;i<=last;i++)out.push(iso(new Date(y,m,i)));}
  return out;}
function clCellState(staffId,isoD,item,todayISO,doneOn){
  if(!clDueOn(item,isoD))return 'nd'; if(isoD>todayISO)return 'future';
  if(clAbsOn(staffId,isoD))return 'abs'; return doneOn(isoD).has(item.id)?'done':'miss';}

    const orgW=doc.getTextWidth(ORG_NAME);doc.setFontSize(12);doc.setTextColor(67,73,79);doc.text('Checklist Snapshot — '+(mode==='week'?'Weekly':'Monthly'),40+orgW+18,y);y+=24;}
  else{doc.setFont('helvetica','bold');doc.setFontSize(14);doc.text('Checklist Snapshot — '+(mode==='week'?'Weekly':'Monthly'),40,y);y+=20;}

    items.forEach(it=>{const s=clCellState(staffId,d,it,todayISO,doneOn);if(s==='done'){due++;done++;}else if(s==='miss')due++;});});
  doc.setFontSize(10);doc.setTextColor(85,85,85);

  const SYM={done:'',miss:'·',abs:'A',nd:'–',future:''};

  const ordered=[];CL_FREQORDER.forEach(f=>items.filter(i=>i.freq===f).forEach(i=>ordered.push(i)));
  const states=ordered.map(it=>days.map(d=>clCellState(staffId,d,it,todayISO,doneOn)));

  doc.autoTable({startY:y+12,margin:{left:40,right:40},styles:{fontSize:7.5,halign:'center',valign:'middle',cellPadding:2,lineColor:[236,235,227],lineWidth:0.5},
    headStyles:{fillColor:[250,249,245],textColor:[67,73,79],fontStyle:'bold',fontSize:7},columnStyles:{0:{halign:'left',cellWidth:150}},head,body,
    didParseCell:function(data){if(data.section!=='body'||data.column.index===0)return;const s=states[data.row.index][data.column.index-1];

}

/* ============ calendar ============ */
function Cal({ctx,personal,allowFilter}){
  const [base,setBase]=useState(new Date(2026,6,1));
  const [fw,setFw]=useState('all');
  const scope=personal?[ctx.r.self]:ctx.scope;
  const y=base.getFullYear(),m=base.getMonth();
  const firstDow=new Date(y,m,1).getDay(),days=new Date(y,m+1,0).getDate();
  const vis=tasks.map((t,i)=>({t,i})).filter(o=>o.t.date&&assigneesM(o.t).some(a=>scope.includes(a))&&(!allowFilter||fw==='all'||hasWhoM(o.t,fw)));
  const byDay={};vis.forEach(o=>{const d=new Date(o.t.date+'T00:00:00');if(d.getFullYear()===y&&d.getMonth()===m)(byDay[d.getDate()]=byDay[d.getDate()]||[]).push(o);});
  const bks=[...new Set(vis.map(o=>o.t.bucket).filter(Boolean))];
  const cells=[];
  for(let i=0;i<firstDow;i++)cells.push(<div key={'e'+i} className="calcell empty2"/>);
  for(let d=1;d<=days;d++){
    const isT=sameDay(new Date(y,m,d),TODAY);const evs=byDay[d]||[];
    cells.push(<div key={d} className={'calcell'+(isT?' today':'')}>
      <div className="caldate">{d}</div>
      {evs.slice(0,3).map(o=>{const dd=new Date(o.t.date+'T00:00:00');const od=!o.t.done&&dd<TODAY&&!sameDay(dd,TODAY);
        return <div key={o.i} className="calev" style={{background:bucketColor(o.t.bucket),opacity:o.t.done?.55:1,textDecoration:o.t.done?'line-through':undefined,boxShadow:od?'0 0 0 1.5px var(--red)':undefined}}
          onClick={()=>ctx.setSheet({kind:'event',idx:o.i})}>{o.t.done?'✓ ':''}{gist(o.t.t)}</div>;})}
      {evs.length>3?<div className="calmore" style={{cursor:'pointer'}}
        onClick={()=>ctx.setSheet({kind:'day',day:new Date(y,m,d),events:evs})}>+{evs.length-3} more</div>:null}
    </div>);
  }
  function ics(){
    const openVis=vis.filter(o=>!o.t.done);
    const calName=(orgName()?orgName()+' — ':'')+'TeamFlow'; // shown as the calendar title in phone calendar apps
    let s='BEGIN:VCALENDAR\r\nVERSION:2.0\r\nPRODID:-//TeamFlow//EN\r\nX-WR-CALNAME:'+calName+'\r\n';
    openVis.forEach((o,ix)=>{s+='BEGIN:VEVENT\r\nUID:tf-'+ix+'-'+Date.now()+'@teamflow\r\nDTSTART;VALUE=DATE:'+o.t.date.replace(/-/g,'')+'\r\nSUMMARY:'+o.t.t+' ('+o.t.who+')\r\nEND:VEVENT\r\n';});
    s+='END:VCALENDAR';
    saveBlob(new Blob([s],{type:'text/calendar'}),iso(new Date())+'-teamflow-calendar.ics');
    ctx.say(openVis.length+' due dates exported (.ics)');
  }
  return <div className="calwrap">
    <div className="calhead">
      <button onClick={()=>setBase(new Date(y,m-1,1))}><I n="chevl" s={16}/></button>
      <div className="calmon">{base.toLocaleString('en',{month:'long',year:'numeric'})}</div>
      <button onClick={()=>setBase(new Date(y,m+1,1))}><I n="chevr" s={16}/></button>
    </div>
    {allowFilter?<select className="selsel" style={{marginBottom:10}} value={fw} onChange={e=>setFw(e.target.value)}>
      <option value="all">All employees</option>
      {scope.map(n=><option key={n} value={n}>{n}</option>)}</select>:null}
    <div className="calgrid">
      {['S','M','T','W','T2','F','S2'].map(d=><div key={d} className="caldow">{d[0]}</div>)}
      {cells}
    </div>
    {bks.length?<div className="callegend">
      {bks.map(b=><span key={b}><span className="ldot" style={{background:bucketColor(b)}}/>{BUCKETS[b]||b}</span>)}
      <span><span className="ldot" style={{background:'#fff',boxShadow:'0 0 0 1.5px var(--red)'}}/>overdue</span>
    </div>:null}
    <div className="syncrow">
      <div className="synctitle">📲 Sync my calendar — stay updated automatically</div>
      <div className="syncbtns">
        <button className="syncb" disabled style={{opacity:.5,cursor:'default'}} title="Coming soon">Google</button>
        <button className="syncb" disabled style={{opacity:.5,cursor:'default'}} title="Coming soon">Outlook</button>
        <button className="syncb" onClick={ics}>Phone (.ics)</button>
      </div>
    </div>
  </div>;
}

function csvDownload(name,rows){
  const q=v=>'"'+String(v==null?'':v).replace(/"/g,'""')+'"';
  const all=orgCsvRows().concat(rows); // org name in A1 for every CSV/XLSX export
  saveBlob(new Blob([all.map(r=>r.map(q).join(',')).join('\r\n')],{type:'text/csv'}),name);
}
/* Mobile counterpart to console's DailyReportsPanel (same daily_reports table, same is_in_scope
   RLS) — browse past submissions from ctx.scope, a completeness indicator, and escalate-from-
   review, adapted to mobile's own shapes: ctx.scope is an array of short-name strings here (not
   person objects like console's), so person lookups go through ALL_PEOPLE by id/short-name rather
   than console's byId. Lives inside Insights since that's the one screen every non-worker role
   already has — mobile has no separate Reports page to hang a new tab off of. No print button:
   mobile has no window.print()/printReport precedent anywhere (checked), so this only adds a CSV
   download, mirroring the .ics calendar export's existing saveBlob pattern instead of inventing one. */
function DailyReportsSection({ctx}){
  const [reports,setReports]=useState([]);
  const [fDate,setFDate]=useState(iso(TODAY)); // default to today's reports; Clear widens to all dates
  const [fb,setFb]=useState('all');
  const [fw,setFw]=useState('all');
  const [escId,setEscId]=useState(null);
  const [escText,setEscText]=useState('');
  const [escPrio,setEscPrio]=useState('Medium');
  const [escBusy,setEscBusy]=useState(false);

  useEffect(()=>{
    sb.from('daily_reports').select('*').order('created_at',{ascending:false})
      .then(({data,error})=>{if(error)console.error(error);setReports(data||[]);});
  },[ctx.syncTick]); // refetch on realtime sync so a resubmitted report's counts update live

  /* ctx.scope for Management is deliberately org-wide everywhere else (Management "oversees every
     department jointly" — see ROLES.mgmt — there's no per-person subtree to narrow to). Daily
     Reports is different: with no filter picked, defaulting straight to all 17 people buries a
     Management viewer's own actual reports (Directors, plus anyone reporting straight to
     Management) in org-wide noise. Mirrors console's DailyReportsPanel exactly: fullScope (the
     TRUE, un-narrowed ctx.scope) is what the department/staff dropdowns are always built from —
     picking a department has to be able to reach every real department, not just whatever's inside
     the narrowed default — while baseScope only substitutes the narrower Directors-only set when
     no filter is active. Getting this backwards (building the dropdown options from the already-
     narrowed set) was a real bug caught in live testing: the department picker only ever offered
     "Management" for a Management viewer, since that's the only department the narrowed default
     itself touches. */
  const fullScope=ctx.scope.map(s=>findPerson(s)).filter(Boolean);
  const mgmtDefault=ctx.role==='mgmt'&&fb==='all'&&fw==='all';
  const baseScope=mgmtDefault
    ?ALL_PEOPLE.filter(p=>p.role==='Director'||(findPerson(p.boss)&&findPerson(p.boss).role==='Management'))
    :fullScope;
  const deptKeys=Object.keys(BUCKETS).filter(k=>fullScope.some(p=>p.department===BUCKETS[k]));
  const empOpts=fullScope.filter(p=>fb==='all'||p.department===BUCKETS[fb]);
  const filteredScope=baseScope.filter(p=>(fb==='all'||p.department===BUCKETS[fb])&&(fw==='all'||p.s===fw));
  const scopeIds=new Set(filteredScope.map(p=>p.id));
  const scoped=reports.filter(r=>scopeIds.has(r.created_by)&&(!fDate||r.report_date===fDate));
  const shown=scoped.slice(0,15);
  const today=iso(TODAY);
  const submittedToday=new Set(reports.filter(r=>r.report_date===today).map(r=>r.created_by));
  const missing=filteredScope.filter(p=>!submittedToday.has(p.id));

  async function sendEscalation(row){
    if(ctx.previewing){ctx.say("You're previewing — switch back to escalate for real");return;}
    if(!escText.trim()){ctx.say('Describe what needs escalating');return;}
    setEscBusy(true);
    const p=ALL_PEOPLE.find(x=>x.id===row.created_by);
    const {error}=await sb.from('report_issues').insert({created_by:ctx.r.id,daily_report_id:row.id,
      issue:escText.trim(),remarks:'Raised while reviewing '+(p?p.n:'someone')+"’s "+fmtD(row.report_date)+' daily report',
      priority:escPrio,files:[]});
    if(error){console.error(error);ctx.say('Could not escalate — try again');setEscBusy(false);return;}
    setEscBusy(false);setEscId(null);setEscText('');setEscPrio('Medium');
    ctx.say('Escalated'+(ctx.r.boss?' to '+escalateTargetLabel(ctx.r.boss):''));
  }

  return <>
    <div className="sec" style={{marginTop:16}}>Today's daily reports</div>
    {deptKeys.length?<div style={{display:'flex',gap:8,marginBottom:8}}>
      <select className="selsel" style={{flex:1}} value={fb} onChange={e=>{setFb(e.target.value);setFw('all');}}>
        <option value="all">All departments</option>
        {deptKeys.map(k=><option key={k} value={k}>{BUCKETS[k]}</option>)}</select>
      <select className="selsel" style={{flex:1}} value={fw} onChange={e=>setFw(e.target.value)}>
        <option value="all">{fb==='all'?'All staff':'All in '+BUCKETS[fb]}</option>
        {empOpts.map(p=><option key={p.s} value={p.s}>{p.n}</option>)}</select>
    </div>:null}
    <div className="attn" style={{flexWrap:'wrap'}}>
      <div style={{flex:1,minWidth:0}}>
        <div className="nm">{filteredScope.length-missing.length} of {filteredScope.length} submitted</div>
        {missing.length?<div className="rs">Still waiting on: {missing.map(p=>p.n.split(' ')[0]).join(', ')}</div>
          :<div className="rs">Everyone in your team has submitted today.</div>}
      </div>
    </div>
    <div style={{display:'flex',gap:8,alignItems:'center',margin:'12px 0 8px'}}>
      <input type="date" className="selsel" style={{flex:1}} value={fDate} max={iso(TODAY)} onChange={e=>setFDate(e.target.value)}/>
      {fDate?<button className="chipbtn" onClick={()=>setFDate('')}>Clear</button>:null}
    </div>
    {shown.length?<>
      {shown.map(row=>{
        const p=ALL_PEOPLE.find(x=>x.id===row.created_by);
        const isEsc=escId===row.id;
        return <div className="attn" key={row.id} style={{flexWrap:'wrap'}}>
          <div className="ring" style={{background:'var(--accent)'}}>{p?p.n.split(' ').map(w=>w[0]).join('').slice(0,2).toUpperCase():'?'}</div>
          <div style={{flex:1,minWidth:0}}>
            <div className="nm">{p?p.n:'—'} <span className="rs" style={{fontWeight:400}}>· {p?p.department:''}</span></div>
            <div className="rs">{fmtD(row.report_date)} · {row.completed_count} completed · {row.overdue_count} overdue · {row.pending_count} open</div>
            {isEsc?<div style={{marginTop:8,display:'flex',flexDirection:'column',gap:6}}>
              <input className="empsearch" style={{marginBottom:0}} value={escText} onChange={e=>setEscText(e.target.value)} placeholder="What needs escalating?"/>
              <select className="selsel" value={escPrio} onChange={e=>setEscPrio(e.target.value)}>
                <option>High</option><option>Medium</option><option>Low</option></select>
              <div style={{display:'flex',gap:8}}>
                <button className="chipbtn" style={{flex:1,justifyContent:'center'}} onClick={()=>{setEscId(null);setEscText('');}}>Cancel</button>
                <button className="send" style={{flex:1,margin:0,padding:'9px'}} disabled={escBusy} onClick={()=>sendEscalation(row)}>{escBusy?'Sending…':'Send'}</button>
              </div>
            </div>:<div style={{marginTop:6,display:'flex',gap:8}}>
              <button className="chipbtn" onClick={()=>{const person=ALL_PEOPLE.find(x=>x.id===row.created_by);
                downloadDailyReportPdf([{row,p:person?{n:person.n,dept:person.department}:null}],(person?person.n:'Daily')+' — '+fmtD(row.report_date),ctx.r.name)
                  .catch(e=>{console.error(e);ctx.say('Could not build the PDF — try again');});}}>⬇ PDF</button>
              {ctx.r.bossId?<button className="chipbtn" onClick={()=>{setEscId(row.id);setEscText('');setEscPrio('Medium');}}>↑ Escalate</button>:null}
            </div>}
          </div>
        </div>;
      })}
      {scoped.length>shown.length?<div className="rs" style={{textAlign:'center',padding:'4px 0'}}>… {scoped.length-shown.length} more — see the console for the full list</div>:null}
      <button className="chipbtn" onClick={()=>exportDailyReportsM(scoped)}>⬇ Download CSV</button>
    </>:<div className="rs" style={{padding:'8px 2px'}}>{fDate?'No reports for that date.':'No daily reports yet.'}</div>}
  </>;
}
function exportDailyReportsM(scoped){
  const rows=[['Person','Department','Date','Completed','Overdue','Open']];
  scoped.forEach(row=>{const p=ALL_PEOPLE.find(x=>x.id===row.created_by);
    rows.push([p?p.n:'—',p?p.department:'',dmy(row.report_date),row.completed_count,row.overdue_count,row.pending_count]);});
  csvDownload(iso(new Date())+'-teamflow-daily-reports.csv',rows);
}

function NotifSheet({ctx,acts,close}){
  const unread=ctx.notifs.filter(n=>!n.read_at);
  // Same flat feed as before, split into two labeled groups — overdue/due-today ("Needs
  // attention") vs job-log-activity pings ("Activity") — each still in the feed's own recency
  // order (loadNotifs already sorts the merged list by created_at before this ever runs).
  const notifItem=n=>{
    const t=tasks.find(x=>x.id===n.task_id);
    const isAct=n.source==='activity',isCl=n.source==='checklist';
    const entry=isAct&&n.task_log_id&&t&&t.log?t.log.find(x=>x.id===n.task_log_id):null;
    const actor=isAct?(ALL_PEOPLE.find(p=>p.id===n.actor_staff_id)||{}).n:null;
    const desc=entry?'“'+(entry.text.length>60?entry.text.slice(0,60)+'…':entry.text)+'” · ':n.label?n.label+' · ':'';
    const subj=isCl&&n.subject_id?(ALL_PEOPLE.find(p=>p.id===n.subject_id)||{}).n:'';
    const clTitle=n.kind==='checklist_missed'?(subj||'Someone')+' — checklist not completed':'Your checklist for today';
    const clMsg=n.kind==='checklist_missed'?'Completed '+n.done_count+'/'+n.total_count+' · '+fmtD(n.for_date):n.total_count+' item'+(n.total_count!=1?'s':'')+' today'+(n.done_count?' · '+n.done_count+' done':'');
    const clOpen=()=>{if(n.kind!=='checklist_missed')ctx.setPage('checklist');markNotifRead(n).catch(()=>{});n.read_at=new Date().toISOString();ctx.R();};
    return <div key={n.source+n.id} className="task" style={{cursor:'pointer',opacity:n.read_at?0.55:1}} onClick={()=>isCl?clOpen():acts.openNotif(n)}>
      <div className="stripe" style={{background:isCl?(n.kind==='checklist_missed'?'var(--red)':'var(--accent)'):isAct?'var(--accent)':n.kind==='overdue'?'var(--red)':'var(--amber)'}}/>
      <div className="tt">{isCl?clTitle:isAct?(actor||'Someone')+' updated “'+(t?t.t:'a task')+'”':(t?t.t:'(task removed)')}</div>
      <div className="meta">{isCl?clMsg:isAct?desc+fmtDateTime(n.created_at):(n.kind==='overdue'?'Overdue':'Due today')+' · '+fmtD(n.for_date)}</div>
    </div>;
  };
  const attn=ctx.notifs.filter(n=>n.source!=='activity');
  const act=ctx.notifs.filter(n=>n.source==='activity');
  // "Needs your approval" — the same live queue Home's action sections render (ctx.approvalQueue,
  // see approvalQueue()), surfaced here too. These aren't notification rows (no read/unread state,
  // nothing to mark read) and they resolve themselves once acted on, so a tap just sends the viewer
  // to Home where the real Approve/Reject/Assign buttons live, rather than duplicating them here.
  const {completions:qC,exts:qX,reqs:qR,fulfil:qF,issues:qI}=ctx.approvalQueue;
  const qFul=qF||[];
  const queueTotal=qC.length+qX.length+qR.length+qFul.length+qI.length;
  const toHome=()=>{ctx.setPage('home');close();};
  const queueItem=(key,color,title,meta)=>
    <div key={key} className="task" style={{cursor:'pointer'}} onClick={toHome}>
      <div className="stripe" style={{background:color}}/>
      <div className="tt">{title}</div>
      <div className="meta">{meta}</div>
    </div>;
  return <>
    <h3>Notifications
      {unread.length?<span style={{float:'right',fontSize:12.5,fontWeight:600,color:'var(--accent-ink)',cursor:'pointer'}} onClick={acts.markAllNotifsSeen}>Mark all read</span>:null}
    </h3>
    <div style={{maxHeight:400,overflowY:'auto'}}>
      {queueTotal?<div className="sec">Needs your approval</div>:null}
      {qC.map(o=>queueItem('qc'+o.i,'var(--green)',o.t.t,o.t.who+' marked this done — needs approval'))}
      {qX.map(o=>queueItem('qx'+o.i,'var(--blue)',o.t.t,o.t.who+' requests extension → '+(o.t.extReq.label||o.t.extReq.newDate)))}
      {qI.map((q,qi)=>queueItem('qi'+qi,'var(--amber)','Repair/maintenance report: '+q.t,'Reported by '+q.from))}
      {qR.map(o=>queueItem('qr'+o.qi,'var(--amber)','Supply request: '+o.q.t,'From '+o.q.from+' · approve'))}
      {qFul.map(o=>queueItem('qf'+o.qi,'var(--accent)','Approved supply: '+o.q.t,'From '+o.q.from+' · fulfil'))}
      {ctx.notifs.length?<>
        {attn.length?<div className="sec">Needs attention</div>:null}
        {attn.map(notifItem)}
        {act.length?<div className="sec">Activity</div>:null}
        {act.map(notifItem)}
      </>:(queueTotal?null:<MobileEmpty icon={<I n="bell" s={26}/>} t="You're all caught up" s="Overdue alerts, due-today reminders, and task activity will show up here."/>)}
    </div>
  </>;
}

function TaskSheet({ctx,close}){
  const [mode,setMode]=useState('type');
  const [txt,setTxt]=useState('');
  const [heard,setHeard]=useState('');
  const [rec,setRec]=useState(false);
  const [cur,setCur]=useState(null);
  const [type,setType]=useState('work');const typeByUser=useRef(false);
  const [assign,setAssign]=useState(ctx.role==='worker'?'self':'others');
  const [deptTab,setDeptTab]=useState('within'); // Directors only: 'within' | 'other' (self is handled by assign==='self')
  const [pick,setPick]=useState(null);
  const [q,setQ]=useState('');const [dept,setDept]=useState('all');
  const [instruct,setInstruct]=useState('');
  const [showOpts,setShowOpts]=useState(false);
  const canMulti=['admin','mgmt','srm'].includes(ctx.role);
  /* Director-only ASSIGNMENT scope (separate from oversight/ctx.scope, which stays subtree-only).
     Directors can assign to anyone whose DB role is NOT Administrator/Management — split into two
     picker tabs: within = their own subtree (who they oversee); other = everyone else assignable
     (org minus Admin/Mgmt) minus their subtree minus self. Self is the third tab. DB roles come from
     ALL_PEOPLE (true role), not MEMBERS.role which JOB_TITLE can relabel. */
  const isDir=ctx.role==='dir';
  const dirWithinSet=isDir?new Set(descendantsM(ctx.r.self).map(p=>p.s)):null;
  const dirOtherSet=isDir?new Set(ALL_PEOPLE.filter(p=>p.role!=='Administrator'&&p.role!=='Management'
    &&p.s!==ctx.r.self&&!dirWithinSet.has(p.s)).map(p=>p.s)):null;

  function understood(p){
    const gt=typeByUser.current?type:guessType(p.raw);
    if(!typeByUser.current)setType(gt);
    const allowedDepts=realDeptKeys(ctx.scope);
    let whos=p.whos.slice(),whoSugg=false,whoWhy='';
    if(ctx.role==='worker'){whos=[ctx.r.self];whoWhy='assigned to yourself';}
    else if(whos.length>1){whoWhy='joint task — named in your sentence';}
    else if(whos.length===1){whoWhy='named in your sentence';}
    /* the assignee's own real department is a stronger signal than keywords in the raw text —
       prefer it whenever exactly one person is named; a joint task could span departments, so
       keyword-guessing stays the fallback there, same as when no one's named yet. */
    let guessedBucket;
    if(whos.length===1){const m=findMember(whos[0]);guessedBucket=m&&LABEL_TO_BUCKET[m.dept]?LABEL_TO_BUCKET[m.dept]:guessBucket(p.raw);}
    else guessedBucket=guessBucket(p.raw);
    const bucket=allowedDepts.includes(guessedBucket)?guessedBucket:(allowedDepts[0]||guessedBucket);
    if(!whos.length){const s=suggestAssignee(gt,bucket);whos=[s.n];whoSugg=true;whoWhy=s.reason;}
    /* suggestAssignee/named-in-sentence draw from the whole MEMBERS pool, which for a Director can
       include people outside their assignable scope (e.g. Management) or outside the active tab.
       Constrain the default to the current tab's allowed set so a Director is never pre-pointed at
       someone they can't assign to; Self mode ignores whos entirely. */
    if(isDir&&assign!=='self'){
      const allow=deptTab==='other'?dirOtherSet:dirWithinSet;
      whos=whos.filter(n=>allow.has(n));
      if(!whos.length){const first=MEMBERS.find(m=>allow.has(m.n));whos=first?[first.n]:[];whoSugg=!!first;whoWhy=first?'suggested — in your assignable scope':'';}
    }
    let when=p.when,whenSugg=false,whenWhy='';
    let dateIso;
    if(p.dateIso){dateIso=p.dateIso;whenWhy=p.dateWhy||'you named a date in your sentence';}
    else{
      if(!when){const s=suggestDue(gt,p.raw);when=s.when;whenSugg=true;whenWhy=s.reason;}
      dateIso=whenToDate(when);
    }
    const timeHM=guessTime(p.raw)||labelToTime(when)||'';
    const recur=p.recur||null;
    let recurOn=p.recurOn!=null?p.recurOn:(recur?defaultRecurOn(recur,dateIso):null);
    if(recur==='weekly'&&p.recurOn!=null){dateIso=nextAnchor('weekly',p.recurOn,iso(TODAY));whenSugg=false;whenWhy='every '+DOW[p.recurOn]+' — first on '+fmtD(dateIso);}
    setCur({raw:p.raw,task:p.task,whos,whoSugg,whoWhy,dateIso,timeHM,whenSugg,whenWhy,bucket,bucketSugg:true,recur,recurOn});
  }
  function record(){
    setRec(true);setCur(null);
    const s=SAMPLES[Math.floor(Math.random()*SAMPLES.length)];
    let i=0;const tick=setInterval(()=>{i+=3;setHeard(s.slice(0,i));
      if(i>=s.length){clearInterval(tick);setRec(false);setHeard(s);understood(parseText(s));}},40);
  }
  function toggleWho(n){
    if(!cur)return;
    let next;
    if(!canMulti)next=[n];
    else{next=cur.whos.slice();const ix=next.indexOf(n);
      if(ix>-1){if(next.length>1)next.splice(ix,1);}else next.push(n);}
    setCur({...cur,whos:next,whoSugg:false,
      whoWhy:next.length>1?'joint task — it appears in each person’s list':'you picked '+next[0]});
    if(!canMulti)setPick(null);
  }
  function doAssign(){
    if(!cur)return;
    const self=assign==='self';
    const list=self?[ctx.r.self]:cur.whos;
    const m=findMember(list[0])||{i:list[0][0]};
    const nt={t:cur.task,who:list[0],init:m.i,coWho:(!self&&list.length>1)?list.slice(1):undefined,
      due:'Due '+dueLabel(cur.dateIso,cur.timeHM).replace(/^Today/,'today').replace(/^Tomorrow/,'tomorrow'),date:cur.dateIso,bucket:cur.bucket,type,done:false,recur:cur.recur||undefined,recurOn:cur.recur?cur.recurOn:undefined,
      // instructedBy doubles as "who assigned this" (defaults to me, the creator) and the optional
      // "relaying on behalf of X" override — without the default, tasks assigned to someone else
      // never recorded who assigned them, so boss-filtered views stayed empty for the common case.
      selfAssigned:self,instructedBy:instruct||(self?null:ctx.r.name)};
    tasks.unshift(nt);
    close();ctx.R();
    saveTask(nt).catch(console.error);
    const tail=(cur.recur?' · '+recurLabel(cur.recur,cur.recurOn).toLowerCase():'')+(instruct?' · as per '+instruct:'');
    ctx.say(self?'Added to your list'+tail:'Assigned '+(list.length>1?'jointly to ':'to ')+list.join(' + ')+tail+' · notified in TeamFlow');
  }
  const dirPool=isDir?MEMBERS.filter(m=>(deptTab==='other'?dirOtherSet:dirWithinSet).has(m.n)):MEMBERS;
  const depts=['all',...new Set(dirPool.map(m=>m.dept))];
  const load=workload();
  const emp=dirPool.filter(m=>(dept==='all'||m.dept===dept)&&(!q||m.n.toLowerCase().includes(q.toLowerCase())||m.dept.toLowerCase().includes(q.toLowerCase())||m.role.toLowerCase().includes(q.toLowerCase())));
  const bosses=instructorsFor(ctx.r.self);
  return <>
    <h3>New task</h3>
    <div className="sub">Type it or speak it — your choice.</div>
    <div className="modetabs">
      <button className={'mtab'+(mode==='type'?' on':'')} onClick={()=>setMode('type')}>⌨️ Type</button>
      <button className={'mtab'+(mode==='speak'?' on':'')} onClick={()=>setMode('speak')}>🎤 Speak</button>
    </div>
    <div className="typechips">
      {Object.entries(TYPES).map(([k,v])=><button key={k} className={'tchip'+(k===type?' on':'')}
        onClick={()=>{typeByUser.current=true;setType(k);
          if(cur&&cur.whoSugg){const s=suggestAssignee(k,cur.bucket);setCur({...cur,whos:[s.n],whoWhy:s.reason});}}}>{v.e} {v.l}</button>)}
    </div>
    {mode==='type'?<div>
      <textarea className="typein" rows={3} autoFocus value={txt} onChange={e=>setTxt(e.target.value)}
        placeholder="e.g. Ask Hari to repair the lab projector by tomorrow"/>
      <button className="understand" onClick={()=>{if(!txt.trim()){ctx.say('Type a task first');return;}understood(parseText(txt.trim()));}}>✨ Understand task</button>
    </div>:<div>
      <div className={'mic'+(rec?' rec':'')} onClick={record}><I n="mic"/></div>
      <div className="heard">{heard||<span className="ph">Tap the mic to speak…</span>}</div>
      <div style={{fontSize:11,color:'var(--muted)',textAlign:'center',marginTop:8}}>🎤 Demo: shows a sample sentence to try the flow — edit the task text below if it's wrong.</div>
    </div>}
    {cur?<div style={{marginTop:14}}>
      <span className="aibadge">✨ AI understood</span>
      <div className="field"><div className="k">Task</div><div className="v">
        <input value={cur.task} onChange={e=>setCur({...cur,task:e.target.value})}
          style={{width:'100%',border:'none',borderBottom:'1.5px solid var(--line)',fontFamily:'inherit',fontSize:'inherit',fontWeight:'inherit',color:'inherit',padding:'2px 0',outline:'none',background:'none'}}/>
      </div></div>
      <div className="field"><div className="k">Assign to</div><div className="v">
        {ctx.role!=='worker'&&!isDir?<div className="modetabs" style={{marginBottom:9}}>
          <button className={'mtab'+(assign==='others'?' on':'')} onClick={()=>setAssign('others')}>👥 Others</button>
          <button className={'mtab'+(assign==='self'?' on':'')} onClick={()=>setAssign('self')}>🙋 Myself</button>
        </div>:null}
        {isDir?<div className="modetabs" style={{marginBottom:9}}>
          <button className={'mtab'+(assign==='others'&&deptTab==='within'?' on':'')} onClick={()=>{setAssign('others');if(deptTab!=='within'){setDeptTab('within');setDept('all');setCur(c=>c?{...c,whos:[],whoWhy:''}:c);}}}>🏢 Within</button>
          <button className={'mtab'+(assign==='self'?' on':'')} onClick={()=>setAssign('self')}>🙋 Self</button>
          <button className={'mtab'+(assign==='others'&&deptTab==='other'?' on':'')} onClick={()=>{setAssign('others');if(deptTab!=='other'){setDeptTab('other');setDept('all');setCur(c=>c?{...c,whos:[],whoWhy:'',whoSugg:false}:c);}}}>🌐 Other dept</button>
        </div>:null}
        {assign==='self'?<span>You ({ctx.r.self})</span>:<>
          <span className="chipbtn" onClick={()=>setPick(pick==='who'?null:'who')}>{cur.whos.join(' + ')}</span>
          {cur.whoWhy?<div className="reason"><b>{cur.whoSugg?'✦ Suggested':'✓'}</b> — {cur.whoWhy}</div>:null}
          {pick==='who'?<div style={{marginTop:9}}>
            <div style={{display:'flex',gap:8,marginBottom:8}}>
              <select className="selsel" style={{flex:'0 0 44%'}} value={dept} onChange={e=>setDept(e.target.value)}>
                {depts.map(d=><option key={d} value={d}>{d==='all'?'All departments':d}</option>)}</select>
              <input className="empsearch" style={{marginBottom:0}} placeholder="🔍 Name, dept or skill…" value={q} onChange={e=>setQ(e.target.value)}/>
            </div>
            {isDir&&deptTab==='other'?<div className="reason" style={{marginBottom:6}}>🌐 Any department — everyone except Administrators &amp; Management</div>:null}
            {canMulti?<div className="reason" style={{marginBottom:6}}>Tap more than one to assign jointly</div>:null}
            <div className="empcol">
              {emp.length?emp.map(m=><button key={m.n} className={'pickchip'+(cur.whos.includes(m.n)?' cur':'')} onClick={()=>toggleWho(m.n)}>
                {cur.whos.includes(m.n)?'✓ ':''}<b>{m.n}</b> · {load[m.n]} open<span className="emprole">{m.dept} · {m.role}</span></button>)
                :<MobileEmpty icon="🔍" t="No one matches" s="Try a different name, department, or skill." style={{padding:12}}/>}
            </div>
          </div>:null}
        </>}
      </div></div>
      {bosses.length?<div className="field"><div className="k">On instruction of</div><div className="v">
        <select className="selsel" value={instruct} onChange={e=>setInstruct(e.target.value)}>
          <option value="">No one — own initiative</option>
          {bosses.map(b=><option key={b.n} value={b.n}>{b.label}</option>)}
        </select></div></div>:null}
      <div className="field"><div className="k">When</div><div className="v">
        <span className="chipbtn" onClick={()=>setPick(pick==='when'?null:'when')}>{dueLabel(cur.dateIso,cur.timeHM)}</span>
        {cur.whenWhy?<div className="reason"><b>{cur.whenSugg?'✦ Suggested':'✓'}</b> — {cur.whenWhy}</div>:null}
        {pick==='when'?<div className="picker">
          {[0,1,7].map(n=>{const d=new Date(TODAY);d.setDate(d.getDate()+n);const v=iso(d);
            return <button key={v} className={'pickchip'+(v===cur.dateIso?' cur':'')}
              onClick={()=>setCur({...cur,dateIso:v,whenSugg:false,whenWhy:'you picked this date'})}>{n===0?'Today':fmtD(v)}</button>;})}
          <input type="date" className="selsel" style={{flex:'1 1 54%'}} min={iso(TODAY)} value={cur.dateIso||''} aria-label="Pick any date"
            onChange={e=>{const v=e.target.value;if(!v)return;setCur({...cur,dateIso:v,whenSugg:false,whenWhy:'you picked this date'});}}/>
          <input type="time" className="selsel" style={{flex:'1 1 38%'}} value={cur.timeHM||''} aria-label="Due time (optional)"
            onChange={e=>setCur({...cur,timeHM:e.target.value,whenSugg:false,whenWhy:'you picked this time'})}/>
          <button className="pickchip" style={{flex:'1 1 100%',textAlign:'center'}} onClick={()=>setPick(null)}>✓ Set</button>
        </div>:null}
      </div></div>
      <div className="field"><div className="k">Repeat</div><div className="v">
        <span className="chipbtn" onClick={()=>setPick(pick==='recur'?null:'recur')}>{cur.recur?'↻ '+recurLabel(cur.recur,cur.recurOn):"Doesn't repeat"}</span>
        {cur.recur?<div className="reason">Next occurrence is scheduled automatically each time it's completed</div>:null}
        {pick==='recur'?<>
          <div className="picker">
            <button className={'pickchip'+(!cur.recur?' cur':'')} onClick={()=>{setCur({...cur,recur:null,recurOn:null});setPick(null);}}>Doesn't repeat</button>
            {Object.keys(RECURS).map(k=><button key={k} className={'pickchip'+(k===cur.recur?' cur':'')}
              onClick={()=>{setCur({...cur,recur:k,recurOn:defaultRecurOn(k,cur.dateIso)});if(k==='daily')setPick(null);}}>{RECURS[k]}</button>)}
          </div>
          {cur.recur==='weekly'?<><div className="reason" style={{marginTop:8}}>On which day of the week?</div>
            <div className="picker">{[1,2,3,4,5,6,0].map(ix=><button key={ix} className={'pickchip'+(cur.recurOn===ix?' cur':'')}
              onClick={()=>{const nd=nextAnchor('weekly',ix,iso(TODAY));setCur({...cur,recurOn:ix,dateIso:nd,whenSugg:false,whenWhy:'first occurrence — every '+DOW[ix]});setPick(null);}}>{DOW[ix]}</button>)}</div></>:null}
          {cur.recur==='monthly'?<><div className="reason" style={{marginTop:8}}>On which date of the month?</div>
            <select className="selsel" style={{marginTop:6}} value={cur.recurOn||1} onChange={e=>{const v=+e.target.value;
              const nd=nextAnchor('monthly',v,iso(TODAY));setCur({...cur,recurOn:v,dateIso:nd,whenSugg:false,whenWhy:'first occurrence — the '+ord(v)+' of every month'});setPick(null);}}>
              {Array.from({length:31},(_,i)=>i+1).map(n=><option key={n} value={n}>{ord(n)} of every month</option>)}</select></>:null}
          {cur.recur==='yearly'?<><div className="reason" style={{marginTop:8}}>On which day and month?</div>
            <div style={{display:'flex',gap:8,marginTop:6}}>
              <select className="selsel" value={(cur.recurOn&&cur.recurOn.d)||1} onChange={e=>{const v={d:+e.target.value,m:(cur.recurOn&&cur.recurOn.m)||0};
                const nd=nextAnchor('yearly',v,iso(TODAY));setCur({...cur,recurOn:v,dateIso:nd,whenSugg:false,whenWhy:'every year on '+v.d+' '+MONTHS[v.m]});}}>
                {Array.from({length:31},(_,i)=>i+1).map(n=><option key={n} value={n}>{ord(n)}</option>)}</select>
              <select className="selsel" value={(cur.recurOn&&cur.recurOn.m)||0} onChange={e=>{const v={d:(cur.recurOn&&cur.recurOn.d)||1,m:+e.target.value};
                const nd=nextAnchor('yearly',v,iso(TODAY));setCur({...cur,recurOn:v,dateIso:nd,whenSugg:false,whenWhy:'every year on '+v.d+' '+MONTHS[v.m]});}}>
                {MONTHS.map((mn,ix)=><option key={mn} value={ix}>{mn}</option>)}</select>
            </div></>:null}
        </>:null}
      </div></div>
      <button className="optst" onClick={()=>setShowOpts(!showOpts)}><span>⚙️ Options</span>
        <span style={{fontWeight:600,color:'var(--muted)',fontSize:12.5}}>Department: {BUCKETS[cur.bucket]||cur.bucket}{cur.bucketSugg?' (auto)':''}</span></button>
      {showOpts?<div className="field"><div className="k">Department</div><div className="v">
        <div className="picker" style={{marginTop:0}}>{realDeptKeys(ctx.scope).map(b=><button key={b} className={'pickchip'+(b===cur.bucket?' cur':'')}
          onClick={()=>setCur({...cur,bucket:b,bucketSugg:false})}>{BUCKETS[b]}</button>)}</div>
      </div></div>:null}
      <button className="send" onClick={doAssign}>Assign task ✓</button>
    </div>:null}
  </>;
}

function IssueSheet({ctx,close}){
  const [cat,setCat]=useState(null); // routing_rules maintenance category id; null → first (Building)
  const [txt,setTxt]=useState('');
  const [files,setFiles]=useState([]);
  const cats=maintCats();
  const selCat=catById(cat)||cats[0]||null;
  const issueRec=selCat&&selCat.staff_id?ALL_PEOPLE.find(p=>p.id===selCat.staff_id):null;
  const headFirst=issueRec?issueRec.n.split(' ')[0]:(selCat?selCat.label:'the recipient');
  const pickF=async e=>{
    const picked=[...e.target.files];
    if(!picked.length)return;
    ctx.say('Uploading '+picked.length+' file'+(picked.length>1?'s':'')+'…');
    try{const nf=await Promise.all(picked.map(x=>uploadFile(x,'issues')));setFiles(files.concat(nf));}
    catch(err){console.error(err);ctx.say('Upload failed — try again');}
  };
  const send=()=>{
    if(!txt.trim()){ctx.say('Describe the issue first');return;}
    const nq={t:txt.trim().charAt(0).toUpperCase()+txt.trim().slice(1),from:ctx.r.name,av:ctx.r.av,
      routing_rule_id:selCat?selCat.id:null,target_staff_id:issueRec?issueRec.id:null,files:files.length?files.slice():undefined};

    <h3>Report for repair/maintenance</h3>
    <div className="sub">Pick what kind of issue it is — it goes straight to the configured recipient, who assigns the right person.</div>
    <div style={{fontSize:11,fontWeight:800,textTransform:'uppercase',letterSpacing:'.9px',color:'var(--muted)',margin:'4px 2px 8px'}}>What kind of issue?</div>
    <div style={{display:'flex',gap:10,marginBottom:14,flexWrap:'wrap'}}>
      {cats.map(c=>{const h=c.staff_id?ALL_PEOPLE.find(p=>p.id===c.staff_id):null,on=selCat&&selCat.id===c.id;
        return <button key={c.id} type="button" onClick={()=>setCat(c.id)}
          style={{flex:'1 1 44%',minWidth:130,textAlign:'left',border:'1.5px solid '+(on?'var(--accent)':'var(--line)'),
            background:on?'var(--accent-soft)':'#fff',borderRadius:12,padding:'11px 12px',cursor:'pointer',color:'inherit'}}>
          <div style={{fontSize:22,lineHeight:1}}>{c.icon}</div>
          <div style={{fontWeight:800,fontSize:13.5,marginTop:6}}>{c.label}</div>
          <div style={{fontSize:11,color:'var(--muted)',marginTop:5,lineHeight:1.4}}>Goes to {h?<b style={{color:'var(--accent-ink)'}}>{h.n} · {h.role}, {h.department}</b>:<b>the configured recipient</b>}{!h?<><br/>No recipient set — admins will handle it</>:null}</div>
        </button>;})}
    </div>
    <textarea className="typein" rows={3} autoFocus value={txt} onChange={e=>setTxt(e.target.value)}
      placeholder="e.g. The ceiling fan in Class 7B is making a loud noise"/>
    <div className="attachrow">
      <label className="uploadbtn">📷 Camera<input type="file" accept="image/*" capture="environment" style={{display:'none'}} onChange={pickF}/></label>
      <label className="uploadbtn">🖼 Photos<input type="file" accept="image/*" multiple style={{display:'none'}} onChange={pickF}/></label>
      <label className="uploadbtn">📎 Files<input type="file" multiple style={{display:'none'}} onChange={pickF}/></label>
    </div>
    {files.length?<div className="filelist">{files.map((f,ix)=><FileChip key={ix} f={f} onRemove={()=>{
      setFiles(files.filter((_,i)=>i!==ix));
      removeAttachment(f.path).catch(console.error);
    }}/>)}</div>:null}
    <button className="send" onClick={send}>Send to {headFirst} ✓</button>
  </>;
}
/* Small self-contained donut renderer, same math as the console app's donutSVG (which doesn't
   exist in this file) — mobile has no chart helper anywhere else, so this is built fresh rather
   than reusing something that isn't there. Returns an HTML string, rendered via
   dangerouslySetInnerHTML, same convention as console. */
function drDonutSVG(segs,size,stroke){
  const total=segs.reduce((a,x)=>a+x.v,0);
  const r=(size-stroke)/2,C=2*Math.PI*r,cx=size/2,cy=size/2;
  let off=0,parts='';
  if(!total)parts=`<circle r="${r}" cx="${cx}" cy="${cy}" fill="none" stroke="#efeee7" stroke-width="${stroke}"/>`;
  else segs.forEach(x=>{if(!x.v)return;const len=x.v/total*C;
    parts+=`<circle r="${r}" cx="${cx}" cy="${cy}" fill="none" stroke="${x.c}" stroke-width="${stroke}" stroke-dasharray="${len-1.5} ${C-len+1.5}" stroke-dashoffset="${-off}" transform="rotate(-90 ${cx} ${cy})"/>`;off+=len;});
  return `<svg width="${size}" height="${size}" viewBox="0 0 ${size} ${size}">${parts}
    <text x="${cx}" y="${cy+5}" text-anchor="middle" font-size="22" font-weight="700" fill="#1b1e21">${total}</text></svg>`;
}

  function statusPill(t){

            <label className="uploadbtn" style={{flex:'0 0 auto'}}>📎 Attach<input type="file" style={{display:'none'}} onChange={e=>pickFile(i,e)}/></label>}

    <div style={{display:'flex',gap:16,alignItems:'center',marginBottom:12}}>

      <div style={{flex:1}}>{segs.map(x=><div key={x.l} style={{display:'flex',alignItems:'center',gap:7,fontSize:12.5,padding:'3px 0'}}>
        <span style={{width:9,height:9,borderRadius:2,background:x.c,flex:'0 0 auto'}}/>{x.l}<b style={{marginLeft:'auto'}}>{x.v}</b></div>)}</div>
    </div>

      <div style={{minWidth:0,flex:1}}>

    <button className="send" disabled={busy} onClick={submit}>{busy?'Sending…':'Submit report'}</button>
  </>;
}
function RequestSheet({ctx,close}){

    // the dept Sr.-Manager fallback) and store it on the request so routing stays stable.
    const appId=supplyApproverIdM({from:ctx.r.name});
    const nq={t:txt.trim(),note:note.trim(),from:ctx.r.name,av:ctx.r.av,approver_staff_id:appId||null};
    pendingReqs.unshift(nq);
    close();ctx.R();
    saveRequestRow(nq,'request').catch(console.error);
    const app=appId?ALL_PEOPLE.find(p=>p.id===appId):null;
    ctx.say('Request sent to '+(app?app.n.split(' ')[0]:'your approver')+' for approval 📦');};
  return <>
    <h3>Request supplies</h3>
    <div className="sub">What do you need? Your manager approves it in one tap.</div>
