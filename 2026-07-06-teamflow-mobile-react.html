    <textarea className="typein" rows={2} style={{marginTop:9}} value={note} onChange={e=>setNote(e.target.value)} placeholder="Why / for which class? (optional)"/>
    <button className="send" onClick={send}>Send request ✓</button>
  </>;
}
function UpdateSheet({ctx,idx,close}){
  const t=tasks[idx];
  const [st,setSt]=useState('done');
  const [note,setNote]=useState('');
  const [files,setFiles]=useState([]);
  /* mis-click guard for the "Mark done ✓" send button — arm/confirm pattern (console dropped its
     row-level equivalent; this is now the only mis-click guard in either app). The Done tab is
     pre-selected by default, so the very first tap on this sheet could
     otherwise complete a task with zero real confirmation; a first tap just arms it (label flips
     to "Tap again to confirm"), the second tap within the window actually calls save(). */
  const [armed,setArmed]=useState(false);
  const armTimer=useRef();
  const [editingLogId,setEditingLogId]=useState(null);
  const [editText,setEditText]=useState('');
  useEffect(()=>()=>clearTimeout(armTimer.current),[]);
  useEffect(()=>{setArmed(false);},[st]);
  /* Issue 4: opening your own assigned task moves it open -> inprogress automatically. Gated on
     the REAL signed-in person (ctx.realSelf/ctx.previewing, not whatever role Preview As is
     currently simulating) genuinely being an assignee (hasWhoM, same helper used everywhere
     else). Mount-time effect keyed on idx, not on every place a task can be opened. */
  useEffect(()=>{
    const tk=tasks[idx];
    if(tk&&!ctx.previewing&&hasWhoM(tk,ctx.realSelf)&&!tk.done&&!tk.progress){
      tk.progress='inprogress';saveTask(tk).catch(console.error);
      notifyEvent(tk.id,ctx.r.id,'marked in progress',concernedForM(tk,ctx.r.self));
      ctx.R();
    }
  },[idx]);
  if(!t)return null;
  const logs=t.log||(t.note?[{by:'Earlier',when:'',text:t.note}]:[]);
  const pickF=async e=>{
    const picked=[...e.target.files];
    if(!picked.length)return;
    ctx.say('Uploading '+picked.length+' file'+(picked.length>1?'s':'')+'…');
    try{const nf=await Promise.all(picked.map(x=>uploadFile(x,'tasks/'+t.id)));setFiles(files.concat(nf));}
    catch(err){console.error(err);ctx.say('Upload failed — try again');}
  };
  const save=()=>{
    if(st==='done'&&t.completionPending){ctx.say('Already submitted — waiting for approval');close();return;}
    t.progress=st;
    if(note.trim()){
      t.log=t.log||(t.note?[{by:'Earlier',when:'',text:t.note}]:[]);
      const entry={by:ctx.r.name,when:fmtDateTime(new Date()),text:note.trim(),createdAt:new Date().toISOString()};
      t.log.push(entry);
      t.note=note.trim();
      logTask(t,ctx.r.name,note.trim()).then(row=>{if(row)entry.id=row.id;ctx.R();}).catch(console.error);
    }
    if(files.length)t.files=(t.files||[]).concat(files);
    if(st==='done'){
      const self=ctx.r.self;
      if(t.coWho&&t.coWho.length&&assigneesM(t).includes(self)){
        t.doneBy=[...new Set([...(t.doneBy||[]),self])];
        const pending=assigneesM(t).filter(a=>!t.doneBy.includes(a));
        if(!pending.length){
          /* completion-approval gate, mirroring console: a self-assigned task has no natural
             "assigner" to approve, so it still completes instantly. Anything assigned by someone
             else waits for approval instead — spawnNextRecur only runs once approveCompletion
             actually approves it (acts.approveCompletion), so a rejected completion never leaves
             an already-spawned next occurrence behind. */
          if(!t.selfAssigned){t.progress='inprogress';t.completionPending=true;saveTask(t).catch(console.error);notifyEvent(t.id,ctx.r.id,'submitted for completion approval',concernedForM(t,ctx.r.self));close();ctx.R();ctx.say('Everyone confirmed — waiting for approval');return;}
          t.done=true;t.doneWhen='just now';delete t.extReq;const nd=spawnNextRecur(t);persistComplete(t,nd);notifyEvent(t.id,ctx.r.id,'completed the task',concernedForM(t,ctx.r.self));close();ctx.R();ctx.say(nd?'Everyone finished ✓ · next '+RECURS[t.recur].toLowerCase()+' on '+fmtD(nd):'Everyone finished — task completed ✓');return;}
        t.done=false;saveTask(t).catch(console.error);notifyEvent(t.id,ctx.r.id,'completed their part — waiting on '+pending.join(', '),concernedForM(t,ctx.r.self));close();ctx.R();ctx.say('Your part done ✓ — pending with '+pending.join(', '));return;
      }
      if(t.coWho&&t.coWho.length)t.doneBy=assigneesM(t).slice();
      if(!t.selfAssigned){t.progress='inprogress';t.completionPending=true;saveTask(t).catch(console.error);notifyEvent(t.id,ctx.r.id,'submitted for completion approval',concernedForM(t,ctx.r.self));close();ctx.R();ctx.say('Marked complete — waiting for approval');return;}
      t.done=true;t.doneWhen='just now';delete t.extReq;
      const nd=spawnNextRecur(t);
      persistComplete(t,nd);
      notifyEvent(t.id,ctx.r.id,'completed the task',concernedForM(t,ctx.r.self));
      close();ctx.R();
      ctx.say(nd?'Done ✓ · next '+RECURS[t.recur].toLowerCase()+' on '+fmtD(nd):'Task marked done ✓');return;
    } else t.done=false;
    saveTask(t).catch(console.error);
    notifyEvent(t.id,ctx.r.id,'marked in progress',concernedForM(t,ctx.r.self));
    close();ctx.R();
    ctx.say('Progress updated 🔧');};
  return <>
    <h3>Update task</h3>
    <div className="sub">{t.t}</div>
    {t.prio==='high'?<span className="tag2 red" style={{marginTop:6,display:'inline-block'}}>🔴 High priority</span>
      :t.prio==='med'?<span className="tag2 amber" style={{marginTop:6,display:'inline-block'}}>🟡 Medium priority</span>:null}
    {t.completionPending?<div className="notepv" style={{color:'var(--amber)',fontStyle:'normal',marginTop:8}}>⏳ Completion pending approval — waiting for your manager to review.</div>:null}
    <div className="modetabs">
      {[['inprogress','🔧 In progress'],['done','✓ Done']].map(([k,l])=>
        <button key={k} className={'mtab'+(st===k?' on':'')} onClick={()=>setSt(k)}>{l}</button>)}
    </div>
    {logs.length?<div style={{marginBottom:10}}>
      <div className="sec" style={{margin:'0 0 6px'}}>Job log</div>
      <div style={{maxHeight:140,overflowY:'auto'}}>
        {logs.map((x,ix)=>{
          const canEditEntry=x.id&&!ctx.previewing&&x.by===ctx.r.name&&x.createdAt&&(Date.now()-new Date(x.createdAt).getTime()<2*60*1000);
          if(editingLogId&&x.id&&x.id===editingLogId){
            return <div key={x.id} className="notepv" style={{marginTop:6,fontStyle:'normal'}}>
              <textarea className="typein" rows={2} value={editText} onChange={e=>setEditText(e.target.value)}/>
              <div style={{display:'flex',gap:6,marginTop:6}}>
                <button className="btn primary" style={{flex:'0 0 auto',minHeight:32,padding:'6px 12px'}} onClick={async()=>{
                  const txt=editText.trim();
                  if(!txt){ctx.say('Write something first');return;}
                  const res=await editLogEntry(x.id,txt);
                  if(res.ok){x.text=txt;setEditingLogId(null);ctx.R();ctx.say('Log entry updated');}
                  else ctx.say("Can't edit — the 2-minute window has closed");
                }}>Save</button>
                <button className="btn ghost" style={{flex:'0 0 auto',minHeight:32,padding:'6px 12px'}} onClick={()=>setEditingLogId(null)}>Cancel</button>
              </div>
            </div>;
          }
          return <div key={x.id||ix} className="notepv" style={{marginTop:6}}>“{x.text}”
            {canEditEntry?<span style={{cursor:'pointer',marginLeft:6,fontStyle:'normal'}} title="Edit entry" onClick={()=>{setEditingLogId(x.id);setEditText(x.text);}}>✎</span>:null}
            <div style={{fontSize:11,color:'var(--muted)',fontStyle:'normal',marginTop:3}}>{x.by}{x.when?' · '+x.when:''}</div></div>;
        })}
      </div>
    </div>:null}
    <textarea className="typein" rows={3} value={note} onChange={e=>setNote(e.target.value)} placeholder="Add an update to the job log (optional) — what did you do?"/>
    <div className="attachrow">
      <label className="uploadbtn">📷 Camera<input type="file" accept="image/*" capture="environment" style={{display:'none'}} onChange={pickF}/></label>
      <label className="uploadbtn">🖼 Photos<input type="file" accept="image/*" multiple style={{display:'none'}} onChange={pickF}/></label>
      <label className="uploadbtn">📎 Files<input type="file" accept="image/*,application/pdf,.doc,.docx" multiple style={{display:'none'}} onChange={pickF}/></label>
    </div>
    {files.length?<div className="filelist">{files.map((f,ix)=><FileChip key={ix} f={f} onRemove={()=>{
      setFiles(files.filter((_,i)=>i!==ix));
      removeAttachment(f.path).catch(console.error);
    }}/>)}</div>:null}
    <button className="send" onClick={()=>{
      if(st==='done'&&!t.completionPending){
        if(!armed){setArmed(true);armTimer.current=setTimeout(()=>setArmed(false),2200);return;}
        clearTimeout(armTimer.current);setArmed(false);
      }
      save();
    }}>{st==='done'?(t.completionPending?'Mark done ✓':(armed?'Tap again to confirm ✓':'Mark done ✓')):'Save update'}</button>
  </>;
}
function ExtSheet({ctx,idx,close}){
  const t=tasks[idx];
  const [pickd,setPickd]=useState(null);
  const [reason,setReason]=useState('');
  if(!t)return null;
  const dayAfter=(dstr)=>{const d=new Date(dstr+'T00:00:00');d.setDate(d.getDate()+1);return iso(d);};
  const opts=[1,2,3,7].map(n=>{const d=new Date(TODAY);d.setDate(d.getDate()+n);
    return {iso:iso(d),label:d.toLocaleDateString('en',{weekday:'short'})+' · '+d.toLocaleDateString('en',{day:'numeric',month:'short'})+(n===1?' (tomorrow)':n===7?' (next week)':'')};}).filter(o=>!t.date||o.iso>t.date);
  const send=()=>{
    if(ctx.previewing||!hasWhoM(t,ctx.realSelf)){ctx.say("You can't request an extension on someone else's task");close();return;}
    if(!pickd){ctx.say('Pick a new date first');return;}
    if(t.date&&pickd.iso<=t.date){ctx.say('New date must be after the current due date');return;}
    t.extReq={newDate:pickd.iso,label:pickd.label,reason:reason.trim(),from:ctx.r.name};
    saveTask(t).catch(console.error);
    notifyEvent(t.id,ctx.r.id,'requested an extension to '+fmtD(pickd.iso),concernedForM(t,ctx.r.self));
    close();ctx.R();ctx.say('Extension request sent to '+(bossesFor(ctx.role,ctx.r.self).slice(-1)[0]?.label||'your manager')+' ⏳');};
  return <>
    <h3>Request time extension</h3>
    <div className="sub">{t.t}</div>
    <div className="meta" style={{marginBottom:6}}>Current due: {t.due||t.date}</div>
    <div className="sec" style={{margin:'10px 2px 8px'}}>New due date</div>
    <div className="picker" style={{marginTop:0}}>
      {opts.map(o=><button key={o.iso} className={'pickchip'+(pickd&&pickd.iso===o.iso?' cur':'')} onClick={()=>setPickd(o)}>{o.label}</button>)}
      <input type="date" className="selsel" style={{flex:'1 1 100%'}} min={t.date&&dayAfter(t.date)>iso(TODAY)?dayAfter(t.date):iso(TODAY)} value={pickd&&pickd.custom?pickd.iso:''} aria-label="Pick any date"
        onChange={e=>{const v=e.target.value;if(!v)return;setPickd({iso:v,label:new Date(v+'T00:00:00').toLocaleDateString('en',{weekday:'short'})+' · '+fmtD(v),custom:true});}}/>
    </div>
    <textarea className="typein" rows={2} style={{marginTop:12}} value={reason} onChange={e=>setReason(e.target.value)} placeholder="Why do you need more time? (optional)"/>
    <button className="send" onClick={send}>Send request ⏳</button>
  </>;
}
function ReopenSheet({ctx,idx,close}){
  const t=tasks[idx];
  const [pickd,setPickd]=useState(null);
  const [cmt,setCmt]=useState('');
  if(!t)return null;
  const opts=[1,2,3,7].map(n=>{const d=new Date(TODAY);d.setDate(d.getDate()+n);
    return {iso:iso(d),label:d.toLocaleDateString('en',{weekday:'short'})+' · '+d.toLocaleDateString('en',{day:'numeric',month:'short'})};});
  const go=()=>{
    if(!pickd){ctx.say('Pick a new due date');return;}
    t.done=false;t.progress=undefined;t.doneBy=[];t.doneWhen=undefined;
    t.date=pickd.iso;t.due='Due '+fmtD(pickd.iso);
    t.reopened={by:ctx.r.name,comment:cmt.trim()};
    t.log=t.log||(t.note?[{by:'Earlier',when:'',text:t.note}]:[]);
    const reopenText='Reopened — '+(cmt.trim()||'not up to the mark');
    const reopenEntry={by:ctx.r.name,when:fmtDateTime(new Date()),text:reopenText,createdAt:new Date().toISOString()};
    t.log.push(reopenEntry);
    if(cmt.trim())t.note=cmt.trim();
    saveTask(t).catch(console.error);
    logTask(t,ctx.r.name,reopenText).then(row=>{if(row)reopenEntry.id=row.id;ctx.R();}).catch(console.error);
    close();ctx.R();ctx.say('Task reopened ↻ · '+t.who+' notified with your comment');};
  return <>
    <h3>Reopen task</h3>
    <div className="sub">{t.t}</div>
    <div className="sec" style={{margin:'6px 2px 8px'}}>New due date</div>
    <div className="picker" style={{marginTop:0}}>
      {opts.map(o=><button key={o.iso} className={'pickchip'+(pickd&&pickd.iso===o.iso?' cur':'')} onClick={()=>setPickd(o)}>{o.label}</button>)}
      <input type="date" className="selsel" style={{flex:'1 1 100%'}} min={iso(TODAY)} value={pickd&&pickd.custom?pickd.iso:''} aria-label="Pick any date"
        onChange={e=>{const v=e.target.value;if(!v)return;setPickd({iso:v,label:new Date(v+'T00:00:00').toLocaleDateString('en',{weekday:'short'})+' · '+fmtD(v),custom:true});}}/>
    </div>
    <textarea className="typein" rows={2} style={{marginTop:12}} value={cmt} onChange={e=>setCmt(e.target.value)} placeholder="What's not up to the mark? (sent to the assignee)"/>
    <button className="send" onClick={go}>Reopen &amp; notify ↻</button>
  </>;
}
function ReassignSheet({ctx,idx,close}){
  const t=tasks[idx];
  const [q,setQ]=useState('');
  if(!t)return null;
  const load=workload();
  const list=MEMBERS.filter(m=>!q||m.n.toLowerCase().includes(q.toLowerCase())||m.dept.toLowerCase().includes(q.toLowerCase())||m.role.toLowerCase().includes(q.toLowerCase()));
  const go=n=>{const m=findMember(n);const oldWho=t.who;
    t.who=n;t.init=m?m.i:n[0];t.coWho=undefined;
    saveTask(t).catch(console.error);
    const recipients=new Set(concernedForM(t,ctx.r.self));
    const oldP=oldWho?findPerson(oldWho):null;
    if(oldP&&oldP.s!==ctx.r.self)recipients.add(oldP.id);
    notifyEvent(t.id,ctx.r.id,'reassigned to '+n,[...recipients]);
    close();ctx.R();ctx.say('Reassigned to '+n+' · notified in TeamFlow');};
  return <>
    <h3>Reassign task</h3>
    <div className="sub">{t.t}</div>
    <input className="empsearch" placeholder="🔍 Name, department or skill…" value={q} onChange={e=>setQ(e.target.value)}/>
    <div className="empcol" style={{maxHeight:290}}>
      {list.length?list.map(m=><button key={m.n} className={'pickchip'+(hasWhoM(t,m.n)?' cur':'')} onClick={()=>go(m.n)}>
        {hasWhoM(t,m.n)?'✓ ':''}<b>{m.n}</b> · {load[m.n]} open<span className="emprole">{m.dept} · {m.role}</span></button>)
        :<MobileEmpty icon="🔍" t="No one matches" s="Try a different name, department, or skill." style={{padding:12}}/>}
    </div>
  </>;
}
function EventSheet({ctx,idx,close}){
  const t=tasks[idx];
  if(!t)return null;
  const m=findMember(t.who)||{};
  const d=new Date(t.date+'T00:00:00');
  const stat=t.done?'✓ Done':(d<TODAY&&!sameDay(d,TODAY)?'⚠ Overdue':(sameDay(d,TODAY)?'Due today':'Upcoming'));
  return <>
    <h3 style={{lineHeight:1.4}}>{t.t}</h3>
    <div className="sub">{stat} · {t.due||t.date}</div>
    <div className="field"><div className="k">Assigned to</div><div className="v">
      <span className="who" style={{marginRight:6}}>{t.init||''}</span>{t.who}{t.coWho&&t.coWho.length?' + '+t.coWho.join(' + '):''}{m.dept?' · '+m.dept:''}{m.role?' ('+m.role+')':''}</div></div>
    {!t.selfAssigned&&t.instructedBy?<div className="field"><div className="k">Assigned by</div><div className="v">{t.instructedBy}</div></div>:null}
    <div className="field"><div className="k">Department</div><div className="v">
      <span className="ldot" style={{display:'inline-block',background:bucketColor(t.bucket),marginRight:6}}/>{BUCKETS[t.bucket]||t.bucket||'—'}</div></div>
    <div className="field"><div className="k">Type</div><div className="v">{TYPES[t.type||'work'].e} {TYPES[t.type||'work'].l}</div></div>
    {t.recur?<div className="field"><div className="k">Repeats</div><div className="v">↻ {recurLabel(t.recur,t.recurOn)} — next created on completion</div></div>:null}
    {t.note?<div className="field"><div className="k">Note</div><div className="v" style={{fontWeight:500}}>“{t.note}”</div></div>:null}
    {!t.done?<button className="send" onClick={()=>{ctx.setSheet({kind:'update',idx});}}>Update / Done ✓</button>:null}
  </>;
}
function DaySheet({ctx,day,events,title,close}){
  return <>
    <h3>{title||(day.toLocaleDateString('en',{weekday:'short'})+' · '+day.toLocaleDateString('en',{day:'numeric',month:'short'}))}</h3>
    <div className="sub">{events.length} task{events.length!==1?'s':''}</div>
    <div style={{maxHeight:360,overflowY:'auto'}}>
      {events.map(o=><div key={o.i} className="task" style={{cursor:'pointer'}} onClick={()=>ctx.setSheet({kind:'event',idx:o.i})}>
        <div className="stripe" style={{background:bucketColor(o.t.bucket)}}/>
        <div className="tt" style={{textDecoration:o.t.done?'line-through':undefined}}>{o.t.done?'✓ ':''}{o.t.t}</div>
        <div className="meta"><span className="who">{o.t.init}</span> {o.t.who}{o.t.coWho&&o.t.coWho.length?' + '+o.t.coWho.join(' + '):''} · {BUCKETS[o.t.bucket]||o.t.bucket}</div>
      </div>)}
    </div>
  </>;
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
