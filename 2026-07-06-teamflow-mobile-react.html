<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>TeamFlow Mobile — React</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:wght@500;600;700&family=IBM+Plex+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.5/babel.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<script src="./shared.js"></script>
<link rel="stylesheet" href="./shared.css">
<style>
  body{margin:0;font-family:'IBM Plex Sans',-apple-system,"Segoe UI",Roboto,sans-serif;color:var(--ink);
    background:var(--bg);-webkit-font-smoothing:antialiased}
  h3,.brandfont{font-family:'Bricolage Grotesque','IBM Plex Sans',sans-serif}
  svg.i{width:20px;height:20px;stroke:currentColor;fill:none;stroke-width:1.9;stroke-linecap:round;stroke-linejoin:round;display:block;flex:0 0 auto}
  .caption{display:none}
  .caption b{color:#45423a}

  /* mobile-first: on a real phone the app fills the actual viewport, no decorative bezel.
     The "phone in a box" mockup look (fixed size, dark frame, fake notch) only applies on
     desktop-width viewports — see the @media block at the end of this stylesheet. */
  .phone{width:100vw;height:100dvh;background:var(--bg);position:relative}
  .notch{display:none}
  .screen{background:var(--bg);width:100%;height:100%;overflow:hidden;position:relative;display:flex;flex-direction:column}

  .top{padding:calc(14px + env(safe-area-inset-top)) 18px 14px;background:var(--card);border-bottom:1px solid var(--line);z-index:5}
  .top .row{display:flex;align-items:center;justify-content:space-between}
  .hello{font-size:13px;color:var(--muted);line-height:1.45}
  .hello b{color:var(--ink);font-weight:700}
  .av{width:40px;height:40px;border-radius:50%;background:var(--accent);color:#fff;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:14px}
  .rolebar{display:flex;align-items:center;gap:8px;margin-top:12px;background:#f1f0e9;border-radius:9px;padding:8px 10px}
  .rolebar .demo{font-size:10px;font-weight:700;letter-spacing:.5px;color:var(--accent-ink);background:var(--accent-soft);padding:3px 7px;border-radius:6px;white-space:nowrap}
  .rolesel{flex:1;border:none;background:none;font-family:inherit;font-size:13.5px;font-weight:700;color:var(--ink);outline:none;cursor:pointer}
  .summary{margin-top:12px;background:var(--accent-soft);border:1px solid var(--accent-border);
    border-radius:11px 11px 11px 3px;padding:11px 13px;font-size:13px;line-height:1.5;color:#134f48}
  .summary b{color:#0c3b35}

  .content{flex:1;overflow-y:auto;padding:15px 15px 100px}
  .content::-webkit-scrollbar{display:none}
  .sec{font-size:11px;font-weight:800;text-transform:uppercase;letter-spacing:.9px;color:var(--muted);margin:10px 2px 10px}

  .task{background:var(--card);border-radius:13px;padding:14px;margin-bottom:11px;box-shadow:0 2px 8px rgba(27,30,33,.05);border:1px solid var(--line);position:relative;overflow:hidden}
  .task.done .tt{text-decoration:line-through;color:var(--muted)}
  .stripe{position:absolute;left:0;top:0;bottom:0;width:4px}
  .pill{display:inline-flex;align-items:center;gap:5px;font-size:11px;font-weight:700;padding:3px 8px;border-radius:5px}
  .pill.over{background:var(--red-soft);color:var(--red)}
  .pill.today{background:var(--amber-soft);color:var(--amber)}
  .pill.done{background:var(--green-soft);color:var(--green)}
  .pill.open{background:#efeee7;color:#5d6367}
  .tt{font-size:15px;font-weight:600;margin:8px 0 6px;line-height:1.35}
  .meta{display:flex;align-items:center;gap:7px;font-size:12.5px;color:var(--muted);flex-wrap:wrap}
  .who{width:24px;height:24px;border-radius:50%;background:#e6e4da;color:var(--ink2);display:inline-flex;align-items:center;justify-content:center;font-size:10.5px;font-weight:700;flex:0 0 auto}
  .tag2{display:inline-block;font-size:10.5px;font-weight:700;padding:2px 7px;border-radius:5px}
  .tag2.green{background:var(--green-soft);color:var(--green)}
  .tag2.amber{background:var(--amber-soft);color:var(--amber)}
  .tag2.blue{background:var(--blue-soft);color:var(--blue)}
  .tag2.gray{background:#efeee7;color:#5d6367}
  .notepv{font-size:12.5px;color:var(--ink2);background:#f7f6f1;border-radius:7px;padding:7px 10px;margin-top:7px;line-height:1.4;font-style:italic}
  .attrow{display:flex;gap:6px;flex-wrap:wrap;margin-top:7px}
  .filechip{font-size:11.5px;font-weight:600;color:var(--ink2);background:#efeee7;padding:6px 10px;border-radius:6px;display:inline-flex;align-items:center;gap:4px}
  .cardbtns{display:flex;gap:8px;margin-top:12px}
  .btn{flex:1;border:none;border-radius:9px;padding:12px;font-size:13.5px;font-weight:700;cursor:pointer;min-height:44px;display:flex;align-items:center;justify-content:center;gap:6px}
  .btn:active{transform:scale(.97)}
  .btn.primary{background:var(--green);color:#fff}
  .btn.ghost{background:#efeee7;color:var(--ink2);flex:0 0 50px}
  .btn.accent{background:var(--accent);color:#fff}

  .insight{background:#20312e;color:#eef5f3;border-radius:14px;padding:16px;margin-bottom:14px}
  .insight .lab{font-size:10.5px;letter-spacing:1px;text-transform:uppercase;opacity:.75;display:flex;align-items:center;gap:6px}
  .insight p{margin:8px 0 0;font-size:14px;line-height:1.55}
  .attn{background:var(--card);border-radius:12px;padding:12px 13px;margin-bottom:10px;border:1px solid var(--line);display:flex;align-items:center;gap:12px}
  .ring{width:40px;height:40px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:700;color:#fff;font-size:13px;flex:0 0 auto}
  .attn .nm{font-size:14px;font-weight:600}
  .attn .rs{font-size:12px;color:var(--muted);margin-top:2px;line-height:1.35}
  .free{display:inline-block;font-size:10px;font-weight:700;color:var(--green);background:var(--green-soft);padding:2px 7px;border-radius:6px;margin-left:6px}

  .att-sum{display:flex;gap:9px;margin-bottom:14px}
  .att-sum .box{flex:1;background:var(--card);border:1px solid var(--line);border-radius:11px;padding:12px;text-align:center}
  .att-sum .n{font-size:21px;font-weight:700;font-family:'Bricolage Grotesque',sans-serif}
  .att-sum .l{font-size:11px;color:var(--muted);margin-top:2px}
  .prow{background:var(--card);border:1px solid var(--line);border-radius:11px;padding:11px 13px;margin-bottom:8px;display:flex;align-items:center;gap:11px}
  .dot{width:9px;height:9px;border-radius:50%;flex:0 0 auto}

  .nav{position:absolute;bottom:0;left:0;right:0;background:rgba(255,255,255,.95);backdrop-filter:blur(10px);
    border-top:1px solid var(--line);display:flex;justify-content:space-around;padding:8px 6px calc(8px + env(safe-area-inset-bottom));z-index:30}
  .nav button{background:none;border:none;display:flex;flex-direction:column;align-items:center;gap:4px;
    font-size:10.5px;color:var(--muted);cursor:pointer;flex:1;font-weight:600;padding:2px 0;min-height:50px}
  .nav button.on{color:var(--accent-ink)}
  .nav .ic{width:50px;height:29px;display:flex;align-items:center;justify-content:center;border-radius:9px}
  .nav button.on .ic{background:var(--accent-soft)}
  .fab{position:absolute;bottom:calc(78px + env(safe-area-inset-bottom));right:16px;width:60px;height:60px;border-radius:18px 18px 18px 5px;
    background:var(--accent);color:#fff;border:none;box-shadow:0 12px 26px rgba(14,122,111,.4);cursor:pointer;z-index:35;
    display:flex;align-items:center;justify-content:center}
  .fab:active{transform:scale(.93)}

  .sheet-wrap{position:absolute;inset:0;background:rgba(20,25,28,.5);backdrop-filter:blur(2px);z-index:50;display:flex;align-items:flex-end}
  .sheet{background:var(--card);width:100%;border-radius:22px 22px 0 0;padding:20px 18px 28px;animation:up .25s ease;max-height:88%;overflow-y:auto}
  @keyframes up{from{transform:translateY(60%)}to{transform:none}}
  .grab{width:44px;height:5px;border-radius:5px;background:#dcd9cd;margin:-6px auto 14px}
  .sheet h3{margin:2px 0 4px;font-size:18px}
  .sheet .sub{color:var(--muted);font-size:13px;margin-bottom:14px;line-height:1.4}
  .x{position:absolute;right:16px;background:none;border:none;color:var(--muted);cursor:pointer;padding:4px}
  .sheet .xrow{display:flex;justify-content:flex-end;margin:-6px -6px 0 0}

  .actbtn{width:100%;display:flex;align-items:center;gap:13px;background:var(--card);border:1.5px solid var(--line);
    border-radius:12px;padding:14px;margin-bottom:10px;cursor:pointer;text-align:left}
  .actbtn:active{transform:scale(.98)}
  .actbtn b{font-size:14.5px;display:block;color:var(--ink)}
  .actbtn small{font-size:12px;color:var(--muted)}
  .actic{width:44px;height:44px;border-radius:11px;display:flex;align-items:center;justify-content:center;flex:0 0 auto}

  .modetabs{display:flex;gap:6px;background:#efeee7;border-radius:9px;padding:4px;margin-bottom:14px}
  .mtab{flex:1;border:none;background:none;font-size:13.5px;font-weight:700;color:var(--muted);padding:9px;border-radius:7px;cursor:pointer}
  .mtab.on{background:var(--card);color:var(--ink);box-shadow:0 1px 4px rgba(27,30,33,.12)}
  .typein{width:100%;border:1.5px solid var(--line);border-radius:9px;padding:12px;font-size:14.5px;
    font-family:inherit;outline:none;resize:none;color:var(--ink);line-height:1.45}
  .typein:focus{border-color:var(--accent)}
  .understand{width:100%;margin-top:10px;background:var(--accent);color:#fff;border:none;border-radius:9px;
    padding:13px;font-size:14.5px;font-weight:700;cursor:pointer}
  .mic{width:98px;height:98px;border-radius:50%;margin:6px auto 14px;background:var(--accent-soft);color:var(--accent-ink);
    display:flex;align-items:center;justify-content:center;cursor:pointer;position:relative}
  .mic svg{width:40px;height:40px;stroke-width:1.7}
  .mic.rec{background:var(--red-soft);color:var(--red)}
  .mic.rec::after{content:"";position:absolute;inset:-8px;border-radius:50%;border:3px solid var(--red);animation:pulse 1s infinite}
  @keyframes pulse{0%{transform:scale(1);opacity:.7}100%{transform:scale(1.25);opacity:0}}
  .heard{background:#f4f3ec;border-radius:9px;padding:12px 14px;font-size:14px;line-height:1.5;color:var(--ink2);min-height:20px}
  .heard .ph{color:var(--muted)}
  .typechips{display:flex;flex-wrap:wrap;gap:7px;margin-bottom:14px}
  .tchip{border:1.5px solid var(--line);background:var(--card);border-radius:7px;padding:7px 12px;
    font-size:12.5px;font-weight:600;color:var(--ink2);cursor:pointer}
  .tchip.on{border-color:var(--accent);background:var(--accent-soft);color:var(--accent-ink)}
  .field{display:flex;align-items:flex-start;gap:10px;padding:11px 0;border-bottom:1px solid var(--line)}
  .field .k{font-size:12px;color:var(--muted);width:76px;flex:0 0 auto;padding-top:3px}
  .field .v{font-size:14px;font-weight:600;flex:1}
  .chipbtn{display:inline-flex;align-items:center;gap:5px;background:var(--card);border:1.5px dashed #b6d3cd;border-radius:7px;padding:4px 10px;font-size:13px;font-weight:600;cursor:pointer;color:var(--ink)}
  .aibadge{font-size:11px;color:var(--accent-ink);font-weight:700;background:var(--accent-soft);padding:3px 9px;border-radius:6px}
  .reason{font-size:11.5px;color:var(--muted);margin-top:5px;line-height:1.35}
  .reason b{color:var(--accent-ink)}
  .picker{display:flex;flex-wrap:wrap;gap:6px;margin-top:9px}
  .pickchip{border:1.5px solid var(--line);background:var(--card);border-radius:7px;padding:7px 11px;
    font-size:12.5px;font-weight:600;color:var(--ink2);cursor:pointer;text-align:left}
  .pickchip.cur{border-color:var(--accent);background:var(--accent-soft);color:var(--accent-ink)}
  .pickchip .emprole{display:block;font-size:11px;color:var(--muted);font-weight:500;margin-top:2px}
  .empsearch{width:100%;border:1.5px solid var(--line);border-radius:8px;padding:9px 11px;font-family:inherit;font-size:13.5px;color:var(--ink);outline:none;margin-bottom:8px}
  .empsearch:focus{border-color:var(--accent)}
  .empcol{display:flex;flex-direction:column;gap:6px;max-height:200px;overflow-y:auto;width:100%}
  .send{width:100%;margin-top:16px;background:var(--green);color:#fff;border:none;border-radius:10px;padding:14px;font-size:15px;font-weight:700;cursor:pointer}
  .send:active{transform:scale(.98)}
  .optst{width:100%;display:flex;justify-content:space-between;align-items:center;background:#f1f0e9;border:none;border-radius:9px;padding:12px 14px;font-size:13.5px;font-weight:700;color:var(--ink2);cursor:pointer;margin-top:12px}
  .uploadbtn{display:inline-flex;align-items:center;gap:6px;font-size:12.5px;font-weight:700;color:var(--accent-ink);
    background:var(--accent-soft);padding:11px 6px;border-radius:9px;cursor:pointer;flex:1;justify-content:center}
  .attachrow{display:flex;gap:8px;margin-top:12px}
  .filelist{display:flex;gap:8px;flex-wrap:wrap;margin-top:10px}
  .selsel{width:100%;border:1.5px solid var(--line);border-radius:8px;padding:9px;font-family:inherit;font-size:13px;font-weight:600;color:var(--ink);background:var(--card);outline:none}

  .calwrap{background:var(--card);border:1px solid var(--line);border-radius:12px;padding:12px;margin-bottom:14px}
  .calhead{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}
  .calhead button{border:none;background:#f1f0e9;width:30px;height:30px;border-radius:7px;cursor:pointer;color:var(--ink2);display:flex;align-items:center;justify-content:center}
  .calmon{font-weight:700;font-size:15px;font-family:'Bricolage Grotesque',sans-serif}
  .calgrid{display:grid;grid-template-columns:repeat(7,1fr);gap:3px}
  .caldow{text-align:center;font-size:10px;font-weight:700;color:var(--muted);padding:2px 0}
  .calcell{min-height:50px;background:#f7f6f1;border-radius:6px;padding:3px}
  .calcell.empty2{background:transparent}
  .calcell.today{background:var(--accent-soft);outline:1.5px solid var(--accent)}
  .caldate{font-size:10.5px;font-weight:700;color:var(--ink2);margin-bottom:2px}
  .calev{font-size:8.5px;color:#fff;border-radius:4px;padding:2px 4px;margin-bottom:2px;line-height:1.35;cursor:pointer;
    display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;word-break:break-word}
  .calev:active{opacity:.75}
  .calmore{font-size:8.5px;color:var(--muted);font-weight:700}
  .callegend{display:flex;flex-wrap:wrap;gap:5px 11px;margin-top:10px}
  .callegend span{font-size:10px;color:var(--muted);font-weight:600;display:inline-flex;align-items:center;gap:5px}
  .ldot{width:8px;height:8px;border-radius:50%;flex:0 0 auto}
  .syncrow{margin-top:12px;border-top:1px solid var(--line);padding-top:11px}
  .synctitle{font-size:12px;font-weight:700;color:var(--ink2);margin-bottom:8px}
  .syncbtns{display:flex;gap:8px}
  .syncb{flex:1;border:1.5px solid var(--line);background:var(--card);border-radius:8px;padding:10px 6px;font-size:12px;font-weight:700;color:var(--ink2);cursor:pointer}

  .empty{text-align:center;color:var(--muted);font-size:13.5px;padding:28px 10px}
  .toast{position:absolute;bottom:150px;left:50%;transform:translateX(-50%);background:#22262a;color:#fff;
    padding:12px 17px;border-radius:10px;font-size:13px;font-weight:600;z-index:60;max-width:92%;width:max-content;text-align:center;line-height:1.45;animation:up .2s ease}

  /* desktop-width viewports (i.e. not a real phone): restore the decorative "phone in a box"
     mockup look this was originally built with, instead of a full-bleed app. */
  @media (min-width:600px){
    body{min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:30px 14px}
    .caption{display:block;font-size:12px;color:#6d6a5f;margin-top:16px;text-align:center;max-width:390px;line-height:1.5}
    .phone{width:392px;max-width:96vw;height:806px;background:#23262a;border-radius:46px;padding:12px;box-shadow:0 30px 80px rgba(27,30,33,.35);flex:0 0 auto}
    .notch{display:block}
    .screen{border-radius:36px}
    .top{padding:44px 18px 14px}
    .nav{padding:8px 6px 20px}
    .fab{bottom:78px}
  }
</style>
</head>
<body>
<div id="root"></div>
<div id="err-overlay"></div>
<script>
window.onerror=function(msg,src,line){
  var el=document.getElementById('err-overlay');
  el.style.display='block';
  el.textContent='Runtime error — please report this to Claude:\n'+msg+' (line '+line+')\n\n(tap to dismiss)';
  el.onclick=function(){el.style.display='none';};
};
</script>

<script type="text/babel" data-presets="react">
const {useState,useEffect,useRef,useCallback} = React;

/* ============ data ============ */
const TYPES={work:{l:"Work",e:"🛠"},purchase:{l:"Purchase",e:"🛒"},repair:{l:"Repair",e:"🔧"},maint:{l:"Maintenance",e:"🧰"},other:{l:"Other",e:"📋"}};
/* cosmetic-only: the assignment-suggestion heuristic and job-title display text.
   Not persisted anywhere — the DB only tracks org role/department, not this level of detail. */
const SKILLS={Hari:{types:["repair","maint"],buckets:["maintenance","construction","it"]},
  Suresh:{types:["repair","maint"],buckets:["maintenance","construction"]},
  Latha:{types:["maint"],buckets:[]},
  Ravi:{types:["purchase"],buckets:["accounts","administration"]},
  Anita:{types:[],buckets:["administration","hr"]},
  Meena:{types:["work"],buckets:["academic"]},
  Kavya:{types:["work"],buckets:["academic"]},
  Arjun:{types:[],buckets:[]},
  Deepa:{types:[],buckets:["transport"]},
  Vikram:{types:[],buckets:[]}};
const JOB_TITLE={Hari:"Repairs & electrical",Suresh:"Plumbing & carpentry",Latha:"Housekeeping",
  Ravi:"Procurement",Anita:"Office admin",Meena:"Senior teacher",Kavya:"Teacher",
  Arjun:"General duties",Deepa:"Coordinator",Vikram:"Maintenance head"};

let MEMBERS=[];
const ALL_STAFF=[];
let tasks=[];
let pendingReqs=[];
let pendingIssues=[];
let notices=[];
const peopleDemo=[
  {n:"Hari Charan", s:"In · 8:58", c:"var(--green)"},{n:"Meena Rao", s:"Late · 9:24", c:"var(--amber)"},
  {n:"Ravi Kumar", s:"In · 8:41", c:"var(--green)"},{n:"Anita Desai", s:"Absent — no leave", c:"var(--red)"},
  {n:"Arjun Menon", s:"In · 8:50", c:"var(--green)"},
];
const ROLES={
  admin:{name:"Akarsh",org:"Greenwood School · Admin",av:"A",team:ALL_STAFF,self:"Akarsh",rank:0,
    tabs:["home","alltasks","calendar","insights","notices","more"],admin:true,billing:true,canPost:true,
    brief:"Across all 4 teams: 2 tasks at risk today and 1 person is overloaded. You have full visibility and control."},
  mgmt:{name:"Rajesh Menon",org:"Greenwood School · Management",av:"R",team:ALL_STAFF,self:"Rajesh",rank:1,
    tabs:["home","alltasks","calendar","insights","notices","more"],admin:true,billing:false,canPost:true,
    brief:"Org-wide view: 2 tasks at risk and 1 overloaded person. You can manage people and see every report."},
  srm:{name:"Anita Desai",org:"Manager · Academic + Admin",av:"A",team:["Meena","Kavya","Ravi","Anita","Hari","Suresh"],self:"Anita",rank:2,
    tabs:["home","alltasks","calendar","insights","notices","more"],admin:false,billing:false,canPost:true,
    brief:"Your teams (Academic, Admin): 1 task likely to slip by Friday and Hari is behind."},
  jrm:{name:"Vikram Rao",org:"Team Member · Maintenance head",av:"V",team:["Hari","Suresh","Latha"],self:"Vikram",rank:3,
    tabs:["home","alltasks","calendar","insights","notices","more"],admin:false,billing:false,canPost:true,
    brief:"Your team: Hari has 1 task overdue 4 days. Assign or remind to keep things on track."},
  worker:{name:"Hari Charan",org:"Teacher",av:"H",team:["Hari"],self:"Hari",rank:4,
    tabs:["alltasks","calendar","notices"],admin:false,billing:false,canPost:false,brief:""}
};
const CHAIN=[{rank:0,label:"Akarsh (Admin)"},{rank:1,label:"Rajesh (Management)"},{rank:2,label:"Anita (Manager)"},{rank:3,label:"Vikram (Team Member)"}];
const bossesFor=role=>CHAIN.filter(c=>c.rank<ROLES[role].rank).map(c=>c.label);
/* same approval model as the console: admin/mgmt approve anything, otherwise only the person's direct boss */
const FIRST=n=>String(n).split(' ')[0];

/* srm/jrm's real reporting-line scope, mirroring console's descendants() — walks ALL_PEOPLE's
   boss field (short names, matching t.who's convention) rather than a role-config hardcoded list.
   Only need this for srm/jrm: admin/mgmt scope is role-based (ALL_STAFF, position-independent) and
   worker never has reports in this org. */
function descendantsM(shortName){let out=[],q=ALL_PEOPLE.filter(p=>p.boss===shortName);
  while(q.length){const p=q.shift();out.push(p);q=q.concat(ALL_PEOPLE.filter(x=>x.boss===p.s));}return out;}

function extLabel(dateStr){
  const d=new Date(dateStr+'T00:00:00');
  return d.toLocaleDateString('en',{weekday:'short'})+' · '+fmtD(dateStr);
}
function rowToMobileTask(row,assignRows,byId,logRows){
  const mine=assignRows.filter(a=>a.task_id===row.id);
  const primary=mine.find(a=>a.is_primary)||mine[0];
  const co=mine.filter(a=>a!==primary);
  const doneBy=mine.filter(a=>a.done_at).map(a=>a.staff_short);
  const t={id:row.id,t:row.title,who:primary?primary.staff_short:null,
    init:primary&&byId[primary.staff_id]?byId[primary.staff_id].initials:'',
    coWho:co.length?co.map(a=>a.staff_short):undefined,
    due:'Due '+dueLabel(row.due_date,row.due_time?row.due_time.slice(0,5):''),
    date:row.due_date,bucket:LABEL_TO_BUCKET[row.department]||'administration',type:row.type,
    done:row.status==='done',
    /* legacy 'partial' rows collapse into 'inprogress' — the app no longer distinguishes them */
    progress:(row.status==='inprogress'||row.status==='partial')?'inprogress':undefined,
    note:row.note||undefined,doneOn:row.done_on||undefined,
    doneWhen:row.status==='done'?fmtD(row.done_on||row.due_date):undefined,
    doneBy:doneBy.length?doneBy:undefined,
    selfAssigned:row.self_assigned||undefined,instructedBy:row.instructed_by||undefined,
    origin:row.origin||undefined,
    files:row.files&&row.files.length?row.files:undefined,
    recur:row.recur||undefined,recurOn:row.recur_on!=null?row.recur_on:undefined};
  if(row.ext_new_date)t.extReq={newDate:row.ext_new_date,label:extLabel(row.ext_new_date),reason:row.ext_reason||''};
  if(row.reopened_by)t.reopened={by:(byId[row.reopened_by]||{name:''}).name,comment:row.reopened_comment||''};
  const logs=logRows.filter(l=>l.task_id===row.id);
  if(logs.length)t.log=logs.map(l=>({by:l.author_name||'Earlier',when:fmtD(l.created_at.slice(0,10)),text:l.body}));
  return t;
}

function mobileTaskRow(t){

    status:t.done?'done':(t.progress||'open'),
    due_date:t.date||null,due_time:null,note:t.note||'',
    recur:t.recur||null,recur_on:t.recurOn!=null?t.recurOn:null,
    self_assigned:!!t.selfAssigned,instructed_by:t.instructedBy||null,origin:t.origin||null,
    files:t.files||[],done_on:t.doneOn||null,
    ext_new_date:(t.extReq&&t.extReq.newDate)||null,ext_reason:(t.extReq&&t.extReq.reason)||null,
    reopened_by:(t.reopened&&findPerson(t.reopened.by))?findPerson(t.reopened.by).id:null,
    reopened_comment:(t.reopened&&t.reopened.comment)||null};

async function saveTask(t){

  if(t.id){await sb.from('tasks').update(row).eq('id',t.id);}
  else{const {data}=await sb.from('tasks').insert(row).select().single();t.id=data.id;}
  await syncAssignees(t);
}
async function syncAssignees(t){
  if(!t.id)return;
  await sb.from('task_assignees').delete().eq('task_id',t.id);
  const rows=assigneesM(t).filter(Boolean).map(n=>{const m=findMember(n);
    return m&&m.id?{task_id:t.id,staff_id:m.id,is_primary:n===t.who,
      done_at:(t.doneBy||[]).includes(n)?new Date().toISOString():null}:null;}).filter(Boolean);
  if(rows.length)await sb.from('task_assignees').insert(rows);
}

const findMember=n=>MEMBERS.find(m=>m.n.toLowerCase()===String(n).toLowerCase());
const assigneesM=t=>[t.who].concat(t.coWho||[]);
const hasWhoM=(t,n)=>assigneesM(t).includes(n);
const gist=t=>{const w=t.split(' ');return w.length<=3?t:w.slice(0,3).join(' ')+'…';};
const fmtD=d=>new Date(d+'T00:00:00').toLocaleDateString('en',{day:'numeric',month:'short'});
const labelToTime=l=>{const m=(l||'').match(/(\d{1,2}):(\d{2})\s*(AM|PM)/i);if(!m)return '';let h=+m[1]%12;if(m[3].toUpperCase()==='PM')h+=12;return String(h).padStart(2,'0')+':'+m[2];};
const dueLabel=(d,t)=>{if(!d)return '—';const tm=new Date(TODAY);tm.setDate(tm.getDate()+1);
  const day=d===iso(TODAY)?'Today':d===iso(tm)?'Tomorrow':fmtD(d);
  return day+(t?' · '+fmtTime(t):'');};
function guessTime(t){t=t.toLowerCase();
  const m=t.match(/\b(?:by|at|before)\s+(\d{1,2})(?::(\d{2}))?\s*(am|pm)\b/);
  if(m){let h=+m[1]%12;if(m[3]==='pm')h+=12;return String(h).padStart(2,'0')+':'+(m[2]||'00');}
  if(/\bnoon\b/.test(t))return '12:00';
  if(/\bend of (the )?day\b|\beod\b/.test(t))return '17:00';
  return null;}
function workload(){const l={};MEMBERS.forEach(m=>l[m.n]=tasks.filter(t=>!t.done&&hasWhoM(t,m.n)).length);return l;}
/* real overdue/overloaded staff for Insights' "Who needs attention" — was hardcoded demo names
   (Hari Charan, Meena R.) with no real-data path at all; mirrors console's attentionList(). */
function attentionList(){
  const load=workload();
  return MEMBERS.map(m=>{
    const mine=tasks.filter(t=>!t.done&&hasWhoM(t,m.n));
    const od=mine.filter(t=>t.date&&t.date<iso(TODAY));
    const worst=od.length?Math.max(...od.map(t=>Math.round((TODAY-new Date(t.date+'T00:00:00'))/86400000))):0;
    const rs=[];
    if(od.length)rs.push(od.length+' overdue — worst is '+worst+' day'+(worst!==1?'s':'')+' late');
    if(load[m.n]>=3)rs.push(load[m.n]+' open tasks — heaviest load on the team');
    return {m,od:od.length,load:load[m.n],reason:rs.join(' · ')};
  }).filter(x=>x.reason).sort((a,b)=>b.od-a.od||b.load-a.load);
}
/* task creation should only offer departments that actually have real staff in them, and the
   Administrator's own department alone shouldn't count — same policy as console's realDeptKeys() */
const realDeptKeys=()=>{const has=new Set(MEMBERS.filter(p=>p.role!=='Administrator').map(p=>p.dept));return Object.keys(BUCKETS).filter(k=>has.has(BUCKETS[k]));};
/* for recurring tasks: schedule the next occurrence after completion, returns its date */
function spawnNextRecur(t){
  if(!t.recur)return null;
  const base=t.date&&t.date>iso(TODAY)?t.date:iso(TODAY);
  const d=new Date(base+'T00:00:00');
  let nd;
  if(t.recur==='daily'){d.setDate(d.getDate()+1);nd=iso(d);}
  else if(t.recur==='weekly'){if(t.recurOn!=null){d.setDate(d.getDate()+1);nd=nextAnchor('weekly',t.recurOn,iso(d));}else{d.setDate(d.getDate()+7);nd=iso(d);}}
  else if(t.recur==='monthly'){const y=d.getFullYear(),m=d.getMonth()+1,day=t.recurOn!=null?t.recurOn:d.getDate();
    nd=iso(new Date(y,m,Math.min(day,new Date(y,m+1,0).getDate())));}
  else{const y=d.getFullYear()+1,mm=t.recurOn?t.recurOn.m:d.getMonth(),dd=t.recurOn?t.recurOn.d:d.getDate();
    nd=iso(new Date(y,mm,Math.min(dd,new Date(y,mm+1,0).getDate())));}
  tasks.push({t:t.t,who:t.who,init:t.init,coWho:t.coWho?t.coWho.slice():undefined,
    due:'Due '+fmtD(nd),date:nd,bucket:t.bucket,type:t.type,done:false,recur:t.recur,recurOn:t.recurOn,
    selfAssigned:t.selfAssigned,instructedBy:t.instructedBy});
  return nd;}
function suggestAssignee(type,bucket){
  const load=workload();const OVER=3;
  let pool=MEMBERS.filter(m=>m.types.includes(type));let basis='type';
  if(!pool.length){pool=MEMBERS.filter(m=>m.buckets.includes(bucket));basis='bucket';}
  if(!pool.length){pool=MEMBERS.slice();basis='any';}
  pool=pool.slice().sort((a,b)=>load[a.n]-load[b.n]);
  let pick=pool[0];
  let reason=basis==='type'?`Handles ${TYPES[type].l.toLowerCase()} tasks · ${load[pick.n]} open now`
    :basis==='bucket'?`Owns the ${BUCKETS[bucket]||bucket} department · ${load[pick.n]} open now`
    :`Lightest workload · ${load[pick.n]} open now`;
  if(load[pick.n]>=OVER)reason+=' · team is busy';
  return {n:pick.n,i:pick.i,reason};
}
function suggestFixer(text){const t=(text||'').toLowerCase();
  if(/fan|light|electric|wiring|socket|projector|power/.test(t))return{n:'Hari',why:'electrical work'};
  if(/tap|leak|water|pipe|plumb|toilet|drain/.test(t))return{n:'Suresh',why:'plumbing work'};
  if(/clean|dust|sweep|garbage|dirty/.test(t))return{n:'Latha',why:'housekeeping'};
  const s=suggestAssignee('repair','maintenance');return{n:s.n,why:'lightest workload'};}
function guessBucket(t){t=t.toLowerCase();
  if(/\b(exam|class|academic|timetable|teacher|lesson|syllabus|library)\b/.test(t))return 'academic';
  if(/\b(projector|wifi|network|computer|smart ?board|cctv|printer|software|panel|wiring)\b/.test(t))return 'it';
  if(/\b(bus|driver|vehicle|transport|route)\b/.test(t))return 'transport';
  if(/\b(leave|recruit|salary|payroll|appraisal|hiring)\b/.test(t))return 'hr';
  if(/\b(invoice|payment|purchase|order|buy|cash|fees?|budget|supplies|stock)\b/.test(t))return 'accounts';
  if(/\b(build|construction|civil|wall|cement)\b/.test(t))return 'construction';
  if(/\b(repair|fix|broken|leak|clean|service|maintain)\b/.test(t))return 'maintenance';
  return 'administration';}
function suggestDue(type,text){const t=(text||'').toLowerCase();
  if(/\b(urgent|asap|immediately|now|today)\b/.test(t))return{when:"Today · 5:00 PM",reason:"Sounds urgent"};
  if(type==="repair")return{when:"Tomorrow · 9:00 AM",reason:"Repairs are usually next-day"};
  if(type==="purchase")return{when:"This week",reason:"Purchases typically allow a few days"};
  if(type==="maint")return{when:"Next week",reason:"Maintenance can be scheduled ahead"};
  return{when:"Tomorrow · 9:00 AM",reason:"Default next-day"};}
const DATE_OPTS=["Today · 5:00 PM","Tomorrow · 9:00 AM","This week","Friday · 5:00 PM","Next week"];
function whenToDate(when){const w=(when||'').toLowerCase();const d=new Date(TODAY);
  if(w.includes('today')){}
  else if(w.includes('tomorrow'))d.setDate(d.getDate()+1);
  else if(w.includes('friday')||w.includes('this week')){const df=(5-d.getDay()+7)%7||7;d.setDate(d.getDate()+df);}
  else if(w.includes('next week'))d.setDate(d.getDate()+7);
  else d.setDate(d.getDate()+1);
  return iso(d);}
function parseText(txt){
  const low=txt.toLowerCase();
  const whos=MEMBERS.filter(m=>new RegExp('\\b'+m.n.toLowerCase()+'\\b').test(low)).map(m=>m.n);
  let when=null;
  if(low.includes('today'))when='Today · 5:00 PM';
  else if(low.includes('tomorrow'))when='Tomorrow · 9:00 AM';
  else if(low.includes('friday'))when='Friday · 5:00 PM';
  else if(low.includes('this week'))when='This week';
  else if(low.includes('next week'))when='Next week';
  let recur=guessRecur(low),recurOn=null;
  const wm=low.match(/\bevery\s+(sunday|monday|tuesday|wednesday|thursday|friday|saturday)s?\b/);
  if(wm){recur='weekly';recurOn={sunday:0,monday:1,tuesday:2,wednesday:3,thursday:4,friday:5,saturday:6}[wm[1]];}
  const tm=guessTime(low);
  if(tm){const lbl=fmtTime(tm);when=when?when.split(' · ')[0]+' · '+lbl:'Today · '+lbl;}
  const END=/\s*\b(?:by|before|at)?\s*(?:today|tomorrow|this week|next week|friday|every ?day|daily|every week|weekly|every month|monthly|every year|yearly|annually|every\s+(?:sunday|monday|tuesday|wednesday|thursday|friday|saturday)s?|noon|\d{1,2}(?::\d{2})?\s*(?:am|pm))\b\.?\s*$/i;
  let task=txt.replace(/^(please\s+)?(tell|ask|remind|get)\s+\w+(\s+and\s+\w+)*\s+(to\s+)?/i,'').replace(/^\w+\s+should\s+/i,'');
  task=task.replace(END,'').replace(END,'').replace(/[,.]\s*$/,'').trim()||txt;
  task=task.charAt(0).toUpperCase()+task.slice(1);
  return {raw:txt,task,whos,when,recur,recurOn};
}

  };
  return <div className="phone"><div className="notch"/><div className="screen" style={{display:'flex',flexDirection:'column',justifyContent:'center',padding:'0 24px'}}>
    <h3 className="brandfont" style={{fontSize:22,margin:'0 0 20px'}}>TeamFlow</h3>
    {done?<>
      <div style={{color:'var(--muted)',fontSize:13,marginBottom:16,lineHeight:1.4}}>Password updated. Sign in with your new password.</div>
      <button className="send" onClick={()=>window.location.href=window.location.href.split('#')[0]}>Back to sign in</button>
    </>:<>
      <div style={{fontSize:11,fontWeight:700,color:'var(--muted)',textTransform:'uppercase',letterSpacing:.5,marginBottom:6}}>New password</div>
      <input type="password" className="typein" style={{marginBottom:12}} value={pw} onChange={e=>setPw(e.target.value)} autoFocus/>
      <div style={{fontSize:11,fontWeight:700,color:'var(--muted)',textTransform:'uppercase',letterSpacing:.5,marginBottom:6}}>Confirm password</div>
      <input type="password" className="typein" style={{marginBottom:14}} value={pw2} onChange={e=>setPw2(e.target.value)}
        onKeyDown={e=>e.key==='Enter'&&save()}/>
      {err?<div style={{color:'var(--red)',fontSize:12.5,marginBottom:12}}>{err}</div>:null}
      <button className="send" disabled={busy} onClick={save}>{busy?'Saving…':'Set new password'}</button>
    </>}
  </div></div>;
}

/* ============ app ============ */
function App(){
  const [,setTick]=useState(0);
  const R=useCallback(()=>setTick(t=>t+1),[]);
  const [previewRole,setPreviewRole]=useState(null); // admin-only "preview as" override
  const [page,setPage]=useState('home');
  const [sheet,setSheet]=useState(null); // {kind, idx?}
  const sheetRef=useRef(null);
  useEffect(()=>{sheetRef.current=sheet;},[sheet]);
  const {toast,say}=useToast();
  const [loaded,setLoaded]=useState(false);
  const [session,setSession]=useState(undefined); // undefined=checking · null=signed out · object=signed in
  const [recovery,setRecovery]=useState(false); // true once Supabase reports this session came from a reset-password email link
  useEffect(()=>{
    sb.auth.getSession().then(({data})=>setSession(data.session));
    const {data:sub}=sb.auth.onAuthStateChange((e,sess)=>{if(e==='PASSWORD_RECOVERY')setRecovery(true);setSession(sess);});
    return ()=>sub.subscription.unsubscribe();
  },[]);
  useEffect(()=>{
    if(!session)return;
    loadAll().then(()=>setLoaded(true)).catch(e=>{console.error(e);setLoaded(true);say('Could not load data from Supabase — check your connection');});
  },[session]);
  useEffect(()=>{
    if(!session)return;
    let t;
    const taskSheetKinds=['update','ext','reopen','reassign','event'];
    const refetch=()=>{clearTimeout(t);t=setTimeout(()=>{
      const cur=sheetRef.current;
      const openId=cur&&taskSheetKinds.includes(cur.kind)&&tasks[cur.idx]?tasks[cur.idx].id:null;
      loadAll().then(()=>{
        if(openId){const ni=tasks.findIndex(x=>x.id===openId);setSheet(ni<0?null:{...cur,idx:ni});}
        R();
      }).catch(console.error);
    },400);};
    const ch=sb.channel('teamflow-sync')
      .on('postgres_changes',{event:'*',schema:'public',table:'staff'},refetch)
      .on('postgres_changes',{event:'*',schema:'public',table:'tasks'},refetch)
      .on('postgres_changes',{event:'*',schema:'public',table:'task_assignees'},refetch)
      .on('postgres_changes',{event:'*',schema:'public',table:'task_log'},refetch)
      .on('postgres_changes',{event:'*',schema:'public',table:'requests'},refetch)
      .on('postgres_changes',{event:'*',schema:'public',table:'notices'},refetch)
      .subscribe();
    return ()=>{clearTimeout(t);sb.removeChannel(ch);};
  },[session]);

  const loadingScreen=msg=><div className="phone"><div className="notch"/><div className="screen" style={{display:'flex',alignItems:'center',justifyContent:'center',color:'var(--muted)',fontSize:13}}>{msg}</div></div>;
  if(session===undefined)return loadingScreen('Loading…');
  if(recovery)return <ResetPasswordScreen/>;
  if(session===null)return <LoginScreen/>;
  if(!loaded)return loadingScreen('Loading TeamFlow…');

  const myPerson=ALL_PEOPLE.find(p=>p.authId===session.user.id);
  if(!myPerson)return <div className="phone"><div className="notch"/><div className="screen" style={{display:'flex',flexDirection:'column',gap:14,alignItems:'center',justifyContent:'center',color:'var(--muted)',fontSize:13,padding:24,textAlign:'center'}}>
    <div>Your account isn't linked to a staff record. Contact your administrator.</div>
    <button className="syncb" onClick={()=>sb.auth.signOut()}>Sign out</button></div></div>;
  const myRoleKey=DB_ROLE_TO_KEY[myPerson.role];
  if(!myRoleKey)return <div className="phone"><div className="notch"/><div className="screen" style={{display:'flex',flexDirection:'column',gap:14,alignItems:'center',justifyContent:'center',color:'var(--muted)',fontSize:13,padding:24,textAlign:'center'}}>
    <div>This account isn't set up for a supported role. Contact your administrator.</div>
    <button className="syncb" onClick={()=>sb.auth.signOut()}>Sign out</button></div></div>;
  const role=(myRoleKey==='admin'&&previewRole)?previewRole:myRoleKey;

  /* When Preview As is engaged this is a hypothetical simulation with no real backing person, so
     keep the canonical demo persona for that role. Otherwise show whoever's actually logged in —
     ROLES[role].name/av used to be a fixed persona per role, which showed every admin/mgmt
     account as "Priya"/"Rajesh" regardless of who signed in. Same fix for `team`: worker/srm/jrm
     all used to be hardcoded per-role lists (ROLES.worker.team=["Hari"], srm=Anita's exact roster,
     jrm=Vikram's), so any other real account at those tiers would've seen the demo persona's
     people instead of their own. worker just needs [myPerson.s] (no Teacher has reports here);
     srm/jrm now walk the real boss_id chain via descendantsM(). Preserves each role's original
     self-inclusion behavior exactly (srm included Anita herself in her own team, jrm did NOT
     include Vikram in his) rather than unifying them, since that's an existing behavioral
     distinction, not something this fix was asked to change. admin/mgmt stay on ALL_STAFF
     unchanged — that's already role-based, not position-based, so it was never broken. */
  const previewing=role!==myRoleKey;
  const r=previewing?ROLES[role]:{...ROLES[role],name:myPerson.n,
    self:myPerson.s,
    av:myPerson.n.split(/\s+/).map(w=>w[0]).join('').slice(0,2).toUpperCase(),
    team:role==='worker'?[myPerson.s]
      :role==='srm'?[myPerson.s].concat(descendantsM(myPerson.s).map(p=>p.s))
      :role==='jrm'?descendantsM(myPerson.s).map(p=>p.s)
      :ROLES[role].team};
  const scope=r.team;
  const mine=tasks.map((t,i)=>({t,i})).filter(o=>assigneesM(o.t).some(a=>scope.includes(a)));
  const openN=mine.filter(o=>!o.t.done).length;
  const overN=mine.filter(o=>!o.t.done&&o.t.date&&o.t.date<iso(TODAY)).length;
  const todayN=mine.filter(o=>!o.t.done&&o.t.date===iso(TODAY)).length;
  const waitN=role==='worker'?0
    :(canAssignIssues(role)?pendingIssues.length:0)
    +pendingReqs.filter(q=>canApproveFrom(role,q.from)).length
    +tasks.filter(t=>t.extReq&&canApproveFrom(role,t.who)).length;

  const switchRole=v=>{setPreviewRole(v);const rr=ROLES[v];if(!rr.tabs.includes(page))setPage(rr.tabs[0]);setSheet(null);};
  const ctx={role,r,scope,mine,say,R,setSheet,setPage,page};

  const needExt=t=>{if(t.done||!t.date)return false;const lim=new Date(TODAY);lim.setDate(lim.getDate()+2);return t.date<=iso(lim);};

  /* actions shared */
  const acts={
    remind:i=>say('Reminder sent to '+assigneesM(tasks[i]).join(' & ')+' on WhatsApp 🔔'),
    approveReq:qi=>{const q=pendingReqs.splice(qi,1)[0];if(!q)return;
      const s=suggestAssignee('purchase','accounts');
      const nt={t:"Buy: "+q.t,who:s.n,init:s.i,due:"This week",date:whenToDate("this week"),
        bucket:"accounts",type:"purchase",done:false,origin:"request",
        note:'From '+q.from+(q.note?' — “'+q.note+'”':'')};
      tasks.unshift(nt);
      R();
      saveTask(nt).catch(console.error);deleteRequestRow(q).catch(console.error);
      say('Approved · '+s.n+' (procurement · accounts) will buy 📦');},
    declineReq:qi=>{const q=pendingReqs.splice(qi,1)[0];if(q){R();deleteRequestRow(q).catch(console.error);say('Request declined — '+q.from.split(' ')[0]+' will be notified');}},
    assignIssue:(qi,who)=>{const q=pendingIssues.splice(qi,1)[0];if(!q)return;const m=findMember(who);
      const nt={t:q.t,who:m.n,init:m.i,due:"Tomorrow · 9:00 AM",date:whenToDate("tomorrow"),
        bucket:"maintenance",type:"repair",done:false,origin:"issue",note:'Reported by '+q.from,files:q.files};
      tasks.unshift(nt);
      R();
      saveTask(nt).catch(console.error);deleteRequestRow(q).catch(console.error);
      say('Assigned to '+who+' 🔧 · notified on WhatsApp');},
    approveExt:i=>{const t=tasks[i];if(!t||!t.extReq)return;
      t.date=t.extReq.newDate;t.due='Due '+fmtD(t.extReq.newDate);delete t.extReq;R();
      saveTask(t).catch(console.error);
      say('Extension approved ⏳ · assignee notified');},
    rejectExt:i=>{const t=tasks[i];if(!t||!t.extReq)return;delete t.extReq;R();
      saveTask(t).catch(console.error);
      say('Extension rejected — original due date stands');},
    needExt,
  };

  return <>
  <div className="phone"><div className="notch"/><div className="screen">
    <div className="top">
      <div className="row">
        <div className="hello">Good morning,<br/><b>{r.name}</b> · <span>{r.org}</span></div>
        <div className="av">{r.av}</div>
      </div>
      <div className="rolebar">
        {myRoleKey==='admin'?<>
          <span className="demo">PREVIEW AS</span>
          <select className="rolesel" value={role} onChange={e=>switchRole(e.target.value)}>
            <option value="admin">Administrator</option><option value="mgmt">Management</option>
            <option value="srm">Manager</option><option value="jrm">Team Member</option>
            <option value="worker">Teacher</option>
          </select>
        </>:<span className="rolesel">{myPerson.n}</span>}
        <button className="uploadbtn" style={{flex:'0 0 auto',padding:'6px 10px',fontSize:11}} onClick={()=>sb.auth.signOut()}>Sign out</button>
      </div>
      <div className="summary">
        <b>{role==='worker'?`You have ${openN} task${openN!=1?'s':''}`:`${openN} open · ${r.org.split('·')[0].trim()}`}</b> · {overN} overdue · {todayN} due today
        {waitN?<span> · <b>{waitN} waiting on you</b></span>:null}
      </div>
    </div>
    <div className="content">
      {page==='home'&&<Home ctx={ctx} acts={acts}/>}
      {page==='alltasks'&&<AllTasks ctx={ctx} acts={acts}/>}
      {page==='calendar'&&<div><div className="sec">My calendar · due dates</div><Cal ctx={ctx} personal/></div>}
      {page==='insights'&&<Insights ctx={ctx}/>}
      {page==='notices'&&<Notices ctx={ctx}/>}
      {page==='more'&&<More ctx={ctx}/>}
      {page==='attendance'&&<Attendance/>}
    </div>
    <button className="fab" onClick={()=>setSheet({kind:'actions'})} aria-label="Add"><I n="plus" s={26}/></button>
    <div className="nav">
      {[['home','home','Home'],['alltasks','checkc','Tasks'],['calendar','cal','Calendar'],['insights','chart','Insights'],['notices','horn','Notices'],['more','dots','More']]
        .filter(([p])=>r.tabs.includes(p))
        .map(([p,ic,l])=><button key={p} className={page===p?'on':''} onClick={()=>setPage(p)}>
          <span className="ic"><I n={ic}/></span>{l}</button>)}
    </div>
    {sheet?<Sheets ctx={ctx} acts={acts} sheet={sheet}/>:null}
    {toast?<div className="toast">{toast}</div>:null}
  </div></div>
  <div className="caption"><b>TeamFlow mobile · React build.</b> Tap <b>+</b> to add a task, report an issue, or request supplies. Switch roles up top — the Teacher view is what most staff see.</div>
  </>;
}

/* ============ task card ============ */
function TaskCard({o,ctx,acts}){
  const t=o.t,i=o.i;
  const st=t.done?'done':(t.date&&t.date<iso(TODAY)?'over':(t.date===iso(TODAY)?'today':'open'));
  const pl={over:'Overdue',today:'Due today',open:'Open',done:'Done'};
  const sc={over:'var(--red)',today:'var(--amber)',open:'#b9b5a6',done:'var(--green)'};
  return <div className={'task'+(t.done?' done':'')}>
    <div className="stripe" style={{background:sc[st]}}/>
    <span className={'pill '+st}>{t.done?'✓ ':''}{pl[st]}</span>
    <div className="tt">{t.t}</div>
    <div className="meta"><span className="who">{t.init}</span> {t.who}{t.coWho&&t.coWho.length?' + '+t.coWho.join(' + '):''} · {BUCKETS[t.bucket]||t.bucket}
      <span className="tag2 gray">{TYPES[t.type||'work'].e} {TYPES[t.type||'work'].l}</span>
      {t.recur?<span className="tag2 blue">↻ {recurLabel(t.recur,t.recurOn)}</span>:null}</div>
    {t.selfAssigned?<div className="meta" style={{marginTop:5}}><span className="tag2 green">🙋 Self-assigned</span>{t.instructedBy?<span className="tag2 amber">📣 As per {t.instructedBy}</span>:null}</div>:null}
    {t.origin?<div className="meta" style={{marginTop:5}}><span className={'tag2 '+(t.origin==='issue'?'amber':'blue')}>{t.origin==='issue'?'🔧 Reported issue':'📦 Supply request'}{t.reportedBy?' · by '+t.reportedBy:''}</span></div>:null}
    {t.extReq?<div className="meta" style={{marginTop:5}}><span className="tag2 amber">⏳ Extension requested → {t.extReq.label||t.extReq.newDate}</span></div>:null}
    {!t.done&&t.coWho&&t.coWho.length&&(t.doneBy||[]).length?<div className="meta" style={{marginTop:5}}>
      <span className="tag2 green">✓ Done: {(t.doneBy||[]).join(', ')}</span>
      <span className="tag2 amber">⏳ Pending: {assigneesM(t).filter(a=>!(t.doneBy||[]).includes(a)).join(', ')}</span></div>:null}
    {t.reopened?<div className="meta" style={{marginTop:5}}><span className="tag2 amber">↻ Reopened by {t.reopened.by.split(' ')[0]}{t.reopened.comment?' — “'+t.reopened.comment+'”':''}</span></div>:null}
    {t.progress==='inprogress'&&!t.done?<div className="meta" style={{marginTop:5}}><span className="tag2 blue">🔧 In progress</span></div>:null}
    {t.note?<div className="notepv">“{t.note}”</div>:null}
    {t.files&&t.files.length?<div className="attrow">{t.files.map((f,ix)=><FileChip key={ix} f={f}/>)}</div>:null}
    <div className="meta" style={{marginTop:5}}>{t.done?'Closed'+(t.doneWhen?' · '+t.doneWhen:''):t.due}</div>
    {!t.done?<div className="cardbtns">
      <button className="btn primary" onClick={()=>ctx.setSheet({kind:'update',idx:i})}>Update / Done</button>
      {ctx.role!=='worker'?<>
        <button className="btn ghost" title="Send reminder" onClick={()=>acts.remind(i)}><I n="bell" s={18}/></button>
        <button className="btn ghost" title="Reassign" onClick={()=>ctx.setSheet({kind:'reassign',idx:i})}><I n="redo" s={18}/></button>
      </>:acts.needExt(t)&&!t.extReq?<button className="btn ghost" title="Request extension" onClick={()=>ctx.setSheet({kind:'ext',idx:i})} style={{fontSize:18}}>⏳</button>:null}
    </div>:t.done&&ctx.role!=='worker'?<div className="cardbtns">
      <button className="btn ghost" style={{flex:1}} onClick={()=>ctx.setSheet({kind:'reopen',idx:i})}><I n="redo" s={16}/>&nbsp;Reopen — not up to the mark</button>
    </div>:null}
  </div>;
}

/* ============ tasks tab ============ */
function AllTasks({ctx,acts}){

  const [fboss,setFboss]=useState('all');

    </select>:null}

}

/* ============ calendar ============ */
function Cal({ctx,personal,allowFilter}){
  const [base,setBase]=useState(new Date(2026,6,1));
  const [fw,setFw]=useState('all');
  const scope=personal?[ctx.r.self]:ctx.scope;
  const y=base.getFullYear(),m=base.getMonth();
  const firstDow=new Date(y,m,1).getDay(),days=new Date(y,m+1,0).getDate();
  const vis=tasks.map((t,i)=>({t,i})).filter(o=>o.t.date&&assigneesM(o.t).some(a=>scope.includes(a))&&(!allowFilter||fw==='all'||hasWhoM(o.t,fw)));
  const byDay={};vis.forEach(o=>{const d=new Date(o.t.date+'T00:00:00');if(d.getFullYear()===y&&d.getMonth()===m)(byDay[d.getDate()]=byDay[d.getDate()]||[]).push(o);});
  const bks=[...new Set(vis.map(o=>o.t.bucket).filter(Boolean))];
  const cells=[];
  for(let i=0;i<firstDow;i++)cells.push(<div key={'e'+i} className="calcell empty2"/>);
  for(let d=1;d<=days;d++){
    const isT=sameDay(new Date(y,m,d),TODAY);const evs=byDay[d]||[];
    cells.push(<div key={d} className={'calcell'+(isT?' today':'')}>
      <div className="caldate">{d}</div>
      {evs.slice(0,3).map(o=>{const dd=new Date(o.t.date+'T00:00:00');const od=!o.t.done&&dd<TODAY&&!sameDay(dd,TODAY);
        return <div key={o.i} className="calev" style={{background:bucketColor(o.t.bucket),opacity:o.t.done?.55:1,textDecoration:o.t.done?'line-through':undefined,boxShadow:od?'0 0 0 1.5px var(--red)':undefined}}
          onClick={()=>ctx.setSheet({kind:'event',idx:o.i})}>{o.t.done?'✓ ':''}{gist(o.t.t)}</div>;})}
      {evs.length>3?<div className="calmore">+{evs.length-3} more</div>:null}
    </div>);
  }
  function ics(){
    const openVis=vis.filter(o=>!o.t.done);
    let s='BEGIN:VCALENDAR\r\nVERSION:2.0\r\nPRODID:-//TeamFlow//EN\r\n';
    openVis.forEach((o,ix)=>{s+='BEGIN:VEVENT\r\nUID:tf-'+ix+'-'+Date.now()+'@teamflow\r\nDTSTART;VALUE=DATE:'+o.t.date.replace(/-/g,'')+'\r\nSUMMARY:'+o.t.t+' ('+o.t.who+')\r\nEND:VEVENT\r\n';});
    s+='END:VCALENDAR';
    saveBlob(new Blob([s],{type:'text/calendar'}),iso(new Date())+'-teamflow-calendar.ics');
    ctx.say(openVis.length+' due dates exported (.ics)');
  }
  return <div className="calwrap">
    <div className="calhead">
      <button onClick={()=>setBase(new Date(y,m-1,1))}><I n="chevl" s={16}/></button>
      <div className="calmon">{base.toLocaleString('en',{month:'long',year:'numeric'})}</div>
      <button onClick={()=>setBase(new Date(y,m+1,1))}><I n="chevr" s={16}/></button>
    </div>
    {allowFilter?<select className="selsel" style={{marginBottom:10}} value={fw} onChange={e=>setFw(e.target.value)}>
      <option value="all">All employees</option>
      {scope.map(n=><option key={n} value={n}>{n}</option>)}</select>:null}
    <div className="calgrid">
      {['S','M','T','W','T2','F','S2'].map(d=><div key={d} className="caldow">{d[0]}</div>)}
      {cells}
    </div>
    {bks.length?<div className="callegend">
      {bks.map(b=><span key={b}><span className="ldot" style={{background:bucketColor(b)}}/>{BUCKETS[b]||b}</span>)}
      <span><span className="ldot" style={{background:'#fff',boxShadow:'0 0 0 1.5px var(--red)'}}/>overdue</span>
    </div>:null}
    <div className="syncrow">
      <div className="synctitle">📲 Sync my calendar — stay updated automatically</div>
      <div className="syncbtns">
        <button className="syncb" disabled style={{opacity:.5,cursor:'default'}} title="Coming soon">Google</button>
        <button className="syncb" disabled style={{opacity:.5,cursor:'default'}} title="Coming soon">Outlook</button>
        <button className="syncb" onClick={ics}>Phone (.ics)</button>
      </div>
    </div>
  </div>;
}

function TaskSheet({ctx,close}){
  const [mode,setMode]=useState('type');
  const [txt,setTxt]=useState('');
  const [heard,setHeard]=useState('');
  const [rec,setRec]=useState(false);
  const [cur,setCur]=useState(null);
  const [type,setType]=useState('work');const typeByUser=useRef(false);
  const [assign,setAssign]=useState(ctx.role==='worker'?'self':'others');
  const [pick,setPick]=useState(null);
  const [q,setQ]=useState('');const [dept,setDept]=useState('all');
  const [instruct,setInstruct]=useState('');
  const [showOpts,setShowOpts]=useState(false);
  const canMulti=['admin','mgmt','srm'].includes(ctx.role);

  function understood(p){
    const gt=typeByUser.current?type:guessType(p.raw);
    if(!typeByUser.current)setType(gt);
    const bucket=guessBucket(p.raw);
    let whos=p.whos.slice(),whoSugg=false,whoWhy='';
    if(ctx.role==='worker'){whos=[ctx.r.self];whoWhy='assigned to yourself';}
    else if(whos.length>1){whoWhy='joint task — named in your sentence';}
    else if(whos.length===1){whoWhy='named in your sentence';}
    else{const s=suggestAssignee(gt,bucket);whos=[s.n];whoSugg=true;whoWhy=s.reason;}
    let when=p.when,whenSugg=false,whenWhy='';
    if(!when){const s=suggestDue(gt,p.raw);when=s.when;whenSugg=true;whenWhy=s.reason;}
    let dateIso=whenToDate(when);
    const timeHM=guessTime(p.raw)||labelToTime(when)||'';
    const recur=p.recur||null;
    let recurOn=p.recurOn!=null?p.recurOn:(recur?defaultRecurOn(recur,dateIso):null);
    if(recur==='weekly'&&p.recurOn!=null){dateIso=nextAnchor('weekly',p.recurOn,iso(TODAY));whenSugg=false;whenWhy='every '+DOW[p.recurOn]+' — first on '+fmtD(dateIso);}
    setCur({raw:p.raw,task:p.task,whos,whoSugg,whoWhy,dateIso,timeHM,whenSugg,whenWhy,bucket,bucketSugg:true,recur,recurOn});
  }
  function record(){
    setRec(true);setCur(null);
    const s=SAMPLES[Math.floor(Math.random()*SAMPLES.length)];
    let i=0;const tick=setInterval(()=>{i+=3;setHeard(s.slice(0,i));
      if(i>=s.length){clearInterval(tick);setRec(false);setHeard(s);understood(parseText(s));}},40);
  }
  function toggleWho(n){
    if(!cur)return;
    let next;
    if(!canMulti)next=[n];
    else{next=cur.whos.slice();const ix=next.indexOf(n);
      if(ix>-1){if(next.length>1)next.splice(ix,1);}else next.push(n);}
    setCur({...cur,whos:next,whoSugg:false,
      whoWhy:next.length>1?'joint task — it appears in each person’s list':'you picked '+next[0]});
    if(!canMulti)setPick(null);
  }
  function doAssign(){
    if(!cur)return;
    const self=assign==='self';
    const list=self?[ctx.r.self]:cur.whos;
    const m=findMember(list[0])||{i:list[0][0]};
    const nt={t:cur.task,who:list[0],init:m.i,coWho:(!self&&list.length>1)?list.slice(1):undefined,
      due:'Due '+dueLabel(cur.dateIso,cur.timeHM).replace(/^Today/,'today').replace(/^Tomorrow/,'tomorrow'),date:cur.dateIso,bucket:cur.bucket,type,done:false,recur:cur.recur||undefined,recurOn:cur.recur?cur.recurOn:undefined,
      // instructedBy doubles as "who assigned this" (defaults to me, the creator) and the optional
      // "relaying on behalf of X" override — without the default, tasks assigned to someone else
      // never recorded who assigned them, so boss-filtered views stayed empty for the common case.
      selfAssigned:self,instructedBy:self?null:(instruct||ctx.r.name)};
    tasks.unshift(nt);
    close();ctx.R();
    saveTask(nt).catch(console.error);
    const tail=(cur.recur?' · '+recurLabel(cur.recur,cur.recurOn).toLowerCase():'')+(instruct?' · as per '+instruct:'');
    ctx.say(self?'Added to your list'+tail:'Assigned '+(list.length>1?'jointly to ':'to ')+list.join(' + ')+tail+' · sent on WhatsApp');
  }
  const depts=['all',...new Set(MEMBERS.map(m=>m.dept))];
  const load=workload();
  const emp=MEMBERS.filter(m=>(dept==='all'||m.dept===dept)&&(!q||m.n.toLowerCase().includes(q.toLowerCase())||m.dept.toLowerCase().includes(q.toLowerCase())||m.role.toLowerCase().includes(q.toLowerCase())));
  const bosses=bossesFor(ctx.role);
  return <>
    <h3>New task</h3>
    <div className="sub">Type it or speak it — your choice.</div>
    <div className="modetabs">
      <button className={'mtab'+(mode==='type'?' on':'')} onClick={()=>setMode('type')}>⌨️ Type</button>
      <button className={'mtab'+(mode==='speak'?' on':'')} onClick={()=>setMode('speak')}>🎤 Speak</button>
    </div>
    <div className="typechips">
      {Object.entries(TYPES).map(([k,v])=><button key={k} className={'tchip'+(k===type?' on':'')}
        onClick={()=>{typeByUser.current=true;setType(k);
          if(cur&&cur.whoSugg){const s=suggestAssignee(k,cur.bucket);setCur({...cur,whos:[s.n],whoWhy:s.reason});}}}>{v.e} {v.l}</button>)}
    </div>
    {mode==='type'?<div>
      <textarea className="typein" rows={3} autoFocus value={txt} onChange={e=>setTxt(e.target.value)}
        placeholder="e.g. Ask Hari to repair the lab projector by tomorrow"/>
      <button className="understand" onClick={()=>{if(!txt.trim()){ctx.say('Type a task first');return;}understood(parseText(txt.trim()));}}>✨ Understand task</button>
    </div>:<div>
      <div className={'mic'+(rec?' rec':'')} onClick={record}><I n="mic"/></div>
      <div className="heard">{heard||<span className="ph">Tap the mic to speak…</span>}</div>
    </div>}
    {cur?<div style={{marginTop:14}}>
      <span className="aibadge">✨ AI understood</span>
      <div className="field"><div className="k">Task</div><div className="v">{cur.task}</div></div>
      <div className="field"><div className="k">Assign to</div><div className="v">
        {ctx.role!=='worker'?<div className="modetabs" style={{marginBottom:9}}>
          <button className={'mtab'+(assign==='others'?' on':'')} onClick={()=>setAssign('others')}>👥 Others</button>
          <button className={'mtab'+(assign==='self'?' on':'')} onClick={()=>setAssign('self')}>🙋 Myself</button>
        </div>:null}
        {assign==='self'?<span>You ({ctx.r.self})</span>:<>
          <span className="chipbtn" onClick={()=>setPick(pick==='who'?null:'who')}>{cur.whos.join(' + ')}</span>
          {cur.whoWhy?<div className="reason"><b>{cur.whoSugg?'✦ Suggested':'✓'}</b> — {cur.whoWhy}</div>:null}
          {pick==='who'?<div style={{marginTop:9}}>
            <div style={{display:'flex',gap:8,marginBottom:8}}>
              <select className="selsel" style={{flex:'0 0 44%'}} value={dept} onChange={e=>setDept(e.target.value)}>
                {depts.map(d=><option key={d} value={d}>{d==='all'?'All departments':d}</option>)}</select>
              <input className="empsearch" style={{marginBottom:0}} placeholder="🔍 Name, dept or skill…" value={q} onChange={e=>setQ(e.target.value)}/>
            </div>
            {canMulti?<div className="reason" style={{marginBottom:6}}>Tap more than one to assign jointly</div>:null}
            <div className="empcol">
              {emp.length?emp.map(m=><button key={m.n} className={'pickchip'+(cur.whos.includes(m.n)?' cur':'')} onClick={()=>toggleWho(m.n)}>
                {cur.whos.includes(m.n)?'✓ ':''}<b>{m.n}</b> · {load[m.n]} open<span className="emprole">{m.dept} · {m.role}</span></button>)
                :<div className="empty" style={{padding:12}}>No one matches</div>}
            </div>
          </div>:null}
        </>}
      </div></div>
      {bosses.length?<div className="field"><div className="k">On instruction of</div><div className="v">
        <select className="selsel" value={instruct} onChange={e=>setInstruct(e.target.value)}>
          <option value="">No one — own initiative</option>
          {bosses.map(b=><option key={b} value={b}>{b}</option>)}
        </select></div></div>:null}
      <div className="field"><div className="k">When</div><div className="v">
        <span className="chipbtn" onClick={()=>setPick(pick==='when'?null:'when')}>{dueLabel(cur.dateIso,cur.timeHM)}</span>
        {cur.whenWhy?<div className="reason"><b>{cur.whenSugg?'✦ Suggested':'✓'}</b> — {cur.whenWhy}</div>:null}
        {pick==='when'?<div className="picker">
          {[0,1,7].map(n=>{const d=new Date(TODAY);d.setDate(d.getDate()+n);const v=iso(d);
            return <button key={v} className={'pickchip'+(v===cur.dateIso?' cur':'')}
              onClick={()=>setCur({...cur,dateIso:v,whenSugg:false,whenWhy:'you picked this date'})}>{n===0?'Today':fmtD(v)}</button>;})}
          <input type="date" className="selsel" style={{flex:'1 1 54%'}} min={iso(TODAY)} value={cur.dateIso||''} aria-label="Pick any date"
            onChange={e=>{const v=e.target.value;if(!v)return;setCur({...cur,dateIso:v,whenSugg:false,whenWhy:'you picked this date'});}}/>
          <input type="time" className="selsel" style={{flex:'1 1 38%'}} value={cur.timeHM||''} aria-label="Due time (optional)"
            onChange={e=>setCur({...cur,timeHM:e.target.value,whenSugg:false,whenWhy:'you picked this time'})}/>
          <button className="pickchip" style={{flex:'1 1 100%',textAlign:'center'}} onClick={()=>setPick(null)}>✓ Set</button>
        </div>:null}
      </div></div>
      <div className="field"><div className="k">Repeat</div><div className="v">
        <span className="chipbtn" onClick={()=>setPick(pick==='recur'?null:'recur')}>{cur.recur?'↻ '+recurLabel(cur.recur,cur.recurOn):"Doesn't repeat"}</span>
        {cur.recur?<div className="reason">Next occurrence is scheduled automatically each time it's completed</div>:null}
        {pick==='recur'?<>
          <div className="picker">
            <button className={'pickchip'+(!cur.recur?' cur':'')} onClick={()=>{setCur({...cur,recur:null,recurOn:null});setPick(null);}}>Doesn't repeat</button>
            {Object.keys(RECURS).map(k=><button key={k} className={'pickchip'+(k===cur.recur?' cur':'')}
              onClick={()=>{setCur({...cur,recur:k,recurOn:defaultRecurOn(k,cur.dateIso)});if(k==='daily')setPick(null);}}>{RECURS[k]}</button>)}
          </div>
          {cur.recur==='weekly'?<><div className="reason" style={{marginTop:8}}>On which day of the week?</div>
            <div className="picker">{[1,2,3,4,5,6,0].map(ix=><button key={ix} className={'pickchip'+(cur.recurOn===ix?' cur':'')}
              onClick={()=>{const nd=nextAnchor('weekly',ix,iso(TODAY));setCur({...cur,recurOn:ix,dateIso:nd,whenSugg:false,whenWhy:'first occurrence — every '+DOW[ix]});setPick(null);}}>{DOW[ix]}</button>)}</div></>:null}
          {cur.recur==='monthly'?<><div className="reason" style={{marginTop:8}}>On which date of the month?</div>
            <select className="selsel" style={{marginTop:6}} value={cur.recurOn||1} onChange={e=>{const v=+e.target.value;
              const nd=nextAnchor('monthly',v,iso(TODAY));setCur({...cur,recurOn:v,dateIso:nd,whenSugg:false,whenWhy:'first occurrence — the '+ord(v)+' of every month'});setPick(null);}}>
              {Array.from({length:31},(_,i)=>i+1).map(n=><option key={n} value={n}>{ord(n)} of every month</option>)}</select></>:null}
          {cur.recur==='yearly'?<><div className="reason" style={{marginTop:8}}>On which day and month?</div>
            <div style={{display:'flex',gap:8,marginTop:6}}>
              <select className="selsel" value={(cur.recurOn&&cur.recurOn.d)||1} onChange={e=>{const v={d:+e.target.value,m:(cur.recurOn&&cur.recurOn.m)||0};
                const nd=nextAnchor('yearly',v,iso(TODAY));setCur({...cur,recurOn:v,dateIso:nd,whenSugg:false,whenWhy:'every year on '+v.d+' '+MONTHS[v.m]});}}>
                {Array.from({length:31},(_,i)=>i+1).map(n=><option key={n} value={n}>{ord(n)}</option>)}</select>
              <select className="selsel" value={(cur.recurOn&&cur.recurOn.m)||0} onChange={e=>{const v={d:(cur.recurOn&&cur.recurOn.d)||1,m:+e.target.value};
                const nd=nextAnchor('yearly',v,iso(TODAY));setCur({...cur,recurOn:v,dateIso:nd,whenSugg:false,whenWhy:'every year on '+v.d+' '+MONTHS[v.m]});}}>
                {MONTHS.map((mn,ix)=><option key={mn} value={ix}>{mn}</option>)}</select>
            </div></>:null}
        </>:null}
      </div></div>
      <button className="optst" onClick={()=>setShowOpts(!showOpts)}><span>⚙️ Options</span>
        <span style={{fontWeight:600,color:'var(--muted)',fontSize:12.5}}>Department: {BUCKETS[cur.bucket]||cur.bucket}{cur.bucketSugg?' (auto)':''}</span></button>
      {showOpts?<div className="field"><div className="k">Department</div><div className="v">
        <div className="picker" style={{marginTop:0}}>{realDeptKeys().map(b=><button key={b} className={'pickchip'+(b===cur.bucket?' cur':'')}
          onClick={()=>setCur({...cur,bucket:b,bucketSugg:false})}>{BUCKETS[b]}</button>)}</div>
      </div></div>:null}
      <button className="send" onClick={doAssign}>Assign task ✓</button>
    </div>:null}
  </>;
}

function IssueSheet({ctx,close}){
  const [txt,setTxt]=useState('');
  const [files,setFiles]=useState([]);
  const pickF=async e=>{
    const picked=[...e.target.files];
    if(!picked.length)return;
    ctx.say('Uploading '+picked.length+' file'+(picked.length>1?'s':'')+'…');
    try{const nf=await Promise.all(picked.map(x=>uploadFile(x,'issues')));setFiles(files.concat(nf));}
    catch(err){console.error(err);ctx.say('Upload failed — try again');}
  };
  const send=()=>{
    if(!txt.trim()){ctx.say('Describe the issue first');return;}
    const nq={t:txt.trim().charAt(0).toUpperCase()+txt.trim().slice(1),from:ctx.r.name,av:ctx.r.av,files:files.length?files.slice():undefined};
    pendingIssues.unshift(nq);
    close();ctx.R();
    saveRequestRow(nq,'issue').catch(console.error);
    ctx.say('Sent to Vikram (maintenance head) 🔧');};
  return <>
    <h3>Report a maintenance issue</h3>
    <div className="sub">Say what's broken — it goes to the maintenance head, who assigns the right person.</div>
    <textarea className="typein" rows={3} autoFocus value={txt} onChange={e=>setTxt(e.target.value)}
      placeholder="e.g. The ceiling fan in Class 7B is making a loud noise"/>
    <div className="attachrow">
      <label className="uploadbtn">📷 Camera<input type="file" accept="image/*" capture="environment" style={{display:'none'}} onChange={pickF}/></label>
      <label className="uploadbtn">🖼 Photos<input type="file" accept="image/*" multiple style={{display:'none'}} onChange={pickF}/></label>
      <label className="uploadbtn">📎 Files<input type="file" multiple style={{display:'none'}} onChange={pickF}/></label>
    </div>
    {files.length?<div className="filelist">{files.map((f,ix)=><FileChip key={ix} f={f} onRemove={()=>{
      setFiles(files.filter((_,i)=>i!==ix));
      removeAttachment(f.path).catch(console.error);
    }}/>)}</div>:null}
    <button className="send" onClick={send}>Send to maintenance head ✓</button>
  </>;
}
function RequestSheet({ctx,close}){
  const [txt,setTxt]=useState('');const [note,setNote]=useState('');
  const send=()=>{
    if(!txt.trim()){ctx.say('Say what you need first');return;}
    const nq={t:txt.trim(),note:note.trim(),from:ctx.r.name,av:ctx.r.av};
    pendingReqs.unshift(nq);
    close();ctx.R();
    saveRequestRow(nq,'request').catch(console.error);
    ctx.say('Request sent to '+(bossesFor(ctx.role).slice(-1)[0]||'your manager')+' for approval 📦');};
  return <>
    <h3>Request supplies</h3>
    <div className="sub">What do you need? Your manager approves it in one tap.</div>
    <textarea className="typein" rows={2} autoFocus value={txt} onChange={e=>setTxt(e.target.value)} placeholder="e.g. 2 boxes of whiteboard markers"/>
    <textarea className="typein" rows={2} style={{marginTop:9}} value={note} onChange={e=>setNote(e.target.value)} placeholder="Why / for which class? (optional)"/>
    <button className="send" onClick={send}>Send request ✓</button>
  </>;
}
function UpdateSheet({ctx,idx,close}){
  const t=tasks[idx];
  const [st,setSt]=useState('done');
  const [note,setNote]=useState('');
  const [files,setFiles]=useState([]);
  if(!t)return null;
  const logs=t.log||(t.note?[{by:'Earlier',when:'',text:t.note}]:[]);
  const pickF=async e=>{
    const picked=[...e.target.files];
    if(!picked.length)return;
    ctx.say('Uploading '+picked.length+' file'+(picked.length>1?'s':'')+'…');
    try{const nf=await Promise.all(picked.map(x=>uploadFile(x,'tasks/'+t.id)));setFiles(files.concat(nf));}
    catch(err){console.error(err);ctx.say('Upload failed — try again');}
  };
  const save=()=>{
    t.progress=st;
    if(note.trim()){
      t.log=t.log||(t.note?[{by:'Earlier',when:'',text:t.note}]:[]);
      t.log.push({by:ctx.r.name,when:fmtD(iso(TODAY)),text:note.trim()});
      t.note=note.trim();
      logTask(t,ctx.r.name,note.trim()).catch(console.error);
    }
    if(files.length)t.files=(t.files||[]).concat(files);
    if(st==='done'){
      const self=ctx.r.self;
      if(t.coWho&&t.coWho.length&&assigneesM(t).includes(self)){
        t.doneBy=[...new Set([...(t.doneBy||[]),self])];
        const pending=assigneesM(t).filter(a=>!t.doneBy.includes(a));
        if(!pending.length){t.done=true;t.doneWhen='just now';delete t.extReq;const nd=spawnNextRecur(t);persistComplete(t,nd);close();ctx.R();ctx.say(nd?'Everyone finished ✓ · next '+RECURS[t.recur].toLowerCase()+' on '+fmtD(nd):'Everyone finished — task completed ✓');return;}
        t.done=false;saveTask(t).catch(console.error);close();ctx.R();ctx.say('Your part done ✓ — pending with '+pending.join(', '));return;
      }
      if(t.coWho&&t.coWho.length)t.doneBy=assigneesM(t).slice();
      t.done=true;t.doneWhen='just now';delete t.extReq;
      const nd=spawnNextRecur(t);
      persistComplete(t,nd);
      close();ctx.R();
      ctx.say(nd?'Done ✓ · next '+RECURS[t.recur].toLowerCase()+' on '+fmtD(nd):'Task marked done ✓');return;
    } else t.done=false;
    saveTask(t).catch(console.error);
    close();ctx.R();
    ctx.say('Progress updated 🔧');};
  return <>
    <h3>Update task</h3>
    <div className="sub">{t.t}</div>
    <div className="modetabs">
      {[['inprogress','🔧 In progress'],['done','✓ Done']].map(([k,l])=>
        <button key={k} className={'mtab'+(st===k?' on':'')} onClick={()=>setSt(k)}>{l}</button>)}
    </div>
    {logs.length?<div style={{marginBottom:10}}>
      <div className="sec" style={{margin:'0 0 6px'}}>Job log</div>
      <div style={{maxHeight:140,overflowY:'auto'}}>
        {logs.map((x,ix)=><div key={ix} className="notepv" style={{marginTop:6}}>“{x.text}”
          <div style={{fontSize:11,color:'var(--muted)',fontStyle:'normal',marginTop:3}}>{x.by}{x.when?' · '+x.when:''}</div></div>)}
      </div>
    </div>:null}
    <textarea className="typein" rows={3} value={note} onChange={e=>setNote(e.target.value)} placeholder="Add an update to the job log (optional) — what did you do?"/>
    <div className="attachrow">
      <label className="uploadbtn">📷 Camera<input type="file" accept="image/*" capture="environment" style={{display:'none'}} onChange={pickF}/></label>
      <label className="uploadbtn">🖼 Photos<input type="file" accept="image/*" multiple style={{display:'none'}} onChange={pickF}/></label>
      <label className="uploadbtn">📎 Files<input type="file" accept="image/*,application/pdf,.doc,.docx" multiple style={{display:'none'}} onChange={pickF}/></label>
    </div>
    {files.length?<div className="filelist">{files.map((f,ix)=><FileChip key={ix} f={f} onRemove={()=>{
      setFiles(files.filter((_,i)=>i!==ix));
      removeAttachment(f.path).catch(console.error);
    }}/>)}</div>:null}
    <button className="send" onClick={save}>{st==='done'?'Mark done ✓':'Save update'}</button>
  </>;
}
function ExtSheet({ctx,idx,close}){
  const t=tasks[idx];
  const [pickd,setPickd]=useState(null);
  const [reason,setReason]=useState('');
  if(!t)return null;
  const opts=[1,2,3,7].map(n=>{const d=new Date(TODAY);d.setDate(d.getDate()+n);
    return {iso:iso(d),label:d.toLocaleDateString('en',{weekday:'short'})+' · '+d.toLocaleDateString('en',{day:'numeric',month:'short'})+(n===1?' (tomorrow)':n===7?' (next week)':'')};});
  const send=()=>{
    if(!pickd){ctx.say('Pick a new date first');return;}
    t.extReq={newDate:pickd.iso,label:pickd.label,reason:reason.trim(),from:ctx.r.name};
    saveTask(t).catch(console.error);
    close();ctx.R();ctx.say('Extension request sent to '+(bossesFor(ctx.role).slice(-1)[0]||'your manager')+' ⏳');};
  return <>
    <h3>Request time extension</h3>
    <div className="sub">{t.t}</div>
    <div className="meta" style={{marginBottom:6}}>Current due: {t.due||t.date}</div>
    <div className="sec" style={{margin:'10px 2px 8px'}}>New due date</div>
    <div className="picker" style={{marginTop:0}}>
      {opts.map(o=><button key={o.iso} className={'pickchip'+(pickd&&pickd.iso===o.iso?' cur':'')} onClick={()=>setPickd(o)}>{o.label}</button>)}
      <input type="date" className="selsel" style={{flex:'1 1 100%'}} min={iso(TODAY)} value={pickd&&pickd.custom?pickd.iso:''} aria-label="Pick any date"
        onChange={e=>{const v=e.target.value;if(!v)return;setPickd({iso:v,label:new Date(v+'T00:00:00').toLocaleDateString('en',{weekday:'short'})+' · '+fmtD(v),custom:true});}}/>
    </div>
    <textarea className="typein" rows={2} style={{marginTop:12}} value={reason} onChange={e=>setReason(e.target.value)} placeholder="Why do you need more time? (optional)"/>
    <button className="send" onClick={send}>Send request ⏳</button>
  </>;
}
function ReopenSheet({ctx,idx,close}){
  const t=tasks[idx];
  const [pickd,setPickd]=useState(null);
  const [cmt,setCmt]=useState('');
  if(!t)return null;
  const opts=[1,2,3,7].map(n=>{const d=new Date(TODAY);d.setDate(d.getDate()+n);
    return {iso:iso(d),label:d.toLocaleDateString('en',{weekday:'short'})+' · '+d.toLocaleDateString('en',{day:'numeric',month:'short'})};});
  const go=()=>{
    if(!pickd){ctx.say('Pick a new due date');return;}
    t.done=false;t.progress=undefined;t.doneBy=[];t.doneWhen=undefined;
    t.date=pickd.iso;t.due='Due '+fmtD(pickd.iso);
    t.reopened={by:ctx.r.name,comment:cmt.trim()};
    t.log=t.log||(t.note?[{by:'Earlier',when:'',text:t.note}]:[]);
    t.log.push({by:ctx.r.name,when:fmtD(iso(TODAY)),text:'Reopened — '+(cmt.trim()||'not up to the mark')});
    if(cmt.trim())t.note=cmt.trim();
    saveTask(t).catch(console.error);logTask(t,ctx.r.name,'Reopened — '+(cmt.trim()||'not up to the mark')).catch(console.error);
    close();ctx.R();ctx.say('Task reopened ↻ · '+t.who+' notified with your comment');};
  return <>
    <h3>Reopen task</h3>
    <div className="sub">{t.t}</div>
    <div className="sec" style={{margin:'6px 2px 8px'}}>New due date</div>
    <div className="picker" style={{marginTop:0}}>
      {opts.map(o=><button key={o.iso} className={'pickchip'+(pickd&&pickd.iso===o.iso?' cur':'')} onClick={()=>setPickd(o)}>{o.label}</button>)}
      <input type="date" className="selsel" style={{flex:'1 1 100%'}} min={iso(TODAY)} value={pickd&&pickd.custom?pickd.iso:''} aria-label="Pick any date"
        onChange={e=>{const v=e.target.value;if(!v)return;setPickd({iso:v,label:new Date(v+'T00:00:00').toLocaleDateString('en',{weekday:'short'})+' · '+fmtD(v),custom:true});}}/>
    </div>
    <textarea className="typein" rows={2} style={{marginTop:12}} value={cmt} onChange={e=>setCmt(e.target.value)} placeholder="What's not up to the mark? (sent to the assignee)"/>
    <button className="send" onClick={go}>Reopen &amp; notify ↻</button>
  </>;
}
function ReassignSheet({ctx,idx,close}){
  const t=tasks[idx];
  const [q,setQ]=useState('');
  if(!t)return null;
  const load=workload();
  const list=MEMBERS.filter(m=>!q||m.n.toLowerCase().includes(q.toLowerCase())||m.dept.toLowerCase().includes(q.toLowerCase())||m.role.toLowerCase().includes(q.toLowerCase()));
  const go=n=>{const m=findMember(n);t.who=n;t.init=m?m.i:n[0];t.coWho=undefined;
    saveTask(t).catch(console.error);
    close();ctx.R();ctx.say('Reassigned to '+n+' · notified on WhatsApp');};
  return <>
    <h3>Reassign task</h3>
    <div className="sub">{t.t}</div>
    <input className="empsearch" placeholder="🔍 Name, department or skill…" value={q} onChange={e=>setQ(e.target.value)}/>
    <div className="empcol" style={{maxHeight:290}}>
      {list.length?list.map(m=><button key={m.n} className={'pickchip'+(hasWhoM(t,m.n)?' cur':'')} onClick={()=>go(m.n)}>
        {hasWhoM(t,m.n)?'✓ ':''}<b>{m.n}</b> · {load[m.n]} open<span className="emprole">{m.dept} · {m.role}</span></button>)
        :<div className="empty" style={{padding:12}}>No one matches</div>}
    </div>
  </>;
}
function EventSheet({ctx,idx,close}){
  const t=tasks[idx];
  if(!t)return null;
  const m=findMember(t.who)||{};
  const d=new Date(t.date+'T00:00:00');
  const stat=t.done?'✓ Done':(d<TODAY&&!sameDay(d,TODAY)?'⚠ Overdue':(sameDay(d,TODAY)?'Due today':'Upcoming'));
  return <>
    <h3 style={{lineHeight:1.4}}>{t.t}</h3>
    <div className="sub">{stat} · {t.due||t.date}</div>
    <div className="field"><div className="k">Assigned to</div><div className="v">
      <span className="who" style={{marginRight:6}}>{t.init||''}</span>{t.who}{t.coWho&&t.coWho.length?' + '+t.coWho.join(' + '):''}{m.dept?' · '+m.dept:''}{m.role?' ('+m.role+')':''}</div></div>
    <div className="field"><div className="k">Department</div><div className="v">
      <span className="ldot" style={{display:'inline-block',background:bucketColor(t.bucket),marginRight:6}}/>{BUCKETS[t.bucket]||t.bucket||'—'}</div></div>
    <div className="field"><div className="k">Type</div><div className="v">{TYPES[t.type||'work'].e} {TYPES[t.type||'work'].l}</div></div>
    {t.recur?<div className="field"><div className="k">Repeats</div><div className="v">↻ {recurLabel(t.recur,t.recurOn)} — next created on completion</div></div>:null}
    {t.note?<div className="field"><div className="k">Note</div><div className="v" style={{fontWeight:500}}>“{t.note}”</div></div>:null}
    {!t.done?<button className="send" onClick={()=>{ctx.setSheet({kind:'update',idx});}}>Update / Done ✓</button>:null}
  </>;
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
