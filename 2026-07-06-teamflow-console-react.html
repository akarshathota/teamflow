<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TeamFlow Console — React</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:wght@500;600;700&family=IBM+Plex+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.5/babel.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<script src="./shared.js"></script>
<link rel="stylesheet" href="./shared.css">
<style>
  :root{
    --line2:#d9d6cb;
    --sh-sm:0 1px 2px rgba(27,30,33,.06);
    --sh-md:0 4px 14px rgba(27,30,33,.08);
    --sh-lg:0 24px 60px rgba(27,30,33,.22);
  }
  html,body{height:100%}
  body{margin:0;font-family:'IBM Plex Sans',-apple-system,"Segoe UI",Roboto,sans-serif;
    background:var(--bg);color:var(--ink);-webkit-font-smoothing:antialiased;font-size:14px}
  h1,h2,h3,.brand{font-family:'Bricolage Grotesque','IBM Plex Sans',sans-serif}
  svg.i{width:18px;height:18px;stroke:currentColor;fill:none;stroke-width:1.9;stroke-linecap:round;stroke-linejoin:round;flex:0 0 auto;display:block}
  :focus-visible{outline:2px solid var(--accent);outline-offset:2px;border-radius:4px}

  .app{display:flex;min-height:100vh}
  /* sidebar */
  .sidebar{width:230px;background:var(--card);border-right:1px solid var(--line);display:flex;flex-direction:column;
    padding:18px 12px 16px;position:sticky;top:0;height:100vh;flex:0 0 auto;z-index:30}
  .brand{display:flex;align-items:center;gap:10px;padding:4px 10px 18px;font-weight:700;font-size:19px;letter-spacing:-.2px}
  .brand .logo{width:34px;height:34px;border-radius:9px 9px 9px 2px;background:var(--accent);display:flex;align-items:center;justify-content:center;color:#fff;flex:0 0 auto}
  .navitem{display:flex;align-items:center;gap:11px;padding:10px 12px;border-radius:8px;cursor:pointer;border:none;background:none;width:100%;
    font-size:13.5px;font-weight:600;color:var(--ink2);margin-bottom:2px;transition:background .15s,color .15s;position:relative;text-align:left}
  .navitem:hover{background:#f3f2ec;color:var(--ink)}
  .navitem.on{background:var(--accent-soft);color:var(--accent-ink)}
  .navitem.on::before{content:"";position:absolute;left:-12px;top:8px;bottom:8px;width:3px;background:var(--accent)}
  .navitem .kbd{margin-left:auto;font-size:10px;color:var(--muted);border:1px solid var(--line);border-radius:4px;padding:1px 5px;font-weight:600}
  .side-foot{margin-top:auto;padding-top:14px;border-top:1px solid var(--line)}
  .side-lab{font-size:10.5px;text-transform:uppercase;letter-spacing:.8px;color:var(--muted);margin:2px 6px 8px;font-weight:700}
  .roleSel{width:100%;background:#f3f2ec;color:var(--ink);border:1px solid var(--line);
    border-radius:8px;padding:10px;font-family:inherit;font-size:13px;font-weight:600;outline:none;cursor:pointer}
  .companion{font-size:11px;color:var(--muted);margin-top:12px;line-height:1.5;padding:0 6px}

  /* topbar */
  .main{flex:1;min-width:0;display:flex;flex-direction:column}
  .topbar{display:flex;align-items:center;gap:16px;padding:13px 26px;background:var(--card);
    border-bottom:1px solid var(--line);position:sticky;top:0;z-index:20}
  .topbar h1{font-size:19px;margin:0;font-weight:700;white-space:nowrap}
  .tb-right{display:flex;align-items:center;gap:12px;margin-left:auto}
  .searchwrap{position:relative}
  .search{border:1.5px solid var(--line);border-radius:8px;padding:9px 12px 9px 36px;font-family:inherit;font-size:13.5px;width:250px;outline:none;background:var(--bg)}
  .search:focus{border-color:var(--accent);background:var(--card)}
  .searchwrap>svg{position:absolute;left:11px;top:50%;transform:translateY(-50%);color:var(--muted);width:16px;height:16px}
  .search-kbd{position:absolute;right:10px;top:50%;transform:translateY(-50%);font-size:10.5px;color:var(--muted);border:1px solid var(--line2);border-radius:4px;padding:1px 6px;font-weight:700;background:var(--card);pointer-events:none}
  .searchdrop{position:absolute;top:calc(100% + 8px);right:0;width:360px;background:var(--card);border:1px solid var(--line);
    border-radius:10px;box-shadow:var(--sh-lg);padding:6px;max-height:380px;overflow:auto;z-index:50}
  .sd-item{display:flex;align-items:center;gap:10px;padding:9px 10px;border-radius:7px;cursor:pointer}
  .sd-item:hover{background:var(--accent-soft)}
  .sd-item .t{font-size:13px;font-weight:600;line-height:1.3}
  .sd-item .m{font-size:11.5px;color:var(--muted);margin-top:1px}
  .sd-head{font-size:10.5px;font-weight:700;text-transform:uppercase;letter-spacing:.7px;color:var(--muted);padding:8px 10px 4px}
  .sd-empty{padding:16px 12px;color:var(--muted);font-size:13px;text-align:center}
  .av{width:36px;height:36px;border-radius:50%;background:var(--accent);color:#fff;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:13px}
  .bell-btn{position:relative}
  .bell-badge{position:absolute;top:2px;right:2px;background:var(--red);color:#fff;font-size:9.5px;font-weight:700;
    border-radius:8px;min-width:15px;height:15px;padding:0 3px;display:flex;align-items:center;justify-content:center;line-height:1}

  .btn{border:none;border-radius:8px;padding:9px 15px;font-size:13.5px;font-weight:700;cursor:pointer;
    display:inline-flex;align-items:center;gap:7px;transition:filter .15s,background .15s,transform .1s}
  .btn:active{transform:scale(.98)}
  .btn.primary{background:var(--accent);color:#fff}
  .btn.primary:hover{background:var(--accent-ink)}
  .btn.soft{background:#efeee7;color:var(--ink2)}
  .btn.soft:hover{background:#e6e4da}
  .btn.ghost{background:none;color:var(--ink2);border:1.5px solid var(--line)}
  .btn.ghost:hover{border-color:var(--line2);background:#faf9f5}
  .btn svg.i{width:15px;height:15px}
  /* one shared style for the unified Download PDF · Download CSV · Print trio on every surface */
  .exp-btn{display:inline-flex;align-items:center;gap:6px;border:1px solid var(--accent);background:var(--accent);color:#fff;border-radius:8px;padding:6px 11px;font-family:inherit;font-weight:700;font-size:12px;cursor:pointer;white-space:nowrap}
  .exp-btn:hover{background:var(--accent-ink);border-color:var(--accent-ink)}
  .exp-btn:active{transform:scale(.98)}
  .exp-btn svg{width:13px;height:13px}
  .exp-group{display:inline-flex;gap:6px;flex-wrap:wrap;align-items:center}

  /* strip */
  .stripbar{padding:14px 26px 0}
  .strip{display:flex;align-items:center;gap:11px;background:var(--accent-soft);
    border:1px solid var(--accent-border);border-radius:10px 10px 10px 3px;padding:12px 16px;font-size:13.5px;color:#134f48;line-height:1.5}
  .strip b{color:#0c3b35}
  .strip .chips{margin-left:auto;display:flex;gap:7px;flex-wrap:wrap}
  .chip-s{font-size:11.5px;font-weight:700;padding:3px 10px;border-radius:6px;white-space:nowrap}
  .chip-s.red{background:var(--red-soft);color:var(--red)}
  .chip-s.amber{background:var(--amber-soft);color:var(--amber)}
  .chip-s.green{background:var(--green-soft);color:var(--green)}
  .chip-s.teal{background:#d5ebe7;color:var(--accent-ink)}

  /* Reports & requests tracker */
  .trk-panel{background:var(--card);border:1px solid var(--line);border-radius:14px;box-shadow:var(--sh-sm);overflow:hidden}
  .trk-head{display:flex;align-items:center;gap:12px;padding:14px 16px 12px;flex-wrap:wrap}
  .trk-head h3{margin:0;font-size:15px;display:flex;align-items:center;gap:8px}
  .trk-badge{font-size:10.5px;font-weight:800;letter-spacing:.5px;text-transform:uppercase;color:var(--blue);background:var(--blue-soft);border:1px solid #cdddee;border-radius:999px;padding:2px 9px}
  .trk-tabs{display:flex;gap:6px;margin-left:auto;flex-wrap:wrap}
  .trk-tab{font-size:12.5px;font-weight:700;color:var(--muted);padding:6px 11px;border-radius:8px;border:1px solid transparent;background:none;cursor:pointer;font-family:inherit}
  .trk-tab:hover{background:#f3f2ec;color:var(--ink)}
  .trk-tab.on{background:var(--accent-soft);color:var(--accent-ink);border-color:var(--accent-border)}
  .trk-tw{overflow-x:auto}
  .trk-t{width:100%;border-collapse:collapse;font-size:13px}
  .trk-t thead th{text-align:left;font-size:10.5px;font-weight:800;letter-spacing:.5px;text-transform:uppercase;color:var(--muted);padding:8px 14px;border-bottom:1.5px solid var(--line);white-space:nowrap}
  .trk-t tbody td{padding:12px 14px;border-bottom:1px solid var(--line);vertical-align:middle}
  .trk-t tbody tr:last-child td{border-bottom:none}
  .trk-item{font-weight:700}
  .trk-sub{font-size:11px;color:var(--muted);margin-top:2px}
  .trk-type{display:inline-flex;align-items:center;gap:6px;font-size:11.5px;font-weight:700;border-radius:999px;padding:3px 9px;white-space:nowrap}
  .trk-type.m{color:var(--amber);background:var(--amber-soft);border:1px solid #e6d7ad}
  .trk-type.s{color:var(--blue);background:var(--blue-soft);border:1px solid #cdddee}
  .trk-who{display:inline-flex;align-items:center;gap:7px;white-space:nowrap}
  .trk-av{width:24px;height:24px;border-radius:50%;color:#fff;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:10px;flex:0 0 auto}
  .trk-none{color:var(--muted);font-style:italic}
  .trk-st{display:inline-flex;align-items:center;gap:6px;font-size:11.5px;font-weight:700;border-radius:999px;padding:3px 9px;white-space:nowrap}
  .trk-st.rep{color:var(--ink2);background:#f1efe8;border:1px solid var(--line)}
  .trk-st.wait{color:var(--amber);background:var(--amber-soft);border:1px solid #e6d7ad}
  .trk-st.prog{color:var(--blue);background:var(--blue-soft);border:1px solid #cdddee}
  .trk-st.late{color:var(--red);background:var(--red-soft);border:1px solid #f2c9d2}
  .trk-st.done{color:var(--green);background:var(--green-soft);border:1px solid #bfe2cd}
  .trk-dot{width:7px;height:7px;border-radius:50%;flex:0 0 auto}
  .trk-empty{padding:34px 16px;text-align:center;color:var(--muted);font-size:13px}
  .trk-foot{font-size:11.5px;color:var(--muted);padding:12px 16px;line-height:1.5;border-top:1px solid var(--line)}
  /* Settings sub-sidebar */
  .set-wrap{display:grid;grid-template-columns:206px 1fr;gap:20px;align-items:start;max-width:990px}
  .set-subnav{background:var(--card);border:1px solid var(--line);border-radius:12px;padding:8px;position:sticky;top:74px}
  .set-subitem{display:flex;align-items:center;gap:10px;width:100%;text-align:left;padding:10px 12px;border-radius:9px;font-size:13.5px;font-weight:600;color:var(--ink2);cursor:pointer;background:none;border:none;font-family:inherit}
  .set-subitem+.set-subitem{margin-top:2px}
  .set-subitem:hover{background:#f3f2ec}
  .set-subitem.on{background:var(--accent-soft);color:var(--accent-ink);font-weight:800}
  .set-subitem .ic{width:18px;text-align:center;flex:0 0 auto}
  /* Settings › Departments */
  .deptset-row{display:flex;align-items:center;gap:11px;padding:10px 2px;border-bottom:1px solid var(--line)}
  .deptset-dot{width:9px;height:9px;border-radius:50%;flex:0 0 auto;background:var(--accent)}
  .deptset-name{font-weight:700;font-size:13.5px;flex:1}
  .deptset-head{font-size:11.5px;color:var(--muted)}
  .deptset-rm{border:none;background:none;color:#b23;font-size:15px;cursor:pointer;width:26px;text-align:center}
  .deptset-rm:disabled{color:#cfccc2;cursor:default}
  .deptset-add{display:flex;gap:9px;margin-top:16px}
  .deptset-add input{flex:1;font-size:13.5px;font-family:inherit;color:var(--ink);border:1px solid var(--line);border-radius:9px;padding:10px 12px;outline:none}
  .deptset-add input:focus{border-color:var(--accent-border);box-shadow:0 0 0 3px var(--accent-soft)}
  @media(max-width:820px){.set-wrap{grid-template-columns:1fr}.set-subnav{position:static}}

  .view{padding:20px 26px 46px}
  /* panels */
  .kpis{display:grid;grid-template-columns:repeat(auto-fit,minmax(168px,1fr));gap:14px;margin-bottom:18px}
  .kpi{background:var(--card);border:1px solid var(--line);border-radius:12px 12px 12px 3px;padding:16px;box-shadow:var(--sh-sm);display:flex;flex-direction:column;gap:2px}
  .kpi .top{display:flex;align-items:center;justify-content:space-between}
  .kpi .ic{width:32px;height:32px;border-radius:8px;display:flex;align-items:center;justify-content:center;position:relative}
  .kpi .n{font-size:27px;font-weight:700;letter-spacing:-.5px;margin-top:6px;font-family:'Bricolage Grotesque',sans-serif}
  .kpi .l{font-size:12px;color:var(--muted);font-weight:600}
  .kpi .bar{height:4px;border-radius:4px;margin-top:10px;background:#efeee7;overflow:hidden}
  .kpi .bar i{display:block;height:100%;border-radius:4px}
  .pulsedot{position:absolute;top:-3px;right:-3px;width:10px;height:10px;border-radius:50%;background:var(--red);border:2px solid var(--card);animation:blink 1.2s infinite}
  @keyframes blink{50%{opacity:.35}}
  .grid2{display:grid;grid-template-columns:minmax(0,1.3fr) minmax(0,1fr);gap:16px}
  .panel{background:var(--card);border:1px solid var(--line);border-radius:12px;padding:18px;box-shadow:var(--sh-sm);margin-bottom:16px}
  .panel h3{margin:0 0 14px;font-size:14.5px;font-weight:700;display:flex;align-items:center;gap:8px}
  .h-row{display:flex;align-items:center;justify-content:space-between;margin:0 0 14px}
  .h-row h3{margin:0}
  .scrollbox{max-height:300px;overflow-y:auto;padding-right:6px;scrollbar-width:thin}

  .attn{display:flex;align-items:flex-start;gap:12px;padding:11px 0;border-bottom:1px solid var(--line)}
  .attn:last-child{border-bottom:none;padding-bottom:2px}
  .ring{width:38px;height:38px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:700;color:#fff;font-size:13px;flex:0 0 auto}
  .attn .nm{font-size:13.5px;font-weight:700}
  .attn .rs{font-size:12.5px;color:var(--muted);margin-top:2px;line-height:1.45}
  .attn .act{margin-left:auto;flex:0 0 auto;display:flex;gap:2px}
  .linkbtn{background:none;border:none;color:var(--accent-ink);font-weight:700;font-size:12.5px;cursor:pointer;padding:6px 8px;border-radius:6px}
  .linkbtn:hover{background:var(--accent-soft)}
  .linkbtn.mut{color:var(--muted)}

  .barrow{display:flex;align-items:center;gap:12px;margin-bottom:10px}
  .barrow .k{width:110px;font-size:12.5px;font-weight:600;color:var(--ink2);flex:0 0 auto}
  .barrow .track{flex:1;background:#efeee7;border-radius:5px;height:12px;overflow:hidden}
  .barrow .track i{display:block;height:100%;border-radius:5px;background:var(--accent)}
  .barrow .v{width:42px;text-align:right;font-size:12.5px;font-weight:700;color:var(--ink2)}

  /* tasks */
  .group-h{display:flex;align-items:center;gap:9px;font-size:11.5px;font-weight:800;text-transform:uppercase;letter-spacing:.8px;color:var(--muted);margin:18px 4px 10px}
  .group-h .cnt{background:#eceade;color:var(--ink2);border-radius:10px;padding:1px 8px;font-size:11px}
  .group-h.red{color:var(--red)} .group-h.red .cnt{background:var(--red-soft);color:var(--red)}
  .group-h.amber{color:var(--amber)} .group-h.amber .cnt{background:var(--amber-soft);color:var(--amber)}
  .trow{display:flex;align-items:center;gap:13px;background:var(--card);border:1px solid var(--line);border-radius:10px;
    padding:13px 16px;margin-bottom:8px;cursor:pointer;box-shadow:var(--sh-sm);transition:border-color .15s}
  .trow:hover{border-color:var(--accent-border);box-shadow:var(--sh-md)}
  .trow.done{opacity:.6}
  .trow.done .tt{text-decoration:line-through;color:var(--muted)}
  .trow.selrow{border-color:var(--accent-border);background:var(--accent-soft)}
  .rowcb{width:20px;height:20px;border-radius:6px;border:2px solid #c9cdc4;flex:0 0 auto;background:#fff;position:relative}
  .rowcb.on{background:var(--accent);border-color:var(--accent)}
  .rowcb.on::after{content:"✓";color:#fff;position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:800}
  /* bulk action bar */
  .selbtn{font-size:12px;font-weight:700;color:var(--accent-ink);background:var(--accent-soft);border:1px solid var(--accent-border);border-radius:8px;padding:5px 11px;cursor:pointer}
  .selbtn.on{background:var(--accent);color:#fff;border-color:var(--accent)}
  .bulkbar{margin-top:8px;padding:11px 12px;background:var(--card);border:1px solid var(--accent-border);border-radius:11px;display:flex;align-items:center;gap:7px;flex-wrap:wrap;box-shadow:var(--sh-sm)}
  .bulkbar .cnt{font-weight:800;font-size:12.5px;margin-right:2px}
  .bpill{border:1px solid var(--line);background:#f3f2ec;border-radius:8px;padding:7px 11px;font-weight:700;font-size:12px;color:var(--ink2);cursor:pointer}
  .bpill.on{background:var(--accent);border-color:var(--accent);color:#fff}
  .bpill.ghost{background:none;margin-left:auto}
  .bulkctl{flex-basis:100%;display:flex;gap:8px;align-items:center;margin-top:4px}
  .bulkctl .fsel{flex:1}
  .trow .body{flex:1;min-width:0}
  .trow .tt{font-size:14px;font-weight:600;line-height:1.35}
  .trow .meta{display:flex;align-items:center;gap:9px;font-size:12px;color:var(--muted);margin-top:5px;flex-wrap:wrap}
  .avex{width:22px;height:22px;border-radius:50%;background:#e6e4da;color:var(--ink2);display:inline-flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;flex:0 0 auto}
  .tag{display:inline-flex;align-items:center;gap:5px;font-size:11px;font-weight:700;padding:3px 8px;border-radius:5px;white-space:nowrap}
  .tag.gray{background:#efeee7;color:#5d6367}
  .tag.blue{background:var(--blue-soft);color:var(--blue)}
  .tag.green{background:var(--green-soft);color:var(--green)}
  .tag.amber{background:var(--amber-soft);color:var(--amber)}
  .tag.red{background:var(--red-soft);color:var(--red)}
  .tag.teal{background:var(--accent-soft);color:var(--accent-ink)}
  .tag.purple{background:#eceafc;color:#5b5ea6}
  .duecell{font-size:12.5px;font-weight:600;color:var(--ink2);display:flex;align-items:center;gap:6px;flex:0 0 auto;white-space:nowrap}
  .duecell.over{color:var(--red);font-weight:700}
  .duecell svg{width:14px;height:14px}
  .prio{width:8px;height:8px;border-radius:50%;flex:0 0 auto}
  .priolabel{display:flex;align-items:center;gap:5px;font-size:11px;font-weight:700;flex:0 0 auto;white-space:nowrap}
  .filters{display:flex;gap:9px;margin-bottom:14px;flex-wrap:wrap;align-items:center}
  .fsel{border:1.5px solid var(--line);border-radius:8px;padding:8px 11px;font-family:inherit;font-size:13px;font-weight:600;outline:none;background:var(--card);cursor:pointer;color:var(--ink)}
  .fsel:focus{border-color:var(--accent)}
  .spacer{flex:1}
  .empty{display:flex;flex-direction:column;align-items:center;gap:10px;color:var(--muted);font-size:13.5px;padding:40px 16px;text-align:center}
  .empty svg{width:38px;height:38px;stroke-width:1.4;color:#c2beae}
  .empty b{color:var(--ink2)}

  /* three-column Tasks layout */
  .cols3{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:16px;align-items:start}
  .colpanel{display:flex;flex-direction:column}
  .col-head{display:flex;align-items:center;gap:8px;margin-bottom:12px;flex-wrap:wrap}
  .col-head h3{margin:0;font-size:14.5px;font-weight:700;flex:1}
  .col-note{font-size:11px;color:var(--muted);font-weight:600;background:#efeee7;padding:2px 8px;border-radius:6px;flex:0 0 auto}
  .col-toprow{display:flex;align-items:center;gap:8px;margin-bottom:12px}
  .col-empty-note{font-size:12px;color:var(--muted);padding:0 2px 10px;line-height:1.5}
  .col-scroll{max-height:calc(100vh - 260px);overflow-y:auto;padding-right:4px}
  .kebab{width:32px;height:32px;border-radius:8px;border:1.5px solid var(--line);background:var(--card);display:flex;align-items:center;justify-content:center;cursor:pointer;flex:0 0 auto;position:relative}
  .kebab:hover{border-color:var(--accent-border)}
  .kebab-menu{position:absolute;top:38px;right:0;background:var(--card);border:1px solid var(--line);border-radius:9px;box-shadow:var(--sh-lg);padding:6px;width:150px;z-index:20}
  .kebab-menu button{width:100%;text-align:left;border:none;background:none;padding:8px 10px;border-radius:6px;font-family:inherit;font-size:13px;font-weight:600;color:var(--ink);cursor:pointer;display:flex;align-items:center;gap:8px}
  .kebab-menu button:hover{background:#f1f0e9}

  /* drawer */
  .scrim{position:fixed;inset:0;background:rgba(27,30,33,.35);z-index:55}
  .drawer{position:fixed;top:0;right:0;width:400px;max-width:96vw;height:100vh;background:var(--card);z-index:60;
    box-shadow:var(--sh-lg);display:flex;flex-direction:column;animation:slidein .22s ease}
  @keyframes slidein{from{transform:translateX(30px);opacity:0}to{transform:none;opacity:1}}
  .dr-head{padding:18px 20px 14px;border-bottom:1px solid var(--line);display:flex;align-items:flex-start;gap:12px}
  .dr-head h3{margin:0;font-size:16px;font-weight:700;line-height:1.35;flex:1}
  .dr-body{flex:1;overflow:auto;padding:16px 20px 24px}
  .dr-sec{font-size:10.5px;font-weight:800;text-transform:uppercase;letter-spacing:.8px;color:var(--muted);margin:16px 0 8px}
  .dr-sec:first-child{margin-top:0}
  .kv{display:flex;align-items:center;gap:10px;padding:8px 0;font-size:13.5px}
  .kv .k{width:96px;color:var(--muted);font-weight:600;font-size:12.5px;flex:0 0 auto}
  .kv .v{font-weight:600;display:flex;align-items:center;gap:8px;flex-wrap:wrap}
  .segs{display:flex;gap:6px;background:#efeee7;border-radius:8px;padding:4px}
  .segs button{flex:1;border:none;background:none;font-weight:700;font-size:12.5px;color:var(--muted);padding:8px 4px;border-radius:6px;cursor:pointer}
  .segs button.on{background:var(--card);color:var(--ink);box-shadow:0 1px 4px rgba(27,30,33,.14)}
  .dr-note{width:100%;border:1.5px solid var(--line);border-radius:8px;padding:10px;font-family:inherit;font-size:13.5px;outline:none;resize:vertical;min-height:64px;color:var(--ink)}
  .dr-note:focus{border-color:var(--accent)}
  .timeline{border-left:2px solid var(--line);margin-left:7px;padding-left:16px}
  .tl{position:relative;padding-bottom:14px;font-size:12.5px;color:var(--ink2)}
  .tl::before{content:"";position:absolute;left:-21.5px;top:4px;width:9px;height:9px;border-radius:50%;background:var(--accent);border:2px solid var(--card)}
  .tl .when{color:var(--muted);font-size:11.5px;margin-top:1px}
  .dr-actions{display:flex;gap:9px;padding:14px 20px;border-top:1px solid var(--line)}
  .iconbtn{background:none;border:none;color:var(--muted);cursor:pointer;padding:6px;border-radius:6px;display:flex}
  .iconbtn:hover{background:#f3f2ec;color:var(--ink)}
  .roletag{font-size:11px;font-weight:700;padding:3px 8px;border-radius:5px;background:#efeee7;color:#5d6367;white-space:nowrap}

  /* calendar */
  .calhead{display:flex;align-items:center;gap:12px;margin-bottom:14px}
  .calhead .navb{border:none;background:#efeee7;width:32px;height:32px;border-radius:8px;cursor:pointer;color:var(--ink2);display:flex;align-items:center;justify-content:center}
  .calmon{font-weight:700;font-size:16px;min-width:150px;font-family:'Bricolage Grotesque',sans-serif}
  .calgrid{display:grid;grid-template-columns:repeat(7,minmax(0,1fr));gap:6px}
  .caldow{text-align:center;font-size:11px;font-weight:700;color:var(--muted);padding:4px 0}
  .calcell{min-height:104px;background:#fbfaf7;border:1px solid var(--line);border-radius:8px;padding:6px;cursor:pointer}
  .calcell:hover{border-color:var(--accent-border)}
  .calcell.empty2{background:transparent;border:none;cursor:default}
  .calcell.wkend{background:#f4f3ee}
  .calcell.today{background:var(--accent-soft);border-color:var(--accent)}
  .caldate{font-size:11.5px;font-weight:700;color:var(--ink2);margin-bottom:5px;display:flex;justify-content:space-between}
  .caldate .tdy{font-size:9.5px;font-weight:800;color:var(--accent-ink)}
  .calev{display:flex;align-items:flex-start;gap:5px;font-size:11px;font-weight:600;border-radius:5px;padding:3px 6px;margin-bottom:3px;line-height:1.3;color:#fff}
  .calev .who2{width:15px;height:15px;border-radius:50%;background:rgba(255,255,255,.3);display:inline-flex;align-items:center;justify-content:center;font-size:8.5px;font-weight:800;flex:0 0 auto;margin-top:1px}
  .calev .txt{white-space:normal;word-break:break-word;min-width:0}
  .calmore{font-size:10.5px;color:var(--muted);font-weight:700;padding-left:2px}
  .callegend{display:flex;flex-wrap:wrap;gap:6px 14px;margin-top:12px}
  .callegend span{font-size:11px;color:var(--muted);font-weight:600;display:inline-flex;align-items:center;gap:6px}
  .ldot{width:9px;height:9px;border-radius:50%;flex:0 0 auto}

  table{width:100%;border-collapse:collapse}
  th{text-align:left;font-size:10.5px;text-transform:uppercase;letter-spacing:.7px;color:var(--muted);font-weight:700;padding:10px 12px;border-bottom:1px solid var(--line)}
  td{padding:11px 12px;border-bottom:1px solid var(--line);font-size:13.5px;vertical-align:middle}
  tr:last-child td{border-bottom:none}
  tbody tr:hover td{background:#fbfaf7}
  .loadbar{width:74px;height:7px;border-radius:4px;background:#efeee7;overflow:hidden;display:inline-block;vertical-align:middle;margin-right:8px}
  .loadbar i{display:block;height:100%;border-radius:4px}
  .leg{display:flex;align-items:center;gap:9px;padding:7px 0;border-bottom:1px solid var(--line);font-size:13px;font-weight:600;color:var(--ink2)}

  /* ===== org chart (People & roles) ===== */
  .org-toolbar{display:flex;align-items:center;gap:8px;flex-wrap:wrap;margin-bottom:14px}
  .org-toolbar .spacer{flex:1}
  .org-toolbar .remove-btn{background:var(--red-soft);border-color:#e6b6bd;color:var(--red)}
  .org-toolbar .remove-btn:hover{background:var(--red);color:#fff}
  .zoom-bar{display:flex;align-items:center;gap:6px;margin-bottom:10px}
  .zoom-bar button{width:28px;height:28px;border:1.5px solid var(--line);background:var(--card);border-radius:7px;
    font-family:inherit;font-size:15px;font-weight:700;color:var(--ink);cursor:pointer;display:flex;align-items:center;justify-content:center}
  .zoom-bar button:hover{border-color:var(--accent-border,var(--accent));background:var(--accent-soft)}
  .zoom-bar .pct{font-size:12px;font-weight:700;color:var(--muted);width:42px;text-align:center}
  .zoom-bar .zreset{width:auto;padding:0 10px;font-size:11.5px}
  .chart-scroll{overflow:auto;max-height:65vh;padding:50px 6px 6px}
  .orgtree,.orgtree ul{list-style:none;margin:0;padding:0}
  .orgtree{padding-top:0;text-align:center}
  .orgtree ul{padding-top:26px;position:relative;display:flex;justify-content:center}
  .orgtree li{display:inline-block;text-align:center;position:relative;padding:26px 10px 0 10px;vertical-align:top}
  .orgtree li::before,.orgtree li::after{content:'';position:absolute;top:0;right:50%;border-top:2px solid var(--line);width:50%;height:26px}
  .orgtree li::after{right:auto;left:50%;border-left:2px solid var(--line)}
  .orgtree li:only-child::after,.orgtree li:only-child::before{display:none}
  .orgtree li:only-child{padding-top:0}
  .orgtree li:first-child::before,.orgtree li:last-child::after{border:0 none}
  .orgtree li:last-child::before{border-right:2px solid var(--line);border-radius:0 6px 0 0}
  .orgtree li:first-child::after{border-radius:6px 0 0 0}
  .orgtree>li{padding-top:0}
  .orgtree>li::before,.orgtree>li::after{display:none}
  .onode{display:inline-flex;flex-direction:column;align-items:center;gap:4px;background:var(--card);
    border:1.5px solid var(--line);border-radius:11px;padding:12px 16px;min-width:128px;box-shadow:var(--sh-sm);cursor:pointer}
  .onode:hover{border-color:var(--accent);box-shadow:var(--sh-md)}
  .onode.static{cursor:default}
  .onode.static:hover{border-color:var(--line);box-shadow:var(--sh-sm)}
  .onode .orole{font-size:11px;font-weight:800;text-transform:uppercase;letter-spacing:.6px;color:var(--muted)}
  .onode .oname{font-size:13.5px;font-weight:700;color:var(--ink)}
  .onode .odept{font-size:11px;color:var(--muted)}
  .onode .odept-add{cursor:pointer;color:var(--accent);font-weight:600}
  .onode .odept-add:hover{text-decoration:underline}
  .onode .otempflag{font-size:9.5px;font-weight:800;color:#8a6a10;background:#fff3d6;border:1px solid #e6c877;
    border-radius:5px;padding:2px 7px;margin-top:2px}
  .onode .otaphint{font-size:9px;color:var(--muted);margin-top:1px}
  .onode-wrap{position:relative;display:inline-block}
  .onode-wrap.temp .onode{border-color:#e6c877;border-style:dashed}
  .onode.admin{background:#23262a;border-color:#23262a}
  .onode.admin .orole,.onode.admin .oname{color:#fff}
  .onode.mgmt{background:var(--accent-soft);border-color:var(--accent);gap:2px}
  .onode.director{background:var(--blue-soft);border-color:var(--blue)}
  .onode.director .orole{color:var(--blue)}
  .org-mgmt-member{display:flex;flex-direction:column;align-items:center;padding:3px 0}
  .org-mgmt-member+.org-mgmt-member{border-top:1px dashed var(--accent);padding-top:5px;margin-top:1px}
  .org-edit-dept{cursor:pointer;margin-left:6px;font-size:14px;color:var(--red);vertical-align:middle;display:inline-block;transform:scaleX(-1)}
  .org-edit-dept:hover{color:#a51c2c;transform:scaleX(-1) scale(1.15)}
  /* multi-department Sr. Manager: equal department chips on the node + a labelled column per dept below */
  .onode .ochips{display:flex;gap:5px;flex-wrap:wrap;justify-content:center;margin-top:1px}
  .onode .ochip{font-size:10.5px;font-weight:800;border-radius:999px;padding:2px 9px;border:1px solid var(--accent);background:var(--accent-soft);color:var(--accent)}
  .onode .ochip.none{border-color:var(--line);background:transparent;color:var(--muted);font-weight:600}
  .odeptgroup{display:inline-flex;align-items:center;font-size:10.5px;font-weight:800;text-transform:uppercase;letter-spacing:.4px;color:var(--accent);background:var(--accent-soft);border:1px solid var(--accent);border-radius:6px;padding:3px 10px}
  .org-checklist{display:flex;flex-direction:column;gap:9px;margin:12px 20px;max-height:220px;overflow-y:auto}
  /* higher specificity than .mf label (which the edit-head-depts picker nests these rows inside) so
     the department name renders as a normal dark row, not a tiny uppercase muted form-label */
  .org-checklist .org-check-row{display:flex;align-items:center;gap:9px;font-size:13px;font-weight:500;color:var(--ink);cursor:pointer;text-transform:none;letter-spacing:normal;text-align:left;margin:0}
  .org-checklist .org-check-row input{width:16px;height:16px;flex:0 0 auto;cursor:pointer;accent-color:var(--accent)}
  .org-role-grid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:8px;margin:12px 20px}
  .org-role-grid button{border:1.5px solid var(--line);background:var(--card);border-radius:9px;padding:14px 8px;font-family:inherit;
    font-size:13px;font-weight:700;color:var(--ink);cursor:pointer}
  .org-role-grid button:hover{border-color:var(--accent);background:var(--accent-soft)}
  .org-action-grid{display:flex;gap:10px;margin:12px 20px}
  .org-action-grid button{flex:1;border:1.5px solid var(--line);background:var(--card);border-radius:9px;padding:16px 8px;font-family:inherit;
    font-size:13.5px;font-weight:700;color:var(--ink);cursor:pointer;display:flex;flex-direction:column;gap:4px;align-items:center}
  .org-action-grid button:hover:not(:disabled){border-color:var(--accent);background:var(--accent-soft)}
  .org-action-grid button:disabled{opacity:.45;cursor:not-allowed}
  .org-action-grid small{font-weight:500;color:var(--muted);font-size:10.5px}
  .org-info-box{background:#f1f0e9;border-radius:8px;padding:10px 12px;font-size:12px;color:var(--ink2);margin:12px 20px;line-height:1.5}
  .leg:last-child{border-bottom:none}
  .leg .dot2{width:11px;height:11px;border-radius:3px;flex:0 0 auto}
  .leg b{margin-left:auto;color:var(--ink)}

  /* modal */
  .modal-wrap{position:fixed;inset:0;background:rgba(27,30,33,.45);z-index:70;display:flex;align-items:flex-start;justify-content:center;padding:8vh 16px 16px}
  .modal{background:var(--card);width:560px;max-width:100%;border-radius:14px 14px 14px 4px;box-shadow:var(--sh-lg);max-height:86vh;overflow:auto;animation:pop .2s ease}
  @keyframes pop{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:none}}
  .qc-head{display:flex;align-items:center;gap:10px;padding:18px 20px 0}
  .qc-head h3{margin:0;font-size:17px;font-weight:700;flex:1}
  .selfseg{display:flex;gap:6px;background:#efeee7;border-radius:8px;padding:4px;margin:12px 20px 0}
  .selfseg button{flex:1;border:none;background:none;font-weight:700;font-size:13px;color:var(--muted);padding:9px;border-radius:6px;cursor:pointer}
  .selfseg button.on{background:var(--card);color:var(--ink);box-shadow:0 1px 4px rgba(27,30,33,.12)}
  .qc-input-row{display:flex;gap:9px;padding:14px 20px 0;align-items:center}
  .qc-input{flex:1;border:1.5px solid var(--line);border-radius:9px;padding:13px 14px;font-family:inherit;font-size:14.5px;outline:none;color:var(--ink)}
  .qc-input:focus{border-color:var(--accent)}
  .micbtn{width:46px;height:46px;border-radius:9px;border:none;background:var(--accent-soft);color:var(--accent-ink);cursor:pointer;display:flex;align-items:center;justify-content:center;flex:0 0 auto;position:relative}
  .micbtn.rec{background:var(--red-soft);color:var(--red)}
  .micbtn.rec::after{content:"";position:absolute;inset:-5px;border-radius:12px;border:2px solid var(--red);animation:pulse 1s infinite}
  @keyframes pulse{0%{transform:scale(1);opacity:.7}100%{transform:scale(1.18);opacity:0}}
  .qc-hint{padding:8px 22px 0;font-size:12px;color:var(--muted)}
  .qc-hint b{color:var(--ink2)}
  .qc-attach{display:flex;gap:8px;flex-wrap:wrap;padding:12px 20px 0}
  .qc-attach label{flex:1;justify-content:center;cursor:pointer;min-width:110px}
  .filelist{display:flex;gap:8px;flex-wrap:wrap;margin-top:10px;width:100%}
  .filechip{font-size:11.5px;font-weight:600;color:var(--ink2);background:#efeee7;padding:6px 10px;border-radius:6px;display:inline-flex;align-items:center;gap:5px}
  .qc-parsed{margin:14px 20px 0;border:1px solid var(--accent-border);background:#fbfdfc;border-radius:10px;padding:14px 16px}
  .qc-parsed .aihead{display:flex;align-items:center;gap:7px;font-size:11.5px;font-weight:800;color:var(--accent-ink);text-transform:uppercase;letter-spacing:.6px;margin-bottom:10px}
  .fieldrow{display:flex;align-items:flex-start;gap:10px;padding:9px 0;border-bottom:1px solid #e8efec}
  .fieldrow:last-child{border-bottom:none}
  .fieldrow .k{font-size:12px;color:var(--muted);width:80px;flex:0 0 auto;font-weight:600;padding-top:5px}
  .fieldrow .v{flex:1;font-size:14px;font-weight:600}
  .editchip{display:inline-flex;align-items:center;gap:6px;background:var(--card);border:1.5px dashed #b6d3cd;border-radius:7px;padding:5px 11px;font-size:13px;font-weight:600;cursor:pointer;color:var(--ink)}
  .editchip:hover{border-color:var(--accent)}
  .whysm{font-size:11.5px;color:var(--muted);margin-top:5px;line-height:1.4;width:100%}
  .whysm b{color:var(--accent-ink)}
  .pickrow{display:flex;flex-wrap:wrap;gap:6px;margin-top:8px}
  .pk{border:1.5px solid var(--line);background:var(--card);border-radius:7px;padding:6px 11px;font-size:12.5px;font-weight:600;color:var(--ink2);cursor:pointer}
  .pk:hover{border-color:var(--accent)}
  .pk.cur{border-color:var(--accent);background:var(--accent-soft);color:var(--accent-ink)}
  .qc-opts-t{width:calc(100% - 40px);margin:14px 20px 0;display:flex;justify-content:space-between;align-items:center;background:#f3f2ec;border:none;border-radius:8px;padding:11px 14px;font-size:13px;font-weight:700;color:var(--ink2);cursor:pointer}
  .qc-opts{padding:4px 20px 0}
  .qc-opts label{display:block;font-size:11px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;margin:12px 0 6px}
  .qc-opts select,.qc-opts textarea,.mf input,.mf select{width:100%;border:1.5px solid var(--line);border-radius:8px;padding:10px;font-family:inherit;font-size:13.5px;outline:none;color:var(--ink);background:var(--card)}
  .qc-opts select:focus,.qc-opts textarea:focus,.mf input:focus,.mf select:focus{border-color:var(--accent)}
  .qc-actions{display:flex;gap:10px;padding:18px 20px 20px}
  .mf{padding:0 20px}
  .mf label{display:block;font-size:11px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;margin:12px 0 6px}
  .mf .row2{display:flex;gap:10px}
  .mf .row2>div{flex:1}

  .toast{position:fixed;bottom:26px;left:50%;transform:translateX(-50%);background:#22262a;color:#fff;
    padding:12px 18px;border-radius:9px;font-size:13.5px;font-weight:600;z-index:90;display:flex;align-items:center;gap:9px;box-shadow:var(--sh-lg);animation:pop .2s ease}
  .toast svg{width:16px;height:16px;color:#7fd8b8}

  @media (max-width:1100px){
    .sidebar{width:66px;padding:18px 10px}
    .sidebar .brand span.bt,.navitem span.lb,.navitem .kbd,.side-lab,.companion{display:none}
    .navitem{justify-content:center;padding:11px 0}
    .roleSel{font-size:0;padding:10px 4px}
    .grid2{grid-template-columns:1fr}
    .search{width:170px}
  }
  @media (max-width:760px){
    .kpis{grid-template-columns:repeat(2,minmax(0,1fr))}
    .topbar{flex-wrap:wrap;gap:10px;padding:12px 16px}
    .stripbar,.view{padding-left:16px;padding-right:16px}
    .strip{flex-wrap:wrap}
    .strip .chips{margin-left:0}
    .drawer{width:100vw}
    .calcell{min-height:64px}
    .calev .txt{display:none}
    .cols3{grid-template-columns:1fr}
    .calhead{flex-wrap:wrap}
    .calhead .spacer{flex-basis:100%;height:0}
    .calhead .fsel{flex:1;min-width:0}
  }
  /* Phone (≤600px): the console is desktop-first, but keep it usable on a phone browser — the left
     rail becomes a fixed BOTTOM NAV BAR (like the mobile app), and the top bar / content reflow. */
  @media (max-width:600px){
    html,body{overflow-x:hidden}
    /* sidebar -> fixed bottom nav bar */
    .sidebar{position:fixed;left:0;right:0;bottom:0;top:auto;width:100%;height:auto;
      flex-direction:row;align-items:center;justify-content:space-around;gap:0;
      padding:5px 4px calc(5px + env(safe-area-inset-bottom,0px));
      border-right:none;border-top:1px solid var(--line);
      box-shadow:0 -2px 12px rgba(0,0,0,.07);z-index:60;overflow-x:auto}
    .sidebar .brand,.sidebar>div:not([class]),.roleSel,.side-lab,.companion{display:none}
    .navitem{width:auto;flex:0 0 auto;padding:7px 6px;border-radius:11px;justify-content:center}
    .side-foot{margin:0;padding:0;border-top:none;flex:0 0 auto;display:flex;align-items:center}
    .side-foot .btn{width:auto!important;margin:0!important;padding:6px 8px;font-size:10.5px;white-space:nowrap;min-height:0}
    .main{padding-bottom:58px}                  /* clear the fixed bottom bar */
    .drawer{z-index:80}                         /* task detail sits above the nav bar */
    /* top bar + content */
    .topbar{flex-wrap:wrap;gap:8px;padding:10px 12px}
    .topbar>.chip-s{display:none}              /* wide cron-status chip — admin diagnostic, not needed on a phone */
    .tb-right{margin-left:0;flex:1 1 100%;flex-wrap:wrap;gap:8px;justify-content:flex-end}
    .tb-right .searchwrap:first-child{flex:1 1 100%}   /* search gets its own full-width row */
    .search{width:100%}
    .kpis{grid-template-columns:1fr}           /* one KPI card per row */
    .view,.stripbar{padding-left:12px;padding-right:12px}
    .attn{flex-wrap:wrap}
  }
  /* ---- checklists ---- */
  .ktabs{display:flex;gap:4px;margin-bottom:18px;border-bottom:1px solid var(--line)}
  .ktab{border:none;background:none;padding:10px 14px;font-size:13.5px;font-weight:600;color:var(--muted);cursor:pointer;border-bottom:2.5px solid transparent;margin-bottom:-1px}

<script type="text/babel" data-presets="react">
const {useState,useEffect,useRef,useCallback} = React;

/* ============ data ============ */
const TYPES={work:"Work",purchase:"Purchase",repair:"Repair",maint:"Maintenance",other:"Other"};
const PRIOS={high:{l:"High",c:"var(--red)"},med:{l:"Medium",c:"var(--amber)"},low:{l:"Low",c:"#9aa2a8"}};
const AV_COLORS=['#0e7a6f','#39638f','#1a7a48','#b06e12','#c43a53','#0e7a8f','#a34d78','#5b5ea6'];
/* display labels for the org-chart view only — the DB role strings themselves (and every other
   view's rendering of them) stay exactly as they are; this is presentation-layer relabeling so the
   chart reads as the Admin -> Management -> Sr. Manager -> Jr Manager -> Team Lead -> Staff
   tiers everyone agreed on, without a schema/UI-wide rename of "Manager"/"Team Member"/"Teacher". */
/* Canonical default role labels now live in shared.js (ROLE_DEFAULT_LABEL) so the console and mobile
   resolve the same defaults for the custom-role-titles feature. TIER_LABEL is kept as the name that
   category-B *role-tier* references use (role pickers/headers, promote/demote dropdowns, add/remove
   flows) — it is the SAME object, so those sites are unchanged. Person-DISPLAY sites use roleLabel(p)
   (shared.js), which overlays a person's chosen title on top of this default. */
const TIER_LABEL=ROLE_DEFAULT_LABEL;
/* org tiers highest -> lowest, used by the Demote flow to offer any role BELOW someone's current
   one (Administrator is excluded — it's never a demote source or target). In staff.role terms this
   is the same Sr. Manager -> Jr. Manager -> Team Lead -> Staff ladder above, plus the two tiers
   over it. */
const DEMOTE_LADDER=['Management','Director','Manager','Team Member','Team Lead','Teacher'];

let STAFF=[];
let tasks=[];
let ORG_NAME='';
let SUPPLY_ENABLED=true; // org_settings.supply_requests_enabled — master toggle for the supply-request feature (read via shared.js supplyEnabled())
let NAV_ICONS={};        // org_settings.nav_icons jsonb — Administrator-chosen emoji overrides for sidebar items (key→emoji); empty = use the default line icon
let NAV_LABELS={};       // org_settings.nav_labels jsonb — Administrator-chosen text overrides for sidebar item names (key→label); no entry = use the default word
let ROUTING_RULES=[]; // routing_rules rows (admin-configured recipients) — read via shared.js helpers
let requests=[];
let notifs=[];
let lastCronRun=null; // most recent cron_runs row — "is check-due-tasks actually running?" (RLS: admin/mgmt only, empty for everyone else)
let activityLog=[]; // recent admin_activity_log rows — RLS: admin/mgmt only
let clItems=[]; // checklist_items rows (in scope)
let clDone=[];  // checklist_completions rows (recent window)
let clAbs=[];   // checklist_absences rows

function rowsToStaff(rows){
  const byId=Object.fromEntries(rows.map(r=>[r.id,r]));
  return rows.map(r=>({n:r.name,s:r.short_name,role:r.role,dept:r.department,subDept:r.sub_dept||undefined,
    boss:r.boss_id?byId[r.boss_id].name:null,bossId:r.boss_id,av:r.initials,id:r.id,authId:r.auth_user_id,
    /* head_departments: the jsonb array of departments a Sr. Manager fully heads (multi-dept). null
       only pre-migration → left undefined so deptChips()/head lookups fall back to [dept]; post-migration
       it's always a real array (possibly empty = a deliberately dept-less Sr. Manager). */
    headDepartments:Array.isArray(r.head_departments)?r.head_departments:undefined,
    /* staff.title — the per-person chosen role title (alias). undefined = use the role's default
       label. Read by roleLabel(p) at every person-display site. */
    title:r.title||undefined,
    tempCovering:r.temp_covering,tempSnap:r.temp_cover_snapshot}));
}
function rowToTask(row,assignRows,logRows){
  const mine=assignRows.filter(a=>a.task_id===row.id);
  const primary=mine.find(a=>a.is_primary)||mine[0];
  const co=mine.filter(a=>a!==primary);
  const doneBy=mine.filter(a=>a.done_at).map(a=>a.staff_short);
  const t={id:row.id,t:row.title,who:primary?primary.staff_short:null,
    coWho:co.length?co.map(a=>a.staff_short):undefined,
    type:row.type,bucket:LABEL_TO_BUCKET[row.department]||'administration',prio:row.priority,
    date:row.due_date,time:row.due_time?row.due_time.slice(0,5):undefined,status:row.status,
    note:row.note||"",doneOn:row.done_on||undefined,
    doneBy:doneBy.length?doneBy:undefined,
    selfAssigned:row.self_assigned||undefined,instructedBy:row.instructed_by||undefined,
    origin:row.origin||undefined,files:row.files&&row.files.length?row.files:undefined,
    recur:row.recur||undefined,recurOn:row.recur_on!=null?row.recur_on:undefined,
    issued:row.created_at||undefined,
    lastNudgedAt:row.last_nudged_at||undefined,
    ticket:row.ticket_no||undefined,requestedAt:row.requested_at?row.requested_at.slice(0,10):undefined,
    completionPending:row.completion_pending||undefined};
  if(row.ext_new_date)t.extReq={newDate:row.ext_new_date,reason:row.ext_reason||""};
  if(row.reopened_by)t.reopened={by:byId2Name(row.reopened_by),comment:row.reopened_comment||""};
  const logs=logRows.filter(l=>l.task_id===row.id);
  /* author_id is the only real column on task_log — there is no author_name. Resolve it through
     the same byId2Name lookup reopened_by uses just above; "Earlier" is the fallback for the rare
     null-author row (e.g. pre-author-tracking data), not the default for every row. */
  if(logs.length)t.log=logs.map(l=>({id:l.id,by:l.author_id?(byId2Name(l.author_id)||"Earlier"):"Earlier",when:fmtDateTime(l.created_at),text:l.body,createdAt:l.created_at}));
  return t;
}
let byId2Name=()=>"";
function rowToRequest(row){
  return {id:row.id,kind:row.kind,t:row.title,from:row.from_short,date:row.created_at.slice(0,10),ticket:row.ticket_no||undefined,
    routing_rule_id:row.routing_rule_id||null,target_staff_id:row.target_staff_id||null,stage:row.stage||null,
    approver_staff_id:row.approver_staff_id||null,
    declined_at:row.declined_at||null,declined_by:row.declined_by||null,
    resolved_at:row.resolved_at||null,resolved_by:row.resolved_by||null,
    note:row.note||"",files:row.files&&row.files.length?row.files:undefined};
}
const rowToRule=r=>({id:r.id,kind:r.kind,label:r.label,icon:r.icon||'',staff_id:r.target_staff_id||null,sort_order:r.sort_order||0,created_at:r.created_at});
/* pull the reporter's name out of a request-origin task's note (built at assign/fulfil time). Used by
   the tracker AND the requester's own "Your reports & requests" card to match "tasks I reported". */
function reporterFromNote(note){
  if(!note)return null;
  let m=note.match(/Reported by (.+?)(?: — |$)/);if(m)return m[1].trim();
  m=note.match(/request from (.+?)(?: — |$)/);if(m)return m[1].trim();
  return null;
}
/* status of one of MY raised items, for the requester card — a compact {text,dot} from a request row
   (open/declined) or an assigned task. Mirrors the tracker's status logic, first-person. */
function myReqStatus(x){
  if(x.req){const r=x.req;
    if(r.declined_at)return {text:'Declined',dot:'#9a938a'};
    if(r.kind==='issue')return {text:'Reported · awaiting assignment',dot:'var(--amber)'};
    if(r.stage==='approved')return {text:'Approved · being procured',dot:'var(--blue)'};
    return {text:'Awaiting approval',dot:'var(--amber)'};
  }
  const t=x.task;
  if(t.status==='done')return {text:'Done'+(t.doneOn?' · '+fmtDate(t.doneOn):''),dot:'var(--green)'};
  if(isOverdue(t)){const d=overdueDays(t);return {text:'In progress · '+d+' day'+(d!=1?'s':'')+' late',dot:'var(--red)'};}
  return {text:'Assigned · '+(ST[t.status]?ST[t.status].l:'in progress'),dot:'var(--blue)'};
}
async function loadAll(){
  /* cron_runs/admin_activity_log are both RLS-gated to admin/mgmt (see their migrations) — for
     everyone else these just come back empty, same as any other out-of-scope query in this app. */
  const clSince=iso(new Date(Date.now()-90*864e5)); // last 90 days of completion/absence history
  const [{data:staffRows},{data:taskRows},{data:assignRows},{data:logRows},{data:reqRows},notifRows,{data:cronRows},{data:activityRows},{data:orgRow},{data:ruleRows},{data:clItemRows},{data:clDoneRows},{data:clAbsRows}]=await Promise.all([
    sb.from('staff').select('*'),
    sb.from('tasks').select('*'),
    sb.from('task_assignees').select('*'),
    sb.from('task_log').select('*').order('created_at'),
    sb.from('requests').select('*').order('created_at'),
    loadNotifs(),
    sb.from('cron_runs').select('*').order('ran_at',{ascending:false}).limit(1),
    sb.from('admin_activity_log').select('*').order('created_at',{ascending:false}).limit(80),
    sb.from('org_settings').select('name,supply_requests_enabled,nav_icons,nav_labels,departments,hidden_departments,role_titles,task_permissions').eq('id',true).maybeSingle(),
    sb.from('routing_rules').select('*'),
    sb.from('checklist_items').select('*').eq('archived',false),
    sb.from('checklist_completions').select('*').gte('occ_date',clSince),
    sb.from('checklist_absences').select('*').gte('absent_date',clSince)
  ]);
  if(orgRow&&orgRow.name)ORG_NAME=orgRow.name;
  if(orgRow&&typeof orgRow.supply_requests_enabled==='boolean')SUPPLY_ENABLED=orgRow.supply_requests_enabled;
  NAV_ICONS=(orgRow&&orgRow.nav_icons&&typeof orgRow.nav_icons==='object')?orgRow.nav_icons:{};
  NAV_LABELS=(orgRow&&orgRow.nav_labels&&typeof orgRow.nav_labels==='object')?orgRow.nav_labels:{};
  ROLE_TITLES=(orgRow&&orgRow.role_titles&&typeof orgRow.role_titles==='object')?orgRow.role_titles:{}; // shared alias pool per role (custom role titles)
  TASK_PERMS=(orgRow&&orgRow.task_permissions&&typeof orgRow.task_permissions==='object')?orgRow.task_permissions:{}; // per-department task edit/delete role gates
  applyDeptConfig(orgRow&&orgRow.departments,orgRow&&orgRow.hidden_departments); // merge custom + hide removed built-ins
  ROUTING_RULES.length=0;ROUTING_RULES.push(...(ruleRows||[]).map(rowToRule));
  STAFF.length=0;STAFF.push(...rowsToStaff(staffRows||[]));
  const byId=Object.fromEntries(STAFF.map(p=>[p.id,p]));
  byId2Name=id=>byId[id]?byId[id].n:"";
  (assignRows||[]).forEach(a=>a.staff_short=byId[a.staff_id]?byId[a.staff_id].s:a.staff_id);
  (reqRows||[]).forEach(r=>r.from_short=byId[r.from_staff_id]?byId[r.from_staff_id].s:r.from_staff_id);
  tasks.length=0;tasks.push(...(taskRows||[]).map(r=>rowToTask(r,assignRows||[],logRows||[]))
    .sort((a,b)=>(a.date||'')<(b.date||'')?-1:1));
  requests.length=0;requests.push(...(reqRows||[]).map(rowToRequest));
  notifs.length=0;notifs.push(...(notifRows||[]));
  lastCronRun=(cronRows&&cronRows[0])||null;
  activityLog.length=0;activityLog.push(...(activityRows||[]));
  clItems.length=0;clItems.push(...(clItemRows||[]));
  clDone.length=0;clDone.push(...(clDoneRows||[]));
  clAbs.length=0;clAbs.push(...(clAbsRows||[]));
}
function taskRow(t){
  return {title:t.t,type:t.type||'work',department:BUCKETS[t.bucket]||t.bucket,priority:t.prio||'med',
    status:t.status,due_date:t.date||null,due_time:t.time||null,note:t.note||'',
    recur:t.recur||null,recur_on:t.recurOn!=null?t.recurOn:null,
    self_assigned:!!t.selfAssigned,instructed_by:t.instructedBy||null,origin:t.origin||null,
    ticket_no:t.ticket||null,requested_at:t.requestedAt||null,
    files:t.files||[],done_on:t.doneOn||null,completion_pending:!!t.completionPending,
    ext_new_date:(t.extReq&&t.extReq.newDate)||null,ext_reason:(t.extReq&&t.extReq.reason)||null,
    reopened_by:(t.reopened&&byName(t.reopened.by))?byName(t.reopened.by).id:null,
    reopened_comment:(t.reopened&&t.reopened.comment)||null};
}
async function saveTask(t){
  const row=taskRow(t);

function LoginScreen(){
  const [id,setId]=useState('');const [pw,setPw]=useState('');const [err,setErr]=useState('');const [busy,setBusy]=useState(false);
  const [forgot,setForgot]=useState(false); // null=hidden · 'sent' · 'noemail'
  const go=async()=>{
    if(!id.trim()||!pw){setErr('Enter your email/username and password');return;}
    setBusy(true);setErr('');
    const email=id.includes('@')?id.trim():id.trim()+'@teamflow.demo';
    const {error}=await sb.auth.signInWithPassword({email,password:pw});
    setBusy(false);
    if(error)setErr('Could not sign in — check your email/username and password');
  };
  const sendReset=async()=>{
    const raw=id.trim();
    if(!raw){setErr('Enter your email or username first');return;}
    setErr('');
    if(!raw.includes('@')||raw.toLowerCase().endsWith('@teamflow.demo')){setForgot('noemail');return;}
    setBusy(true);
    await sb.auth.resetPasswordForEmail(raw,{redirectTo:window.location.href.split('#')[0]});
    setBusy(false);
    setForgot('sent');
  };
  return <div style={{minHeight:'100vh',display:'flex',alignItems:'center',justifyContent:'center',background:'var(--bg)'}}>

      <input className="qc-input" style={{width:'100%',marginBottom:12}} value={id} onChange={e=>{setId(e.target.value);setForgot(false);}}
        onKeyDown={e=>e.key==='Enter'&&go()} placeholder="priya@teamflow.demo or vikram" autoFocus/>
      <label style={{display:'block',fontSize:11,fontWeight:700,color:'var(--muted)',textTransform:'uppercase',letterSpacing:.5,margin:'0 0 6px'}}>Password</label>
      <input type="password" className="qc-input" style={{width:'100%',marginBottom:14}} value={pw} onChange={e=>setPw(e.target.value)}
        onKeyDown={e=>e.key==='Enter'&&go()} placeholder="••••••••"/>
      {err?<div style={{color:'var(--red)',fontSize:12.5,marginBottom:12}}>{err}</div>:null}
      <button className="btn primary" style={{width:'100%',justifyContent:'center'}} disabled={busy} onClick={go}>{busy?'Signing in…':'Sign in'}</button>
      {forgot==='sent'?<div className="whysm" style={{marginTop:12}}>Check your email for a reset link.</div>
        :forgot==='noemail'?<div className="whysm" style={{marginTop:12}}>This account doesn't have an email on file — ask your Administrator or Management to reset your password from the console.</div>
        :<button className="btn ghost" style={{width:'100%',justifyContent:'center',marginTop:10}} disabled={busy} onClick={sendReset}>Forgot password?</button>}
    </div>
  </div>;
}
function ResetPasswordScreen(){
  const [pw,setPw]=useState('');const [pw2,setPw2]=useState('');const [err,setErr]=useState('');const [busy,setBusy]=useState(false);const [done,setDone]=useState(false);
  const save=async()=>{
    if(pw.length<8){setErr('Password must be at least 8 characters');return;}
    if(pw!==pw2){setErr("Passwords don't match");return;}
    setBusy(true);setErr('');
    const {error}=await sb.auth.updateUser({password:pw});
    setBusy(false);
    if(error){setErr(error.message);return;}
    await sb.auth.signOut();
    setDone(true);
  };
  return <div style={{minHeight:'100vh',display:'flex',alignItems:'center',justifyContent:'center',background:'var(--bg)'}}>
    <div style={{width:360,maxWidth:'92vw',background:'var(--card)',border:'1px solid var(--line)',borderRadius:14,boxShadow:'var(--sh-lg)',padding:'28px 26px'}}>
      <div className="brand" style={{padding:0,marginBottom:18}}><span className="logo"><I n="logo"/></span><span className="bt">TeamFlow</span></div>
      {done?<>
        <div className="whysm" style={{marginBottom:14}}>Password updated. Sign in with your new password.</div>
        <button className="btn primary" style={{width:'100%',justifyContent:'center'}} onClick={()=>window.location.href=window.location.href.split('#')[0]}>Back to sign in</button>
      </>:<>
        <label style={{display:'block',fontSize:11,fontWeight:700,color:'var(--muted)',textTransform:'uppercase',letterSpacing:.5,margin:'0 0 6px'}}>New password</label>
        <input type="password" className="qc-input" style={{width:'100%',marginBottom:12}} value={pw} onChange={e=>setPw(e.target.value)} autoFocus/>
        <label style={{display:'block',fontSize:11,fontWeight:700,color:'var(--muted)',textTransform:'uppercase',letterSpacing:.5,margin:'0 0 6px'}}>Confirm password</label>
        <input type="password" className="qc-input" style={{width:'100%',marginBottom:14}} value={pw2} onChange={e=>setPw2(e.target.value)}
          onKeyDown={e=>e.key==='Enter'&&save()}/>
        {err?<div style={{color:'var(--red)',fontSize:12.5,marginBottom:12}}>{err}</div>:null}
        <button className="btn primary" style={{width:'100%',justifyContent:'center'}} disabled={busy} onClick={save}>{busy?'Saving…':'Set new password'}</button>
      </>}
    </div>
  </div>;
}

function App(){
  const [,setTick]=useState(0);
  const R=useCallback(()=>setTick(t=>t+1),[]);
  const [previewRole,setPreviewRole]=useState(null); // admin-only "preview as" override
  const [view,setView]=useState('dashboard');
  const {toast,say}=useToast();
  const [drawerIdx,setDrawerIdx]=useState(-1);
  const drawerIdxRef=useRef(-1);
  useEffect(()=>{drawerIdxRef.current=drawerIdx;},[drawerIdx]);
  const [modal,setModal]=useState(false);
  const [dailyReport,setDailyReport]=useState(false);
  const [resetTarget,setResetTarget]=useState(null); // staff object being password-reset, or null
  const [personTasks,setPersonTasks]=useState(null); // person object whose pending tasks are shown in a popup, or null
  const [orgEdit,setOrgEdit]=useState(false);
  const [orgDraft,setOrgDraft]=useState('');
  const [syncTick,setSyncTick]=useState(0);
  const searchRef=useRef();
  const [loaded,setLoaded]=useState(false);
  const [session,setSession]=useState(undefined); // undefined=checking · null=signed out · object=signed in
  const [recovery,setRecovery]=useState(false); // true once Supabase reports this session came from a reset-password email link
  useEffect(()=>{
    sb.auth.getSession().then(({data})=>setSession(data.session));
    const {data:sub}=sb.auth.onAuthStateChange((e,sess)=>{if(e==='PASSWORD_RECOVERY')setRecovery(true);setSession(sess);});
    return ()=>sub.subscription.unsubscribe();
  },[]);
  useEffect(()=>{
    if(!session)return;
    loadAll().then(()=>setLoaded(true)).catch(e=>{console.error(e);setLoaded(true);say('Could not load data from Supabase — check your connection');});
  },[session]);
  useEffect(()=>{
    if(!session)return;
    let t;
    const refetch=()=>{clearTimeout(t);t=setTimeout(()=>{
      const di=drawerIdxRef.current;
      const openId=di>=0&&tasks[di]?tasks[di].id:null;
      loadAll().then(()=>{
        if(openId)setDrawerIdx(tasks.findIndex(x=>x.id===openId)); // findIndex's -1-on-miss doubles as "closed"
        setSyncTick(x=>x+1); // components holding their own fetched state (Daily Reports panel/modal) key refetches off this
        R();
      }).catch(console.error);
    },400);};
    const ch=sb.channel('teamflow-sync')
      .on('postgres_changes',{event:'*',schema:'public',table:'staff'},refetch)
      .on('postgres_changes',{event:'*',schema:'public',table:'tasks'},refetch)
      .on('postgres_changes',{event:'*',schema:'public',table:'task_assignees'},refetch)
      .on('postgres_changes',{event:'*',schema:'public',table:'task_log'},refetch)
      .on('postgres_changes',{event:'*',schema:'public',table:'requests'},refetch)
      .on('postgres_changes',{event:'*',schema:'public',table:'routing_rules'},refetch)
      .on('postgres_changes',{event:'*',schema:'public',table:'org_settings'},refetch)
      .on('postgres_changes',{event:'*',schema:'public',table:'notices'},refetch)
      .on('postgres_changes',{event:'*',schema:'public',table:'task_notifications'},refetch)
      .on('postgres_changes',{event:'*',schema:'public',table:'task_activity_notifications'},refetch)
      .on('postgres_changes',{event:'*',schema:'public',table:'daily_reports'},refetch)
      .on('postgres_changes',{event:'*',schema:'public',table:'report_issues'},refetch)
      .on('postgres_changes',{event:'*',schema:'public',table:'checklist_items'},refetch)
      .on('postgres_changes',{event:'*',schema:'public',table:'checklist_completions'},refetch)
      .on('postgres_changes',{event:'*',schema:'public',table:'checklist_absences'},refetch)
      .on('postgres_changes',{event:'*',schema:'public',table:'checklist_notifications'},refetch)
      .subscribe();
    return ()=>{clearTimeout(t);sb.removeChannel(ch);};
  },[session]);
  useEffect(()=>{
    const h=e=>{
      const typing=/INPUT|TEXTAREA|SELECT/.test(document.activeElement.tagName);
      if(e.key==='Escape'){setModal(false);setDailyReport(false);setDrawerIdx(-1);document.activeElement.blur();return;}
      if(typing)return;
      if(e.key==='/'){e.preventDefault();searchRef.current&&searchRef.current.focus();return;}
      if(e.key==='n'||e.key==='N'){e.preventDefault();setModal(true);return;}
      const vs=['dashboard','tasks','calendar','people','reports'];
      if(/^[1-5]$/.test(e.key))setView(vs[+e.key-1]);
    };
    document.addEventListener('keydown',h);
    return ()=>document.removeEventListener('keydown',h);
  },[]);

  if(session===undefined)return <div style={{display:'flex',alignItems:'center',justifyContent:'center',height:'100vh',color:'var(--muted)',fontSize:14}}>Loading…</div>;
  if(recovery)return <ResetPasswordScreen/>;
  if(session===null)return <LoginScreen/>;
  if(!loaded)return <div style={{display:'flex',alignItems:'center',justifyContent:'center',height:'100vh',color:'var(--muted)',fontSize:14}}>Loading TeamFlow…</div>;

  const myStaff=STAFF.find(p=>p.authId===session.user.id);
  if(!myStaff)return <div style={{display:'flex',flexDirection:'column',gap:14,alignItems:'center',justifyContent:'center',height:'100vh',color:'var(--muted)',fontSize:14}}>
    <div>Your account isn't linked to a staff record. Contact your administrator.</div>
    <button className="btn ghost" onClick={()=>sb.auth.signOut()}>Sign out</button></div>;
  /* DB_ROLE_TO_KEY (shared.js) is mobile's superset and includes Teacher:'worker' — harmless there,
     but console has no Teacher-facing UI at all, so it needs its own explicit block rather than
     relying on DB_ROLE_TO_KEY[role] being falsy (which stopped being true for Teachers once the
     dedup shared mobile's map). Caught by testing an actual Teacher login into console. */
  const myRoleKey=myStaff.role==='Teacher'?null:DB_ROLE_TO_KEY[myStaff.role];
  if(!myRoleKey)return <div style={{display:'flex',flexDirection:'column',gap:14,alignItems:'center',justifyContent:'center',height:'100vh',color:'var(--muted)',fontSize:14}}>
    <div>This account doesn't have console access — open the TeamFlow mobile app instead.</div>
    <button className="btn ghost" onClick={()=>sb.auth.signOut()}>Sign out</button></div>;
  const role=(myRoleKey==='admin'&&previewRole)?previewRole:myRoleKey;
  const setRole=r=>{setPreviewRole(r);setDrawerIdx(-1);};

  /* viewer = the identity actually driving the dashboard. When Preview As is engaged, that's a
     hypothetical simulation with no real backing person, so fall back to the canonical demo
     persona for that role (same as always). Otherwise it's whoever's actually logged in — not a
     fixed per-role persona, which used to show every admin/mgmt account as "Priya"/"Rajesh". */
  const previewing=role!==myRoleKey;
  const viewer=previewing?(roleRep(role)||{n:'',s:'',role:'',dept:'',boss:null,av:''}):myStaff;
  /* admin/mgmt see the whole org regardless of where they sit in the boss_id tree (matches their
     RLS access and mobile's ALL_STAFF team) — walking descendants() from a specific person only
     makes sense for the tree-scoped srm/jrm roles. */
  const scope=(role==='admin'||role==='mgmt')?STAFF.slice():[viewer].concat(descendants(viewer.n));
  const treeRoot=(role==='admin'||role==='mgmt')?(STAFF.find(p=>!p.boss)||viewer).n:viewer.n;
  const shorts=scope.map(p=>p.s);
  const bossChain=(()=>{let c=[],cur=viewer.boss;while(cur){c.push(cur);const b=byName(cur);cur=b?b.boss:null;}return c;})();
  /* "On instruction of" in the New Task form lists all leadership (Administrator/Director/Management),
     not just the creator's own boss chain — anyone at that tier can hand down a task. Excludes the
     creator themselves ("own initiative" covers that). Ordered top tier first, then by name. */
  const INSTRUCT_RANK={Administrator:0,Director:1,Management:2};
  const instructors=STAFF.filter(p=>p.role in INSTRUCT_RANK&&p.n!==viewer.n)
    .sort((a,b)=>INSTRUCT_RANK[a.role]-INSTRUCT_RANK[b.role]||a.n.localeCompare(b.n));
  /* Completion/extension approval follows whoever ISSUED the task (its instructedBy), plus
     admin/mgmt can always override. Legacy tasks with no instructedBy fall back to the old
     local-manager rule so nothing already in flight breaks. `t` is optional: purchase-request
     approvals (no task) keep the manager rule via the fallback branch. */
  const canApprove=(from,t)=>{const p=byShort(from);
    if(role==='admin'||role==='mgmt')return true;
    if(t&&t.instructedBy)return viewer.n===t.instructedBy;
    return !!(p&&p.boss===viewer.n);};
  /* Recipient-based issue routing (admin-configured, replaces the old dept-head heuristic): the
     configured recipient of a report sees & assigns EVERY report routed to them, whoever filed it —
     even a Director above them (fixes the reported bug where a report filed from above never reached
     the head). issueRecipientId (shared.js) live-resolves the recipient from the report's category,
     so re-configuring re-routes; legacy reports with no category/recipient default to the first
     ('Building') maintenance recipient. */
  const viewerIsRecipient=r=>{const rid=issueRecipientId(r);return !!(rid&&rid===viewer.id);};
  const canAssignIssue=r=>role==='admin'||role==='mgmt'||viewerIsRecipient(r);
  /* Supply requests are two-stage. supplyApproverId resolves the stage-1 approver, in priority order:
     (1) the approver STORED on the request at creation (approver_staff_id) — the configured approver
     for the requester's department, snapshotted so it's stable; (2) the currently-configured
     supply_approver rule for the requester's department (covers legacy requests with no stored id);
     (3) FALLBACK to the dept Sr. Manager (role='Manager' AND same dept), escalating to the requester's
     boss if the requester IS that Sr. Manager / the dept has none, so it never dead-ends. viewerSeesReq
     decides whose queue a request/issue belongs in: admin/mgmt see all; a supply request sits with its
     approver until approved, then with the configured supply recipient (target_staff_id) to fulfil. */
  const supplyApproverId=r=>{
    if(r.approver_staff_id)return r.approver_staff_id;
    const req=byShort(r.from);if(!req)return null;
    const cfg=supplyApproverIdForDept(req.dept);if(cfg)return cfg;
    const mgr=headOfDept(req.dept); // multi-dept aware: the Sr. Manager who heads the requester's dept
    if(mgr&&mgr.s!==req.s)return mgr.id;
    const boss=req.boss?byName(req.boss):null;return boss?boss.id:null;};
  const viewerSeesReq=r=>{
    if(r.declined_at||r.resolved_at)return false; // declined/closed items live only in the tracker, never the action queue
    if(role==='admin'||role==='mgmt')return true;
    if(r.kind==='issue')return viewerIsRecipient(r);
    return r.stage==='approved'?r.target_staff_id===viewer.id:supplyApproverId(r)===viewer.id;};

  const mine=tasks.filter(t=>inScope(t,shorts));
  const open=mine.filter(t=>t.status!=='done').length;
  const over=mine.filter(isOverdue).length;
  const today=mine.filter(isToday).length;
  const done=mine.filter(t=>t.status==='done').length;
  const qReqs=requests.map((r,i)=>({r,i})).filter(o=>viewerSeesReq(o.r));
  const qExts=tasks.map((t,i)=>({t,i})).filter(o=>o.t.extReq&&inScope(o.t,shorts));
  const qCompletions=tasks.map((t,i)=>({t,i})).filter(o=>o.t.completionPending&&inScope(o.t,shorts));
  const reqN=qReqs.filter(o=>o.r.kind==='request').length;
  const issN=qReqs.filter(o=>o.r.kind==='issue').length;

  function attentionList(){
    const load=workloadMap();
    return scope.map(p=>{
      const pm=tasks.filter(t=>hasWho(t,p.s));
      const od=pm.filter(isOverdue);
      const worst=od.slice().sort((a,b)=>a.date<b.date?-1:1)[0];
      const rs=[];
      if(od.length)rs.push(od.length+' overdue — worst is '+overdueDays(worst)+' day'+(overdueDays(worst)!=1?'s':'')+' late');
      if(load[p.s]>=3)rs.push(load[p.s]+' open tasks — heaviest load on the team');
      return {p,od:od.length,load:load[p.s],reason:rs.join(' · ')};
    }).filter(x=>x.reason).sort((a,b)=>b.od-a.od||b.load-a.load);
  }

  /* actions */
  /* Overdue nudges — these used to be a fake toast ("Reminder sent"); they now write REAL in-app
     notifications (task_activity_notifications via notifyEvent) to everyone concerned with the task
     minus the nudger, so the assignee actually sees it in their bell. Three entry points:
       nudgeTask(t)   — one overdue task (per-row "Remind" in the Overdue panel / list)
       nudgeMany(arr) — bulk (the "Nudge all" buttons)
       remindPerson(s)— every overdue task assigned to that person (Who-needs-attention "Remind") */
  /* nudgeOne stamps tasks.last_nudged_at (for de-dup + "nudged 2h ago" display) then notifies. A single
     explicit Remind always fires; the BULK paths skip anything nudged within the last 12h so a repeated
     "Nudge all" doesn't spam the same people. */
  const nudgeOne=t=>{if(!t||!t.id)return;t.lastNudgedAt=new Date().toISOString();
    sb.from('tasks').update({last_nudged_at:t.lastNudgedAt}).eq('id',t.id).then(({error})=>{if(error)console.error(error);});
    notifyEvent(t.id,viewer.id,'nudged — this task is overdue',concernedFor(t,viewer.s));};
  const nudgeTask=t=>{if(previewing){say("You're previewing — switch back to nudge for real");return;}
    if(!t||!t.id)return;nudgeOne(t);R();const p=byShort(t.who);
    say('Nudged '+(p?p.n.split(' ')[0]:t.who)+' about “'+t.t.slice(0,28)+(t.t.length>28?'…':'')+'”');};
  const nudgeMany=arr=>{if(previewing){say("You're previewing — switch back to nudge for real");return;}
    const list=(arr||[]).filter(t=>t&&t.id);if(!list.length){say('Nothing overdue to nudge');return;}
    const fresh=list.filter(t=>!nudgedRecently(t.lastNudgedAt));
    if(!fresh.length){say('Everyone was already nudged in the last few hours');return;}
    fresh.forEach(nudgeOne);R();const skipped=list.length-fresh.length;
    say('Nudged '+fresh.length+' overdue task'+(fresh.length!=1?'s':'')+(skipped?' · '+skipped+' already nudged recently':''));};
  const remindPerson=s=>{if(previewing){say("You're previewing — switch back to remind for real");return;}
    const od=tasks.filter(t=>isOverdue(t)&&hasWho(t,s)&&inScope(t,shorts));const p=byShort(s);
    if(!od.length){say((p?p.n.split(' ')[0]:s)+' has nothing overdue');return;}
    const fresh=od.filter(t=>!nudgedRecently(t.lastNudgedAt));
    if(!fresh.length){say((p?p.n.split(' ')[0]:s)+' was already nudged in the last few hours');return;}
    fresh.forEach(nudgeOne);R();const skipped=od.length-fresh.length;
    say('Reminded '+(p?p.n.split(' ')[0]:s)+' about '+fresh.length+' overdue task'+(fresh.length!=1?'s':'')+(skipped?' · '+skipped+' already nudged':''));};
  /* Stage 1 of the supply two-stage: the requester's Sr. Manager approves. This no longer creates a
     procurement task or deletes the request — it moves the request to stage='approved' and stamps the
     configured supply recipient (routing_rules kind='supply') onto it, so the request now surfaces on
     THAT person's dashboard to fulfil (stage 2 = fulfilReq). */
  const approveReq=i=>{if(previewing){say("You're previewing — switch back to approve for real");return;}
    const r=requests[i];if(!r||r.kind!=='request')return;
    if(!(role==='admin'||role==='mgmt'||supplyApproverId(r)===viewer.id)){say('Only the requester’s Sr. Manager can approve this');return;}
    const rid=supplyRecipientId();const rec=rid?byId(rid):null;
    r.stage='approved';r.target_staff_id=rid||null;R();
    updateRequestRow(r).catch(console.error);
    say('Request approved · routed to '+(rec?rec.n:'the supply recipient')+' to fulfil');};
  /* Stage 2: the configured supply recipient fulfils — turns it into a procurement task on their own
     list and clears the request. */
  const fulfilReq=i=>{if(previewing){say("You're previewing — switch back to fulfil for real");return;}
    const r=requests[i];if(!r||r.kind!=='request')return;
    const rec=r.target_staff_id?byId(r.target_staff_id):null;
    const d=new Date(TODAY);d.setDate(d.getDate()+4);
    const nt={t:r.t,who:rec?rec.s:r.from,type:'purchase',bucket:'accounts',prio:'med',date:iso(d),status:'open',ticket:r.ticket,requestedAt:r.date,files:r.files,
      note:'Approved supply request from '+(byShort(r.from)||{}).n+(r.note?' — “'+r.note+'”':''),origin:'request'};
    tasks.unshift(nt);
    requests.splice(i,1);R();
    saveTask(nt).catch(console.error);deleteRequestRow(r).catch(console.error);
    say('Marked for procurement · added to '+(rec?rec.n.split(' ')[0]+'’s':'your')+' task list');};
  const declineReq=i=>{if(previewing){say("You're previewing — switch back to decide for real");return;}
    const r=requests[i];if(!r)return;
    r.declined_at=new Date().toISOString();r.declined_by=viewer.id;R();
    declineRequestRow(r).catch(console.error);
    say((r.kind==='issue'?'Report':'Request')+' declined — '+(byShort(r.from)||{n:r.from}).n.split(' ')[0]+' will be notified');};
  const assignIssue=(i,who)=>{if(previewing){say("You're previewing — switch back to assign for real");return;}
    const r=requests[i];if(!r||!who)return;
    const d=new Date(TODAY);d.setDate(d.getDate()+1);
    const nt={t:r.t,who,type:'repair',bucket:'maintenance',prio:'high',date:iso(d),status:'open',ticket:r.ticket,requestedAt:r.date,
      note:'Reported by '+(byShort(r.from)||{}).n+(r.note?' — “'+r.note+'”':''),origin:'issue',files:r.files};
    tasks.unshift(nt);
    requests.splice(i,1);R();
    saveTask(nt).catch(console.error);deleteRequestRow(r).catch(console.error);
    say('Report assigned to '+byShort(who).n+' · notified in TeamFlow');};
  const approveExt=i=>{if(previewing){say("You're previewing — switch back to approve for real");return;}
    const t=tasks[i];if(!t||!t.extReq)return;
    if(!canApprove(t.who,t)){say('Only the person who assigned this can approve it');return;}
    t.date=t.extReq.newDate;delete t.extReq;R();
    saveTask(t).catch(console.error);
    notifyEvent(t.id,viewer.id,'approved the extension — new due '+fmtDate(t.date),concernedFor(t,viewer.s));
    say('Extension approved — new due date '+fmtDate(t.date)+' · assignee notified');};
  const rejectExt=i=>{if(previewing){say("You're previewing — switch back to decide for real");return;}
    const t=tasks[i];if(!t||!t.extReq)return;
    if(!canApprove(t.who,t)){say('Only the person who assigned this can decide it');return;}
    delete t.extReq;R();
    saveTask(t).catch(console.error);
    notifyEvent(t.id,viewer.id,'rejected the extension request',concernedFor(t,viewer.s));
    say('Extension rejected — original due date stands');};
  const approveCompletion=i=>{if(previewing){say("You're previewing — switch back to approve for real");return;}
    const t=tasks[i];if(!t||!t.completionPending)return;
    if(!canApprove(t.who,t)){say('Only the person who assigned this can approve it');return;}
    delete t.completionPending;
    const nd=completeTask(t);
    persistComplete(t,nd);R();
    notifyEvent(t.id,viewer.id,'approved completion',concernedFor(t,viewer.s));
    say(nd?'Completion approved · next '+RECURS[t.recur].toLowerCase()+' occurrence '+fmtDate(nd):'Completion approved — task closed');};
  const rejectCompletion=i=>{if(previewing){say("You're previewing — switch back to decide for real");return;}
    const t=tasks[i];if(!t||!t.completionPending)return;
    if(!canApprove(t.who,t)){say('Only the person who assigned this can decide it');return;}
    delete t.completionPending;t.doneBy=[];R();
    saveTask(t).catch(console.error);
    notifyEvent(t.id,viewer.id,'rejected completion — sent back for rework',concernedFor(t,viewer.s));
    say('Completion rejected — sent back to '+(byShort(t.who)||{n:t.who}).n.split(' ')[0]);};

  /* opening a notification always jumps to the real signed-in user's own task list, regardless of
     whatever role "Preview As" is currently simulating — the notification IS theirs (RLS-scoped) */
  const openNotif=n=>{markNotifRead(n).catch(console.error);n.read_at=new Date().toISOString();R();
    const idx=tasks.findIndex(x=>x.id===n.task_id);setView('tasks');if(idx>=0)setDrawerIdx(idx);};
  const markAllNotifsSeen=()=>{const unread=notifs.filter(n=>!n.read_at);
    if(!unread.length)return;markAllNotifsRead(unread).catch(console.error);
    unread.forEach(n=>{n.read_at=new Date().toISOString();});R();};

  function exportCSV(kind){
    if(kind==='tasks'){
      const rows=[['Task','Department','Task department','Priority','Repeats','Assignee','Assigned by','Issued','Due','Status','Overdue','Note']];
      tasks.filter(t=>inScope(t,shorts)).forEach(t=>rows.push([t.t,(byShort(t.who)||{}).dept||'',BUCKETS[t.bucket]||'',PRIOS[t.prio||'med'].l,t.recur?recurLabel(t.recur,t.recurOn):'',
        assignees(t).map(a=>(byShort(a)||{n:a}).n).join(' + '),t.instructedBy||(t.selfAssigned?'Self':'—'),dmyTs(t.issued),dmy(t.date)+(t.time?' '+fmtTime(t.time):''),ST[t.status].l,isOverdue(t)?'Yes':'No',t.note||'']));
      csvDownload(iso(new Date())+'-teamflow-tasks.csv',rows);say('Tasks exported (CSV)');
    }else{
      const load=workloadMap();const rows=[['Employee','Department','Role','Open','Overdue','Done']];
      scope.forEach(p=>{const tt=tasks.filter(t=>hasWho(t,p.s));
        rows.push([p.n,p.dept,p.role,load[p.s],tt.filter(isOverdue).length,tt.filter(t=>t.status==='done').length]);});

  function printReport(repWho,repBucket){
    repBucket=repBucket||'all';
    const list=tasks.filter(t=>inScope(t,shorts)&&(repBucket==='all'||t.bucket===repBucket)&&(repWho==='all'||hasWho(t,repWho)));

    b+='<table style="width:100%;border-collapse:collapse;font-size:12px;table-layout:fixed">'+TASK_PRINT_COLGROUP+TASK_PRINT_HEAD+'<tbody>';
    list.forEach(t=>{b+=taskPrintRow(t);});

  }
  /* Real landscape team-report PDF (Download PDF on the Reports view) — same scope/donut as
     printReport, but built with autoTable so no straddling row is ever dropped. */

    repBucket=repBucket||'all';

    const sub='Prepared for '+viewer.n+' ('+viewer.role+') · '+new Date().toDateString()+' · '+list.length+' tasks'+(repBucket==='all'?'':' · department: '+BUCKETS[repBucket])+(repWho==='all'?'':' · staff: '+(byShort(repWho)||{}).n);
    downloadTablePdf('team-report',{orgName:orgName(),title:'TeamFlow — Team Report',subtitle:sub,donutSegs:deliveryStats(list)},TASK_PDF_COLS,list.map(taskPdfRow),TASK_PDF_COLW)
      .catch(e=>{console.error(e);say('Could not build the PDF — check your connection and try again');});
  }

  const ctx={role,view,setView,say,R,scope,shorts,viewer,treeRoot,mine,canApprove,canAssignIssue,viewerIsRecipient,supplyApproverId,bossChain,instructors,previewing,syncTick,
    remindPerson,nudgeTask,nudgeMany,approveReq,fulfilReq,declineReq,assignIssue,approveExt,rejectExt,approveCompletion,rejectCompletion,
    setDrawerIdx,setModal,setDailyReport,setResetTarget,setPersonTasks,exportCSV,printReport,reportPdf,qReqs,qExts,qCompletions,attentionList,
    notifs,openNotif,markAllNotifsSeen,lastCronRun,activityLog,realSelfId:(myStaff&&myStaff.id)||null,
    /* record an in-app admin action: unshift to the local list for instant display + persist via
       shared logAdmin (actor = the REAL signed-in staff, so it satisfies the INSERT RLS check). */
    logAdmin:(action,targetName,detail)=>{const actor=(myStaff&&myStaff.id)||null;
      activityLog.unshift({id:'local-'+Date.now(),actor_staff_id:actor,action,target_name:targetName||null,detail:detail||null,created_at:new Date().toISOString()});
      logAdmin(actor,action,targetName,detail);}};

      </div>
