        {myRoleKey==='admin'&&role==='admin'?<span className="org-edit-dept" title="Rename organisation" role="button"
          onClick={()=>{setOrgDraft(ORG_NAME);setOrgEdit(true);}}>✎</span>:null}
      </div>}
      {[['dashboard','grid','Dashboard','1'],['tasks','checkc','Tasks','2'],['checklists','checkc','Checklists','3'],['calendar','cal','Calendar','4'],['people','users','People & roles','5'],['reports','chart','Reports','6']].map(([v,ic,l,k])=>
        <button key={v} className={'navitem'+(view===v?' on':'')} onClick={()=>setView(v)}>
          {NAV_ICONS[v]?<span style={{fontSize:16,width:18,textAlign:'center'}}>{NAV_ICONS[v]}</span>:<I n={ic}/>}<span className="lb">{navLabel(v,l)}</span><span className="kbd">{k}</span></button>)}
      {/* Reports & requests tracker — org-wide oversight of every maintenance report + supply request.

      {(role==='mgmt'||role==='admin')?<button className={'navitem'+(view==='tracker'?' on':'')} onClick={()=>setView('tracker')}>
        {NAV_ICONS.tracker?<span style={{fontSize:16,width:18,textAlign:'center'}}>{NAV_ICONS.tracker}</span>:<I n="inbox"/>}<span className="lb">{navLabel('tracker','Reports & requests')}</span><span className="kbd">7</span></button>:null}

      {myRoleKey==='admin'?<button className={'navitem'+(view==='settings'?' on':'')} onClick={()=>setView('settings')}>

      <div className="side-foot">

/* ============ topbar + search ============ */
function Topbar({ctx,searchRef}){
  const [q,setQ]=useState('');
  const [bellOpen,setBellOpen]=useState(false);
  const unread=ctx.notifs.filter(n=>!n.read_at);
  // same composition as QueuePanel's own "N waiting" count (ctx.qReqs/qExts/qCompletions are the
  // exact same live arrays QueuePanel renders) — folded into the bell badge so the two numbers can
  // never disagree.
  const queueN=ctx.qReqs.length+ctx.qExts.length+ctx.qCompletions.length;
  const badgeN=unread.length+queueN;
  /* close the notifications dropdown when you click anywhere outside it (or the bell button) */
  const bellRef=useRef();
  useEffect(()=>{if(!bellOpen)return;
    const onDown=e=>{if(bellRef.current&&!bellRef.current.contains(e.target))setBellOpen(false);};
    document.addEventListener('mousedown',onDown);
    return()=>document.removeEventListener('mousedown',onDown);
  },[bellOpen]);
  const TITLES={dashboard:"Dashboard",tasks:"Tasks",calendar:"Team calendar",people:"People & roles",reports:"Reports",tracker:"Reports & requests"};
  const ql=q.trim().toLowerCase();
  const tHits=ql?tasks.map((t,i)=>({t,i})).filter(o=>inScope(o.t,ctx.shorts)&&(o.t.t.toLowerCase().includes(ql)||assignees(o.t).some(a=>byShort(a)&&byShort(a).n.toLowerCase().includes(ql)))).slice(0,5):[];
  const pHits=ql?ctx.scope.filter(p=>p.n.toLowerCase().includes(ql)||p.dept.toLowerCase().includes(ql)).slice(0,4):[];
  /* "is check-due-tasks actually running?" health signal — see cron_runs migration for why this
     reads a dedicated table instead of task_notifications (which is per-recipient RLS-scoped and
     often empty even on a day the cron ran fine). admin/mgmt only — everyone else's query for
     cron_runs comes back empty via RLS, so ctx.lastCronRun is always null for them anyway; the role
     check here just avoids showing a misleading "no runs" for people who can't see the table. */
  const cronStatus=(ctx.role==='admin'||ctx.role==='mgmt')?
    (ctx.lastCronRun?{ok:true,text:'Cron last ran '+new Date(ctx.lastCronRun.ran_at).toLocaleString('en',{day:'numeric',month:'short',hour:'numeric',minute:'2-digit'})+' · '+ctx.lastCronRun.overdue_count+' overdue, '+ctx.lastCronRun.due_today_count+' due today'}
      :{ok:false,text:'Cron: no runs recorded yet'})
    :null;
  // Bell dropdown item markup, shared by both the "Needs attention" (overdue/due-today,
  // source!=='activity') and "Activity" (job-log-ping, source==='activity') groups below —
  // grouping is just two labeled slices of the same already recency-sorted ctx.notifs list.
  const notifItem=n=>{
    const t=tasks.find(x=>x.id===n.task_id);
    const isAct=n.source==='activity',isCl=n.source==='checklist';
    const entry=isAct&&n.task_log_id&&t&&t.log?t.log.find(x=>x.id===n.task_log_id):null;
    const desc=entry?'“'+(entry.text.length>60?entry.text.slice(0,60)+'…':entry.text)+'” · ':n.label?n.label+' · ':'';
    const clTitle=n.kind==='checklist_missed'?(byId2Name(n.subject_id)||'Someone')+' — checklist not completed':'Your checklist for today';
    const clMsg=n.kind==='checklist_missed'?'Completed '+n.done_count+'/'+n.total_count+' · '+fmtDate(n.for_date):n.total_count+' item'+(n.total_count!=1?'s':'')+' today'+(n.done_count?' · '+n.done_count+' done':'');
    const bg=isCl?(n.kind==='checklist_missed'?'var(--red)':'var(--accent)'):isAct?'var(--accent)':n.kind==='overdue'?'var(--red)':'var(--amber)';
    return <div key={n.source+n.id} className="sd-item" style={{opacity:n.read_at?0.55:1}} onClick={()=>{setBellOpen(false);if(isCl){ctx.setView('checklists');markNotifRead(n).catch(()=>{});n.read_at=new Date().toISOString();ctx.R();}else ctx.openNotif(n);}}>
      <span className="avex" style={{background:bg,color:'#fff'}}>{isCl?'☑':isAct?'✎':n.kind==='overdue'?'!':'•'}</span>
      <div><div className="t">{isCl?clTitle:isAct?(byId2Name(n.actor_staff_id)||'Someone')+' updated “'+(t?t.t:'a task')+'”':(t?t.t:'(task removed)')}</div>
        <div className="m">{isCl?clMsg:isAct?desc+fmtDateTime(n.created_at):(n.kind==='overdue'?'Overdue':'Due today')+' · '+fmtDate(n.for_date)}</div></div>
    </div>;
  };
  // "Needs your approval" item — deliberately simpler than notifItem (no read/unread dimming,
  // no per-source routing): just closes the bell and sends the viewer to the Dashboard, where
  // QueuePanel already has the full Approve/Reject/Assign UI for whichever item this is.
  const queueItem=(key,color,title,meta)=>
    <div key={key} className="sd-item" onClick={()=>{setBellOpen(false);ctx.setView('dashboard');}}>
      <span className="avex" style={{background:color,color:'#fff'}}>•</span>
      <div><div className="t">{title}</div><div className="m">{meta}</div></div>
    </div>;
  return <div className="topbar">
    <h1>{TITLES[ctx.view]}</h1>
    {cronStatus?<span className={'chip-s '+(cronStatus.ok?'green':'red')} style={{marginLeft:10}} title="check-due-tasks daily cron health">{cronStatus.text}</span>:null}
    <div className="tb-right">
      <div className="searchwrap">
        <I n="search"/>
        <input ref={searchRef} className="search" placeholder="Search tasks or people…" value={q} onChange={e=>setQ(e.target.value)}/>
        <span className="search-kbd">/</span>
        {ql?<div className="searchdrop">
          {tHits.length?<div className="sd-head">Tasks</div>:null}
          {tHits.map(o=>{const p=byShort(o.t.who);
            return <div key={'t'+o.i} className="sd-item" onClick={()=>{setQ('');ctx.setView('tasks');ctx.setDrawerIdx(o.i);}}>
              <span className="avex">{p?p.av:'?'}</span><div><div className="t">{o.t.t}</div><div className="m">{p?p.n:o.t.who} · {fmtDate(o.t.date)} · {ST[o.t.status].l}</div></div></div>;})}
          {pHits.length?<div className="sd-head">People</div>:null}
          {pHits.map(p=><div key={'p'+p.s} className="sd-item" onClick={()=>{setQ('');ctx.setPersonTasks(p);}}>
            <span className="avex" style={{background:avColor(p.n),color:'#fff'}}>{p.av}</span><div><div className="t">{p.n}</div><div className="m">{roleLabel(p)} · {p.dept}</div></div></div>)}
          {!tHits.length&&!pHits.length?<div className="sd-empty">No matches for “{q}”</div>:null}
        </div>:null}
      </div>
      <div className="searchwrap" ref={bellRef}>
        <button className="btn ghost bell-btn" onClick={()=>setBellOpen(o=>!o)} aria-label="Notifications">
          <I n="bell"/>{badgeN?<span className="bell-badge">{badgeN>9?'9+':badgeN}</span>:null}
        </button>
        {bellOpen?<div className="searchdrop" style={{width:320}}>
          <div className="sd-head" style={{display:'flex',justifyContent:'space-between',alignItems:'center'}}>
            <span>Notifications</span>
            {unread.length?<span style={{cursor:'pointer',textTransform:'none',fontWeight:600,color:'var(--accent-ink)'}} onClick={()=>ctx.markAllNotifsSeen()}>Mark all read</span>:null}
          </div>
          {/* Same title as the Dashboard's own panel, and deliberately not "Needs your approval" —
              ctx.qReqs/qExts/qCompletions is QueuePanel's broader-scope list (everything visible to
              this viewer), not filtered down to only items they personally can act on; QueuePanel
              itself shows "Waiting for X" instead of buttons for the ones that aren't theirs, so the
              bell shouldn't claim otherwise. Not notification rows: no read/unread state, and they
              resolve themselves (vanish next refetch) once approved/rejected/assigned. A tap just
              jumps to the Dashboard where QueuePanel's real Approve/Reject UI already lives, rather
              than duplicating it here. */}
          {queueN?<div className="sd-head">Incoming reports & requests</div>:null}
          {ctx.qCompletions.map(o=>queueItem('qc'+o.i,'var(--green)',o.t.t,(byShort(o.t.who)||{n:o.t.who}).n+' marked this done — needs approval'))}
          {ctx.qExts.map(o=>queueItem('qx'+o.i,'var(--blue)',o.t.t,(byShort(o.t.who)||{n:o.t.who}).n+' asks '+fmtDate(o.t.date)+' → '+fmtDate(o.t.extReq.newDate)))}
          {ctx.qReqs.map(o=>queueItem('qr'+o.i,o.r.kind==='issue'?'var(--amber)':'var(--accent)',
            (o.r.kind==='issue'?'Maintenance issue: ':'Supply request: ')+o.r.t,
            'From '+(byShort(o.r.from)||{n:o.r.from}).n))}
          {/* One list, newest-triggered first — sorted by created_at (the moment the notification fired),
              with for_date as a tie-break/fallback. Was split into "Needs attention" + "Activity" groups,
              which broke a pure time order (an old overdue notice could sit above a fresh activity one). */}
          {ctx.notifs.length?<>
            <div className="sd-head">Recent</div>
            {[...ctx.notifs].sort((a,b)=>{const at=a.created_at||a.for_date||'',bt=b.created_at||b.for_date||'';
              return at<bt?1:at>bt?-1:((a.for_date||'')<(b.for_date||'')?1:-1);}).slice(0,20).map(notifItem)}
          </>:(queueN?null:<div className="sd-empty">No notifications</div>)}
        </div>:null}
      </div>
      <button className="btn ghost" onClick={()=>ctx.setDailyReport(true)}><I n="chart"/>Daily report</button>
      <button className="btn primary" onClick={()=>ctx.setModal(true)}><I n="plus"/>New task</button>
      <div className="av">{ctx.viewer.av}</div>
    </div>
  </div>;
}

/* ============ shared bits ============ */
const Empty=({t,s})=><div className="empty"><I n="inbox"/><div><b>{t}</b><br/>{s}</div></div>;
function TagsFor({t}){
  return <>
    <span className="tag gray">{TYPES[t.type||'work']}</span>
    {t.bucket?<span className="tag blue">{BUCKETS[t.bucket]||t.bucket}</span>:null}
    {t.status!=='open'&&t.status!=='done'?<span className={'tag '+ST[t.status].c}>{ST[t.status].l}</span>:null}
    {t.recur?<span className="tag teal" title={'Repeats '+recurLabel(t.recur,t.recurOn).toLowerCase()+' — next occurrence is created on completion'}>↻ {recurLabel(t.recur,t.recurOn)}</span>:null}
    {t.selfAssigned?<span className="tag green">Self{t.instructedBy?' · per '+t.instructedBy:''}</span>:null}
    {!t.selfAssigned&&t.instructedBy?<span className="tag gray" title={'Assigned by '+t.instructedBy}>↳ {t.instructedBy}</span>:null}
    {t.origin?<span className={'tag '+(t.origin==='issue'?'amber':'blue')}>{t.origin==='issue'?'Reported issue':'Supply request'}</span>:null}
    {(t.log&&t.log.length)||t.note?<span className="tag teal"><I n="note" s={11}/> {t.log?t.log.length:1}</span>:null}
    {t.files&&t.files.length?<span className="tag gray"><I n="clip" s={11}/> {t.files.length}</span>:null}
    {t.extReq?<span className="tag amber"><I n="clock" s={11}/> ext → {fmtDate(t.extReq.newDate)}</span>:null}
    {t.completionPending?<span className="tag amber"><I n="clock" s={11}/> Completion pending approval</span>:null}
  </>;
}
function TaskRow({t,i,ctx,sel,checked,onToggle}){
  const p=byShort(t.who),od=isOverdue(t),dn=t.status==='done';
  return <div className={'trow'+(dn?' done':'')+(sel&&checked?' selrow':'')} onClick={()=>sel?onToggle(i):ctx.setDrawerIdx(i)}>
    {sel?<span className={'rowcb'+(checked?' on':'')} aria-hidden/>:null}
    <div className="body">
      <div className="tt">{t.t}</div>
      <div className="meta">
        <span className="avex">{p?p.av:'?'}</span>{p?p.n:t.who}
        {t.coWho&&t.coWho.length?<span className="tag teal" title={'Jointly with '+t.coWho.map(a=>(byShort(a)||{n:a}).n).join(', ')}>+{t.coWho.length} joint</span>:null}
        {t.coWho&&t.coWho.length&&t.status!=='done'&&(t.doneBy||[]).length?<span className="tag green">✓ {(t.doneBy||[]).length}/{assignees(t).length} · pending {assignees(t).filter(a=>!(t.doneBy||[]).includes(a)).map(a=>(byShort(a)||{n:a}).n.split(' ')[0]).join(', ')}</span>:null}
        {t.reopened?<span className="tag red" title={t.reopened.comment||''}>↻ Reopened</span>:null}
        <TagsFor t={t}/>
      </div>
    </div>
    <span className="priolabel" style={{color:PRIOS[t.prio||'med'].c}} title={PRIOS[t.prio||'med'].l+' priority'}>
      <span className="prio" style={{background:PRIOS[t.prio||'med'].c}}/>{PRIOS[t.prio||'med'].l}
    </span>
    {dn?<span className="duecell"><I n="check"/>Closed</span>
      :od?<span className="duecell over"><I n="alert"/>{fmtDate(t.date)} · {overdueDays(t)}d late</span>
      :isToday(t)?<span className="duecell" style={{color:'var(--amber)'}}><I n="clock"/>Today{t.time?' · '+fmtTime(t.time):''}</span>
      :<span className="duecell"><I n="cal"/>{fmtDate(t.date)}{t.time?' · '+fmtTime(t.time):''}</span>}
  </div>;
}

/* ============ dashboard ============ */
function Bars({rows,pct}){
  if(!rows.length)return <Empty t="No data yet" s="Assign a task to see the chart fill up."/>;
  const max=Math.max(1,...rows.map(r=>r[1]));
  return <>{rows.map(([k,v,vd],ix)=><div className="barrow" key={ix}>
    <div className="k">{k}</div><div className="track"><i style={{width:(v/max*100)+'%',background:vd||undefined}}/></div><div className="v">{pct?v+'%':v}</div></div>)}</>;
}
function Dashboard({ctx,open,over,today,done}){
  const {mine,shorts}=ctx;
  const [loadBucket,setLoadBucket]=useState('all');
  const segs=deliveryStats(mine);
  const segTot=segs.reduce((a,x)=>a+x.v,0);
  const pend=ctx.qReqs.length+ctx.qExts.length+ctx.qCompletions.length;
  const bTot=mine.length||1;
  const bRows=Object.keys(BUCKETS).map(k=>({k,c:mine.filter(t=>t.bucket===k).length})).filter(o=>o.c).sort((a,b)=>b.c-a.c);
  const wStaff=ctx.scope.filter(p=>inDept(p,loadBucket));
  const wCnt=p=>tasks.filter(t=>hasWho(t,p.s)&&t.status!=='done'&&(loadBucket==='all'||t.bucket===loadBucket)).length;
  const wRows=wStaff.map(p=>({p,l:wCnt(p)})).sort((a,b)=>b.l-a.l);
  const wMax=Math.max(1,...wRows.map(o=>o.l));
  const ods=tasks.map((t,i)=>({t,i})).filter(o=>inScope(o.t,shorts)&&isOverdue(o.t)).sort((a,b)=>a.t.date<b.t.date?-1:1);
  /* Week-ahead digest — turns reactive overdue-chasing into a weekly habit. "At risk" = due in the next
     7 days AND assigned to someone already behind (has ≥1 overdue task), i.e. likely to slip. */
  const weekEnd=iso(new Date(TODAY.getTime()+7*864e5));
  const dueThisWeek=t=>t.status!=='done'&&t.date&&t.date>=iso(TODAY)&&t.date<weekEnd;
  const behindSet=new Set(tasks.filter(t=>inScope(t,shorts)&&isOverdue(t)).flatMap(t=>assignees(t).filter(Boolean)));
  const atRiskPred=t=>dueThisWeek(t)&&assignees(t).some(a=>behindSet.has(a));
  const weekRows=tasks.map((t,i)=>({t,i})).filter(o=>inScope(o.t,shorts)&&dueThisWeek(o.t));
  const atRisk=weekRows.filter(o=>atRiskPred(o.t)).sort((a,b)=>a.t.date<b.t.date?-1:1);
  const attn=ctx.attentionList().slice(0,4);
  const attnColors=['var(--red)','var(--amber)','var(--accent)','var(--blue)'];
  /* Things I raised — open requests still in `requests` (mine) + the ones already actioned into tasks
     (matched back to me via the "Reported by <name>" note). So a requester sees their own ticket +
     live status without needing the Management-only tracker. */
  const myItems=[
    ...requests.filter(r=>r.from===ctx.viewer.s).map(r=>({req:r,ticket:r.ticket,item:r.t,kind:r.kind,date:r.date})),
    ...tasks.filter(t=>(t.origin==='issue'||t.origin==='request')&&reporterFromNote(t.note)===ctx.viewer.n)
      .map(t=>({task:t,ticket:t.ticket,item:t.t,kind:t.origin,date:t.issued||t.date}))
  ].sort((a,b)=>(''+(b.date||'')).localeCompare(''+(a.date||'')));
  const [kpiPop,setKpiPop]=useState(null); // {title,pred} — resolved to rows at render so realtime refetches stay live
  const kpiRows=pred=>tasks.map((t,i)=>({t,i})).filter(o=>inScope(o.t,shorts)&&pred(o.t));
  const KP=[['Open tasks',open,'var(--accent)','var(--accent-soft)','checkc',100,t=>t.status!=='done'],
    ['Overdue',over,'var(--red)','var(--red-soft)','alert',open?over/open*100:0,isOverdue],
    ['Due today',today,'var(--amber)','var(--amber-soft)','clock',open?today/open*100:0,isToday],
    ['Completed',done,'var(--green)','var(--green-soft)','check',100,t=>t.status==='done']];
  const pIss=ctx.qReqs.filter(o=>o.r.kind==='issue').length;
  const pApp=ctx.qReqs.filter(o=>o.r.kind==='request').length+ctx.qExts.length+ctx.qCompletions.length;
  return <div className="view">
    <div className="kpis">
      {KP.map(([l,n,c,cs,ic,p,pred])=><div className="kpi" key={l} style={{cursor:'pointer'}} title={'Review the tasks behind this number'}
        onClick={()=>setKpiPop({title:l,pred})}>
        <div className="top"><span className="l">{l}</span><span className="ic" style={{background:cs,color:c}}><I n={ic}/></span></div>
        <div className="n" style={{color:c}}>{n}</div><div className="bar"><i style={{width:Math.max(6,p)+'%',background:c}}/></div></div>)}
      <div className="kpi" style={{cursor:'pointer',borderColor:pend?'var(--amber)':undefined}} title="Jump to the queue"
        onClick={()=>{const el=document.getElementById('dashReq');el&&el.scrollIntoView({behavior:'smooth',block:'center'});}}>
        <div className="top"><span className="l">Waiting in queue</span><span className="ic" style={{background:'var(--amber-soft)',color:'var(--amber)'}}><I n="tool"/>{pend?<span className="pulsedot"/>:null}</span></div>
        <div className="n" style={{color:pend?'var(--amber)':'var(--green)'}}>{pend}</div>
        <div className="l" style={{marginTop:4}}>{pIss} to assign · {pApp} to approve</div>
      </div>
    </div>
    {kpiPop?<TaskListModal ctx={ctx} title={kpiPop.title} rows={kpiRows(kpiPop.pred)} close={()=>setKpiPop(null)}/>:null}
    <div className="grid2">
      <div>
        <div className="panel">
          <div className="h-row"><h3>Delivery performance</h3><span className="tag gray">{segTot?Math.round(segs[0].v/segTot*100)+'% on time':'no data'}</span></div>
          <div style={{display:'flex',gap:24,alignItems:'center',flexWrap:'wrap'}}>
            <div dangerouslySetInnerHTML={{__html:donutSVG(segs,132,22)}}/>
            <div style={{flex:1,minWidth:190}}>
              {segs.map(x=>{const tot=segTot||1;return <div className="leg" key={x.l}><span className="dot2" style={{background:x.c}}/>{x.l}<b>{x.v} · {Math.round(x.v/tot*100)}%</b></div>;})}
            </div>
          </div>
        </div>
        <div className="panel">
          <div className="h-row"><h3>Tasks by department</h3><span className="tag gray">% of all tasks</span></div>
          <Bars pct rows={bRows.map(o=>[BUCKETS[o.k],Math.round(o.c/bTot*100)])}/>
        </div>
        <div className="panel">
          <div className="h-row"><h3>Team workload</h3>
            <select className="fsel" style={{padding:'6px 10px',fontSize:12.5}} value={loadBucket} onChange={e=>setLoadBucket(e.target.value)}>
              <option value="all">All departments</option>
              {realDeptKeys(ctx.scope).map(k=><option key={k} value={k}>{BUCKETS[k]}</option>)}
            </select></div>
          <div className="scrollbox">
            {wRows.map(o=>{const c=o.l>=3?'var(--red)':o.l===2?'var(--amber)':'var(--green)';
              return <div className="barrow" key={o.p.s}><div className="k">{o.p.n}</div>
                <div className="track"><i style={{width:(o.l?Math.max(4,o.l/wMax*100):0)+'%',background:c}}/></div><div className="v">{o.l}</div></div>;})}
          </div>
        </div>
      </div>
      <div>
        {myItems.length?<div className="panel">
          <div className="h-row"><h3><I n="inbox" c="var(--accent-ink)"/>Your reports &amp; requests</h3><span className="tag gray">{myItems.length}</span></div>
          {myItems.slice(0,5).map((x,ix)=>{const st=myReqStatus(x);return <div className="attn" key={ix}>
            <div style={{flex:1,minWidth:0}}>
              <div className="nm">{x.ticket?<b style={{color:'var(--accent-ink)'}}>#{x.ticket} </b>:null}{x.kind==='issue'?'🔧 ':'📦 '}{x.item}</div>
              <div className="rs"><span style={{display:'inline-block',width:8,height:8,borderRadius:'50%',background:st.dot,marginRight:6,verticalAlign:'middle'}}/>{st.text}</div>
            </div></div>;})}
          {myItems.length>5?<div className="whysm" style={{marginTop:6}}>+{myItems.length-5} more</div>:null}
        </div>:null}
        <QueuePanel ctx={ctx}/>
        {/* Week-ahead digest: a Monday-review summary that adds a predictive "at risk" signal (due this
            week + assignee already behind) on top of the current overdue/attention panels. */}
        <div className="panel">
          <div className="h-row"><h3><I n="clock" c="var(--accent-ink)"/>This week · at a glance</h3><span className="tag gray">Mon review</span></div>
          <div style={{display:'flex',gap:8,margin:'2px 0 12px',flexWrap:'wrap'}}>
            <span className="chip-s red" style={{cursor:'pointer'}} title="Review overdue" onClick={()=>setKpiPop({title:'Overdue',pred:isOverdue})}>{over} overdue</span>
            <span className="chip-s amber" style={{cursor:'pointer'}} title="Due in the next 7 days" onClick={()=>setKpiPop({title:'Due this week',pred:dueThisWeek})}>{weekRows.length} due this week</span>
            <span className="chip-s" style={{cursor:'pointer',background:'#fbe6cf',color:'#8a5316',border:'1px solid #f0c98f'}} title="Due this week and assigned to someone already behind" onClick={()=>setKpiPop({title:'At risk this week',pred:atRiskPred})}>{atRisk.length} at risk</span>
          </div>
          {atRisk.length?atRisk.slice(0,4).map(o=>{const p=byShort(o.t.who);
            return <div className="attn" key={o.i}>
              <div className="ring" style={{background:'var(--amber)'}}>{p?p.av:'?'}</div>
              <div style={{flex:1,minWidth:0}}><div className="nm">{o.t.t}</div><div className="rs">{p?p.n:o.t.who} · due {fmtDate(o.t.date)} · behind on other work</div></div>
              <div className="act"><button className="linkbtn" onClick={()=>ctx.setDrawerIdx(o.i)}>Open</button></div></div>;})
          :<div className="whysm" style={{padding:'6px 2px'}}>No one behind is due this week — you’re ahead. 🎉</div>}
          {atRisk.length>4?<button className="linkbtn" style={{marginTop:6}} onClick={()=>setKpiPop({title:'At risk this week',pred:atRiskPred})}>View all {atRisk.length} at risk →</button>:null}
        </div>
        <div className="panel">
          <div className="h-row"><h3><I n="spark" c="var(--accent-ink)"/>Who needs attention</h3><span className="tag green">FREE · LIVE</span></div>
          {attn.length?attn.map((x,ix)=><div className="attn" key={x.p.s}>
            <div className="ring" style={{background:attnColors[ix%4]}}>{x.p.av}</div>
            <div><div className="nm" style={{cursor:'pointer'}} title="View pending tasks" onClick={()=>ctx.setPersonTasks(x.p)}>{x.p.n}</div><div className="rs">{x.reason} · {x.p.dept}</div></div>
            <div className="act"><button className="linkbtn" onClick={()=>ctx.remindPerson(x.p.s)}>Remind</button></div></div>)
          :<Empty t="Everyone is on track" s="No overdue work or overloaded people right now."/>}
        </div>
        <div className="panel">
          <div className="h-row"><h3><I n="alert" c="var(--red)"/>Overdue — act now</h3>
            <div style={{display:'flex',gap:8,alignItems:'center'}}>
              {ods.length&&!ctx.previewing?<button className="btn soft" style={{padding:'4px 10px',fontSize:12}} title="Send an in-app reminder to everyone with an overdue task" onClick={()=>ctx.nudgeMany(ods.map(o=>o.t))}><I n="bell" s={14}/>Nudge all</button>:null}
              <span className="tag red">{ods.length?ods.length+' late':'clear'}</span></div></div>
          {ods.length?ods.slice(0,4).map(o=>{const p=byShort(o.t.who);
            return <div className="attn" key={o.i}>
              <div className="ring" style={{background:'var(--red)'}}>{p?p.av:'?'}</div>
              <div style={{flex:1,minWidth:0}}><div className="nm">{o.t.t}</div><div className="rs">{p?p.n:o.t.who} · {overdueDays(o.t)} day{overdueDays(o.t)!=1?'s':''} late · was due {fmtDate(o.t.date)}{o.t.lastNudgedAt?<span style={{color:'var(--accent-ink)'}}> · 🔔 nudged {nudgedAgo(o.t.lastNudgedAt)}</span>:null}</div></div>
              <div className="act"><button className="linkbtn" onClick={()=>ctx.nudgeTask(o.t)}>Remind</button>
              <button className="linkbtn" onClick={()=>ctx.setDrawerIdx(o.i)}>Open</button></div></div>;})
          :<Empty t="Nothing overdue" s="All work is on schedule."/>}
          {ods.length>4?<button className="linkbtn" style={{marginTop:6}} onClick={()=>setKpiPop({title:'Overdue',pred:isOverdue})}>View all {ods.length} overdue →</button>:null}
        </div>
      </div>
    </div>
  </div>;
}

function QueuePanel({ctx}){
  const [sel,setSel]=useState({});
  const total=ctx.qReqs.length+ctx.qExts.length+ctx.qCompletions.length;
  return <div className="panel" id="dashReq">
    <div className="h-row"><h3><I n="tool" c="var(--amber)"/>Incoming reports & requests</h3><span className="tag amber">{total?total+' waiting':'clear'}</span></div>
    {total?<>
      {ctx.qCompletions.map(o=>{const t=o.t,p=byShort(t.who),can=ctx.canApprove(t.who,t),
        approver=t.instructedBy?t.instructedBy.split(' ')[0]+' (assigned by)':(p&&p.boss?p.boss.split(' ')[0]+' (dept boss)':'—');
        return <div className="attn" key={'c'+o.i}>
          <div className="ring" style={{background:'var(--green)'}}><I n="check" c="#fff"/></div>
          <div style={{flex:1,minWidth:0,cursor:'pointer'}} onClick={()=>ctx.setDrawerIdx(o.i)} title="Open task to review before deciding">
            <div className="nm">{t.t} <span className="tag green">Completion</span></div>
            <div className="rs">{p?p.n:t.who} marked this done{t.instructedBy?' · assigned by '+t.instructedBy:''} · approver: {approver}</div></div>
          <div className="act">{can?<><button className="linkbtn" onClick={()=>ctx.approveCompletion(o.i)}>Approve</button>
            <button className="linkbtn mut" onClick={()=>ctx.rejectCompletion(o.i)}>Reject</button></>
            :<span className="rs" style={{whiteSpace:'nowrap'}}>Waiting for {t.instructedBy?t.instructedBy.split(' ')[0]:(p&&p.boss?p.boss.split(' ')[0]:'manager')}</span>}</div>
        </div>;})}
      {ctx.qExts.map(o=>{const t=o.t,p=byShort(t.who),can=ctx.canApprove(t.who,t);
        return <div className="attn" key={'e'+o.i}>
          <div className="ring" style={{background:'var(--blue)'}}><I n="clock" c="#fff"/></div>
          <div style={{flex:1,minWidth:0,cursor:'pointer'}} onClick={()=>ctx.setDrawerIdx(o.i)} title="Open task to review before deciding">
            <div className="nm">{t.t} <span className="tag blue">Extension</span></div>
            <div className="rs">{p?p.n:t.who} asks {fmtDate(t.date)} → <b>{fmtDate(t.extReq.newDate)}</b>{t.extReq.reason?' · “'+t.extReq.reason+'”':''} · approver: {t.instructedBy?t.instructedBy.split(' ')[0]+' (assigned by)':(p&&p.boss?p.boss.split(' ')[0]+' (dept boss)':'—')}</div></div>
          <div className="act">{can?<><button className="linkbtn" onClick={()=>ctx.approveExt(o.i)}>Approve</button>
            <button className="linkbtn mut" onClick={()=>ctx.rejectExt(o.i)}>Reject</button></>
            :<span className="rs" style={{whiteSpace:'nowrap'}}>Waiting for {t.instructedBy?t.instructedBy.split(' ')[0]:(p&&p.boss?p.boss.split(' ')[0]:'manager')}</span>}</div>
        </div>;})}
      {ctx.qReqs.map(o=>{const r=o.r,p=byShort(r.from);
        if(r.kind==='issue'){
          // Recipient-based routing: the configured recipient of this report (its category's current
          // recipient, live-resolved) receives it and picks a fixer. The fixer pool is the recipient's
          // own department (they staff the repair); fall back to Maintenance if unresolved.
          const rec=byId(issueRecipientId(r));
          const poolDept=rec?rec.dept:'Maintenance';
          const can=ctx.canAssignIssue(r);
          const pool=STAFF.filter(x=>x.dept===poolDept);
          const rawSug=poolDept==='Maintenance'?suggestFixer(r.t):null;
          const sug=(rawSug&&pool.some(x=>x.s===rawSug.s))?rawSug
            :(pool.length?{s:pool.slice().sort((a,b)=>workloadMap()[a.s]-workloadMap()[b.s])[0].s,why:'lightest workload'}:null);
          const cur=sel[o.i]||(sug?sug.s:pool[0]&&pool[0].s);
          return <div className="attn" key={'r'+o.i}>
            <div className="ring" style={{background:'var(--amber)'}}><I n="tool" c="#fff"/></div>
            <div style={{flex:1,minWidth:0}}>
              <div className="nm">{r.t} <span className="tag amber">Report</span></div>
              <div className="rs">From {p?p.n:r.from} · {fmtDate(r.date)}{r.note?' · “'+r.note+'”':''} · routed to {rec?rec.n.split(' ')[0]:'—'}{rec?' ('+rec.dept+')':''}</div>
              {r.files&&r.files.length?<div className="filelist">{r.files.map((x,ix)=><FileChip key={ix} x={x}/>)}</div>:null}
              {can?<>
                <div className="rs" style={{marginTop:6,color:'var(--accent-ink)'}}>✦ Suggested: <b>{sug?byShort(sug.s).n:'—'}</b>{sug?' — '+sug.why:''}</div>
                <div style={{display:'flex',gap:8,marginTop:7,alignItems:'center'}}>
                  <select className="fsel" style={{padding:'6px 9px',fontSize:12.5}} value={cur} onChange={e=>setSel({...sel,[o.i]:e.target.value})}>
                    {pool.map(x=><option key={x.s} value={x.s}>{x.n}</option>)}
                  </select>
                  <button className="linkbtn" onClick={()=>ctx.assignIssue(o.i,cur)}>Assign →</button>
                </div></>
                :<div className="rs" style={{marginTop:4}}>Waiting for {rec?rec.n.split(' ')[0]:'the recipient'} to assign</div>}
            </div>
          </div>;
        }
        // Supply request — two-stage. Stage 1 (pending): the requester's Sr. Manager approves/declines.
        // Stage 2 (approved): the configured supply recipient fulfils.
        const approver=byId(ctx.supplyApproverId(r));
        if(r.stage==='approved'){
          const rec=r.target_staff_id?byId(r.target_staff_id):null;
          const canFulfil=ctx.role==='admin'||ctx.role==='mgmt'||ctx.viewer.id===r.target_staff_id;
          return <div className="attn" key={'r'+o.i}>
            <div className="ring" style={{background:'var(--accent)'}}><I n="box" c="#fff"/></div>
            <div style={{flex:1,minWidth:0}}>
              <div className="nm">{r.t} <span className="tag teal">Approved supply</span></div>
              <div className="rs">From {p?p.n:r.from} · {fmtDate(r.date)}{r.note?' · “'+r.note+'”':''} · to fulfil: {rec?rec.n.split(' ')[0]:'—'}</div></div>
            <div className="act">{canFulfil?<><button className="linkbtn" onClick={()=>ctx.fulfilReq(o.i)}>Mark for procurement</button>
              <button className="linkbtn mut" onClick={()=>ctx.declineReq(o.i)}>Decline</button></>
              :<span className="rs" style={{whiteSpace:'nowrap'}}>Waiting for {rec?rec.n.split(' ')[0]:'recipient'}</span>}</div>
          </div>;
        }
        const canApproveReq=ctx.role==='admin'||ctx.role==='mgmt'||(approver&&ctx.viewer.id===approver.id);
        return <div className="attn" key={'r'+o.i}>
          <div className="ring" style={{background:'var(--amber)'}}><I n="box" c="#fff"/></div>
          <div style={{flex:1,minWidth:0}}>
            <div className="nm">{r.t} <span className="tag teal">Supply · awaiting approval</span></div>
            <div className="rs">From {p?p.n:r.from} · {fmtDate(r.date)}{r.note?' · “'+r.note+'”':''} · approver: {approver?approver.n.split(' ')[0]+' · '+roleLabel(approver):'—'}</div></div>
          <div className="act">{canApproveReq?<><button className="linkbtn" onClick={()=>ctx.approveReq(o.i)}>Approve</button>
            <button className="linkbtn mut" onClick={()=>ctx.declineReq(o.i)}>Decline</button></>
            :<span className="rs" style={{whiteSpace:'nowrap'}}>Waiting for {approver?approver.n.split(' ')[0]:'the approver'}</span>}</div>
        </div>;})}
    </>:<Empty t="Queue is clear" s="Supply requests wait here for the requester's Sr. Manager to approve, then route to the configured recipient; maintenance reports go straight to their configured recipient; extensions and completions go to whoever assigned the task."/>}
  </div>;
}

/* ============ Admin Settings — report & request routing ============ */
/* Admin-only. Lets the Administrator map each maintenance category and the single supply recipient to
   ANY staff member. Edits mutate the ROUTING_RULES global optimistically (so the UI reflects the change
   immediately) and persist to routing_rules; RLS enforces Administrator-only writes server-side. */
function StaffSelect({value,onChange}){
  const people=STAFF.slice().sort((a,b)=>a.n.localeCompare(b.n));
  return <select className="fsel" style={{minWidth:210,fontWeight:700}} value={value||''} onChange={e=>onChange(e.target.value||null)}>
    <option value="">— no recipient —</option>
    {people.map(p=><option key={p.id} value={p.id}>{p.n} · {roleLabel(p)}, {p.dept}</option>)}
  </select>;
}
/* Curated emoji set for maintenance/facilities categories — no external picker lib (keeps the app
   self-contained). Click the icon swatch to open a small grid; picking one sets the row's icon. */
const EMOJI_CHOICES=['🔧','🛠️','🏢','💻','🖥️','🖨️','📽️','💡','🔌','⚡','❄️','🔥','🚿','🚽','🚰','💧','🚪','🪟','🪑','🧹','🧯','🚚','🚌','🛗','🪜','🔑','🧰','🪛','🌡️','📦','🍽️','☕','🌳','🪴','📚','🏫','🔒','📞','📷','🎨'];
function EmojiPicker({value,onPick}){
  const [open,setOpen]=useState(false);

    <button type="button" title="Choose an icon" onClick={()=>setOpen(o=>!o)}
      style={{width:36,height:36,borderRadius:10,background:'#f6f5f0',border:'1px solid var(--line)',display:'flex',alignItems:'center',justifyContent:'center',fontSize:18,cursor:'pointer',padding:0}}>{value||'🔧'}</button>
    {open?<><div onClick={()=>setOpen(false)} style={{position:'fixed',inset:0,zIndex:40}}/>
      <div style={{position:'absolute',top:42,left:0,zIndex:41,background:'#fff',border:'1px solid var(--line)',borderRadius:10,boxShadow:'0 6px 24px rgba(0,0,0,.14)',padding:8,width:264,display:'grid',gridTemplateColumns:'repeat(8,1fr)',gap:2}}>
        {EMOJI_CHOICES.map(e=><button key={e} type="button" onClick={()=>{onPick(e);setOpen(false);}}
          style={{border:'none',background:value===e?'var(--accent-soft)':'none',borderRadius:7,fontSize:18,padding:'5px 0',cursor:'pointer',lineHeight:1}}>{e}</button>)}
      </div></>:null}
  </div>;
}
function RouteRow({rule,ctx,onRecipient,onRename,onRemove,onMove,onIcon,canMove}){
  const [editing,setEditing]=useState(false);const [draft,setDraft]=useState(rule.label);
  return <div style={{display:'flex',alignItems:'center',gap:11,padding:12,border:'1px solid var(--line)',borderRadius:11,marginBottom:10,background:'#fff'}}>
    <EmojiPicker value={rule.icon} onPick={onIcon}/>
    <div style={{minWidth:0,flex:'0 1 auto'}}>
      {editing?<input className="fsel" style={{fontWeight:700,padding:'5px 8px'}} value={draft} autoFocus
        onChange={e=>setDraft(e.target.value)}
        onKeyDown={e=>{if(e.key==='Enter'){onRename(draft.trim()||rule.label);setEditing(false);}if(e.key==='Escape'){setDraft(rule.label);setEditing(false);}}}
        onBlur={()=>{onRename(draft.trim()||rule.label);setEditing(false);}}/>
        :<div style={{fontWeight:700,fontSize:13.5}}>{rule.label} <span role="button" title="Rename" onClick={()=>{setDraft(rule.label);setEditing(true);}} style={{cursor:'pointer',color:'var(--muted)',fontSize:12}}>✎</span></div>}
      <div style={{fontSize:11,color:'var(--muted)',marginTop:1}}>Reports of this type route here</div>
    </div>
    <span style={{color:'var(--muted)',fontWeight:800,margin:'0 2px'}}>→</span>
    <div style={{marginLeft:'auto',display:'flex',alignItems:'center',gap:6}}>
      <StaffSelect value={rule.staff_id} onChange={id=>onRecipient(id)}/>
      {canMove?<span style={{display:'flex',flexDirection:'column',lineHeight:.8}}>
        <button className="linkbtn" style={{padding:0,fontSize:11}} title="Move up" onClick={()=>onMove(-1)}>▲</button>
        <button className="linkbtn" style={{padding:0,fontSize:11}} title="Move down" onClick={()=>onMove(1)}>▼</button>
      </span>:null}
      <button className="linkbtn mut" title="Remove" onClick={onRemove} style={{fontSize:15}}>✕</button>
    </div>
  </div>;
}
/* Sidebar nav items (key → default line-icon name → label). Single source of truth for the sidebar
   rendering (emoji override per key) and the Settings "Sidebar icons" picker. */
const NAV_ITEMS=[['dashboard','grid','Dashboard'],['tasks','checkc','Tasks'],['checklists','checkc','Checklists'],['calendar','cal','Calendar'],['people','users','People & roles'],['reports','chart','Reports'],['tracker','inbox','Reports & requests'],['settings','gear','Settings']];
function SettingsView({ctx}){
  const [,setTick]=useState(0);const R=()=>{setTick(t=>t+1);ctx.R();};
  const [sec,setSec]=useState('maint');   // sub-nav section: maint | supply | icons
  const [newLabel,setNewLabel]=useState('');const [newIcon,setNewIcon]=useState('');
  const cats=maintCats();const supply=supplyRule();
  const setRecipient=(rule,staffId)=>{rule.staff_id=staffId;R();saveRuleRecipient(rule.id,staffId).catch(console.error);};
  const rename=(rule,label)=>{if(label===rule.label)return;rule.label=label;R();saveRuleLabel(rule.id,label).catch(console.error);};
  const setIcon=(rule,icon)=>{rule.icon=icon;R();if(!String(rule.id).startsWith('local-'))saveRuleIcon(rule.id,icon).catch(console.error);};
  const setNavIcon=(key,emoji)=>{const nx={...NAV_ICONS};if(emoji)nx[key]=emoji;else delete nx[key];NAV_ICONS=nx;R();saveNavIcons(nx).catch(console.error);};
  /* Rename a sidebar menu item. Store the trimmed word only when it differs from the built-in default;
     a blank or a value equal to the default clears the override (falls back to the default word). */
  const setNavLabel=(key,text,def)=>{const t=String(text||'').trim();const nx={...NAV_LABELS};if(t&&t!==def)nx[key]=t;else delete nx[key];NAV_LABELS=nx;R();saveNavLabels(nx).catch(console.error);};
  const remove=rule=>{const i=ROUTING_RULES.indexOf(rule);if(i>=0)ROUTING_RULES.splice(i,1);R();deleteRule(rule.id).catch(console.error);};
  const addType=()=>{const label=newLabel.trim()||'New maintenance type';
    const local={id:'local-'+Date.now(),kind:'maintenance',label,icon:(newIcon.trim()||'🔧'),staff_id:null,sort_order:cats.length};
    ROUTING_RULES.push(local);setNewLabel('');setNewIcon('');R();
    addMaintRule(label,local.icon).then(d=>{if(d){local.id=d.id;R();}}).catch(console.error);};
  const move=(rule,dir)=>{const arr=maintCats();const i=arr.indexOf(rule);const j=i+dir;if(j<0||j>=arr.length)return;
    const other=arr[j];const a=rule.sort_order,b=other.sort_order;rule.sort_order=b;other.sort_order=a;R();
    saveRuleOrder(rule.id,rule.sort_order).catch(console.error);saveRuleOrder(other.id,other.sort_order).catch(console.error);};
  /* Step 1 · per-department supply approver. One row per distinct staff.department; each persists a
     routing_rules kind='supply_approver' row keyed by that department name (create/update/clear). */
  const supplyOn=supplyEnabled();
  const toggleSupply=()=>{const v=!supplyOn;SUPPLY_ENABLED=v;R();saveSupplyEnabled(v).catch(console.error);};
  const depts=[...new Set(STAFF.map(p=>p.dept).filter(Boolean))].sort((a,b)=>a.localeCompare(b));
  const approverRuleFor=dept=>ROUTING_RULES.find(r=>r.kind==='supply_approver'&&r.label===dept)||null;
  const setApprover=(dept,staffId)=>{
    const rule=approverRuleFor(dept);
    if(rule){rule.staff_id=staffId;R();if(!String(rule.id).startsWith('local-'))saveRuleRecipient(rule.id,staffId).catch(console.error);return;}
    if(!staffId)return; // nothing to persist — an unset dept just falls back to its Sr. Manager
    const local={id:'local-'+Date.now(),kind:'supply_approver',label:dept,icon:'',staff_id:staffId,sort_order:0};
    ROUTING_RULES.push(local);R();
    addApproverRule(dept,staffId).then(d=>{if(d){local.id=d.id;R();}}).catch(console.error);};
  /* Departments section — the org's department vocabulary. Built-ins live in BUCKETS; a removed
     built-in is remembered in org_settings.hidden_departments (rebuilt from the snapshot on load, so
     re-adding restores it). Custom ones live in org_settings.departments. ANY department can be
     removed while nothing uses it (no staff, no Sr. Manager head). "Management" (leadership tier) is
     excluded from this list entirely. */
  const [newDept,setNewDept]=useState('');
  const visibleDeptLabels=[...DEPT_BUILTINS.map(k=>BUILTIN_BUCKETS[k]).filter(l=>l!=='Management'&&!HIDDEN_DEPTS.includes(l)),...CUSTOM_DEPTS];
  const deptStaffCount=lbl=>STAFF.filter(p=>p.dept===lbl).length;
  const addDept=()=>{const l=newDept.trim();if(!l)return;
    // re-adding a removed built-in just un-hides it
    const hiddenMatch=HIDDEN_DEPTS.find(h=>h.toLowerCase()===l.toLowerCase());
    if(hiddenMatch){const nh=HIDDEN_DEPTS.filter(x=>x!==hiddenMatch);applyDeptConfig(CUSTOM_DEPTS,nh);setNewDept('');R();saveHiddenDepts(nh).catch(console.error);ctx.say('Restored “'+hiddenMatch+'”');return;}
    if(Object.values(BUCKETS).some(v=>v.toLowerCase()===l.toLowerCase())){ctx.say('“'+l+'” already exists');return;}
    const nx=[...CUSTOM_DEPTS,l];applyDeptConfig(nx,HIDDEN_DEPTS);setNewDept('');R();saveDepartments(nx).catch(console.error);ctx.say('Added “'+l+'”');};
  const removeDept=lbl=>{
    if(deptStaffCount(lbl)||headOfDept(lbl)){ctx.say('Can’t remove “'+lbl+'” — staff or a head still use it');return;}
    if(isBuiltinDept(lbl)){const nh=[...HIDDEN_DEPTS,lbl];applyDeptConfig(CUSTOM_DEPTS,nh);R();saveHiddenDepts(nh).catch(console.error);}
    else{const nx=CUSTOM_DEPTS.filter(x=>x!==lbl);applyDeptConfig(nx,HIDDEN_DEPTS);R();saveDepartments(nx).catch(console.error);}
    ctx.say('Removed “'+lbl+'”');};
  const deptRow=lbl=>{const h=headOfDept(lbl);const n=deptStaffCount(lbl);const locked=n>0||!!h;
    return <div key={lbl} className="deptset-row">
      <span className="deptset-dot"/>
      <span className="deptset-name">{lbl}</span>
      <span className="deptset-head">{h?h.n.split(' ')[0]:(n?n+' staff':'no head yet')}</span>
      <button className="deptset-rm" disabled={locked} title={locked?'Can’t remove — staff or a head use it':'Remove'} onClick={()=>{if(!locked)removeDept(lbl);}}>✕</button>
    </div>;};
  /* Role titles — the org's per-role pool of alternative names (org_settings.role_titles). Admin adds
     aliases here; each person is then given one in People & roles. Display-only; Administrator excluded
     (it's the system admin). Same mutate-a-fresh-object + save + R() pattern as NAV_ICONS. */
  const TITLE_ROLES=[['Management','Management'],['Director','Director'],['Manager','Sr. Manager'],['Team Lead','Team Lead'],['Team Member','Jr Manager'],['Teacher','Staff']];
  const [titleInputs,setTitleInputs]=useState({});
  const addAlias=role=>{const def=ROLE_DEFAULT_LABEL[role]||role;const v=(titleInputs[role]||'').trim();
    if(!v)return;
    const cur=ROLE_TITLES[role]||[];
    if(v.toLowerCase()===def.toLowerCase()||cur.some(a=>a.toLowerCase()===v.toLowerCase())){ctx.say('“'+v+'” is already a title for '+def);setTitleInputs({...titleInputs,[role]:''});return;}
    const nx={...ROLE_TITLES,[role]:[...cur,v]};ROLE_TITLES=nx;setTitleInputs({...titleInputs,[role]:''});R();saveRoleTitles(nx).catch(console.error);ctx.say('Added “'+v+'” to '+def);};
  const removeAlias=(role,alias)=>{const nx={...ROLE_TITLES,[role]:(ROLE_TITLES[role]||[]).filter(a=>a!==alias)};
    if(!nx[role].length)delete nx[role];ROLE_TITLES=nx;R();saveRoleTitles(nx).catch(console.error);ctx.say('Removed “'+alias+'”');};
  /* Task permissions — per department, which non-admin roles may edit / delete a task (org_settings.
     task_permissions). Role KEYS stored (never 'admin' — Administrators are always allowed). A dept with
     no entry ⇒ admin-only for both. Same mutate-fresh-object + save + R() pattern as NAV_ICONS. */
  const PERM_ROLES=[['mgmt','Management'],['dir','Director'],['srm','Sr. Manager'],['lead','Team Lead'],['jrm','Jr Manager'],['worker','Staff']];
  const togglePerm=(dept,kind,roleKey)=>{
    const cur=TASK_PERMS[dept]||{};const arr=cur[kind]||[];
    const nextArr=arr.includes(roleKey)?arr.filter(r=>r!==roleKey):[...arr,roleKey];
    ctx.logAdmin('task_permissions',dept,{can:kind,role:(PERM_ROLES.find(r=>r[0]===roleKey)||[])[1]||roleKey,allowed:!arr.includes(roleKey)});
    const nextDept={...cur,[kind]:nextArr};
    if((!nextDept.edit||!nextDept.edit.length)&&(!nextDept.delete||!nextDept.delete.length)){
      const nx={...TASK_PERMS};delete nx[dept];TASK_PERMS=nx;R();saveTaskPerms(nx).catch(console.error);return;}
    const nx={...TASK_PERMS,[dept]:nextDept};TASK_PERMS=nx;R();saveTaskPerms(nx).catch(console.error);};
  const SECS=[['maint','🔧','Maintenance routing'],['supply','📦','Supply requests'],['depts','🏢','Departments'],['titles','🏷️','Role titles'],['icons','🎨','Sidebar menu'],['taskperms','🔑','Task permissions']];
  return <div className="view">
    <div className="h-row" style={{marginBottom:4}}><h2 style={{margin:0,display:'flex',alignItems:'center',gap:8}}>{NAV_ICONS.settings?<span style={{fontSize:20}}>{NAV_ICONS.settings}</span>:<I n="gear" s={20}/>} {navLabel('settings','Settings')}</h2></div>
    <div style={{color:'var(--muted)',fontSize:13,margin:'0 0 18px',maxWidth:760}}>Organisation-wide configuration. Only Administrators can change these.</div>
    <div className="set-wrap">
      <div className="set-subnav">
        {SECS.map(([k,ic,l])=><button key={k} className={'set-subitem'+(sec===k?' on':'')} onClick={()=>setSec(k)}><span className="ic">{ic}</span>{l}</button>)}
      </div>
      <div>

      {sec==='maint'&&<div className="panel" style={{maxWidth:760,marginBottom:0}}>
        <div className="h-row"><h3><I n="tool" c="var(--accent-ink)"/>Maintenance routing</h3><span className="tag amber">Admin only</span></div>
        <div style={{color:'var(--muted)',fontSize:12.5,margin:'2px 0 16px'}}>Map each maintenance type to whoever should receive those reports. Any staff member can be a recipient; changes re-route existing reports of that type immediately.</div>
        {cats.length?cats.map((c,ix)=><RouteRow key={c.id} rule={c} ctx={ctx}
          onRecipient={id=>setRecipient(c,id)} onRename={l=>rename(c,l)} onRemove={()=>remove(c)}
          onIcon={ic=>setIcon(c,ic)} onMove={dir=>move(c,dir)} canMove={cats.length>1}/>):<div style={{color:'var(--muted)',fontSize:12.5,marginBottom:10}}>No maintenance types yet — add one below.</div>}
        <div style={{display:'flex',alignItems:'center',gap:9,padding:'11px 12px',border:'1.5px dashed var(--line)',borderRadius:11,background:'#fcfdfc',marginTop:2}}>
          <EmojiPicker value={newIcon} onPick={setNewIcon}/>
          <input className="fsel" style={{flex:1}} placeholder="Add a maintenance type… (e.g. Transport, Housekeeping)" value={newLabel}
            onChange={e=>setNewLabel(e.target.value)} onKeyDown={e=>{if(e.key==='Enter')addType();}}/>
          <button className="btn primary" style={{padding:'7px 14px'}} onClick={addType}>＋ Add</button>
        </div>
      </div>}

      {sec==='supply'&&<div className="panel" style={{maxWidth:760,marginBottom:0}}>
        <div className="h-row"><h3><I n="box" c="var(--accent-ink)"/>Supply requests</h3><span className="tag amber">Admin only</span></div>
        <div style={{color:'var(--muted)',fontSize:12.5,margin:'2px 0 16px'}}>Turn the whole feature on or off, and configure the two-stage approval → procurement routing.</div>
        <div style={{display:'flex',alignItems:'center',gap:12,padding:'12px 14px',border:'1px solid '+(supplyOn?'var(--accent-border,#bcdcd6)':'var(--line)'),background:supplyOn?'var(--accent-soft,#e2f1ee)':'#faf9f5',borderRadius:11,marginBottom:16}}>
          <div style={{flex:1}}>
            <div style={{fontWeight:800,fontSize:13.5,color:supplyOn?'var(--accent-ink)':'var(--ink2,#43494f)'}}>Supply requests enabled</div>
            <div style={{fontSize:11.5,color:'var(--ink2,#43494f)',marginTop:2}}>When off, the “Request supplies” tab is hidden everywhere — nobody can file one.</div></div>
          <button type="button" role="switch" aria-checked={supplyOn} onClick={toggleSupply} title="Toggle supply requests"
            style={{width:46,height:26,borderRadius:99,background:supplyOn?'var(--accent)':'#c7c5bb',position:'relative',flex:'0 0 auto',border:'none',cursor:'pointer',padding:0,transition:'background .15s'}}>
            <div style={{width:20,height:20,borderRadius:'50%',background:'#fff',position:'absolute',top:3,left:supplyOn?23:3,boxShadow:'0 1px 2px rgba(0,0,0,.2)',transition:'left .15s'}}></div></button>
          <span style={{fontSize:11,fontWeight:800,color:supplyOn?'var(--accent-ink)':'var(--muted)',minWidth:24}}>{supplyOn?'ON':'OFF'}</span>
        </div>
        <div style={{opacity:supplyOn?1:.5,pointerEvents:supplyOn?'auto':'none'}}>
          <div style={{fontSize:11,fontWeight:800,letterSpacing:'.5px',textTransform:'uppercase',color:'var(--ink2,#43494f)',margin:'4px 0 10px'}}>Step 1 · Approval — by department</div>
          {depts.length?depts.map(dept=>{const rule=approverRuleFor(dept);return (
            <div key={dept} style={{display:'flex',alignItems:'center',gap:11,padding:12,border:'1px solid var(--line)',borderRadius:11,marginBottom:10,background:'#fff'}}>
              <div style={{width:36,height:36,borderRadius:10,background:'#f6f5f0',border:'1px solid var(--line)',display:'flex',alignItems:'center',justifyContent:'center',fontSize:18,flex:'0 0 auto'}}>🏢</div>
              <div style={{minWidth:0}}><div style={{fontWeight:700,fontSize:13.5}}>{dept}</div>
                <div style={{fontSize:11,color:'var(--muted)',marginTop:1}}>Requests from this dept approved by</div></div>

/* ============ tasks view ============ */
/* The 7 columns every task-based export shares (team report, per-column lists, pending-task
   popup). taskPdfRow/taskPrintRow build one row for the jsPDF and window.print paths respectively;
   both render dates as "22 Jul" (pdfDate) and put the overdue "N days late" note under the Due
   date (CSV keeps DD-MM-YYYY via exportRows/exportCSV, untouched). */
/* Remarks = an empty trailing column left blank for handwritten notes on the printout/PDF. */
const TASK_PDF_COLS=['Task','Assignee','Assigned by','Department','Issued','Due','Status','Remarks'];
/* Fixed landscape-pt column widths so Task/Assignee/Assigned-by don't hog space and Remarks gets
   real room to write in (Task still wraps rather than truncates). Print mirrors these as % via the
   colgroup below. Sum ≈ 760pt ≈ A4-landscape usable width. */
const TASK_PDF_COLW={0:{cellWidth:150},1:{cellWidth:92},2:{cellWidth:82},3:{cellWidth:92},4:{cellWidth:52},5:{cellWidth:66},6:{cellWidth:72},7:{cellWidth:150}};
const TASK_PRINT_COLGROUP='<colgroup><col style="width:20%"/><col style="width:12%"/><col style="width:11%"/><col style="width:12%"/><col style="width:7%"/><col style="width:9%"/><col style="width:9%"/><col style="width:20%"/></colgroup>';
const TASK_PRINT_HEAD='<thead><tr style="border-bottom:2px solid #333"><th style="text-align:left;padding:6px">Task</th><th style="text-align:left;padding:6px">Assignee</th><th style="text-align:left;padding:6px">Assigned by</th><th style="text-align:left;padding:6px">Department</th><th style="text-align:left;padding:6px">Issued</th><th style="text-align:left;padding:6px">Due</th><th style="text-align:left;padding:6px">Status</th><th style="text-align:left;padding:6px">Remarks</th></tr></thead>';
const lateNote=t=>overdueDays(t)+' day'+(overdueDays(t)!=1?'s':'')+' late';
/* joint assignees stacked one per line ('\n' for PDF autoTable, '<br>' for print) so they don't
   eat horizontal width; overdue Due cell rendered fully red (date + late note). */
function taskPdfRow(t){
  return [t.t,assignees(t).map(a=>(byShort(a)||{n:a}).n).join('\n'),t.instructedBy||(t.selfAssigned?'Self':'—'),(byShort(t.who)||{}).dept||'—',
    pdfDate(t.issued),pdfDate(t.date)+(isOverdue(t)?'\n'+lateNote(t):''),ST[t.status].l,''];
}
function taskPrintRow(t){
  return '<tr style="border-bottom:1px solid #ccc"><td style="padding:6px">'+t.t+'</td><td style="padding:6px">'+assignees(t).map(a=>(byShort(a)||{n:a}).n).join('<br>')+'</td><td style="padding:6px">'+(t.instructedBy||(t.selfAssigned?'Self':'—'))+'</td><td style="padding:6px">'+((byShort(t.who)||{}).dept||'—')+'</td><td style="padding:6px;white-space:nowrap">'+pdfDate(t.issued)+'</td><td style="padding:6px'+(isOverdue(t)?';color:#c0392b':'')+'"><span style="white-space:nowrap">'+pdfDate(t.date)+'</span>'+(isOverdue(t)?'<br><span style="font-size:11px">'+lateNote(t)+'</span>':'')+'</td><td style="padding:6px">'+ST[t.status].l+'</td><td style="padding:6px"></td></tr>';
}
/* Download PDF for an arbitrary task row set ({t,i} objects) — used by the Tasks columns and the
   pending-task / KPI popup. */
function colPdf(label,rows,viewerName){
  downloadTablePdf(label,{orgName:orgName(),title:'TeamFlow — '+label,
    subtitle:'Prepared for '+viewerName+' · '+new Date().toDateString()+' · '+rows.length+' tasks'},
    TASK_PDF_COLS,rows.map(({t})=>taskPdfRow(t)),TASK_PDF_COLW).catch(e=>console.error(e));
}
/* per-column task list export: reuses the same CSV/print machinery as the old scope-wide
   exportCSV/printReport, just parameterized by an arbitrary row set + label instead of always
   being the whole scope. */
function exportRows(rows,label){
  const csvRows=[['Task','Department','Task department','Priority','Repeats','Assignee','Assigned by','Issued','Due','Status','Overdue','Note']];
  rows.forEach(({t})=>csvRows.push([t.t,(byShort(t.who)||{}).dept||'',BUCKETS[t.bucket]||'',PRIOS[t.prio||'med'].l,t.recur?recurLabel(t.recur,t.recurOn):'',
    assignees(t).map(a=>(byShort(a)||{n:a}).n).join(' + '),t.instructedBy||(t.selfAssigned?'Self':'—'),dmyTs(t.issued),dmy(t.date)+(t.time?' '+fmtTime(t.time):''),ST[t.status].l,isOverdue(t)?'Yes':'No',t.note||'']));
  csvDownload(iso(new Date())+'-teamflow-'+label.toLowerCase().replace(/\s+/g,'-')+'.csv',csvRows);
}
function printRows(rows,label,viewerName){
  let b=orgHeadHtml()+'<div style="font-family:Bricolage Grotesque,sans-serif;font-weight:700;font-size:15px;margin:0 0 4px">TeamFlow — '+label+'</div>';
  b+='<div style="color:#555;margin-bottom:18px">Prepared for '+viewerName+' · '+new Date().toDateString()+' · '+rows.length+' tasks</div>';
  b+='<table style="width:100%;border-collapse:collapse;font-size:12px;table-layout:fixed">'+TASK_PRINT_COLGROUP+TASK_PRINT_HEAD+'<tbody>';
  rows.forEach(({t})=>{b+=taskPrintRow(t);});
  b+='</tbody></table>';
  const pr=document.getElementById('print-report');pr.innerHTML=b;pr.style.display='block';
  const ot=document.title;document.title=iso(new Date())+'-teamflow-'+label.toLowerCase().replace(/\s+/g,'-');
  window.print();
  setTimeout(()=>{pr.style.display='none';document.title=ot;},300);
}
/* Print/PDF for the Reports & requests tracker — reuses the same #print-report machinery, over the
   currently-filtered rows (respects the type tab + month filter). */
const TRACKER_COLS=['Ticket','Item','Type','Requested','Reported by','Assigned to','Status'];
const trackerScopeLabel=tab=>tab==='maint'?'Maintenance reports':tab==='supply'?'Supply requests':tab==='open'?'Open items':'All reports & requests';
const trackerMonTxt=mon=>(mon&&mon!=='all')?' · '+MONTHS[+mon.split('-')[1]-1]+' '+mon.split('-')[0]:'';
const trackerRow=r=>[(r.ticket?'#'+r.ticket:'—'),r.item,r.typeLabel,(r.requested?fmtDate(r.requested):'—'),(r.reporter?r.reporter.n:(r.reporterFallback||'—')),(r.assignee?r.assignee.n:'—'),r.status.text];
function printTracker(rows,tab,mon){
  let b=orgHeadHtml()+'<div style="font-family:Bricolage Grotesque,sans-serif;font-weight:700;font-size:15px;margin:0 0 4px">TeamFlow — Reports &amp; requests</div>';
  b+='<div style="color:#555;margin-bottom:18px">'+trackerScopeLabel(tab)+trackerMonTxt(mon)+' · '+new Date().toDateString()+' · '+rows.length+' items</div>';
  b+='<table style="width:100%;border-collapse:collapse;font-size:12px"><thead><tr style="border-bottom:2px solid #333"><th style="text-align:left;padding:6px">Ticket</th><th style="text-align:left;padding:6px">Item</th><th style="text-align:left;padding:6px">Type</th><th style="text-align:left;padding:6px">Requested</th><th style="text-align:left;padding:6px">Reported by</th><th style="text-align:left;padding:6px">Assigned to</th><th style="text-align:left;padding:6px">Status</th></tr></thead><tbody>';
  rows.forEach(r=>{b+='<tr style="border-bottom:1px solid #ccc"><td style="padding:6px;font-weight:700">'+(r.ticket?'#'+r.ticket:'—')+'</td><td style="padding:6px">'+r.item+'</td><td style="padding:6px">'+r.typeLabel+'</td><td style="padding:6px">'+(r.requested?fmtDate(r.requested):'—')+'</td><td style="padding:6px">'+(r.reporter?r.reporter.n:(r.reporterFallback||'—'))+'</td><td style="padding:6px">'+(r.assignee?r.assignee.n:'—')+'</td><td style="padding:6px">'+r.status.text+'</td></tr>';});
  b+='</tbody></table>';
  const pr=document.getElementById('print-report');pr.innerHTML=b;pr.style.display='block';
  const ot=document.title;document.title=iso(new Date())+'-teamflow-reports-requests';
  window.print();
  setTimeout(()=>{pr.style.display='none';document.title=ot;},300);
}
function downloadTrackerPdf(rows,tab,mon){
  downloadTablePdf('reports-requests',{orgName:orgName(),title:'TeamFlow — Reports & requests',
    subtitle:trackerScopeLabel(tab)+trackerMonTxt(mon)+' · '+new Date().toDateString()+' · '+rows.length+' items'},
    TRACKER_COLS,rows.map(trackerRow)).catch(e=>console.error(e));
}
function exportTracker(rows,tab,mon){
  const csvRows=[TRACKER_COLS];rows.forEach(r=>csvRows.push(trackerRow(r)));
  csvDownload(iso(new Date())+'-teamflow-reports-requests.csv',csvRows);
}
/* The unified export trio (Download PDF · Download CSV · Print) over a task row set — the same
   three matching .exp-btn buttons used on every surface. rows are {t,i} objects. */
function ExportTrio({label,rows,viewerName}){
  return <div className="exp-group">
    <button className="exp-btn" onClick={()=>colPdf(label,rows,viewerName)}><I n="dl" s={13}/>Download PDF</button>
    <button className="exp-btn" onClick={()=>exportRows(rows,label)}><I n="dl" s={13}/>Download CSV</button>
    <button className="exp-btn" onClick={()=>printRows(rows,label,viewerName)}><I n="print" s={13}/>Print</button>
  </div>;
}
/* ============ Performance Analysis (Reports tab) ============ */
/* Flat per-task performance table driven by ReportsView's own fb/fw filters. "Department-wise"
   (byDept = fw==='all', no specific staff picked) prepends an Assignee column and sorts rows by
   assignee name; "staff-wise" (a specific person picked) drops that column entirely. Remarks is
   always a blank trailing column, for handwritten notes on a printout — same idea as TASK_PDF_COLS.
   t.issued is a full created_at timestamp so it's sliced to date-only before fmtDate. */
const PERF_COLS_FULL=['Assignee','Date of issue','Assigned by','Priority','Task Description','Due Date','Date of Completion','Remarks'];
/* 'S.No.' is a running row number, always the first column (both dept-wise and staff-wise). It's added
   at row/column assembly time, so perfCells still returns just the 8 data cells (Assignee…Remarks). */
const perfCols=byDept=>['S.No.'].concat(byDept?PERF_COLS_FULL:PERF_COLS_FULL.slice(1));
const perfSubtitle=(fw,fb,mon)=>(fb==='all'?'All departments':'Department: '+BUCKETS[fb])+' · '+(fw==='all'?'all staff':'Staff: '+(byShort(fw)||{n:fw}).n)+((mon&&mon!=='all')?' · '+perfMonLbl(mon):'');
/* Month filter for Performance Analysis (by DATE OF ISSUE). A task belongs to month `mon` (YYYY-MM) if
   it was issued that month OR it was issued in an earlier month and is still pending (not done) — pending
   work rolls forward into the current month until it's completed. 'all' = every month, no rollover. */
const perfIssMonth=t=>t.issued?(''+t.issued).slice(0,7):'';
const perfInMonth=(t,mon)=>{if(mon==='all')return true;const m=perfIssMonth(t);return m===mon||(!!m&&m<mon&&t.status!=='done');};
const perfMonthsOf=list=>[...new Set(list.map(perfIssMonth).filter(Boolean))].sort().reverse();
const perfMonLbl=m=>{const p=(''+m).split('-');return MONTHS[+p[1]-1]+' '+p[0];};
/* All Performance Analysis dates render DD-MM-YYYY (screen + PDF + CSV + Print), via shared dmy(). */
const perfDate=d=>d?dmy((''+d).slice(0,10)):'';
/* Summary stats for a perf list: overall {total,done,over,rate} + per-primary-assignee breakdown
   (counted under t.who so the per-person totals sum to the task count, matching the flat table). */
const perfStats=list=>{const done=list.filter(t=>t.status==='done').length,over=list.filter(isOverdue).length;
  return {total:list.length,done,over,rate:list.length?Math.round(done/list.length*100):0};};
const perfByAssignee=list=>{const m={};
  list.forEach(t=>{const k=(byShort(t.who)||{n:t.who||'—'}).n;m[k]=m[k]||{n:k,total:0,done:0,over:0};
    m[k].total++;if(t.status==='done')m[k].done++;if(isOverdue(t))m[k].over++;});
  return Object.values(m).sort((a,b)=>a.n<b.n?-1:a.n>b.n?1:0).map(p=>({...p,rate:p.total?Math.round(p.done/p.total*100):0}));};
const perfStatsLine=list=>{const s=perfStats(list);return s.total+' tasks · '+s.done+' completed · '+s.over+' overdue · '+s.rate+'% done';};
const perfRows=(list,byDept)=>byDept?list.slice().sort((a,b)=>{const an=(byShort(a.who)||{n:a.who}).n,bn=(byShort(b.who)||{n:b.who}).n;return an<bn?-1:an>bn?1:0;}):list;
/* full 8-cell row in PERF_COLS_FULL order; caller slices off cell 0 (Assignee) for staff-wise.
   fmt formats a date-only 'YYYY-MM-DD' string — fmtDate for PDF/print ("21 Jul"), a slice(0,10)
   identity for CSV (keeps the year, sorts cleanly). Completion cell blank when the task isn't done. */
const perfCells=(t,fmt)=>[assignees(t).map(a=>(byShort(a)||{n:a}).n).join(' + '),
  fmt((''+t.issued).slice(0,10)),t.instructedBy||'Self',PRIOS[t.prio||'med'].l,t.t,
  fmt(t.date),(t.status==='done'&&t.doneOn)?fmt(t.doneOn):'',''];

function clStats(staffId,days){let due=0,done=0,absent=0,full=0,evald=0;const items=clItemsFor(staffId);
  days.forEach(d=>{if(clAbsOn(staffId,d)){absent++;return;}const di=items.filter(it=>clDueOn(it,d));if(!di.length)return;evald++;

function KCompliance({ctx,team}){
  const [win,setWin]=useState(7);
  const days=clWindowDates(win);
  const rows=team.map(p=>({p,st:clStats(p.id,days),streak:clStreak(p.id),n:clItemsFor(p.id).length}))
    .filter(x=>x.n>0).sort((a,b)=>(a.st.pct==null?101:a.st.pct)-(b.st.pct==null?101:b.st.pct));
  const withCl=rows.length,avg=withCl?Math.round(rows.reduce((s,x)=>s+(x.st.pct||0),0)/withCl):null;
  return <div>
    <div className="khead" style={{marginBottom:14}}>
      <div><div className="kh-t">Checklist compliance</div><div className="ksetby">{withCl} of {team.length} people have a checklist · last {win} days</div></div>
      <span className="kspacer"/>
      <div className="kwin">{[7,30].map(w=><button key={w} className={win===w?'on':''} onClick={()=>setWin(w)}>{w} days</button>)}</div>
    </div>
    {withCl?<>
      <div className="kavg"><div className="kavg-n" style={{color:avg>=85?'#1a7a48':avg>=60?'#9a6a10':'#c43a53'}}>{avg}%</div><div className="kavg-l">team average completion<br/>over the last {win} days</div></div>
      <div className="panel" style={{padding:'4px 18px'}}>
        {rows.map(({p,st,streak})=>{const pct=st.pct==null?0:st.pct,col=pct>=85?'#1a7a48':pct>=60?'#9a6a10':'#c43a53';
          return <div key={p.id} className="kcrow">
            <span className="kav" style={{background:avColor(p.n),width:32,height:32,fontSize:13}}>{p.av}</span>
            <div style={{flex:1,minWidth:0}}>
              <div style={{display:'flex',justifyContent:'space-between',alignItems:'baseline',fontSize:13.5}}><b>{p.n}</b><span style={{color:col,fontWeight:700}}>{st.pct==null?'—':st.pct+'%'}</span></div>
              <div style={{fontSize:11,color:'var(--muted)'}}>{roleLabel(p)} · {p.dept} · {st.full}/{st.evald} full days{st.absent?' · '+st.absent+' absent':''}{streak?' · 🔥 '+streak+'-day streak':''}</div>
              <div className="kcbar"><span style={{width:pct+'%',background:col}}/></div>
            </div></div>;})}
      </div>
      <div style={{fontSize:11.5,color:'var(--muted)',margin:'12px 2px'}}>Completion = done ÷ due items over the window; absent days are excluded. A “full day” is one where every due item was done. Sorted lowest-first so anyone slipping is at the top.</div>
    </>:<div className="kempty"><div className="big">📊</div><h3>No checklists yet</h3><div>Assign checklists to your team to see compliance here.</div></div>}
  </div>;
}

    <div className="kteamwrap">
      <div>
        <div className="side-lab" style={{margin:'0 2px 8px'}}>People below you{showFilter?' · '+people.length+' of '+team.length:''}</div>
        {showFilter&&<div className="kfilter"><input placeholder="🔍  Search by name…" value={fName} onChange={e=>setFName(e.target.value)}/><select value={fDept} onChange={e=>{setFDept(e.target.value);}}>{depts.map(d=><option key={d} value={d}>{d==='all'?'All departments':d}</option>)}</select></div>}
        {people.length?people.map(p=>{const done=clDoneSet(p.id,today),due=clItemsFor(p.id).filter(i=>clDueOn(i,today)),n=due.length,d=due.filter(i=>done.has(i.id)).length;
          return <button key={p.id} className={'kmem'+(selId===p.id?' on':'')} onClick={()=>{setSel(p.id);setEditing(false);setVDate(today);}}>
            <span className="kav" style={{background:avColor(p.n)}}>{p.av}</span><div><div className="kmem-n">{p.n}</div><div className="kmem-r">{roleLabel(p)} · {p.dept}</div></div>
            <div className="kmem-p"><b>{d}/{n}</b><div className="lab">done</div></div></button>;})
          :<div className="kempty" style={{padding:'26px 10px'}}><div>No one matches that filter.</div></div>}
      </div>
      <div>{r&&<KTeamDetail key={selId} ctx={ctx} r={r} editing={editing} setEditing={setEditing} vDate={vDate} setVDate={setVDate} today={today} feeds={feeds}/>}</div>
    </div>
  </div>;
  function tabBtns(){return <>
    <button className={'ktab'+(tab==='mine'?' on':'')} onClick={()=>setTab('mine')}>My checklist</button>
    <button className={'ktab'+(tab==='team'?' on':'')} onClick={()=>setTab('team')}>My team{team.length?<span className="cnt">{team.length}</span>:null}</button>
    <button className={'ktab'+(tab==='compliance'?' on':'')} onClick={()=>setTab('compliance')}>Compliance</button></>;}

function TasksView({ctx}){
  const [fb,setFb]=useState('all');
  const [fboss,setFboss]=useState('all');
  const [bossMode,setBossMode]=useState('tome');
  const [deptFb,setDeptFb]=useState('all');
  /* Bulk actions: one column selects at a time (selCol), selSet holds task indices, bulkAct is the
     open action control. Each action edits every selected task the viewer canEditTask (per-department
     gate), skipping the rest — reassign/due/priority/status only, no bulk delete. */
  const [selCol,setSelCol]=useState(null);
  const [selSet,setSelSet]=useState(()=>new Set());
  const [bulkAct,setBulkAct]=useState(null);
  const [reVal,setReVal]=useState('');const [dueVal,setDueVal]=useState('');
  const [prioVal,setPrioVal]=useState('high');const [statusVal,setStatusVal]=useState('inprogress');
  const startSel=c=>{setSelCol(sc=>sc===c?null:c);setSelSet(new Set());setBulkAct(null);};
  const toggleSel=i=>setSelSet(s=>{const n=new Set(s);n.has(i)?n.delete(i):n.add(i);return n;});
  const clearSel=()=>{setSelSet(new Set());setBulkAct(null);};
  const applyBulk=(mut,label)=>{
    let done=0,skipped=0;
    selSet.forEach(i=>{const t=tasks[i];if(!t)return;
      if(!canEditTask(t,ctx.role)){skipped++;return;}
      mut(t);saveTask(t).catch(console.error);
      notifyEvent(t.id,ctx.viewer.id,label,concernedFor(t,ctx.viewer.s));done++;});
    ctx.R();
    ctx.say(done?('Updated '+done+' task'+(done!=1?'s':'')+(skipped?' · '+skipped+' skipped (no permission)':''))
      :(skipped?'None updated — you can’t edit those tasks':'Nothing selected'));
    setSelCol(null);setSelSet(new Set());setBulkAct(null);
  };
  const doReassign=()=>{if(!reVal){ctx.say('Pick a person');return;}const nm=(byShort(reVal)||{}).n||reVal;applyBulk(t=>{t.who=reVal;t.coWho=undefined;},'reassigned to '+nm);};
  const doDue=()=>{if(!dueVal){ctx.say('Pick a date');return;}applyBulk(t=>{t.date=dueVal;},'due date changed to '+fmtDate(dueVal));};
  const doPrio=()=>applyBulk(t=>{t.prio=prioVal;},'priority set to '+PRIOS[prioVal].l);
  const doStatus=()=>applyBulk(t=>{t.status=statusVal;t.completionPending=false;
    if(statusVal==='done'){t.doneOn=iso(TODAY);if(t.coWho&&t.coWho.length)t.doneBy=assignees(t);}
    else{delete t.doneOn;t.doneBy=[];}},'marked '+ST[statusVal].l);
  const bulkBar=()=><div className="bulkbar">
    <span className="cnt">{selSet.size} selected</span>
    <button className={'bpill'+(bulkAct==='reassign'?' on':'')} onClick={()=>setBulkAct(a=>a==='reassign'?null:'reassign')}>↪ Reassign</button>
    <button className={'bpill'+(bulkAct==='due'?' on':'')} onClick={()=>setBulkAct(a=>a==='due'?null:'due')}>📅 Change due</button>
    <button className={'bpill'+(bulkAct==='prio'?' on':'')} onClick={()=>setBulkAct(a=>a==='prio'?null:'prio')}>● Priority</button>
    <button className={'bpill'+(bulkAct==='status'?' on':'')} onClick={()=>setBulkAct(a=>a==='status'?null:'status')}>✓ Status</button>
    <button className="bpill ghost" onClick={clearSel}>Clear</button>
    {bulkAct==='reassign'?<div className="bulkctl"><select className="fsel" value={reVal} onChange={e=>setReVal(e.target.value)}><option value="">Choose a person…</option>{ctx.scope.map(x=><option key={x.s} value={x.s}>{x.n} · {x.dept}</option>)}</select><button className="btn primary" onClick={doReassign}>Apply</button></div>:null}
    {bulkAct==='due'?<div className="bulkctl"><input type="date" className="fsel" value={dueVal} min={iso(TODAY)} onChange={e=>setDueVal(e.target.value)}/><button className="btn primary" onClick={doDue}>Apply</button></div>:null}
    {bulkAct==='prio'?<div className="bulkctl"><select className="fsel" value={prioVal} onChange={e=>setPrioVal(e.target.value)}>{Object.keys(PRIOS).map(k=><option key={k} value={k}>{PRIOS[k].l}</option>)}</select><button className="btn primary" onClick={doPrio}>Apply</button></div>:null}
    {bulkAct==='status'?<div className="bulkctl"><select className="fsel" value={statusVal} onChange={e=>setStatusVal(e.target.value)}><option value="open">Open</option><option value="inprogress">In progress</option><option value="done">Done</option></select><button className="btn primary" onClick={doStatus}>Apply</button></div>:null}
  </div>;

  const showDept=ctx.role==='admin'||ctx.role==='srm'||ctx.role==='mgmt'||ctx.role==='dir';
  const isManagerTier=ctx.role==='srm';

  const rowsMine=tasks.map((t,i)=>({t,i})).filter(o=>hasWho(o.t,ctx.viewer.s)&&!o.t.instructedBy&&(fb==='all'||o.t.bucket===fb));
  const rowsBoss=tasks.map((t,i)=>({t,i})).filter(o=>hasWho(o.t,ctx.viewer.s)&&o.t.instructedBy&&(fboss==='all'||o.t.instructedBy===fboss));
  /* "Assigned by me" = tasks I issued to OTHER people — instructedBy stores the instructor's full
     display name (never a BOSS_LABEL string, see bossLabelOf), and the !hasWho guard keeps tasks
     I issued to myself out (those live in "My tasks"/rowsBoss already). */
  const rowsByMe=tasks.map((t,i)=>({t,i})).filter(o=>o.t.instructedBy===ctx.viewer.n&&!hasWho(o.t,ctx.viewer.s));
  const bossToMe=bossMode==='tome';
  const rowsBossCol=bossToMe?rowsBoss:rowsByMe;
  // Manager's own dept-lock is intentionally "show everything in my scope" rather than a specific
  // bucket — staff.department (org-chart HR field, e.g. "Academics") and task.bucket (e.g.
  // "academic") are separate vocabularies in this data model, not a 1:1 mapping, so guessing a
  // specific bucket for "their department" would silently misfilter. Management still gets the
  // real per-bucket dropdown.
  const effectiveDeptFb=isManagerTier?'all':deptFb;
  const rowsDept=showDept?tasks.map((t,i)=>({t,i})).filter(o=>inScope(o.t,ctx.shorts)&&!hasWho(o.t,ctx.viewer.s)
    &&(effectiveDeptFb==='all'||o.t.bucket===effectiveDeptFb)):[];

  const col=(label,rows,colId,note)=><>
    <div className="col-head"><h3>{label}</h3>
      {rows.length?<button className={'selbtn'+(selCol===colId?' on':'')} onClick={()=>startSel(colId)}>{selCol===colId?'✓ Done':'☑ Select'}</button>:null}
      {note}<ExportTrio label={label} rows={rows} viewerName={ctx.viewer.n}/></div>
  </>;
  const rowProps=colId=>o=>({sel:selCol===colId,checked:selSet.has(o.i),onToggle:toggleSel});

  return <div className="view">
    <div className="cols3">
      <div className="panel colpanel">
        {col('My tasks',rowsMine,'mine')}
        <div className="col-toprow">
          <select className="fsel" style={{flex:1}} value={fb} onChange={e=>setFb(e.target.value)}>
            <option value="all">All departments</option>
            {realDeptKeys(ctx.scope).map(k=><option key={k} value={k}>{BUCKETS[k]}</option>)}
          </select>
        </div>
        <div className="scrollbox col-scroll">
          {rowsMine.length?rowsMine.map(o=><TaskRow key={o.i} t={o.t} i={o.i} ctx={ctx} {...rowProps('mine')(o)}/>):<Empty t="No tasks" s="Nothing here — try clearing the department filter."/>}
        </div>
        {selCol==='mine'&&selSet.size?bulkBar():null}
      </div>

      <div className="panel colpanel">
        {col(bossToMe?'Tasks assigned to me by':'Tasks assigned by me',rowsBossCol,'boss')}
        <div className="selfseg" style={{margin:'0 0 12px'}}>
          <button className={bossToMe?'on':''} onClick={()=>setBossMode('tome')}>To me</button>
          <button className={bossToMe?'':'on'} onClick={()=>setBossMode('byme')}>By me</button>
        </div>
        {bossToMe?<div className="col-toprow">
          <select className="fsel" style={{flex:1}} value={fboss} onChange={e=>setFboss(e.target.value)}>
            <option value="all">All</option>
            {ctx.bossChain.map(n=><option key={n} value={n}>{bossLabelOf(n)}</option>)}
          </select>
        </div>:null}
        <div className="scrollbox col-scroll">
          {rowsBossCol.length?rowsBossCol.map(o=><TaskRow key={o.i} t={o.t} i={o.i} ctx={ctx} {...rowProps('boss')(o)}/>)
            :<Empty t="No tasks" s={bossToMe?"Nothing assigned to you right now.":"You haven't assigned any tasks to others."}/>}
        </div>
        {selCol==='boss'&&selSet.size?bulkBar():null}
      </div>

      {showDept?<div className="panel colpanel">
        {col('Department tasks',rowsDept,'dept',<span className="col-note">Manager · Management</span>)}
        <div className="col-toprow">
          <select className="fsel" style={{flex:1}} disabled={isManagerTier} value={effectiveDeptFb} onChange={e=>setDeptFb(e.target.value)}>
            <option value="all">All departments</option>
            {realDeptKeys(ctx.scope).map(k=><option key={k} value={k}>{BUCKETS[k]}</option>)}
          </select>
        </div>
        {isManagerTier?<div className="col-empty-note">Fixed to your team — only Management can filter by department here.</div>:null}
        <div className="scrollbox col-scroll">
          {rowsDept.length?rowsDept.map(o=><TaskRow key={o.i} t={o.t} i={o.i} ctx={ctx} {...rowProps('dept')(o)}/>):<Empty t="No tasks" s="Nothing here — try clearing the department filter."/>}
        </div>
        {selCol==='dept'&&selSet.size?bulkBar():null}
      </div>:null}
    </div>
  </div>;
}
