function Drawer({ctx,idx}){
  const t=tasks[idx];
  const [note,setNote]=useState('');
  const [reassign,setReassign]=useState(false);
  const [reDate,setReDate]=useState('');
  const [reNote,setReNote]=useState('');
  const [pendingDone,setPendingDone]=useState(false);
  const [extDate,setExtDate]=useState('');
  const [extReason,setExtReason]=useState('');
  const [editingLogId,setEditingLogId]=useState(null);
  const [editText,setEditText]=useState('');
  /* Management/Administrator can edit the task's core details (title/due/type/department/priority)
     inline. Assignee stays on the existing Reassign flow. Display-editing only — not while previewing. */
  const [editing,setEditing]=useState(false);
  const [edT,setEdT]=useState('');const [edDate,setEdDate]=useState('');const [edType,setEdType]=useState('work');
  const [edBucket,setEdBucket]=useState('administration');const [edPrio,setEdPrio]=useState('med');
  const [confirmDel,setConfirmDel]=useState(false); // inline "Delete this task?" confirmation step
  useEffect(()=>{setNote('');setReassign(false);setReDate('');setReNote('');setPendingDone(tasks[idx]&&tasks[idx].status==='done');setExtDate('');setExtReason('');setEditingLogId(null);setEditText('');setEditing(false);setConfirmDel(false);},[idx]);
  /* Issue 4: opening your own assigned task moves it open -> inprogress automatically. Gated on
     the REAL signed-in viewer (ctx.previewing false, not a Preview As simulation) genuinely being
     an assignee (hasWho, the same helper used everywhere else) — an admin/manager just reviewing
     someone else's task, or a Preview As persona, must not trigger this. Mount-time effect keyed
     on idx, not on every place a task can be opened, per the brief. */
  useEffect(()=>{
    const tk=tasks[idx];
    if(tk&&!ctx.previewing&&hasWho(tk,ctx.viewer.s)&&tk.status==='open'){
      tk.status='inprogress';saveTask(tk).catch(console.error);
      notifyEvent(tk.id,ctx.viewer.id,'marked in progress',concernedFor(tk,ctx.viewer.s));
      ctx.R();
    }
  },[idx]);
  if(!t)return null;
  const p=byShort(t.who),od=isOverdue(t);
  const canEdit=canEditTask(t,ctx.role)&&!ctx.previewing;   // per-department role gate (shared.js); Admin always
  const canDelete=canDeleteTask(t,ctx.role)&&!ctx.previewing; // per-department delete gate (shared.js); Admin always
  const startEdit=()=>{setEdT(t.t);setEdDate(t.date||'');setEdType(t.type||'work');setEdBucket(t.bucket||'administration');setEdPrio(t.prio||'med');setEditing(true);};
  /* Joint → normal: drop `short` from the assignee set. If it was the primary (t.who), promote the
     first remaining co-assignee; when only one assignee is left, clear coWho so it's a plain task.
     saveTask rewrites task_assignees from the new t.who/coWho. */
  const removeAssignee=short=>{
    const rest=assignees(t).filter(a=>a!==short);
    if(!rest.length)return;                       // never remove the last assignee
    t.who=rest[0];
    t.coWho=rest.length>1?rest.slice(1):undefined;
    if(t.doneBy)t.doneBy=t.doneBy.filter(a=>a!==short);
    saveTask(t).catch(console.error);
    const who=byShort(short);
    notifyEvent(t.id,ctx.viewer.id,'removed '+(who?who.n:short)+' from the task',concernedFor(t,ctx.viewer.s));
    ctx.R();ctx.say('Removed '+(who?who.n.split(' ')[0]:short)+(t.coWho&&t.coWho.length?'':' — now a normal task'));
  };
  const doDelete=async()=>{
    const res=await deleteTaskEverywhere(t);
    if(!res.ok){ctx.say(res.blocked?"Couldn't delete — out of your scope":'Delete failed — try again');return;}
    const gi=tasks.findIndex(x=>x.id===t.id);if(gi>=0)tasks.splice(gi,1);
    ctx.logAdmin('delete_task',t.t,{dept:BUCKETS[t.bucket]||t.bucket,assignee:(byShort(t.who)||{}).n});
    ctx.setDrawerIdx(-1);ctx.R();ctx.say('Task deleted');
  };
  const saveEdit=()=>{
    const nt=edT.trim();if(!nt){ctx.say('The task needs a title');return;}
    t.t=nt;t.date=edDate||t.date;t.type=edType;t.bucket=edBucket;t.prio=edPrio;
    saveTask(t).catch(console.error);
    t.log=t.log||(t.note?[{by:'Earlier',when:'',text:t.note}]:[]);
    const entry={by:ctx.viewer.n,when:fmtDateTime(new Date()),text:'Edited the task details',createdAt:new Date().toISOString()};
    t.log.push(entry);logTask(t,ctx.viewer.n,'Edited the task details').then(row=>{if(row)entry.id=row.id;ctx.R();}).catch(console.error);
    notifyEvent(t.id,ctx.viewer.id,'edited the task details',concernedFor(t,ctx.viewer.s));
    setEditing(false);ctx.R();ctx.say('Task updated');
  };
  const tl=[{w:'Assigned to '+assignees(t).map(a=>(byShort(a)||{n:a}).n).join(' + '),d:fmtDate(t.date)+' due date set'}];
  if(t.status==='inprogress'||t.status==='partial')tl.push({w:'Marked '+ST[t.status].l.toLowerCase(),d:'from mobile'});
  const logs=t.log||(t.note?[{by:'Earlier',when:'',text:t.note}]:[]);
  logs.forEach(x=>tl.push({w:'“'+x.text+'”',d:(x.by?x.by.split(' ')[0]:'')+(x.when?' · '+x.when:''),logEntry:x}));
  if(t.extReq)tl.push({w:'Extension requested → '+fmtDate(t.extReq.newDate),d:t.extReq.reason||'pending approval'});
  if(t.reopened)tl.push({w:'Reopened by '+t.reopened.by.split(' ')[0]+(t.reopened.comment?' — “'+t.reopened.comment+'”':''),d:'new due '+fmtDate(t.date)});
  if(t.coWho&&t.coWho.length&&(t.doneBy||[]).length&&t.status!=='done')tl.push({w:'Done by '+(t.doneBy||[]).map(a=>(byShort(a)||{n:a}).n.split(' ')[0]).join(', '),d:'waiting on '+assignees(t).filter(a=>!(t.doneBy||[]).includes(a)).map(a=>(byShort(a)||{n:a}).n.split(' ')[0]).join(', ')});
  if(t.status==='done')tl.push({w:'Completed',d:t.doneOn?fmtDate(t.doneOn):'closed'});
  return <div className="drawer">
    <div className="dr-head">
      {editing?<input className="fsel" style={{flex:1,fontSize:15.5,fontWeight:800,padding:'8px 10px'}} value={edT} onChange={e=>setEdT(e.target.value)} placeholder="Task title"/>:<h3>{t.t}</h3>}
      {canEdit&&!editing?<button className="btn ghost" style={{padding:'6px 12px',minHeight:0,marginRight:6,flex:'0 0 auto'}} onClick={startEdit}>✎ Edit</button>:null}
      <button className="iconbtn" onClick={()=>ctx.setDrawerIdx(-1)}><I n="x"/></button></div>
    <div className="dr-body">
      <div className="dr-sec">Status</div>
      <div className="segs">{['open','inprogress','done'].map(s=>{
        const active=s==='done'?pendingDone:(!pendingDone&&(t.status===s||(s==='inprogress'&&t.status==='partial')));
        return <button key={s} className={active?'on':''} onClick={()=>{
          if(t.completionPending){ctx.say('Already submitted — waiting for approval');return;}
          if(s==='done'){setPendingDone(true);return;}
          setPendingDone(false);t.status=s;delete t.doneOn;saveTask(t).catch(console.error);
          notifyEvent(t.id,ctx.viewer.id,'marked '+ST[s].l.toLowerCase(),concernedFor(t,ctx.viewer.s));
          ctx.say('Status → '+ST[s].l);ctx.R();
        }}>{ST[s].l}</button>;})}</div>
      {t.completionPending?<div className="whysm" style={{margin:'6px 20px 0',color:'var(--amber)'}}>⏳ Completion pending approval{(byShort(t.who)||{}).boss?' — waiting for '+byShort(t.who).boss.split(' ')[0]:''}.</div>
        :pendingDone&&t.status!=='done'?<div className="whysm" style={{margin:'6px 20px 0'}}>Click OK below to close the task.</div>:null}
      {t.coWho&&t.coWho.length?<>
        <div className="dr-sec">Completion — each member confirms</div>
        {assignees(t).map(a=>{const q=byShort(a);const dn=(t.doneBy||[]).includes(a);
          return <div className="kv" key={a}>
            <div className="k"><span className="avex">{q?q.av:'?'}</span></div>
            <div className="v" style={{flex:1}}>{q?q.n:a}</div>
            <button className={'btn '+(dn?'primary':'ghost')} style={{padding:'6px 12px',minHeight:0}}
              onClick={()=>{
                if(t.completionPending){ctx.say('Already submitted — waiting for approval');return;}
                t.doneBy=dn?(t.doneBy||[]).filter(x=>x!==a):[...(t.doneBy||[]),a];
                if(assignees(t).every(x=>(t.doneBy||[]).includes(x))){
                  const r=submitOrComplete(t);persistComplete(t,r.nd);
                  notifyEvent(t.id,ctx.viewer.id,r.pending?'submitted for completion approval':'completed the task',concernedFor(t,ctx.viewer.s));
                  ctx.say(r.pending?'All confirmed — waiting for approval':(r.nd?'All done · next '+RECURS[t.recur].toLowerCase()+' occurrence '+fmtDate(r.nd):'All members done — task completed'));
                }
                else{if(t.status==='done'){t.status='open';delete t.doneOn;}setPendingDone(false);saveTask(t).catch(console.error);}
                ctx.R();}}>{dn?'✓ Done':'Pending'}</button>
          </div>;})}
      </>:null}
      {t.status==='done'&&ctx.canApprove(t.who,t)?<>
        <div className="dr-sec" style={{color:'var(--red)'}}>Not up to the mark? Reopen</div>
        <div className="kv"><div className="k">New due</div><div className="v" style={{flex:1}}>
          <input type="date" className="fsel" style={{width:'100%'}} value={reDate} onChange={e=>setReDate(e.target.value)}/></div></div>
        <textarea className="dr-note" value={reNote} onChange={e=>setReNote(e.target.value)} placeholder="What needs to be fixed? (sent to the assignee)"/>
        <button className="btn ghost" style={{marginTop:9,color:'var(--red)'}} onClick={()=>{
          if(!reDate){ctx.say('Pick a new due date first');return;}
          setPendingDone(false);t.status='open';t.date=reDate;delete t.doneOn;t.doneBy=[];
          t.reopened={by:ctx.viewer.n,comment:reNote.trim()};
          t.log=t.log||(t.note?[{by:'Earlier',when:'',text:t.note}]:[]);
          const reopenText='Reopened — '+(reNote.trim()||'not up to the mark');
          const reopenEntry={by:ctx.viewer.n,when:fmtDateTime(new Date()),text:reopenText,createdAt:new Date().toISOString()};
          t.log.push(reopenEntry);
          if(reNote.trim())t.note=reNote.trim();
          saveTask(t).catch(console.error);
          logTask(t,ctx.viewer.n,reopenText).then(row=>{if(row)reopenEntry.id=row.id;ctx.R();}).catch(console.error);
          ctx.R();ctx.say('Task reopened — new due '+fmtDate(t.date)+' · assignee notified');}}>
          <I n="redo"/>Reopen task</button>
      </>:null}
      <div className="dr-sec">Details</div>
      <div className="kv"><div className="k">Assignee{t.coWho&&t.coWho.length?'s':''}</div>
        <div className="v">{assignees(t).map(a=>{const q=byShort(a);return <React.Fragment key={a}><span className="avex">{q?q.av:'?'}</span>{q?q.n:a}</React.Fragment>;})}
        {t.coWho&&t.coWho.length?<span className="tag teal">joint</span>:<span className="roletag">{p?p.dept:''}</span>}</div></div>
      {editing&&assignees(t).length>1?<div className="kv"><div className="k">Remove</div>
        <div className="v" style={{flex:1,display:'flex',flexWrap:'wrap',gap:6}}>
          {assignees(t).map(a=>{const q=byShort(a);return <span key={a} style={{display:'inline-flex',alignItems:'center',gap:7,background:'#f3f2ec',border:'1px solid var(--line)',borderRadius:999,padding:'4px 6px 4px 10px',fontSize:12.5,fontWeight:600}}>
            {q?q.n:a}<span title="Remove from task" onClick={()=>removeAssignee(a)} style={{width:18,height:18,borderRadius:'50%',background:'#e3e0d7',color:'var(--red)',display:'flex',alignItems:'center',justifyContent:'center',fontWeight:800,fontSize:12,cursor:'pointer'}}>✕</span></span>;})}
          <div className="whysm" style={{flexBasis:'100%',margin:'2px 0 0',color:'var(--muted)'}}>Remove people to shrink the joint task. Down to one person it becomes a normal task.</div>
        </div></div>:null}
      {!t.selfAssigned&&t.instructedBy?<div className="kv"><div className="k">Assigned by</div><div className="v">{t.instructedBy}</div></div>:null}
      {t.completionPending?<div className="kv"><div className="k">Completion</div><div className="v"><span className="tag amber"><I n="clock" s={11}/> Pending approval</span></div></div>:null}
      {reassign?<div className="kv"><div className="k">Move to</div><div className="v" style={{flex:1}}>
        <select className="fsel" style={{width:'100%'}} defaultValue="" onChange={e=>{if(!e.target.value)return;
          const oldP=byShort(t.who),newP=byShort(e.target.value);
          t.who=e.target.value;t.coWho=undefined;saveTask(t).catch(console.error);
          const recipients=new Set(concernedFor(t,ctx.viewer.s));
          if(oldP&&oldP.s!==ctx.viewer.s)recipients.add(oldP.id);
          notifyEvent(t.id,ctx.viewer.id,'reassigned to '+(newP?newP.n:e.target.value),[...recipients]);
          ctx.R();ctx.say('Reassigned to '+byShort(e.target.value).n);setReassign(false);}}>
          <option value="">Choose a person…</option>
          {ctx.scope.map(x=><option key={x.s} value={x.s}>{x.n} · {x.dept}</option>)}
        </select></div></div>:null}
      <div className="kv"><div className="k">Due</div><div className="v" style={{flex:editing?1:undefined,color:!editing&&od?'var(--red)':undefined}}>
        {editing?<input type="date" className="fsel" style={{width:'100%'}} value={edDate} onChange={e=>setEdDate(e.target.value)}/>
          :<>{fmtDate(t.date)}{t.time?' · '+fmtTime(t.time):''}{od?' · '+overdueDays(t)+' days late':''}</>}</div></div>
      <div className="kv"><div className="k">Type</div><div className="v" style={{flex:editing?1:undefined}}>
        {editing?<select className="fsel" style={{width:'100%'}} value={edType} onChange={e=>setEdType(e.target.value)}>{Object.keys(TYPES).map(k=><option key={k} value={k}>{TYPES[k]}</option>)}</select>
          :<span className="tag gray">{TYPES[t.type||'work']}</span>}</div></div>
      <div className="kv"><div className="k">Department</div><div className="v" style={{flex:editing?1:undefined}}>
        {editing?<>
          <select className="fsel" style={{width:'100%'}} value={edBucket} onChange={e=>setEdBucket(e.target.value)}>{Object.keys(BUCKETS).map(k=><option key={k} value={k}>{BUCKETS[k]}</option>)}</select>
          {/* same preventive mismatch warning as New Task (v132), now on the edit flow — editing the
              department to one no current assignee belongs to used to be silent. */}
          {(()=>{const as=assignees(t);const mm=!t.selfAssigned&&as.length&&!as.some(a=>{const p=byShort(a);return p&&LABEL_TO_BUCKET[p.dept]===edBucket;});
            if(!mm)return null;const p0=byShort(as[0]);const sug=p0?LABEL_TO_BUCKET[p0.dept]:null;
            return <div className="whysm" style={{color:'var(--red)',display:'flex',gap:8,flexWrap:'wrap',marginTop:4,alignItems:'center'}}>
              <span><b>⚠ Mismatch</b> — {as.length>1?'no assignee is':'the assignee isn’t'} in {BUCKETS[edBucket]||edBucket}.</span>
              {sug&&sug!==edBucket?<button className="linkbtn" style={{fontSize:12}} onClick={()=>setEdBucket(sug)}>→ Set to {BUCKETS[sug]}</button>:null}
            </div>;})()}
        </>
          :<span className="tag blue">{BUCKETS[t.bucket]||'—'}</span>}</div></div>
      <div className="kv"><div className="k">Priority</div><div className="v" style={{flex:editing?1:undefined}}>
        {editing?<select className="fsel" style={{width:'100%'}} value={edPrio} onChange={e=>setEdPrio(e.target.value)}>{Object.keys(PRIOS).map(k=><option key={k} value={k}>{PRIOS[k].l}</option>)}</select>
          :<><span className="prio" style={{background:PRIOS[t.prio||'med'].c}}/>{PRIOS[t.prio||'med'].l}</>}</div></div>
      {t.recur?<div className="kv"><div className="k">Repeats</div><div className="v"><span className="tag teal">↻ {recurLabel(t.recur,t.recurOn)}</span><span style={{fontWeight:500,color:'var(--muted)',fontSize:12.5}}>next created on completion</span></div></div>:null}
      {t.selfAssigned?<div className="kv"><div className="k">Origin</div><div className="v"><span className="tag green">Self-logged</span>{t.instructedBy?' as per '+t.instructedBy:''}</div></div>:null}
      {t.extReq?<div className="kv"><div className="k">Extension</div><div className="v">asks {fmtDate(t.extReq.newDate)}{t.extReq.reason?' — “'+t.extReq.reason+'”':''}</div></div>:null}
      {!t.extReq&&needExt(t)&&!ctx.previewing&&hasWho(t,ctx.viewer.s)?<>
        <div className="dr-sec">Request extension</div>
        <div className="kv"><div className="k">New due</div><div className="v" style={{flex:1}}>
          <input type="date" className="fsel" style={{width:'100%'}} value={extDate}
            min={t.date&&dayAfter(t.date)>iso(TODAY)?dayAfter(t.date):iso(TODAY)}
            onChange={e=>setExtDate(e.target.value)}/></div></div>
        <textarea className="dr-note" value={extReason} onChange={e=>setExtReason(e.target.value)} placeholder="Why do you need more time? (sent to your boss for approval)"/>
        <button className="btn ghost" style={{marginTop:9}} onClick={()=>{
          if(!extDate){ctx.say('Pick a new due date first');return;}
          if(t.date&&extDate<=t.date){ctx.say('New date must be after the current due date');return;}
          t.extReq={newDate:extDate,reason:extReason.trim()};
          saveTask(t).catch(console.error);
          notifyEvent(t.id,ctx.viewer.id,'requested an extension to '+fmtDate(extDate),concernedFor(t,ctx.viewer.s));
          setExtDate('');setExtReason('');
          ctx.R();ctx.say('Extension request sent — waiting for approval ⏳');}}>
          <I n="clock"/>Request extension</button>
      </>:null}
      <div className="dr-sec">Job log — notes & updates</div>
      <textarea className="dr-note" value={note} onChange={e=>setNote(e.target.value)} placeholder="Add an update — progress, blockers, instructions… (kept forever, visible to assignee and boss)"/>
      <button className="btn soft" style={{marginTop:9}} onClick={()=>{
        const txt=note.trim(); if(!txt){ctx.say('Write something first');return;}
        t.log=t.log||(t.note?[{by:'Earlier',when:'',text:t.note}]:[]);
        const entry={by:ctx.viewer.n,when:fmtDateTime(new Date()),text:txt,createdAt:new Date().toISOString()};
        t.log.push(entry);
        t.note=txt;setNote('');
        saveTask(t).catch(console.error);
        logTask(t,ctx.viewer.n,txt).then(row=>{if(row)entry.id=row.id;ctx.R();}).catch(console.error);
        ctx.R();ctx.say('Added to the job log');}}><I n="note"/>Add to log</button>
      <div className="dr-sec">Attachments — files & proof of work</div>
      {t.files&&t.files.length?<div className="filelist" style={{marginTop:0,marginBottom:8}}>{t.files.map((x,ix)=><FileChip key={ix} x={x} onRemove={()=>{
        t.files=t.files.filter((_,i)=>i!==ix);
        saveTask(t).catch(console.error);
        removeAttachment(x.path).catch(console.error);
        ctx.R();
      }}/>)}</div>:null}
      <div style={{display:'flex',gap:8,flexWrap:'wrap'}}>
        {[['camera','Camera',{accept:'image/*',capture:'environment'}],['image','Photos',{accept:'image/*',multiple:true}],['clip','Files',{multiple:true}]].map(([ic,l,at])=>
          <label key={l} className="btn ghost" style={{flex:1,justifyContent:'center',cursor:'pointer',minWidth:90}}>
            <I n={ic}/>{l}
            <input type="file" style={{display:'none'}} {...at} onChange={async e=>{
              const picked=[...e.target.files];
              if(!picked.length)return;
              ctx.say('Uploading '+picked.length+' file'+(picked.length>1?'s':'')+'…');
              try{
                const nf=await Promise.all(picked.map(x=>uploadFile(x,'tasks/'+t.id)));
                t.files=(t.files||[]).concat(nf);
                await saveTask(t);
                ctx.R();ctx.say(nf.length+' attachment'+(nf.length>1?'s':'')+' added');
              }catch(err){console.error(err);ctx.say('Upload failed — try again');}}}/>
          </label>)}
      </div>
      <div className="dr-sec">Activity</div>
      <div className="timeline">{tl.map((x,ix)=>{
        const le=x.logEntry;
        const canEditEntry=le&&le.id&&!ctx.previewing&&le.by===ctx.viewer.n&&le.createdAt&&(Date.now()-new Date(le.createdAt).getTime()<2*60*1000);
        if(editingLogId&&le&&le.id===editingLogId){
          return <div className="tl" key={ix}>
            <textarea className="dr-note" style={{minHeight:56,marginTop:0}} value={editText} onChange={e=>setEditText(e.target.value)} autoFocus/>
            <div style={{display:'flex',gap:6,marginTop:6}}>
              <button className="btn soft" style={{padding:'5px 12px',minHeight:0,flex:'0 0 auto'}} onClick={async()=>{
                const txt=editText.trim();
                if(!txt){ctx.say('Write something first');return;}
                const res=await editLogEntry(le.id,txt);
                if(res.ok){le.text=txt;setEditingLogId(null);ctx.R();ctx.say('Log entry updated');}
                else ctx.say("Can't edit — the 2-minute window has closed");
              }}>Save</button>
              <button className="btn ghost" style={{padding:'5px 12px',minHeight:0,flex:'0 0 auto'}} onClick={()=>setEditingLogId(null)}>Cancel</button>
            </div>
          </div>;
        }
        return <div className="tl" key={ix}>{x.w}
          {canEditEntry?<span className="org-edit-dept" title="Edit entry" onClick={()=>{setEditingLogId(le.id);setEditText(le.text);}}>✎</span>:null}
          <div className="when">{x.d}</div></div>;
      })}</div>
    </div>
    {canDelete?<div className="dr-actions" style={{borderBottom:'none',paddingBottom:0}}>
      {confirmDel?<div style={{flex:1,display:'flex',alignItems:'center',gap:8,flexWrap:'wrap'}}>
        <span style={{fontSize:12.5,fontWeight:700,color:'var(--red)'}}>Delete this task? This can’t be undone.</span>
        <div style={{marginLeft:'auto',display:'flex',gap:8}}>
          <button className="btn ghost" style={{padding:'7px 14px'}} onClick={()=>setConfirmDel(false)}>Cancel</button>
          <button className="btn" style={{padding:'7px 14px',color:'#a52741',borderColor:'#f0c4cf',background:'var(--red-soft,#fbe4e8)'}} onClick={doDelete}>Delete</button>
        </div>
      </div>:
        <button className="btn" style={{flex:1,color:'#a52741',borderColor:'#f0c4cf',background:'var(--red-soft,#fbe4e8)'}} onClick={()=>setConfirmDel(true)}>🗑 Delete task</button>}
    </div>:null}
    <div className="dr-actions">
      {editing?<>
        <button className="btn ghost" style={{flex:1}} onClick={()=>setEditing(false)}>Cancel</button>
        <button className="btn primary" style={{flex:2}} onClick={saveEdit}><I n="check"/>Save changes</button>
      </>:<>
      <button className="btn ghost" style={{flex:1}} onClick={()=>ctx.remindPerson(t.who)}><I n="bell"/>Remind</button>
      <button className="btn ghost" style={{flex:1}} onClick={()=>setReassign(!reassign)}><I n="redo"/>Reassign</button>
      <button className="btn primary" style={{flex:1}} onClick={()=>{
        if(t.completionPending){ctx.setDrawerIdx(-1);return;}
        if(pendingDone&&t.status!=='done'){
          const r=submitOrComplete(t);persistComplete(t,r.nd);
          notifyEvent(t.id,ctx.viewer.id,r.pending?'submitted for completion approval':'completed the task',concernedFor(t,ctx.viewer.s));
          ctx.R();ctx.setDrawerIdx(-1);
          ctx.say(r.pending?'Marked complete — waiting for approval':(r.nd?'Done · next '+RECURS[t.recur].toLowerCase()+' occurrence '+fmtDate(r.nd):'Task marked done'));
        }
        else ctx.setDrawerIdx(-1);
      }}><I n="check"/>OK</button>
      </>}
    </div>
  </div>;
}

/* ============ calendar ============ */
function CalendarView({ctx}){
  const [base,setBase]=useState(new Date(2026,6,1));
  const [selDay,setSelDay]=useState(null);
  const [fw,setFw]=useState('all');
  const [fb,setFb]=useState('all');
  const selRef=useRef(null);
  useEffect(()=>{if(selDay!=null)selRef.current?.scrollIntoView({behavior:'instant',block:'nearest'});},[selDay]);
  const y=base.getFullYear(),m=base.getMonth();
  const firstDow=new Date(y,m,1).getDay(),days=new Date(y,m+1,0).getDate();
  const vis=tasks.map((t,i)=>({t,i})).filter(o=>inScope(o.t,ctx.shorts)&&o.t.date&&(fb==='all'||o.t.bucket===fb)&&(fw==='all'||hasWho(o.t,fw)));
  const empOpts=ctx.scope.filter(p=>inDept(p,fb));
  const byDay={};vis.forEach(o=>{const d=new Date(o.t.date+'T00:00:00');if(d.getFullYear()===y&&d.getMonth()===m)(byDay[d.getDate()]=byDay[d.getDate()]||[]).push(o);});
  const monthEvs=Object.values(byDay).flat();
  const bks=[...new Set(monthEvs.map(o=>o.t.bucket).filter(Boolean))];
  const cells=[];
  for(let i=0;i<firstDow;i++)cells.push(<div key={'e'+i} className="calcell empty2"/>);
  for(let d=1;d<=days;d++){

const byId=id=>STAFF.find(p=>p.id===id);
const directReports=name=>STAFF.filter(p=>p.boss===name);
const orgDepts=()=>STAFF.filter(p=>p.role==='Manager'); // Sr. Manager rows = department heads
/* task creation should only offer departments that actually exist in People & roles right now,
   not the full fixed BUCKETS vocabulary regardless of whether anyone's really in it */
/* the Administrator's own department doesn't count toward "real" — their role is running the
   org chart, not doing task work, so their department alone shouldn't make it assignable */
/* defaults to org-wide (STAFF) for task creation, where categorizing new work under any real
   department makes sense regardless of who's creating it. Filter dropdowns on scoped views
   (Dashboard/Tasks/Calendar/Reports) pass ctx.scope instead — a Manager whose visible scope is
   just their own team shouldn't be offered a department nobody in that scope belongs to; picking
   it would always show zero results. */
const realDeptKeys=(scope=STAFF)=>{const has=new Set(scope.filter(p=>p.role!=='Administrator').map(p=>p.dept));return Object.keys(BUCKETS).filter(k=>has.has(BUCKETS[k]));};
const mgmtMembers=()=>STAFF.filter(p=>p.role==='Management');
function orgDeepestOfType(rootName,dbRole){
  let last=null;
  (function walk(name){directReports(name).forEach(c=>{if(c.role===dbRole)last=c;walk(c.n);});})(rootName);
  return last;
}
function personLabel(p){
  const tier=roleLabel(p);
  if(p.role==='Manager'){const hd=headDeptsOf(p);return tier+' — '+(hd.length?hd.join(', '):'no department')+' ('+p.n+')';}
  if(p.role==='Management'||p.role==='Director')return tier+' — '+p.n;
  return tier+' — '+p.n+' ('+p.dept+')';
}

async function updateStaffFields(id,fields){
  const {error}=await sb.from('staff').update(fields).eq('id',id);
  if(error)throw error;

/* Repoint every task assigned to `fromId` onto `toId`. task_assignees' PK is (task_id, staff_id),
   so a task jointly assigned to BOTH people would collide on a blind UPDATE ("duplicate key value
   violates unique constraint task_assignees_pkey"). De-dupe first: drop `fromId`'s rows for tasks
   `toId` already has, THEN move the rest over. */
async function mergeTaskAssignees(fromId,toId){
  const {data:toRows,error:readErr}=await sb.from('task_assignees').select('task_id').eq('staff_id',toId);
  if(readErr)throw readErr;
  const overlap=(toRows||[]).map(r=>r.task_id);
  if(overlap.length){
    const {error:delErr}=await sb.from('task_assignees').delete().eq('staff_id',fromId).in('task_id',overlap);
    if(delErr)throw delErr;
  }
  const {error:updErr}=await sb.from('task_assignees').update({staff_id:toId}).eq('staff_id',fromId);
  if(updErr)throw updErr;
}
/* exports every NOT-DONE task assigned to this person or anyone below them — one row per task,
   with status/due date/files/activity log, not just a headcount */
function exportPersonTasksCsv(root){
  const people=[root,...descendants(root.n)];
  const shorts=people.map(p=>p.s);
  const byShortName=Object.fromEntries(people.map(p=>[p.s,p]));
  const rows=[['Role','Name','Department','Task','Status','Issued','Due date','Files attached','Activity log']];
  tasks.filter(t=>t.status!=='done'&&assignees(t).some(a=>shorts.includes(a))).forEach(t=>{
    assignees(t).filter(a=>shorts.includes(a)).forEach(a=>{
      const p=byShortName[a];
      rows.push([p.role,p.n,p.dept,t.t,(ST[t.status]||{l:t.status}).l,dmyTs(t.issued),dmy(t.date),
        (t.files||[]).map(f=>f.name).join('; ')||'—',
        (t.log||[]).map(l=>l.when+' — '+l.by+': '+l.text).join(' | ')||'—']);
    });
  });
  csvDownload(root.n.toLowerCase().replace(/\s+/g,'-')+'-pending-tasks-export.csv',rows);
}

/* chainSiblings: set only when this node is a Staff member mid-chain (see below) — the remaining
   Staff still waiting to be nested under this one, so multiple Staff under one Team Lead render as
   a straight vertical chain instead of a branching sibling row. Reuses the existing only-child
   connector CSS as-is; no new styles needed. */
function OrgNode({person,onNodeClick,canM,chainSiblings}){
  const rawKids=STAFF.filter(x=>x.boss===person.n);
  const staffChain=!chainSiblings&&rawKids.length>1&&rawKids.every(k=>k.role==='Teacher');
  /* heads: the departments this Sr. Manager fully heads (multi-dept). When they head >1, their
     direct reports (which after reparenting = everyone in those departments) render grouped into a
     labelled column per department instead of one flat sibling row — the mockup's org-chart layout. */
  const heads=person.role==='Manager'?headDeptsOf(person):null;
  const isMultiHead=heads&&heads.length>1;
  let below=null;
  if(chainSiblings&&chainSiblings.length){
    below=<ul><OrgNode person={chainSiblings[0]} onNodeClick={onNodeClick} canM={canM} chainSiblings={chainSiblings.slice(1)}/></ul>;
  }else if(isMultiHead&&rawKids.length){
    const order=[...heads,...[...new Set(rawKids.map(k=>k.dept))].filter(d=>!heads.includes(d))];
    const groups=order.map(d=>({d,kids:rawKids.filter(k=>k.dept===d)})).filter(g=>g.kids.length);
    below=<ul>{groups.map(g=><li key={g.d}>
      <div className="onode-wrap"><div className="odeptgroup">{g.d}</div></div>
      <ul>{g.kids.map(k=><OrgNode key={k.id} person={k} onNodeClick={onNodeClick} canM={canM}/>)}</ul>
    </li>)}</ul>;
  }else if(staffChain){
    below=<ul><OrgNode key={rawKids[0].id} person={rawKids[0]} onNodeClick={onNodeClick} canM={canM} chainSiblings={rawKids.slice(1)}/></ul>;
  }else if(rawKids.length){
    below=<ul>{rawKids.map(k=><OrgNode key={k.id} person={k} onNodeClick={onNodeClick} canM={canM}/>)}</ul>;
  }
  return <li>
    <div className={'onode-wrap'+(person.tempCovering?' temp':'')}>
      <div className={'onode'+(person.role==='Director'?' director':'')+(canM?'':' static')} onClick={()=>onNodeClick(person)}>
        <div className="orole">{roleLabel(person)}</div>
        <div className="oname">{person.n}</div>
        {person.role==='Manager'?<div className="ochips">
          {heads.length?heads.map(d=><span className="ochip" key={d}>{d}</span>):<span className="ochip none">no department</span>}
          {/* rename ✎ stays only for a single-department head (unambiguous); multi-dept is managed
             from the person card's "Manage departments" picker */}
          {canM&&heads.length<=1?<span className="org-edit-dept" title="Rename department" onClick={e=>{e.stopPropagation();onNodeClick(person,'rename-dept');}}>✎</span>:null}
        </div>:null}
        {(person.role==='Team Lead'||person.role==='Team Member')?(person.subDept?
          <div className="odept">{person.subDept}
            {canM?<span className="org-edit-dept" title="Edit sub-department" onClick={e=>{e.stopPropagation();onNodeClick(person,'rename-subdept');}}>✎</span>:null}
          </div>
          :(canM?<div className="odept odept-add" onClick={e=>{e.stopPropagation();onNodeClick(person,'rename-subdept');}}>+ Sub-department</div>:null)
        ):null}
        {person.tempCovering?<><div className="otempflag">Temporary</div><div className="otaphint">Click to revert</div></>:null}
      </div>
    </div>
    {below}
  </li>;
}

function OrgChart({onNodeClick,canM,rootPerson}){
  /* A Director now loads org-wide non-leadership staff into STAFF (RLS widened so they can ASSIGN
     across departments), but their oversight — including this org chart — must stay their own
     subtree. When rootPerson is given (Directors), render just that subtree via the generic
     boss-walk OrgNode instead of the whole admin -> mgmt -> every-department tree. admin/mgmt keep
     the full chart. */
  if(rootPerson)return <ul className="orgtree"><OrgNode person={rootPerson} onNodeClick={onNodeClick} canM={canM}/></ul>;
  const admin=STAFF.find(p=>p.role==='Administrator');
  if(!admin)return <Empty t="No Admin account yet" s=""/>;
  const mgmt=mgmtMembers();
  const directors=STAFF.filter(p=>p.role==='Director');
  /* orgDepts() is every Sr. Manager regardless of who they report to. OrgNode is a generic
     boss-name tree-walk, so a Sr. Manager whose boss is a Director already renders correctly
     nested under that Director once the Director itself is rendered — the only thing this split
     does is stop ALSO rendering those same Sr. Managers a second time as direct children of
     Management. */
  const directorNames=new Set(directors.map(d=>d.n));
  const directDepts=orgDepts().filter(d=>!directorNames.has(d.boss));
  return <ul className="orgtree"><li>
    <div className="onode-wrap"><div className="onode admin"><div className="orole">Admin</div><div className="oname">{admin.n}</div></div></div>
    {mgmt.length?<ul><li>
      <div className="onode-wrap"><div className="onode mgmt">
        <div className="orole">Management</div>
        {mgmt.map(m=><div className="org-mgmt-member" key={m.id} onClick={()=>onNodeClick(m)}>
          <div className="oname">{m.n}</div>
          {m.tempCovering?<><div className="otempflag">Temporary</div><div className="otaphint">Click to revert</div></>:null}
        </div>)}
      </div></div>
      {(directors.length||directDepts.length)?<ul>
        {directors.map(d=><OrgNode key={d.id} person={d} onNodeClick={onNodeClick} canM={canM}/>)}
        {directDepts.map(d=><OrgNode key={d.id} person={d} onNodeClick={onNodeClick} canM={canM}/>)}
      </ul>:null}
    </li></ul>:null}
  </li></ul>;
}

    const subs={'add-jrm':"Attaches directly under that department's Sr. Manager.",
      'add-lead':"Attaches under that department's most recent Jr Manager — or directly under the Sr. Manager if it has none yet.",
      'add-staff':'Attaches under the most specific existing manager in that department (Team Lead, else Jr Manager, else the Sr. Manager).'};
    /* one option per (Sr. Manager, headed department) pair — a Manager who heads several departments
       offers each as a separate destination, so new staff land in the right department under the shared
       head. Keyed by managerId::dept because a manager id alone is no longer unique across options. */
    const depts=[];orgDepts().forEach(m=>headDeptsOf(m).forEach(d=>depts.push({key:m.id+'::'+d,id:m.id,dept:d,n:m.n})));
    return <ModalShell close={close} err={err} title={titles[step]} sub={subs[step]}>
      <div className="mf">
        <label>Name</label><input value={f.name||''} onChange={e=>setF({...f,name:e.target.value})} placeholder="e.g. Deepa Iyer" autoFocus/>
        <label>Username (optional)</label><input value={f.username||''} onChange={e=>setF({...f,username:e.target.value})} placeholder="auto-generated from name if left blank"/>
        <label>Department</label>
        <select value={f.deptId||(depts[0]||{}).key||''} onChange={e=>setF({...f,deptId:e.target.value})}>
          {depts.map(d=><option key={d.key} value={d.key}>{d.dept}{d.n?' — '+d.n:''}</option>)}
        </select>
        {(step==='add-lead'||step==='add-jrm')?<>
          <label>Sub-department name</label>
          <input value={f.subDept||''} onChange={e=>setF({...f,subDept:e.target.value})} placeholder="e.g. Network Support (optional)"/>
        </>:null}
        <label>Password (optional)</label><input type="text" value={f.password||''} onChange={e=>setF({...f,password:e.target.value})} placeholder="auto-generated if left blank · min 6 chars"/>
      </div>
      <div className="qc-actions">
        <button className="btn soft" style={{flex:1}} onClick={close}>Cancel</button>
        <button className="btn primary" style={{flex:2,justifyContent:'center'}} disabled={busy} onClick={async()=>{
          const name=(f.name||'').trim();
          const deptKey=f.deptId||(depts[0]||{}).key;
          const deptHead=depts.find(d=>d.key===deptKey);
          const subDept=(step==='add-lead'||step==='add-jrm')?(f.subDept||'').trim()||undefined:undefined;
          if(!name){setErr('Enter a name.');return;}
          if(!deptHead){setErr('Pick a department.');return;}
          const dbRole=step==='add-jrm'?'Team Member':step==='add-lead'?'Team Lead':'Teacher';
          const attachPoint=step==='add-jrm'?deptHead
            :step==='add-lead'?(orgDeepestOfType(deptHead.n,'Team Member')||deptHead)
            :(orgDeepestOfType(deptHead.n,'Team Lead')||orgDeepestOfType(deptHead.n,'Team Member')||deptHead);
          if(step==='add-jrm'||step==='add-lead'){
            const existing=orgDeepestOfType(deptHead.n,dbRole);
            const candidates=directReports(attachPoint.n);
            if(!existing&&candidates.length){
              setOaCtx({dbRole,name,deptHead,attachPoint,candidates,subDept});
              setStep('add-reassign');
              return;
            }
          }
          setBusy(true);setErr('');
          try{
            const j=await createStaffAccount({name,role:dbRole,department:deptHead.dept,subDept,boss:attachPoint.n,username:(f.username||'').trim()||undefined,password:(f.password||'').trim()||undefined});
            STAFF.push({n:j.name,s:j.short_name,role:dbRole,dept:deptHead.dept,subDept,boss:attachPoint.n,bossId:attachPoint.id,av:j.name.split(' ').map(x=>x[0]).join('').slice(0,2).toUpperCase(),id:j.id,authId:null});
            ctx.R();say('Added '+TIER_LABEL[dbRole]+' '+name+' under '+deptHead.dept);setBusy(false);setResult(j);
          }catch(e){setBusy(false);setErr(e.message);}
        }}>{busy?'Adding…':'Add'}</button>
      </div>
    </ModalShell>;
  }
  if(step==='add-reassign'){
    const {dbRole,name,deptHead,attachPoint,candidates,subDept}=oaCtx;
    const [checked,setChecked]=[f.checked||Object.fromEntries(candidates.map(c=>[c.id,true])),
      sel=>setF({...f,checked:sel})];
    return <ModalShell close={close} err={err} title={'Who reports to the new '+TIER_LABEL[dbRole]+'?'}
      sub={'This is the first '+TIER_LABEL[dbRole]+' in '+deptHead.dept+' — pick who moves from reporting to '+(TIER_LABEL[attachPoint.role]||attachPoint.role)+' to reporting to them instead.'}>
      <div className="org-checklist">{candidates.map(c=><label className="org-check-row" key={c.id}>
        <input type="checkbox" checked={checked[c.id]!==false} onChange={e=>setChecked({...checked,[c.id]:e.target.checked})}/>
        {roleLabel(c)} — {c.n}
      </label>)}</div>
      <div className="qc-actions">
        <button className="btn soft" style={{flex:1}} onClick={close}>Back</button>
        <button className="btn primary" style={{flex:2,justifyContent:'center'}} disabled={busy} onClick={async()=>{
          setBusy(true);setErr('');
          try{
            const j=await createStaffAccount({name,role:dbRole,department:deptHead.dept,subDept,boss:attachPoint.n,username:(f.username||'').trim()||undefined,password:(f.password||'').trim()||undefined});
            const newPerson={n:j.name,s:j.short_name,role:dbRole,dept:deptHead.dept,subDept,boss:attachPoint.n,bossId:attachPoint.id,av:j.name.split(' ').map(x=>x[0]).join('').slice(0,2).toUpperCase(),id:j.id,authId:null};
            STAFF.push(newPerson);
            const moved=candidates.filter(c=>checked[c.id]!==false);
            for(const c of moved){await updateStaffFields(c.id,{boss_id:j.id});const local=byId(c.id);if(local){local.boss=j.name;local.bossId=j.id;}}
            ctx.R();
            say('Added '+TIER_LABEL[dbRole]+' '+name+' under '+deptHead.dept+(moved.length?' — '+moved.length+' report'+(moved.length===1?'':'s')+' now reporting to them':''));
            setBusy(false);setResult(j);
          }catch(e){setBusy(false);setErr(e.message);}
        }}>{busy?'Adding…':'Add'}</button>
      </div>
    </ModalShell>;
  }

  /* ---------- Remove / Replace / Promote / Revert ---------- */
  if(step==='remove-role'){
    return <ModalShell close={close} err={err} title="Remove someone" sub="Who do you want to remove?">
      <div className="org-role-grid">
        <button onClick={()=>{setOaCtx({dbRole:'Management'});setStep('remove-person');}}>Management</button>
        <button onClick={()=>{setOaCtx({dbRole:'Director'});setStep('remove-person');}}>Director</button>
        <button onClick={()=>{setOaCtx({dbRole:'Manager'});setStep('remove-person');}}>Sr. Manager</button>
        <button onClick={()=>{setOaCtx({dbRole:'Team Member'});setStep('remove-person');}}>Jr. Manager</button>
        <button onClick={()=>{setOaCtx({dbRole:'Team Lead'});setStep('remove-person');}}>Team Lead</button>
        <button style={{gridColumn:'1/-1'}} onClick={()=>{setOaCtx({dbRole:'Teacher'});setStep('remove-person');}}>Staff</button>
      </div>
      <div className="qc-actions"><button className="btn soft" style={{flex:1}} onClick={close}>Cancel</button></div>
    </ModalShell>;
  }
  if(step==='remove-person'){
    const {dbRole}=oaCtx;
    const entries=STAFF.filter(p=>p.role===dbRole);
    return <ModalShell close={close} err={err} title={'Remove — '+TIER_LABEL[dbRole]} sub={entries.length?'Which one?':'There are none of these to remove right now.'}>
      {entries.length?<div className="mf"><label>{TIER_LABEL[dbRole]}</label>
        <select value={f.targetId||entries[0].id} onChange={e=>setF({...f,targetId:e.target.value})}>
          {entries.map(e=><option key={e.id} value={e.id}>{personLabel(e)}</option>)}
        </select></div>:null}
      <div className="qc-actions">
        <button className="btn soft" style={{flex:1}} onClick={close}>Cancel</button>
        {entries.length?<button className="btn primary" style={{flex:2,justifyContent:'center'}} onClick={()=>{
          const target=byId(f.targetId||entries[0].id);
          exportPersonTasksCsv(target);
          setOaCtx({...oaCtx,target});
          setStep('remove-action');
        }}>Continue</button>:null}
      </div>
    </ModalShell>;
  }
  if(step==='remove-action'){
    const {target}=oaCtx;
    /* Removing a Sr. Manager who heads ≥1 department FORCES a hand-over: their departments (and
       everyone in them) must land on another Sr. Manager so nothing is left headless. This replaces
       the usual replace/promote/merge/hand-over/demote choices for that case (mockup step 3). */
    if(target.role==='Manager'){
      const targetHeads=headDeptsOf(target);
      if(targetHeads.length){
        const srms=STAFF.filter(p=>p.role==='Manager'&&p.id!==target.id);
        const absorber=byId(f.absorberId||(srms[0]||{}).id);
        return <ModalShell close={close} err={err} title={target.n+' heads '+targetHeads.length+' department'+(targetHeads.length===1?'':'s')}
          sub={srms.length
            ?'Hand '+targetHeads.join(' & ')+' over to another Sr. Manager before removing '+target.n+". Both the departments and everyone in them move in one step; "+target.n+"'s account is then removed."
            :'There is no other Sr. Manager to hand '+targetHeads.join(' & ')+" over to. Add or appoint another Sr. Manager first, then remove "+target.n+'.'}>
          {srms.length?<div className="mf"><label>Hand {targetHeads.join(' & ')} over to</label>
            <select value={f.absorberId||srms[0].id} onChange={e=>setF({...f,absorberId:e.target.value})}>
              {srms.map(c=><option key={c.id} value={c.id}>{personLabel(c)}</option>)}
            </select></div>:null}
          <div className="qc-actions">
            <button className="btn soft" style={{flex:1}} onClick={()=>setStep('remove-person')}>Back</button>
            {srms.length?<button className="btn primary" style={{flex:2,justifyContent:'center'}} disabled={busy} onClick={async()=>{
              setBusy(true);setErr('');
              try{
                const heads=headDeptsOf(target);
                // combined set: absorber keeps their own departments and gains the removed head's
                const newAbs=[...new Set([...headDeptsOf(absorber),...heads])];
                await updateStaffFields(absorber.id,{head_departments:newAbs});
                absorber.headDepartments=newAbs;
                // everyone (non-Manager) in the moved departments reports up to the absorber
                const movers=STAFF.filter(p=>heads.includes(p.dept)&&p.id!==target.id&&p.id!==absorber.id&&p.role!=='Manager');
                for(const r of movers){await updateStaffFields(r.id,{boss_id:absorber.id});const local=byId(r.id);if(local){local.boss=absorber.n;local.bossId=absorber.id;}}
                // carry any remaining reports + tasks over, then remove the account (mirrors hand-over)
                await mergeTaskAssignees(target.id,absorber.id);
                let movedTasks=0;
                tasks.forEach(t=>{let changed=false;
                  if(t.who===target.s){t.who=absorber.s;changed=true;}
                  if(t.coWho&&t.coWho.includes(target.s)){t.coWho=t.coWho.map(s=>s===target.s?absorber.s:s);changed=true;}
                  if(changed&&t.coWho)t.coWho=[...new Set(t.coWho)].filter(s=>s!==t.who);
                  if(changed)movedTasks++;});
                await deleteStaffAccount(target.id,absorber.id);
                STAFF.splice(STAFF.indexOf(target),1);
                ctx.R();say('Removed '+target.n+' — '+heads.join(' & ')+' now headed by '+absorber.n+(movedTasks?' · '+movedTasks+' task'+(movedTasks===1?'':'s')+' moved':''));
                setBusy(false);close();
              }catch(e){setBusy(false);setErr(e.message);}
            }}>{busy?'Handing over…':'Hand over & remove'}</button>:null}
          </div>
        </ModalShell>;
      }
    }
    const openCount=tasks.filter(t=>t.status!=='done'&&assignees(t).includes(target.s)).length;
    const candidateCount=STAFF.filter(p=>p.role!=='Administrator'&&p.id!==target.id).length;
    const canMerge=target.role==='Team Lead'||target.role==='Team Member';
    const mergeCandidates=canMerge?STAFF.filter(p=>p.role===target.role&&p.dept===target.dept&&p.id!==target.id):[];
    const tierIdx=DEMOTE_LADDER.indexOf(target.role);
    const demoteRoles=tierIdx>=0?DEMOTE_LADDER.slice(tierIdx+1):[];
    return <ModalShell close={close} err={err} title={canMerge?'Replace, promote, merge, or hand over?':'Replace, promote, or hand over?'}>
      <div className="org-info-box">Exported {(TIER_LABEL[target.role]||target.role).toLowerCase()} data for "{target.n}" as a CSV — one row per pending task, with status, due date, attached files, and full activity log.
        {openCount?<> They have <b>{openCount} pending task{openCount===1?'':'s'}</b> — reassign those separately if they don't move with whoever fills this position.</>:null}</div>
      <div className="org-action-grid">
        <button onClick={()=>setStep('remove-replace-name')}>Replace<small>Bring in someone new</small></button>
        <button disabled={!candidateCount} onClick={()=>setStep('remove-promote-pick')}>Promote<small>{candidateCount?'Anyone in the org':'No one to promote'}</small></button>
        {canMerge?<button disabled={!mergeCandidates.length} onClick={()=>setStep('remove-merge-pick')}>Merge<small>{mergeCandidates.length?'Fold into another '+TIER_LABEL[target.role]:'No other '+TIER_LABEL[target.role]+' in '+target.dept}</small></button>:null}
        <button disabled={!candidateCount} onClick={()=>setStep('remove-handover-pick')}>Hand over<small>{candidateCount?'Reassign tasks & reports, leave role vacant':'No one to hand over to'}</small></button>
        <button disabled={!demoteRoles.length} onClick={()=>{setF({...f,demoteRole:demoteRoles[0]});setStep('remove-demote');}}>Demote<small>{demoteRoles.length?'Lower their role, keep their team':'Already at the lowest role'}</small></button>
      </div>
      <div className="qc-actions"><button className="btn soft" style={{flex:1}} onClick={close}>Cancel</button></div>
    </ModalShell>;
  }
  if(step==='remove-merge-pick'){
    const {target}=oaCtx;
    const mergeCandidates=STAFF.filter(p=>p.role===target.role&&p.dept===target.dept&&p.id!==target.id);
    const absorber=byId(f.mergeId||mergeCandidates[0].id);
    return <ModalShell close={close} err={err} title={'Merge '+target.n+"'s team into…"}
      sub={"Everyone reporting to "+target.n+" moves to whoever you pick, and "+target.n+"'s account is removed. "+
        (target.subDept?'"'+target.subDept+'" is dropped — the sub-department keeps the absorbing '+TIER_LABEL[target.role]+"'s own name.":'No sub-department name to carry over.')}>
      <div className="mf"><label>Merge into</label>
        <select value={f.mergeId||mergeCandidates[0].id} onChange={e=>setF({...f,mergeId:e.target.value})}>
          {mergeCandidates.map(c=><option key={c.id} value={c.id}>{personLabel(c)}</option>)}
        </select></div>
      <div className="qc-actions">
        <button className="btn soft" style={{flex:1}} onClick={()=>setStep('remove-action')}>Back</button>
        <button className="btn primary" style={{flex:2,justifyContent:'center'}} disabled={busy} onClick={async()=>{
          setBusy(true);setErr('');
          try{
            const reports=directReports(target.n);
            for(const r of reports){await updateStaffFields(r.id,{boss_id:absorber.id});const local=byId(r.id);if(local){local.boss=absorber.n;local.bossId=absorber.id;}}
            await mergeTaskAssignees(target.id,absorber.id);
            let movedTasks=0;
            tasks.forEach(t=>{let changed=false;
              if(t.who===target.s){t.who=absorber.s;changed=true;}
              if(t.coWho&&t.coWho.includes(target.s)){t.coWho=t.coWho.map(s=>s===target.s?absorber.s:s);changed=true;}
              if(changed&&t.coWho)t.coWho=[...new Set(t.coWho)].filter(s=>s!==t.who);
              if(changed)movedTasks++;});
            await deleteStaffAccount(target.id,absorber.id);
            STAFF.splice(STAFF.indexOf(target),1);
            ctx.R();say('Merged '+target.n+"'s team into "+absorber.n+(reports.length?' — '+reports.length+' report'+(reports.length===1?'':'s')+' reassigned':'')+(movedTasks?' · '+movedTasks+' task'+(movedTasks===1?'':'s')+' moved':''));
            setBusy(false);close();
          }catch(e){setBusy(false);setErr(e.message);}
        }}>{busy?'Merging…':'Confirm merge'}</button>
      </div>
    </ModalShell>;
  }
  if(step==='remove-handover-pick'){
    const {target}=oaCtx;
    const candidates=STAFF.filter(p=>p.role!=='Administrator'&&p.id!==target.id);
    const absorber=byId(f.handoverId||candidates[0].id);
    return <ModalShell close={close} err={err} title={'Hand over '+target.n+"'s work to…"}
      sub={"Everyone reporting to "+target.n+" and every task assigned to them moves to whoever you pick, and "+target.n+"'s account is removed. The "+TIER_LABEL[target.role]+" position itself stays vacant."}>
      <div className="mf"><label>Hand over to</label>
        <select value={f.handoverId||candidates[0].id} onChange={e=>setF({...f,handoverId:e.target.value})}>
          {candidates.map(c=><option key={c.id} value={c.id}>{personLabel(c)}</option>)}
        </select></div>
      <div className="qc-actions">
        <button className="btn soft" style={{flex:1}} onClick={()=>setStep('remove-action')}>Back</button>
        <button className="btn primary" style={{flex:2,justifyContent:'center'}} disabled={busy} onClick={async()=>{
          setBusy(true);setErr('');
          try{
            const reports=directReports(target.n);
            for(const r of reports){await updateStaffFields(r.id,{boss_id:absorber.id});const local=byId(r.id);if(local){local.boss=absorber.n;local.bossId=absorber.id;}}
            await mergeTaskAssignees(target.id,absorber.id);
            let movedTasks=0;
            tasks.forEach(t=>{let changed=false;
              if(t.who===target.s){t.who=absorber.s;changed=true;}
              if(t.coWho&&t.coWho.includes(target.s)){t.coWho=t.coWho.map(s=>s===target.s?absorber.s:s);changed=true;}
              if(changed&&t.coWho)t.coWho=[...new Set(t.coWho)].filter(s=>s!==t.who);
              if(changed)movedTasks++;});
            await deleteStaffAccount(target.id,absorber.id);
            STAFF.splice(STAFF.indexOf(target),1);
            ctx.R();say("Handed "+target.n+"'s work to "+absorber.n+(reports.length?' — '+reports.length+' report'+(reports.length===1?'':'s')+' reassigned':'')+(movedTasks?' · '+movedTasks+' task'+(movedTasks===1?'':'s')+' moved':''));
            setBusy(false);close();
          }catch(e){setBusy(false);setErr(e.message);}
        }}>{busy?'Handing over…':'Confirm hand over'}</button>
      </div>
    </ModalShell>;
  }
  if(step==='remove-demote'){
    const {target}=oaCtx;
    const tierIdx=DEMOTE_LADDER.indexOf(target.role);
    const demoteRoles=tierIdx>=0?DEMOTE_LADDER.slice(tierIdx+1):[];
    const newRole=f.demoteRole||demoteRoles[0];
    const reports=directReports(target.n);
    return <ModalShell close={close} err={err} title={'Demote '+target.n}
      sub={"Lowers "+target.n+"'s role in place. Their department, who they report to, and their team all stay exactly the same — only the role (and its title) changes."}>
      <div className="mf"><label>New role</label>
        <select value={newRole} onChange={e=>setF({...f,demoteRole:e.target.value})}>
          {demoteRoles.map(r=><option key={r} value={r}>{TIER_LABEL[r]||r}</option>)}
        </select></div>
      {reports.length?<div className="org-info-box">Heads up — {target.n} still has <b>{reports.length} direct report{reports.length===1?'':'s'}</b>. They'll keep reporting to {target.n} after this; reassign them separately if that's not what you want.</div>:null}
      <div className="qc-actions">
        <button className="btn soft" style={{flex:1}} onClick={()=>setStep('remove-action')}>Back</button>
        <button className="btn primary" style={{flex:2,justifyContent:'center'}} disabled={busy} onClick={async()=>{
          if(!newRole){setErr('Pick a role to demote to.');return;}
          setBusy(true);setErr('');
          try{
            const oldLabel=TIER_LABEL[target.role]||target.role,newLabel=TIER_LABEL[newRole]||newRole;
            /* in-place role change only — boss_id and direct reports are deliberately left alone
               (the same updateStaffFields path Promote uses, just pointed downward) */
            await updateStaffFields(target.id,{role:newRole});
            target.role=newRole;
            ctx.logAdmin('demote',target.n,{from:oldLabel,to:newLabel});
            ctx.R();say('Demoted '+target.n+' from '+oldLabel+' to '+newLabel);
            setBusy(false);close();
          }catch(e){setBusy(false);setErr(e.message);}
        }}>{busy?'Demoting…':'Confirm demote'}</button>
      </div>
    </ModalShell>;
  }
  if(step==='remove-replace-name'){
    const {target}=oaCtx;
    const isAdminTier=target.role==='Administrator'||target.role==='Management';
    return <ModalShell close={close} err={err} title={'Replace '+target.n} sub="Enter the name of the person filling this position.">
      <div className="mf">
        <label>New {TIER_LABEL[target.role]} name</label><input value={f.name||''} onChange={e=>setF({...f,name:e.target.value})} placeholder="e.g. Deepa Iyer" autoFocus/>
        {isAdminTier?<><label>Email (their real login)</label><input value={f.email||''} onChange={e=>setF({...f,email:e.target.value})} placeholder="name@school.org"/></>:null}
      </div>
      <div className="qc-actions">
        <button className="btn soft" style={{flex:1}} onClick={()=>setStep('remove-action')}>Back</button>
        <button className="btn primary" style={{flex:2,justifyContent:'center'}} disabled={busy} onClick={async()=>{
          const name=(f.name||'').trim();
          if(!name){setErr('Enter a name for the replacement.');return;}
          if(isAdminTier&&!/^[^@\s]+@[^@\s]+\.[^@\s]+$/.test((f.email||'').trim())){setErr('Enter a valid email for this role.');return;}
          setBusy(true);setErr('');
          try{
            const j=await createStaffAccount({name,role:target.role,department:target.dept,boss:target.boss,email:isAdminTier?f.email.trim():undefined});
            // a replaced Sr. Manager inherits the departments they headed (dept-less here — a Manager
            // who still heads departments is routed through the forced hand-over instead of Replace)
            const carriedHeads=target.role==='Manager'?headDeptsOf(target):null;
            if(carriedHeads)await updateStaffFields(j.id,{head_departments:carriedHeads});
            const reports=directReports(target.n);
            for(const r of reports){await updateStaffFields(r.id,{boss_id:j.id});const local=byId(r.id);if(local){local.boss=name;local.bossId=j.id;}}
            await deleteStaffAccount(target.id,j.id);
            STAFF.splice(STAFF.indexOf(target),1);
            STAFF.push({n:j.name,s:j.short_name,role:target.role,dept:target.dept,headDepartments:carriedHeads||undefined,boss:target.boss,bossId:target.bossId,av:j.name.split(' ').map(x=>x[0]).join('').slice(0,2).toUpperCase(),id:j.id,authId:null});
            ctx.R();say(name+' now fills the '+TIER_LABEL[target.role]+' position'+(target.dept?' ('+target.dept+')':''));setBusy(false);setResult(j);
          }catch(e){setBusy(false);setErr(e.message);}
        }}>{busy?'Replacing…':'Confirm replace'}</button>
      </div>
    </ModalShell>;
  }
  if(step==='remove-promote-pick'){
    const {target}=oaCtx;
    const candidates=STAFF.filter(p=>p.role!=='Administrator'&&p.id!==target.id);
    return <ModalShell close={close} err={err} title="Promote who?" sub="Anyone in the organization — the one you pick keeps their own team and absorbs whoever else reported to this position.">
      <div className="mf"><label>Promote</label>

  async function doPromote(temporary){
    const {target,promotedId}=oaCtx;
    const promoted=byId(promotedId);
    setBusy(true);setErr('');
    try{
      const homeTeamIds=directReports(promoted.n).map(c=>c.id);
      const homeSnapshot={home_role:promoted.role,home_department:promoted.dept,home_boss_id:promoted.bossId,home_team_ids:homeTeamIds};
      const others=directReports(target.n).filter(c=>c.id!==promoted.id);
      const carriedHeads=target.role==='Manager'?headDeptsOf(target):null; // dept-less here (see forced hand-over)
      const fields={role:target.role,department:target.dept,boss_id:target.bossId};
      if(carriedHeads)fields.head_departments=carriedHeads;
      if(temporary){fields.temp_covering=true;fields.temp_cover_snapshot=homeSnapshot;}
      await updateStaffFields(promoted.id,fields);
      for(const o of others){await updateStaffFields(o.id,{boss_id:promoted.id});const local=byId(o.id);if(local){local.boss=promoted.n;local.bossId=promoted.id;}}
      await deleteStaffAccount(target.id,promoted.id);
      STAFF.splice(STAFF.indexOf(target),1);
      Object.assign(promoted,{role:target.role,dept:target.dept,boss:target.boss,bossId:target.bossId,
        headDepartments:carriedHeads||promoted.headDepartments,
        tempCovering:temporary,tempSnap:temporary?homeSnapshot:null});
      ctx.logAdmin(temporary?'cover':'promote',promoted.n,{to:TIER_LABEL[target.role],dept:target.dept||undefined});
      ctx.R();
      say((promoted.n)+(temporary?' temporarily covering ':' promoted to ')+TIER_LABEL[target.role]+(target.dept?' ('+target.dept+')':''));
      setBusy(false);close();

  }
}

/* flags tasks whose tagged department/bucket doesn't match any assignee's real department — built
   after several one-off browser-console JS queries this session turned up exactly this class of
   bug. Scope mirrors the rest of Reports: admin/mgmt see everything, everyone else sees their own
   org-chart scope — deliberately NOT further narrowed by Reports' own department/employee filters,
   since filtering by department would trivially hide the very mismatches this is meant to surface. */
function DeptMismatchModal({ctx,close}){
  // Self-assigned tasks are deliberately excluded: this check exists to catch someone ELSE
  // assigning work to the wrong team, not to flag people for self-logging an ad-hoc task (e.g.
  // "Fix computers") under whatever bucket fits the work rather than their own HR department —
  // there's no assignment error possible when you assigned it to yourself.
  const [editing,setEditing]=useState(null); // {key, mode:'dept'|'reassign'} for the one row being fixed
  const flagged=tasks.filter(t=>inScope(t,ctx.shorts)&&!t.selfAssigned).map(t=>{
    const as=assignees(t).map(byShort).filter(Boolean);
    return {t,as,ok:as.some(p=>LABEL_TO_BUCKET[p.dept]===t.bucket)};
  }).filter(o=>!o.ok&&o.as.length); // tasks with no resolvable assignee are a different (missing-data) problem, not a mismatch

  // Two different real fixes for the same symptom, so both stay one click apart rather than
  // guessing which one applies: (1) the assignee genuinely moved departments and the task's
  // label is just stale — move the task to follow them. (2) the task itself genuinely belongs
  // to its tagged department, and the real mistake was assigning it to someone who's since left
  // that department — reassign it to someone who's actually still there instead.
  function fixBucket(t,newBucket){
    if(ctx.previewing){ctx.say("You're previewing — switch back to fix this for real");return;}
    if(!newBucket||newBucket===t.bucket){setEditing(null);return;}
    t.bucket=newBucket;
    saveTask(t).catch(console.error);
    ctx.R();
    ctx.say('Moved to '+BUCKETS[newBucket]);
    setEditing(null);
  }
  function fixAssignee(t,shortName){
    if(ctx.previewing){ctx.say("You're previewing — switch back to fix this for real");return;}
    if(!shortName)return;
    t.who=shortName;t.coWho=undefined;
    saveTask(t).catch(console.error);
    ctx.R();
    ctx.say('Reassigned to '+(byShort(shortName)||{n:shortName}).n);
    setEditing(null);
  }

  return <div className="modal-wrap" onClick={e=>{if(e.target===e.currentTarget)close();}}>
    <div className="modal" style={{width:560}}>
      <div className="qc-head"><h3>Department / assignee mismatches</h3><button className="iconbtn" onClick={close}><I n="x"/></button></div>
      <div className="mf">
        <div className="whysm" style={{marginTop:8}}>{flagged.length
          ?flagged.length+' task'+(flagged.length===1?'':'s')+' tagged into a department none of the assignees actually belong to.'
          :'No mismatches found in your current scope.'}</div>
        <div style={{maxHeight:'50vh',overflowY:'auto',marginTop:6}}>
          {flagged.map(o=>{
            const key=o.t.id||o.t.t;
            const taggedLabel=BUCKETS[o.t.bucket]||o.t.bucket;
            const suggested=LABEL_TO_BUCKET[(o.as[0]||{}).dept];
            const inOldDept=ctx.scope.filter(p=>p.dept===taggedLabel&&!assignees(o.t).includes(p.s));
            const mode=editing&&editing.key===key?editing.mode:null;
            return <div key={key} className="attn">
              <div style={{flex:1,minWidth:0}}>
                <div className="nm">{o.t.t}</div>
                <div className="rs">Tagged: <b>{taggedLabel}</b> · {o.as.map(p=>p.n+' ('+(p.dept||'—')+')').join(', ')}</div>
                {mode==='dept'?
                  /* only reached when there's no single suggested dept (e.g. assignees span >1 dept and
                     the first has no bucket) — a placeholder-first picker so the first real pick always
                     fires onChange (a pre-selected value would swallow the very choice being made). */
                  <div style={{marginTop:6,display:'flex',gap:10,alignItems:'center'}}>
                    <select className="fsel" style={{fontSize:12.5,padding:'3px 8px'}} defaultValue=""
                      onChange={e=>{if(e.target.value)fixBucket(o.t,e.target.value);}}>
                      <option value="">Choose a department…</option>
                      {realDeptKeys(ctx.scope).map(k=><option key={k} value={k}>{BUCKETS[k]}</option>)}
                    </select>
                    <button className="linkbtn" onClick={()=>setEditing(null)}>Cancel</button>
                  </div>
                :mode==='reassign'?
                  <div style={{marginTop:6}}>
                    <div style={{display:'flex',gap:10,alignItems:'center'}}>
                      <select className="fsel" style={{fontSize:12.5,padding:'3px 8px'}} defaultValue="" disabled={!inOldDept.length}
                        onChange={e=>{if(e.target.value)fixAssignee(o.t,e.target.value);}}>
                        <option value="">Choose someone in {taggedLabel}…</option>
                        {inOldDept.map(p=><option key={p.s} value={p.s}>{p.n}</option>)}
                      </select>
                      <button className="linkbtn" onClick={()=>setEditing(null)}>Cancel</button>
                    </div>
                    {!inOldDept.length?<div style={{fontSize:11.5,color:'var(--muted)',marginTop:4}}>No one else in your scope is currently in {taggedLabel} — use “Move task” instead.</div>:null}
                  </div>
                :<div className="act" style={{marginTop:6,marginLeft:0,gap:14}}>
                  {/* suggested dept known (the common case) → move in one click; the button already names
                      the destination, so a second dropdown step was pure friction (and pre-selected the
                      target, so picking it fired no change — the "Move doesn't work" bug). */}
                  <button className="linkbtn" onClick={()=>suggested?fixBucket(o.t,suggested):setEditing({key,mode:'dept'})}>
                    → Move task to {suggested?BUCKETS[suggested]:'a different department'}</button>
                  <button className="linkbtn" onClick={()=>setEditing({key,mode:'reassign'})}>
                    → Reassign within {taggedLabel}</button>
                </div>}
              </div>
            </div>;})}
        </div>
      </div>
      <div className="qc-actions"><button className="btn primary" style={{flex:1,justifyContent:'center'}} onClick={close}><I n="check"/>Done</button></div>
    </div>
  </div>;
}

/* per-submission daily_reports export/print — same #print-report/csvDownload machinery as
   exportRows/printRows above, just parameterized over daily_reports rows (+ the staff record
   each belongs to) instead of tasks.
   Both functions now need more than what's on the daily_reports row itself: task_snapshot comes
   free with the row (select('*') already fetches it), but linked report_issues don't — fetched
   here in one .in() query across every report being exported/printed, same "fetch fresh, don't
   keep live" spirit as the rest of this feature. Both are async now purely for that fetch; callers
   still fire-and-forget them exactly like every other mutation in this file.
   snapStatusLabel/DR_SEGS/issueResolutionText/fetchIssuesByReport and the whole Download-PDF
   pipeline live in shared.js since mobile gained the same PDF button (v71). */
async function exportDailyReports(rows,label){
  const issuesByReport=await fetchIssuesByReport(rows);
  const csvRows=[];
  rows.forEach(({row,p})=>{
    csvRows.push(['Person','Department','Date','Completed','Overdue','Open · on track']);
    csvRows.push([p?p.n:'—',p?p.dept:'',dmy(row.report_date),row.completed_count,row.overdue_count,row.pending_count]);
    const snap=row.task_snapshot||[];
    if(snap.length){
      csvRows.push([]);csvRows.push(['Task','Assignee','Department','Issued','Due','Status']);
      snap.forEach(t=>csvRows.push([t.title,t.assignee,t.department,dmyTs(t.issued),fmtDate(t.due),snapStatusLabel(t.status)]));
    }
    const clSnap=row.checklist_snapshot||[];
    if(clSnap.length){
      csvRows.push([]);csvRows.push(['Checklist item ('+clSnap.filter(c=>c.done).length+'/'+clSnap.length+' done)','Schedule','Done']);
      clSnap.forEach(c=>csvRows.push([c.body,c.sched,c.done?'Yes':'No']));
    }
    const issues=issuesByReport[row.id]||[];
    if(issues.length){
      csvRows.push([]);csvRows.push(['Issue/Incident','Priority','Status','Resolution']);
      issues.forEach(x=>csvRows.push([x.issue,x.priority,x.status==='resolved'?'Resolved':'Open',issueResolutionText(x)]));
    }
    csvRows.push([]);
  });
  csvDownload(iso(new Date())+'-teamflow-'+label.toLowerCase().replace(/\s+/g,'-')+'.csv',csvRows);
}
