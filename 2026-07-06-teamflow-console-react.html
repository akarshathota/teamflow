/* ===== Reports & requests tracker (Management & Admin only) =========================================
   Read-only, frontend-only aggregation — stores NOTHING new. It gathers into one list:
     • open + declined rows from `requests` (maintenance issues awaiting assignment; supply requests
       awaiting approval or awaiting procurement; anything declined), and
     • assigned rows from `tasks` whose origin is 'issue'/'request' (a report/request that became a
       real task), showing the assignee and the task's live status.
   Management & Admin already load every task + request org-wide via RLS, so this is pure client-side
   shaping. The view is additionally guarded in App() (only rendered for role mgmt/admin). */
function TrackerView({ctx}){
  const [tab,setTab]=useState('all');   // all | maint | supply | open
  const [mon,setMon]=useState('all');   // 'all' | 'YYYY-MM'
  const canManage=ctx.role==='mgmt'||ctx.role==='admin';
  const [,setTick]=useState(0);
  // days a ticket has been open: from the request date to its resolution (done/closed/declined) or today
  const daysOpen=(from,to)=>{if(!from)return null;const a=new Date((''+from).slice(0,10)),b=to?new Date((''+to).slice(0,10)):TODAY;return Math.max(0,Math.round((b-a)/864e5));};
  // close/resolve an open request straight from the tracker (management only)
  const closeReq=r=>{if(ctx.previewing){ctx.say("You're previewing — switch back to close for real");return;}
    r.resolved_at=new Date().toISOString();r.resolved_by=ctx.viewer.id;setTick(t=>t+1);ctx.R();
    resolveRequestRow(r).catch(console.error);ctx.say('Ticket #'+(r.ticket||'')+' closed');};
  const rows=[];
  // --- un-actioned items still living in `requests` (open) + anything declined -----------------------
  requests.forEach(r=>{
    const isIssue=r.kind==='issue';
    const cat=isIssue&&r.routing_rule_id?catById(r.routing_rule_id):null;
    const rep=byShort(r.from);
    let status,placeholder;
    if(r.resolved_at){
      status={cls:'done',dot:'var(--green)',text:'Closed'+(r.resolved_by?' by '+((byId2Name(r.resolved_by)||'management').split(' ')[0]):'')+' · '+fmtDate((''+r.resolved_at).slice(0,10))};
      placeholder='—';
    }else if(r.declined_at){
      status={cls:'rep',dot:'#9a938a',text:'Declined by '+((byId2Name(r.declined_by)||'a manager').split(' ')[0])};
      placeholder='—';
    }else if(isIssue){
      const recName=byId2Name(issueRecipientId(r));
      status={cls:'rep',dot:'#9a938a',text:'Reported'+(recName?' · with '+recName.split(' ')[0]:'')};
      placeholder='not yet assigned';
    }else if(r.stage==='approved'){
      status={cls:'wait',dot:'var(--amber)',text:'Approved · procuring'};
      placeholder='awaiting procurement';
    }else{
      const apName=byId2Name(ctx.supplyApproverId(r));
      status={cls:'wait',dot:'var(--amber)',text:'Awaiting approval'+(apName?' · '+apName.split(' ')[0]:'')};
      placeholder='awaiting approval';
    }
    const open=!r.declined_at&&!r.resolved_at;
    rows.push({
      item:r.t,sub:'Reported '+fmtDate(r.date),date:r.date,ticket:r.ticket,requested:r.date,files:r.files,
      age:daysOpen(r.date,r.resolved_at||r.declined_at),ageOpen:open,
      req:open?r:null, // open requests can be closed from the tracker
      typeKind:isIssue?'m':'s',
      typeIcon:isIssue?((cat&&cat.icon)||'🔧'):'📦',
      typeLabel:isIssue?((cat&&cat.label)||'Maintenance'):'Supply',
      reporter:rep?{n:rep.n,av:rep.av,c:avColor(rep.n)}:{n:r.from||'—',av:(r.from||'?')[0],c:'#888'},
      assignee:null,placeholder,status,isOpen:open});
  });
  // --- items that became real tasks (assigned) ------------------------------------------------------
  tasks.forEach(t=>{
    if(t.origin!=='issue'&&t.origin!=='request')return;
    const isIssue=t.origin==='issue';
    const assignee=byShort(t.who);
    const repName=reporterFromNote(t.note);
    const rep=repName?byName(repName):null;
    let status;
    if(t.status==='done'){
      status={cls:'done',dot:'var(--green)',text:'Done'+(t.doneOn?' · '+fmtDate(t.doneOn):'')};
    }else if(isOverdue(t)){
      const d=overdueDays(t);
      status={cls:'late',dot:'var(--red)',text:'Assigned · '+d+' day'+(d!=1?'s':'')+' late'};
    }else{
      status={cls:'prog',dot:'var(--blue)',text:'Assigned · '+ST[t.status].l};
    }
    const reqDate=t.requestedAt||(t.issued?(''+t.issued).slice(0,10):t.date);
    rows.push({
      item:t.t,sub:isIssue?'Maintenance report':'Supply request',date:t.issued||t.date,ticket:t.ticket,requested:reqDate,files:t.files,
      age:daysOpen(reqDate,t.status==='done'?t.doneOn:null),ageOpen:t.status!=='done',
      typeKind:isIssue?'m':'s',
      typeIcon:isIssue?'🔧':'📦',
      typeLabel:isIssue?'Maintenance':'Supply',
      reporter:rep?{n:rep.n,av:rep.av,c:avColor(rep.n)}:(repName?{n:repName,av:repName[0].toUpperCase(),c:'#888'}:null),
      reporterFallback:(!rep&&!repName)?(t.note||'—'):null,
      assignee:assignee?{n:assignee.n,av:assignee.av,c:avColor(assignee.n)}:null,
      placeholder:assignee?null:'not yet assigned',status,isOpen:t.status!=='done'});
  });
  const nMaint=rows.filter(r=>r.typeKind==='m').length;
  const nSupply=rows.filter(r=>r.typeKind==='s').length;
  const nOpen=rows.filter(r=>r.isOpen).length;
  const months=[...new Set(rows.map(r=>r.date&&(''+r.date).slice(0,7)).filter(Boolean))].sort().reverse();
  const monLbl=m=>{const p=m.split('-');return MONTHS[+p[1]-1]+' '+p[0];};
  const shown=rows.filter(r=>(tab==='all'?true:tab==='maint'?r.typeKind==='m':tab==='supply'?r.typeKind==='s':r.isOpen)
      &&(mon==='all'||(r.date&&(''+r.date).slice(0,7)===mon)))
    .sort((a,b)=>(a.isOpen===b.isOpen)?0:(a.isOpen?-1:1));
  const TABS=[['all','All'],['maint','🔧 Maintenance'],['supply','📦 Supplies'],['open','Open only']];
  return <div className="view">
    <div className="trk-panel">
      <div className="trk-head">
        <h3>🗂️ All reports &amp; requests</h3>
        <span className="trk-badge">Management &amp; Admin</span>
        <div className="trk-tabs">{TABS.map(([k,l])=>
          <button key={k} className={'trk-tab'+(tab===k?' on':'')} onClick={()=>setTab(k)}>{l}</button>)}
          <select className="fsel" style={{fontWeight:700,fontSize:12.5,padding:'6px 8px'}} value={mon} onChange={e=>setMon(e.target.value)}>
            <option value="all">All months</option>
            {months.map(m=><option key={m} value={m}>{monLbl(m)}</option>)}
          </select>
          {shown.length?<div className="exp-group">
            <button className="exp-btn" onClick={()=>downloadTrackerPdf(shown,tab,mon)}><I n="dl" s={13}/>Download PDF</button>
            <button className="exp-btn" onClick={()=>exportTracker(shown,tab,mon)}><I n="dl" s={13}/>Download CSV</button>
            <button className="exp-btn" onClick={()=>printTracker(shown,tab,mon)}><I n="print" s={13}/>Print</button>
          </div>:null}
        </div>
      </div>
      <div className="trk-tw">
        <table className="trk-t">
          <thead><tr><th>Ticket</th><th>Item</th><th>Type</th><th>Requested</th><th>Reported by</th><th>Assigned to</th><th>Status</th></tr></thead>
          <tbody>
            {shown.map((r,i)=><tr key={i}>
              <td><span className="trk-tkt" style={{fontWeight:800,color:'var(--accent-ink)',whiteSpace:'nowrap'}}>{r.ticket?'#'+r.ticket:'—'}</span></td>
              <td><div className="trk-item">{r.item}</div><div className="trk-sub">{r.sub}</div>
                {r.files&&r.files.length?<div className="filelist" style={{marginTop:6}}>{r.files.map((x,ix)=><FileChip key={ix} x={x}/>)}</div>:null}</td>
              <td><span className={'trk-type '+r.typeKind}>{r.typeIcon} {r.typeLabel}</span></td>
              <td><span className="trk-sub" style={{whiteSpace:'nowrap'}}>{r.requested?fmtDate(r.requested):'—'}</span></td>
              <td>{r.reporter?<span className="trk-who"><span className="trk-av" style={{background:r.reporter.c}}>{r.reporter.av}</span>{r.reporter.n.split(' ')[0]}</span>
                :<span className="trk-none">{r.reporterFallback||'—'}</span>}</td>
              <td>{r.assignee?<span className="trk-who"><span className="trk-av" style={{background:r.assignee.c}}>{r.assignee.av}</span>{r.assignee.n.split(' ')[0]}</span>
                :<span className="trk-none">— {r.placeholder}</span>}</td>
              <td><span className={'trk-st '+r.status.cls}><span className="trk-dot" style={{background:r.status.dot}}></span>{r.status.text}</span>
                {r.age!=null?<div className="trk-sub" style={{marginTop:3,color:r.ageOpen&&r.age>7?'var(--red)':'var(--muted)'}}>{r.ageOpen?r.age+' day'+(r.age!==1?'s':'')+' open':'closed in '+r.age+' day'+(r.age!==1?'s':'')}</div>:null}
                {r.req&&canManage&&!ctx.previewing?<button className="linkbtn" style={{fontSize:11.5,padding:'2px 6px',marginTop:2}} onClick={()=>closeReq(r.req)}>Close ticket</button>:null}</td>
            </tr>)}
            {!shown.length?<tr><td colSpan="7"><div className="trk-empty">Nothing to show in this filter.</div></td></tr>:null}
          </tbody>
        </table>
      </div>
      <div className="trk-foot"><b>{rows.length}</b> total · <b>{nOpen}</b> open · {nMaint} maintenance · {nSupply} supply. Un-actioned items come from the live report/request queue; once assigned (or a supply request is approved &amp; sent to procure) the row shows the assignee and the task's live status. Declined items are kept here for the record. Management &amp; Admin see the whole org.</div>
    </div>
  </div>;
}
function ReportsView({ctx}){
  const [mode,setMode]=useState('tasks');
  const [fw,setFw]=useState('all');
  const [fb,setFb]=useState('all');
  const [pmon,setPmon]=useState('all'); // Performance Analysis month filter (by date of issue, with rollover)
  const [showMismatch,setShowMismatch]=useState(false);
  const mine=tasks.filter(t=>inScope(t,ctx.shorts)&&(fb==='all'||t.bucket===fb)&&(fw==='all'||hasWho(t,fw)));
  // Performance Analysis list: `mine` narrowed to the chosen month, where a still-pending task issued in
  // an earlier month rolls forward into the current month (perfInMonth). Month options from issue dates.
  const perfMonths=perfMonthsOf(mine);
  const perfList=mine.filter(t=>perfInMonth(t,pmon));
  const dn=mine.filter(t=>t.status==='done').length,ov=mine.filter(isOverdue).length;
  const rate=mine.length?Math.round(dn/mine.length*100):0;
  const segs=deliveryStats(mine);const segTot=segs.reduce((a,x)=>a+x.v,0);
  const empOpts=ctx.scope.filter(p=>inDept(p,fb));
  const workers=ctx.scope.filter(p=>(fw==='all'||p.s===fw)&&inDept(p,fb));
  const load=workloadMap();
  const byEmp=fw==='all'
    ?workers.map(p=>{const tt=mine.filter(t=>hasWho(t,p.s));return [p.n,tt.length?Math.round(tt.filter(t=>t.status==='done').length/tt.length*100):0];})
    :Object.keys(BUCKETS).map(k=>({k,tt:mine.filter(t=>t.bucket===k)})).filter(o=>o.tt.length)
      .map(o=>[BUCKETS[o.k],Math.round(o.tt.filter(t=>t.status==='done').length/o.tt.length*100)]);
  const [kpiPop,setKpiPop]=useState(null);
  const kpiRows=pred=>tasks.map((t,i)=>({t,i})).filter(o=>mine.includes(o.t)&&pred(o.t));
  const KP=[['Total tasks',mine.length,'var(--accent)','var(--accent-soft)','checkc',()=>true],
    ['Completed',dn,'var(--green)','var(--green-soft)','check',t=>t.status==='done'],
    ['Overdue',ov,'var(--red)','var(--red-soft)','alert',isOverdue],
    ['Completion rate',rate+'%','var(--blue)','var(--blue-soft)','chart',null]]; // derived stat — nothing to list
  /* Performance Analysis is management-only (Management tier + Administrator), same gate as the
     Reports & requests tracker. Uses the effective (Preview-As) role, so previewing down hides it;
     emode falls the view back to Task analytics if perf was selected before the role dropped. */
  const canPerf=ctx.role==='mgmt'||ctx.role==='admin';
  const emode=(mode==='perf'&&!canPerf)?'tasks':mode;
  return <div className="view">
    <div className="selfseg" style={{margin:'0 0 14px',maxWidth:canPerf?520:360}}>
      <button className={emode==='tasks'?'on':''} onClick={()=>setMode('tasks')}>Task analytics</button>
      <button className={emode==='reports'?'on':''} onClick={()=>setMode('reports')}>Daily reports</button>
      {canPerf?<button className={emode==='perf'?'on':''} onClick={()=>setMode('perf')}>Performance Analysis</button>:null}
    </div>
    <div className="filters">
      <select className="fsel" value={fb} onChange={e=>{setFb(e.target.value);setFw('all');}}>
        <option value="all">All departments</option>
        {realDeptKeys(ctx.scope).map(k=><option key={k} value={k}>{BUCKETS[k]}</option>)}</select>
      <select className="fsel" value={fw} onChange={e=>setFw(e.target.value)}>
        <option value="all">{fb==='all'?'All staff':'All in '+BUCKETS[fb]}</option>
        {empOpts.map(p=><option key={p.s} value={p.s}>{p.n}</option>)}</select>
      {emode==='perf'?<select className="fsel" value={pmon} onChange={e=>setPmon(e.target.value)} title="Filter by month of issue — pending tasks roll over into later months">
        <option value="all">All months</option>
        {perfMonths.map(m=><option key={m} value={m}>{perfMonLbl(m)}</option>)}</select>:null}
      <div className="spacer"/>
      {emode==='tasks'?<>
        <button className="btn soft" onClick={()=>setShowMismatch(true)}><I n="alert"/>Check dept mismatches</button>
        {/* the tasks/team report exports + Workload CSV (a different dataset) — all matching .exp-btn buttons */}
        <div className="exp-group">
          <button className="exp-btn" onClick={()=>ctx.reportPdf(fw,fb)}><I n="dl" s={13}/>Download PDF</button>
          <button className="exp-btn" onClick={()=>ctx.exportCSV('tasks')}><I n="dl" s={13}/>Download CSV</button>
          <button className="exp-btn" onClick={()=>ctx.printReport(fw,fb)}><I n="print" s={13}/>Print</button>
          <button className="exp-btn" onClick={()=>ctx.exportCSV('workload')}><I n="dl" s={13}/>Workload CSV</button>
        </div>
      </>:null}
      {emode==='perf'&&perfList.length?<div className="exp-group">
        <button className="exp-btn" onClick={()=>downloadPerfPdf(perfList,fw==='all',fw,fb,pmon)}><I n="dl" s={13}/>Download PDF</button>
        <button className="exp-btn" onClick={()=>exportPerf(perfList,fw==='all',fw,fb,pmon)}><I n="dl" s={13}/>Download CSV</button>
        <button className="exp-btn" onClick={()=>printPerf(perfList,fw==='all',fw,fb,pmon)}><I n="print" s={13}/>Print</button>
      </div>:null}

    {showMismatch?<DeptMismatchModal ctx={ctx} close={()=>setShowMismatch(false)}/>:null}
    {emode==='tasks'?<>
    <div className="kpis">{KP.map(([l,n,c,cs,ic,pred])=><div className="kpi" key={l} style={pred?{cursor:'pointer'}:undefined}
      title={pred?'Review the tasks behind this number':undefined} onClick={pred?()=>setKpiPop({title:l,pred}):undefined}>
      <div className="top"><span className="l">{l}</span><span className="ic" style={{background:cs,color:c}}><I n={ic}/></span></div>
      <div className="n" style={{color:c}}>{n}</div></div>)}</div>

      <div style={{display:'flex',gap:30,alignItems:'center',flexWrap:'wrap'}}>
        <div dangerouslySetInnerHTML={{__html:donutSVG(segs,150,26)}}/>
        <div style={{flex:1,minWidth:230}}>{segs.map(x=>{const tot=segTot||1;
          return <div className="leg" key={x.l}><span className="dot2" style={{background:x.c}}/>{x.l}<b>{x.v} · {Math.round(x.v/tot*100)}%</b></div>;})}</div>

      <div className="panel"><h3>{fw==='all'?'Completion by employee':'Completion by department — '+(byShort(fw)||{n:fw}).n}</h3><Bars pct rows={byEmp}/></div>

        return <tr key={p.s}><td><span className="avex" style={{marginRight:8,background:avColor(p.n),color:'#fff'}}>{p.av}</span>{p.n}</td>

          <td>{tt.filter(t=>t.status==='done').length}</td></tr>;})}</tbody></table>

    </>:emode==='reports'?<DailyReportsPanel ctx={ctx} fw={fw} fb={fb}/>:<PerfPanel list={perfList} fw={fw} fb={fb} mon={pmon}/>}

/* Browse past Daily Report submissions from ctx.scope (RLS already limits the raw fetch to
   is_in_scope rows for the real signed-in user; re-filtering by ctx.shorts here is what makes
   "Preview As" narrow the list correctly, same reasoning ReportsView's own `mine` already relies
   on for tasks). Capped list, ActivityLogModal's style, inlined into the page instead of a modal —
   this is a whole tab of the Reports page, not a small popover. */
function DailyReportsPanel({ctx,fw,fb}){
  const [reports,setReports]=useState([]);
  const [fDate,setFDate]=useState(iso(TODAY)); // default to today's reports; Clear widens to all dates
  const [showAll,setShowAll]=useState(false);
  const [escId,setEscId]=useState(null);
  const [escText,setEscText]=useState('');
  const [escPrio,setEscPrio]=useState('Medium');
  const [escBusy,setEscBusy]=useState(false);

  useEffect(()=>{
    sb.from('daily_reports').select('*').order('created_at',{ascending:false})
      .then(({data,error})=>{if(error)console.error(error);setReports(data||[]);});
  },[ctx.syncTick]); // refetch on realtime sync so a resubmitted report's counts update live

  /* ctx.scope for Management is deliberately org-wide everywhere else in the app (Management
     "oversees every department jointly" — see ROLES.mgmt's own comment — there's no per-person
     subtree to narrow to). Daily Reports is different: with no filter picked, defaulting straight
     to all 17 people buries a Management viewer's own actual reports (Directors, plus anyone who
     reports straight to Management) in noise from departments they don't directly own. Narrow the
     no-filter default to just those people; picking a specific department or person from the
     existing filters still shows everyone in that department, unchanged.
     scopeList then gets fb/fw applied on top of whichever base it started from, so "Today's
     submissions" tracks the same picked department/person as the report list below it — it used
     to stay pinned to the full base scope even after picking "Construction", showing completeness
     and a "still waiting on" list for the whole org while the reports underneath had already
     narrowed to just that department. */
  const mgmtDefault=ctx.role==='mgmt'&&fb==='all'&&fw==='all';
  const baseScope=mgmtDefault
    ?STAFF.filter(p=>p.role==='Director'||(byName(p.boss)&&byName(p.boss).role==='Management'))
    :ctx.scope;
  const scopeList=baseScope.filter(p=>inDept(p,fb)&&(fw==='all'||p.s===fw));
  const scopeShorts=new Set(scopeList.map(p=>p.s));

  const scoped=reports.filter(r=>{const p=byId(r.created_by);
    return p&&scopeShorts.has(p.s)&&(!fDate||r.report_date===fDate);});
  const shown=showAll?scoped:scoped.slice(0,25);

  const today=iso(TODAY);
  const submittedToday=new Set(reports.filter(r=>r.report_date===today).map(r=>r.created_by));
  const missing=scopeList.filter(p=>!submittedToday.has(p.id));

  async function sendEscalation(row){
    if(ctx.previewing){ctx.say("You're previewing — switch back to escalate for real");return;}
    if(!escText.trim()){ctx.say('Describe what needs escalating');return;}
    setEscBusy(true);
    const p=byId(row.created_by);
    const {error}=await sb.from('report_issues').insert({created_by:ctx.viewer.id,daily_report_id:row.id,
      issue:escText.trim(),remarks:'Raised while reviewing '+(p?p.n:'someone')+"’s "+fmtDate(row.report_date)+' daily report',
      priority:escPrio,files:[]});
    if(error){console.error(error);ctx.say('Could not escalate — try again');setEscBusy(false);return;}
    setEscBusy(false);setEscId(null);setEscText('');setEscPrio('Medium');
    ctx.say('Escalated'+(ctx.viewer.boss?' to '+escalateTargetLabel(ctx.viewer):''));
  }

  return <>
    <div className="panel">
      <div className="h-row"><h3><I n="spark" c="var(--accent-ink)"/>Today's submissions</h3>
        <span className={'tag '+(missing.length?'amber':'green')}>{scopeList.length-missing.length} of {scopeList.length} submitted</span></div>
      {missing.length?<div className="rs" style={{padding:'2px 0 4px'}}>Still waiting on: {missing.map(p=>p.n.split(' ')[0]).join(', ')}</div>
        :<Empty t="Everyone has submitted today" s="No one in your scope is missing today's daily report."/>}
    </div>
    <div className="panel">
      <div className="h-row"><h3>Daily reports</h3>
        <div style={{display:'flex',gap:8,alignItems:'center'}}>
          <input type="date" className="fsel" value={fDate} max={iso(TODAY)} onChange={e=>setFDate(e.target.value)}/>
          {fDate?<button className="linkbtn" onClick={()=>setFDate('')}>Clear</button>:null}
          <button className="btn soft" onClick={()=>exportDailyReports(scoped.map(row=>({row,p:byId(row.created_by)})),'Daily Reports').catch(console.error)}><I n="dl"/>Export all (CSV)</button>
        </div></div>
      {shown.length?shown.map(row=>{
        const p=byId(row.created_by);
        const isEsc=escId===row.id;
        return <div className="attn" key={row.id} style={{flexWrap:'wrap'}}>
          <div className="ring" style={{background:avColor(p?p.n:row.created_by)}}>{p?p.av:'?'}</div>
          <div style={{flex:1,minWidth:0}}>
            <div className="nm">{p?p.n:'—'} <span className="rs" style={{fontWeight:400}}>· {p?p.dept:''}</span></div>
            <div className="rs">{fmtDate(row.report_date)} · {row.completed_count} completed · {row.overdue_count} overdue · {row.pending_count} open · on track</div>
            {isEsc?<div style={{marginTop:8,display:'flex',gap:8,flexWrap:'wrap'}}>
              <input className="fsel" style={{flex:'1 1 220px'}} value={escText} onChange={e=>setEscText(e.target.value)} placeholder="What needs escalating?"/>
              <select className="fsel" value={escPrio} onChange={e=>setEscPrio(e.target.value)}>
                <option>High</option><option>Medium</option><option>Low</option></select>
              <button className="btn ghost" onClick={()=>{setEscId(null);setEscText('');}}>Cancel</button>
              <button className="btn primary" disabled={escBusy} onClick={()=>sendEscalation(row)}>{escBusy?'Sending…':'Send'}</button>
            </div>:null}
          </div>
          <div className="act">
            <div className="exp-group">
              <button className="exp-btn" onClick={()=>downloadDailyReportPdf([{row,p}],(p?p.n:'Daily')+' — '+fmtDate(row.report_date),ctx.viewer.n)
                .catch(e=>{console.error(e);ctx.say('Could not build the PDF — check your connection and try again');})}><I n="dl" s={13}/>Download PDF</button>
              <button className="exp-btn" onClick={()=>exportDailyReports([{row,p}],(p?p.n:'Daily')+' — '+fmtDate(row.report_date)).catch(console.error)}><I n="dl" s={13}/>Download CSV</button>
              <button className="exp-btn" onClick={()=>printDailyReports([{row,p}],(p?p.n:'Daily')+' — '+fmtDate(row.report_date),ctx.viewer.n).catch(console.error)}><I n="print" s={13}/>Print</button>
            </div>
            {ctx.viewer.bossId?<button className="linkbtn" onClick={()=>{setEscId(isEsc?null:row.id);setEscText('');setEscPrio('Medium');}}>{isEsc?'Cancel':'Escalate'}</button>:null}
          </div>
        </div>;
      }):<Empty t={fDate?'No reports for that date':'No daily reports yet'} s={fDate?'Nobody in your scope submitted a report on '+fmtDate(fDate)+'.':'Submitted reports from your team will show up here.'}/>}
      {scoped.length>shown.length?<button className="btn ghost" style={{width:'100%',justifyContent:'center',margin:'6px 0 0'}}
        onClick={()=>setShowAll(true)}>Show {scoped.length-shown.length} more</button>:null}
    </div>
  </>;
}

/* ============ daily report ============ */
/* Own-issue/incident reporting that escalates one hop at a time up the exact same boss_id chain
   the rest of the app already walks, plus a scope-matched due/completed task summary. Escalating
   and resolving both rely entirely on report_issues_authority_trg (20260716000002_report_issues.sql)
   for correctness — the client sends its best guess at the next holder (viewer.bossId) purely so
   the request has a distinct new value to trigger the escalate branch; the server always
   recomputes the real value from staff.boss_id regardless of what's sent. Inbox is fetched fresh
   each time the modal opens rather than kept live — this is a point-in-time check-in, not a
   persistent queue like QueuePanel. */
function DailyReportModal({ctx,close}){
  const {viewer,previewing,say}=ctx;
  const [inbox,setInbox]=useState([]);
  const [wantIssue,setWantIssue]=useState(false);
  const [rows,setRows]=useState([{issue:'',remarks:'',priority:'Medium',file:null}]);
  const [busy,setBusy]=useState(false);
  // "Resolve here" inline choice — resolveId is which inbox row is expanded, resolveMode picks
  // which of the two real resolution paths (issue a task / describe it) once expanded.
  const [resolveId,setResolveId]=useState(null);
  const [resolveMode,setResolveMode]=useState(null);
  const [resTaskTitle,setResTaskTitle]=useState('');
  const [resTaskWho,setResTaskWho]=useState('');
  const [resTaskDept,setResTaskDept]=useState('');
  const [resTaskDue,setResTaskDue]=useState('');
  const [resText,setResText]=useState('');
  const [resBusy,setResBusy]=useState(false);

  useEffect(()=>{
    sb.from('report_issues').select('*').eq('escalated_to',viewer.id).eq('status','open').order('created_at')
      .then(({data,error})=>{if(error)console.error(error);setInbox(data||[]);});
  },[ctx.syncTick]); // refetch on realtime sync so issues raised in a resubmitted report land while the modal is open

  const setRow=(i,patch)=>setRows(rows.map((r,ix)=>ix===i?{...r,...patch}:r));
  const addRow=()=>setRows(rows.concat([{issue:'',remarks:'',priority:'Medium',file:null}]));
  const removeRow=i=>setRows(rows.length>1?rows.filter((_,ix)=>ix!==i):rows);
  async function pickFile(i,e){
    const f=e.target.files[0];if(!f)return;
    say('Uploading…');
    try{const up=await uploadFile(f,'report-issues');setRow(i,{file:up});}
    catch(err){console.error(err);say('Upload failed — try again');}
  }

  async function submit(){
    if(previewing){say("You're previewing — switch back to send a real report");return;}
    const clean=wantIssue?rows.filter(r=>r.issue.trim()):[];
    if(wantIssue&&!clean.length){say('Describe at least one issue, or choose "No, nothing to report"');return;}
    setBusy(true);
    /* freeze the same three numbers segs is already showing on screen right now — not a live
       recompute later, see 20260717000001_daily_reports.sql's header comment. task_snapshot
       freezes the full ordered task list the same way (not `shown`, which is capped to 8 for
       on-screen display only — the frozen record keeps every task that was actually on screen
       via scrolling/"…N more", so a printed report later can show all of it). */
    const taskSnapshot=ordered.map(t=>({title:t.t,assignee:(byShort(t.who)||{n:t.who}).n,
      department:(byShort(t.who)||{}).dept||'',due:t.date,issued:t.issued,
      status:t.status==='done'?'done':(isOverdue(t)?'overdue':'pending')}));
    /* freeze today's checklist status too (items due today + whether each was done) */
    const clDay=iso(TODAY),clDoneT=clDoneSet(viewer.id,clDay);
    const checklistSnapshot=CL_FREQORDER.flatMap(f=>clItemsFor(viewer.id).filter(i=>i.freq===f&&clDueOn(i,clDay)))
      .map(it=>({body:it.body,freq:it.freq,sched:clSchedLabel(it),done:clDoneT.has(it.id)}));
    /* resubmitting today updates the existing row instead of inserting a duplicate — enforced by
       the daily_reports_one_per_day unique constraint (20260718000001), so this is one racefree
       upsert rather than a check-then-write. */
    const {data:dr,error:drErr}=await sb.from('daily_reports').upsert({created_by:viewer.id,report_date:iso(TODAY),
      completed_count:segs[0].v,overdue_count:segs[1].v,pending_count:segs[2].v,task_snapshot:taskSnapshot,checklist_snapshot:checklistSnapshot},
      {onConflict:'created_by,report_date'}).select().single();
    if(drErr){console.error(drErr);say('Could not send report — try again');setBusy(false);return;}
    for(const r of clean){
      const {error}=await sb.from('report_issues').insert({created_by:viewer.id,daily_report_id:dr.id,
        issue:r.issue.trim(),remarks:r.remarks.trim()||null,priority:r.priority,
        files:r.file?[r.file]:[]});
      if(error){console.error(error);say('Could not send report — try again');setBusy(false);return;}
    }
    setBusy(false);
    say('Daily report sent'+(viewer.boss?' to '+escalateTargetLabel(viewer):''));
    close();
  }
  async function escalate(row){
    if(previewing){say("You're previewing — switch back to escalate for real");return;}
    if(!viewer.bossId){say('Nothing above you to escalate to');return;}
    const {error}=await sb.from('report_issues').update({escalated_to:viewer.bossId}).eq('id',row.id);
    if(error){console.error(error);say('Could not escalate — try again');return;}
    setInbox(inbox.filter(x=>x.id!==row.id));
    say('Escalated to '+escalateTargetLabel(viewer));
  }
  // Two real resolution paths (see 20260717000002_report_issue_resolution.sql): issue a task,
  // reusing the exact same tasks-insert path QuickCapture/saveTask already use, or describe how
  // it was resolved as free text. Either way the row ends up resolved with a human-readable
  // resolution_note — auto-generated for the task path, verbatim for the text path.
  async function resolveWithTask(row){
    if(previewing){say("You're previewing — switch back to resolve for real");return;}
    if(!resTaskTitle.trim()){say('Give the task a title');return;}
    if(!resTaskWho){say('Pick who should do it');return;}
    setResBusy(true);
    const who=byShort(resTaskWho);
    const nt={t:resTaskTitle.trim(),who:resTaskWho,type:'work',
      bucket:(who&&LABEL_TO_BUCKET[who.dept])||'administration',prio:'med',
      date:resTaskDue||iso(TODAY),status:'open',note:'Raised while resolving: “'+row.issue+'”',
      selfAssigned:resTaskWho===viewer.s,instructedBy:resTaskWho===viewer.s?null:viewer.n};
    try{await saveTask(nt);}
    catch(err){console.error(err);say('Could not create task — try again');setResBusy(false);return;}
    const {error}=await sb.from('report_issues').update({status:'resolved',
      resolution_note:'Converted to task: '+nt.t,resolved_task_id:nt.id}).eq('id',row.id);
    if(error){console.error(error);say('Task created but could not mark resolved — try again');setResBusy(false);return;}
    tasks.unshift(nt);ctx.R();
    setInbox(inbox.filter(x=>x.id!==row.id));
    setResolveId(null);setResolveMode(null);setResBusy(false);
    say('Task created and issue resolved');
  }
  async function resolveWithNote(row){
    if(previewing){say("You're previewing — switch back to resolve for real");return;}
    if(!resText.trim()){say('Describe how it was resolved');return;}
    setResBusy(true);
    const {error}=await sb.from('report_issues').update({status:'resolved',resolution_note:resText.trim()}).eq('id',row.id);
    if(error){console.error(error);say('Could not resolve — try again');setResBusy(false);return;}
    setInbox(inbox.filter(x=>x.id!==row.id));
    setResolveId(null);setResolveMode(null);setResText('');setResBusy(false);
    say('Marked resolved');
  }

  const segs=[ctx.mine.filter(t=>t.status==='done').length,ctx.mine.filter(isOverdue).length,
    ctx.mine.filter(t=>t.status!=='done'&&!isOverdue(t)).length].map((v,i)=>({...DR_SEGS[i],v}));
  const overdueList=ctx.mine.filter(isOverdue).sort((a,b)=>(a.date||'').localeCompare(b.date||''));
  const pendingList=ctx.mine.filter(t=>t.status!=='done'&&!isOverdue(t)).sort((a,b)=>(a.date||'').localeCompare(b.date||''));
  const doneList=ctx.mine.filter(t=>t.status==='done');
  const ordered=overdueList.concat(pendingList,doneList);
  const shown=ordered.slice(0,8);
  const showAssignee=ctx.scope.length>1;
  const showDept=showAssignee&&new Set(ctx.scope.map(p=>p.dept)).size>1;

  function statusBadge(t){
    if(t.status==='done')return <span className="chip-s green">Completed</span>;
    const days=Math.round(Math.abs(new Date(iso(TODAY))-new Date(t.date))/86400000);
    if(isOverdue(t))return <span className="chip-s red">{days} day{days!==1?'s':''} overdue</span>;
    return <span className="chip-s amber">{days<=0?'Due today':'Due in '+days+' day'+(days!==1?'s':'')}</span>;
  }
  function fromLabel(row){
    const raiser=byId(row.created_by);
    if(!row.last_escalated_by)return 'Raised by '+(raiser?raiser.n:'someone');
    const esc=byId(row.last_escalated_by);
    return 'Escalated by '+(esc?esc.n+' ('+roleLabel(esc)+')':'someone')
      +' · originally raised by '+(raiser?raiser.n:'someone')
      +(row.hop_count>1?', '+row.hop_count+' levels down':'');
  }

  return <div className="modal-wrap" onClick={e=>{if(e.target===e.currentTarget)close();}}>
    <div className="modal">
      <div className="qc-head"><h3>Daily Report</h3><button className="iconbtn" onClick={close}><I n="x"/></button></div>
      <div className="whysm" style={{margin:'0 20px'}}>{TODAY.toLocaleDateString('en',{weekday:'short',day:'numeric',month:'short',year:'numeric'})}</div>
      <div style={{padding:'14px 20px 20px'}}>

        {inbox.length?<div className="panel" style={{marginBottom:16}}>
          <div className="h-row"><h3>Issues/Incidents escalated to you</h3><span className="tag amber">{inbox.length}</span></div>
          {inbox.map(row=>{
            const isRes=resolveId===row.id;
            return <div className="attn" key={row.id} style={{flexWrap:'wrap'}}>
            <div className="ring" style={{background:'var(--amber)'}}><I n="tool" c="#fff"/></div>
            <div style={{flex:1,minWidth:0}}>
              <div className="nm">{row.issue} <span className={'chip-s '+(row.priority==='High'?'red':row.priority==='Medium'?'amber':'green')}>{row.priority}</span></div>
              <div className="rs">{fromLabel(row)}{row.remarks?' · “'+row.remarks+'”':''}</div>
              {row.files&&row.files.length?<div className="filelist">{row.files.map((x,ix)=><FileChip key={ix} x={x}/>)}</div>:null}
              <div className="act" style={{marginTop:7,marginLeft:0}}>
                {viewer.bossId?<button className="linkbtn" onClick={()=>escalate(row)}>↑ Escalate to {escalateTargetLabel(viewer)}</button>:null}
                <button className="linkbtn" onClick={()=>{setResolveId(isRes?null:row.id);setResolveMode(null);setResText('');}}>{isRes?'Cancel':'✓ Resolve here'}</button>
              </div>
              {isRes&&!resolveMode?<div style={{marginTop:8,display:'flex',gap:8,flexWrap:'wrap'}}>
                <button className="btn soft" onClick={()=>{setResolveMode('task');setResTaskTitle(row.issue);setResTaskWho('');setResTaskDept('');setResTaskDue(iso(TODAY));}}>Issue a task</button>
                <button className="btn soft" onClick={()=>{setResolveMode('text');setResText('');}}>Describe how it was resolved</button>
              </div>:null}
              {isRes&&resolveMode==='task'?(()=>{const scopeDepts=[...new Set(ctx.scope.map(p=>p.dept).filter(Boolean))].sort();return <div style={{marginTop:8,display:'flex',gap:8,flexWrap:'wrap',alignItems:'center'}}>
                <input className="fsel" style={{flex:'1 1 220px'}} value={resTaskTitle} onChange={e=>setResTaskTitle(e.target.value)} placeholder="Task title"/>
                <select className="fsel" style={{flex:'0 1 170px'}} value={resTaskDept} onChange={e=>{const d=e.target.value;setResTaskDept(d);if(resTaskWho){const who=byShort(resTaskWho);if(d&&(!who||who.dept!==d))setResTaskWho('');}}}>
                  <option value="">All departments</option>
                  {scopeDepts.map(d=><option key={d} value={d}>{d}</option>)}
                </select>
                <select className="fsel" value={resTaskWho} onChange={e=>setResTaskWho(e.target.value)}>
                  <option value="">Assign to…</option>
                  {ctx.scope.filter(p=>!resTaskDept||p.dept===resTaskDept).map(p=><option key={p.s} value={p.s}>{p.n}</option>)}
                </select>
                <input type="date" className="fsel" value={resTaskDue} min={iso(TODAY)} onChange={e=>setResTaskDue(e.target.value)}/>
                <button className="btn ghost" onClick={()=>setResolveMode(null)}>Back</button>
                <button className="btn primary" disabled={resBusy} onClick={()=>resolveWithTask(row)}>{resBusy?'Creating…':'Create task & resolve'}</button>
              </div>;})():null}
              {isRes&&resolveMode==='text'?<div style={{marginTop:8,display:'flex',gap:8,flexWrap:'wrap'}}>
                <input className="fsel" style={{flex:'1 1 220px'}} value={resText} onChange={e=>setResText(e.target.value)} placeholder="How was this resolved?"/>
                <button className="btn ghost" onClick={()=>setResolveMode(null)}>Back</button>
                <button className="btn primary" disabled={resBusy} onClick={()=>resolveWithNote(row)}>{resBusy?'Saving…':'Mark resolved'}</button>
              </div>:null}
            </div>
          </div>;})}
        </div>:null}

        <div className="panel" style={{marginBottom:16}}>
          <div className="h-row"><h3>Report an issue or incident?</h3></div>
          <div className="selfseg" style={{margin:'0 0 14px'}}>
            <button className={wantIssue?'':'on'} onClick={()=>setWantIssue(false)}>No, nothing to report</button>
            <button className={wantIssue?'on':''} onClick={()=>setWantIssue(true)}>Yes, I have something to raise</button>
          </div>
          {wantIssue?<>
            <table style={{width:'100%',borderCollapse:'collapse'}}><thead><tr>
              <th style={{textAlign:'left',padding:'4px 6px',fontSize:11,color:'var(--muted)'}}>Issues/Incidents</th>
              <th style={{textAlign:'left',padding:'4px 6px',fontSize:11,color:'var(--muted)'}}>Remarks</th>
              <th style={{textAlign:'left',padding:'4px 6px',fontSize:11,color:'var(--muted)',width:100}}>Priority</th>
              <th style={{padding:'4px 6px',width:90}}></th><th style={{width:20}}></th></tr></thead>
            <tbody>{rows.map((r,i)=><tr key={i}>
              <td style={{padding:'4px 6px'}}><input className="fsel" style={{width:'100%'}} value={r.issue} onChange={e=>setRow(i,{issue:e.target.value})} placeholder="What's the issue?"/></td>
              <td style={{padding:'4px 6px'}}><input className="fsel" style={{width:'100%'}} value={r.remarks} onChange={e=>setRow(i,{remarks:e.target.value})} placeholder="Optional"/></td>
              <td style={{padding:'4px 6px'}}><select className="fsel" style={{width:'100%'}} value={r.priority} onChange={e=>setRow(i,{priority:e.target.value})}>
                <option>High</option><option>Medium</option><option>Low</option></select></td>
              <td style={{padding:'4px 6px'}}>{r.file?<FileChip x={r.file} onRemove={()=>setRow(i,{file:null})}/>:
                <label className="linkbtn" style={{cursor:'pointer',whiteSpace:'nowrap'}}>📎 Attach<input type="file" style={{display:'none'}} onChange={e=>pickFile(i,e)}/></label>}</td>
              <td style={{padding:'4px 6px',textAlign:'right',color:'var(--muted)',cursor:rows.length>1?'pointer':'default'}} onClick={()=>removeRow(i)}>{rows.length>1?'✕':''}</td>
            </tr>)}</tbody></table>
            <button className="btn ghost" style={{width:'100%',justifyContent:'center',marginTop:8}} onClick={addRow}>+ Add another issue</button>
          </>:null}
        </div>

        <div className="panel" style={{marginBottom:16}}>
          <div className="h-row"><h3>{ctx.scope.length>1?"Your team's tasks this period":'Your tasks this period'}</h3></div>
          <div style={{display:'flex',gap:24,alignItems:'center',flexWrap:'wrap',marginBottom:14}}>
            <div dangerouslySetInnerHTML={{__html:donutSVG(segs,120,20)}}/>
            <div>{segs.map(x=><div className="leg" key={x.l}><span className="dot2" style={{background:x.c}}/>{x.l}<b>{x.v}</b></div>)}</div>
          </div>
          <div style={{overflowX:'auto'}}>
          <table><thead><tr><th>Task</th>{showAssignee?<th>Assignee</th>:null}{showDept?<th>Department</th>:null}<th>Due</th><th>Status</th></tr></thead>
            <tbody>{shown.map(t=><tr key={t.id||t.t}>
              <td>{t.t}</td>
              {showAssignee?<td>{(byShort(t.who)||{n:t.who}).n}</td>:null}
              {showDept?<td>{(byShort(t.who)||{}).dept||''}</td>:null}
              <td>{fmtDate(t.date)}</td>
              <td>{statusBadge(t)}</td>
            </tr>)}</tbody></table>
          </div>
          {ordered.length>shown.length?<div style={{textAlign:'center',color:'var(--muted)',fontSize:11.5,padding:'6px 0'}}>… {ordered.length-shown.length} more</div>:null}
        </div>

        <div style={{display:'flex',gap:10}}>
          <button className="btn ghost" style={{flex:1,justifyContent:'center'}} onClick={close}>Cancel</button>
          <button className="btn primary" style={{flex:1,justifyContent:'center'}} disabled={busy} onClick={submit}>{busy?'Sending…':'Submit report'}</button>
        </div>
      </div>
    </div>
  </div>;
}

/* ============ quick capture ============ */
const QC_SAMPLES=[
  "Ask Hari to fix the broken projector in the science lab by 10 am tomorrow",
  "We are running low on chalk and markers, order more this week",
  "Ask Meena and Kavya to prepare the annual day schedule by friday",
  "Ask Suresh to service the water purifiers every month"
];
function QuickCapture({ctx,close}){
  const [kind,setKind]=useState('task');
  // if the supply feature gets switched off while this modal sits on the (now-hidden) Request tab,
  // fall back to Task so the user isn't stranded on a tab that no longer renders.
  useEffect(()=>{if(kind==='request'&&!supplyEnabled())setKind('task');},[kind]);
  const [cat,setCat]=useState(null); // repair/maintenance report category id (routing_rules kind='maintenance'); null → first
  const [txt,setTxt]=useState('');
  const [mode,setMode]=useState('others');
  const [deptTab,setDeptTab]=useState('within'); // Directors only: 'within' | 'other' (self is handled by mode==='self')
  const [whos,setWhos]=useState([]);const [whoSugg,setWhoSugg]=useState(true);const [whoWhy,setWhoWhy]=useState('');
  const [joint,setJoint]=useState(false);   // opt-in: only when ticked can more than one person be added
  const [whoDept,setWhoDept]=useState('');   // department filter inside the assignee picker
  const [when,setWhen]=useState(null);const [whenSugg,setWhenSugg]=useState(true);const [whenWhy,setWhenWhy]=useState('');
  const [dueTime,setDueTime]=useState('');
  const [type,setType]=useState('work');const [prio,setPrio]=useState('med');
  const [recur,setRecur]=useState(null);
  const [recurOn,setRecurOn]=useState(null);
  const [bucket,setBucket]=useState('administration');const [bucketSugg,setBucketSugg]=useState(true);
  const [pick,setPick]=useState(null);
  const [whoQ,setWhoQ]=useState('');
  const [opts,setOpts]=useState(false);
  const [boss,setBoss]=useState('');const [note,setNote]=useState('');
  const [files,setFiles]=useState([]);
  const [rec,setRec]=useState(false);
  const canMulti=ctx.role!=='jrm'&&ctx.role!=='lead';
  /* Director-only ASSIGNMENT scope (separate from oversight/scope, which stays subtree-only).
     A Director can assign to anyone whose DB role is NOT Administrator/Management — peers and
     below across every department, never up the chain. Split into two picker tabs:
       within = the Director's own subtree (who they oversee), excluding self
       other  = everyone else assignable (org minus Admin/Mgmt) minus their own subtree minus self
     Self is the third tab (mode==='self'). Non-Directors keep the old 2-way toggle + ctx.scope. */
  const isDir=ctx.role==='dir';
  const dirWithin=isDir?descendants(ctx.viewer.n):[];
  const withinShorts=new Set(dirWithin.map(p=>p.s));
  const dirOther=isDir?STAFF.filter(p=>p.role!=='Administrator'&&p.role!=='Management'
    &&p.s!==ctx.viewer.s&&!withinShorts.has(p.s)):[];
  const parsed=kind==='task'&&txt.trim().length>=6;
  // repair/maintenance report routing: the chosen category (an admin-configured routing_rule) resolves
  // to a specific recipient staff member. null cat → the first (default 'Building') category.
  const cats=maintCats();
  const selCat=catById(cat)||cats[0]||null;
  const issueRec=selCat&&selCat.staff_id?byId(selCat.staff_id):null;
  const headFirst=issueRec?issueRec.n.split(' ')[0]:(selCat?selCat.label:'the recipient');

  function parse(text){
    setTxt(text);
    if(kind!=='task'||text.trim().length<6)return;
    const low=text.toLowerCase();
    const named=ctx.scope.filter(p=>new RegExp('\\b'+p.s.toLowerCase()+'\\b').test(low)).map(p=>p.s);
    /* Name(s) in the sentence → auto-assign (multiple names → a genuine joint task, tick it on). No
       name → DON'T auto-pick a "suggested" person; leave it empty so the assigner chooses via the
       department filter + name picker (only clear a still-suggested slot, never the user's own pick). */
    if(named.length){setWhos(named);setWhoSugg(false);setWhoWhy(named.length>1?'all named in your sentence — joint task':'named in your sentence');if(named.length>1)setJoint(true);}
    else if(whoSugg){setWhos([]);setWhoWhy('');}
    const gt=guessType(low);setType(gt);
    /* the assignee's own real department is a stronger signal than keywords in freeform text —
       prefer it whenever exactly one person is named (a joint task could span departments, so
       keyword-guessing stays the fallback there, same as when no one's named at all). */
    if(bucketSugg){
      const allowed=realDeptKeys(ctx.scope);
      let gb;
      if(named.length===1){const person=byShort(named[0]);gb=person&&LABEL_TO_BUCKET[person.dept]?LABEL_TO_BUCKET[person.dept]:guessBucket(low);}
      else gb=guessBucket(low);
      setBucket(allowed.includes(gb)?gb:(allowed[0]||gb));
    }
    const gd=guessDate(low);
    if(gd){setWhen(gd.date);setWhenSugg(false);setWhenWhy(gd.why);}
    else if(whenSugg||!when){const s=suggestDue(gt);setWhen(s.date);setWhenSugg(true);setWhenWhy(s.why);}
    if(/\burgent|asap|immediately|critical\b/.test(low))setPrio('high');
    const wm=low.match(/\bevery\s+(sunday|monday|tuesday|wednesday|thursday|friday|saturday)s?\b/);
    if(wm){const on={sunday:0,monday:1,tuesday:2,wednesday:3,thursday:4,friday:5,saturday:6}[wm[1]];
      setRecur('weekly');setRecurOn(on);
      const nd=nextAnchor('weekly',on,iso(TODAY));setWhen(nd);setWhenSugg(false);setWhenWhy('every '+DOW[on]+' — first on '+fmtDate(nd));}
    else{const gr=guessRecur(low);if(gr){setRecur(gr);setRecurOn(defaultRecurOn(gr,when||iso(TODAY)));}}
    const gtm=guessTime(low);if(gtm)setDueTime(gtm.time);
  }
  function record(){
    setRec(true);const sample=QC_SAMPLES[Math.floor(Math.random()*QC_SAMPLES.length)];
    let i=0;const tick=setInterval(()=>{i+=3;parse(sample.slice(0,i));
      if(i>=sample.length){clearInterval(tick);setRec(false);parse(sample);}},40);
  }
  function toggleWho(v){
    let next;
    // multi-select only when this is an opt-in joint task; otherwise a pick REPLACES the selection
    if(!canMulti||!joint)next=[v];
    else{next=whos.slice();const ix=next.indexOf(v);
      if(ix>-1){if(next.length>1)next.splice(ix,1);}else next.push(v);}
    setWhos(next);setWhoSugg(false);
    setWhoWhy(next.length>1?'joint task — it appears in each person’s list':'you picked '+(byShort(next[0])||{n:''}).n.split(' ')[0]);
    // department auto-follows a single assignee's own department (the person drives the department)
    if(next.length===1){const p=byShort(next[0]);if(p&&LABEL_TO_BUCKET[p.dept]){setBucket(LABEL_TO_BUCKET[p.dept]);setBucketSugg(true);}}
    if(!joint)setPick(null);
  }
  // ticking joint off collapses any multi-selection back to the first person (+ re-syncs department)
  function setJointMode(on){setJoint(on);if(!on&&whos.length>1){const first=[whos[0]];setWhos(first);const p=byShort(first[0]);setWhoWhy(p?'you picked '+p.n.split(' ')[0]:'');if(p&&LABEL_TO_BUCKET[p.dept]){setBucket(LABEL_TO_BUCKET[p.dept]);setBucketSugg(true);}}}
  async function filePicked(e){
    const picked=[...e.target.files];
    if(!picked.length)return;
    ctx.say('Uploading '+picked.length+' file'+(picked.length>1?'s':'')+'…');
    try{
      const nf=await Promise.all(picked.map(x=>uploadFile(x,'issues')));
      setFiles(files.concat(nf));
    }catch(err){console.error(err);ctx.say('Upload failed — try again');}
  }
  function go(){
    const clean=txt.trim();
    if(kind!=='task'){
      if(!clean){ctx.say(kind==='issue'?'Describe the issue first':'Say what you need first');return;}
      // Supply request: resolve the stage-1 approver NOW (configured supply_approver rule for the
      // requester's department, else the dept Sr.-Manager fallback) and store it on the request, so
      // the request routes to a stable approver even if config later changes.
      const appId=kind==='request'?ctx.supplyApproverId({from:ctx.viewer.s}):null;
      const nr={kind:kind==='issue'?'issue':'request',t:clean.charAt(0).toUpperCase()+clean.slice(1),
        from:ctx.viewer.s,date:iso(TODAY),
        routing_rule_id:kind==='issue'&&selCat?selCat.id:undefined,
        target_staff_id:kind==='issue'&&issueRec?issueRec.id:undefined,
        approver_staff_id:kind==='request'?(appId||undefined):undefined,
        stage:kind==='request'?'pending':undefined,
        note:note.trim(),files:files.length?files.slice():undefined};
      requests.unshift(nr);
      close();ctx.R();
      const dest=kind==='issue'?(issueRec?issueRec.n.split(' ')[0]+' ('+selCat.label+')':'the recipient'):((appId&&byId(appId))?byId(appId).n.split(' ')[0]:'your approver')+' for approval';
      // ticket_no is DB-assigned on insert — announce it once saveRequest reads it back
      saveRequest(nr).then(()=>{ctx.R();ctx.say((kind==='issue'?'Report':'Request')+(nr.ticket?' #'+nr.ticket:'')+' sent to '+dest);})
        .catch(e=>{console.error(e);ctx.say((kind==='issue'?'Report':'Request')+' sent to '+dest);});
      return;
    }
    if(!clean||clean.length<3){ctx.say('Type or speak the task first');return;}
    let list=whos;
    if(mode==='self')list=[ctx.viewer.s];
    if(!list.length){ctx.say('Pick at least one person');return;}
    // instructedBy doubles as "who assigned this" (defaults to me, the creator) and the optional
    // "relaying on behalf of X" override via the boss-chain dropdown — without the default, tasks
    // I assign to someone else never recorded who assigned them at all, so "Assigned to me by"
    // stayed empty for the common case and only ever worked for the rare manual-relay one.
    const nt={t:cleanTask(clean),who:list[0],coWho:list.length>1?list.slice(1):undefined,
      type,bucket,prio,recur,recurOn:recur?recurOn:null,date:when||iso(TODAY),time:dueTime||null,status:'open',note:note.trim(),
      selfAssigned:mode==='self',instructedBy:boss||(mode==='self'?null:ctx.viewer.n)};
    tasks.unshift(nt);
    close();ctx.R();
    saveTask(nt).catch(console.error);
    const names=list.map(a=>(byShort(a)||{n:a}).n).join(' + ');
    ctx.say((mode==='self'?'Added to your list':'Assigned '+(list.length>1?'jointly to ':'to ')+names+' · notified in TeamFlow')+(recur?' · '+recurLabel(recur,recurOn):'')+(boss?' · as per '+boss:''));
  }
  const dts=[0,1,7].map(n=>{const d=new Date(TODAY);d.setDate(d.getDate()+n);return d;});
  const pickerBase=isDir?(deptTab==='other'?dirOther:dirWithin):ctx.scope;
  const pickerDepts=[...new Set(pickerBase.map(p=>p.dept).filter(Boolean))].sort();
  const whoList=pickerBase.filter(x=>(!whoDept||x.dept===whoDept)&&(!whoQ||x.n.toLowerCase().includes(whoQ.toLowerCase())||x.dept.toLowerCase().includes(whoQ.toLowerCase())));
  /* Preventive dept/assignee mismatch check (the v131 modal, but live while composing): warn when the
     chosen department matches NO assignee's real department. Skipped for self-tasks (you can't misassign
     to yourself). Common trigger: a joint task spanning departments, or a manual department override.
     mmSuggest = the first assignee's own department, offered as a one-tap fix. */
  const deptMismatch=kind==='task'&&mode!=='self'&&whos.length&&!whos.some(s=>{const p=byShort(s);return p&&LABEL_TO_BUCKET[p.dept]===bucket;});
  const mmSuggest=deptMismatch?(()=>{const p=byShort(whos[0]);return p?LABEL_TO_BUCKET[p.dept]:null;})():null;
  const hints={task:<span>Type or speak in plain words — <b>AI fills in who, when and what type</b>. Tap any value to change it.</span>,
    issue:<span>Goes straight to <b>{issueRec?issueRec.n.split(' ')[0]+(selCat?' ('+selCat.label+')':''):'the configured recipient'}</b> — they assign the right person, no approval needed.</span>,
    request:<span>Goes to <b>your department’s configured approver</b> for one-tap approval, then to the configured supply recipient to fulfil.</span>};
  const phs={task:'Try: "Ask Hari to fix the lab projector by Friday"',issue:"What's broken? e.g. Projector in Lab 2 not working",request:'What do you need? e.g. 2 boxes of chalk for Class 5'};
  return <div className="modal-wrap" onClick={e=>{if(e.target===e.currentTarget)close();}}>
    <div className="modal">
      <div className="qc-head"><h3>New</h3><button className="iconbtn" onClick={close}><I n="x"/></button></div>
      <div className="selfseg" style={{marginTop:12}}>
        {/* the 'request' (Request supplies) tab is omitted for everyone — incl. admin — when the
            master supply toggle (org_settings.supply_requests_enabled) is off. */}
        {[['task','Task'],['issue','Request for repairs and maintenance'],['request','Request supplies']]
          .filter(([k])=>k!=='request'||supplyEnabled()).map(([k,l])=>
          <button key={k} className={kind===k?'on':''} onClick={()=>setKind(k)}>{l}</button>)}
      </div>
      <div className="qc-input-row">
        <input className="qc-input" autoFocus placeholder={phs[kind]} value={txt} onChange={e=>parse(e.target.value)}/>
        <button className={'micbtn'+(rec?' rec':'')} onClick={record} title="Speak"><I n="mic"/></button>
      </div>
      <div style={{padding:'4px 22px 0',fontSize:11,color:'var(--muted)'}}>🎤 Demo: speaking fills in a sample sentence to try the flow — edit the text above if it's wrong.</div>
      <div className="qc-hint">{hints[kind]}</div>
      {kind==='issue'?<div style={{padding:'0 22px'}}>
        <div style={{fontSize:11,fontWeight:800,letterSpacing:'.5px',textTransform:'uppercase',color:'var(--ink2,#43494f)',margin:'2px 0 8px'}}>What kind of issue?</div>
        <div style={{display:'flex',gap:10,flexWrap:'wrap'}}>
          {cats.map(c=>{const h=c.staff_id?byId(c.staff_id):null,on=selCat&&selCat.id===c.id;
            return <button key={c.id} type="button" onClick={()=>setCat(c.id)}
              style={{flex:'1 1 45%',minWidth:150,textAlign:'left',border:'1.5px solid '+(on?'var(--accent)':'var(--line)'),
                background:on?'var(--accent-soft)':'#fff',borderRadius:11,padding:'11px 12px',cursor:'pointer',color:'inherit'}}>
              <div style={{fontSize:20,lineHeight:1}}>{c.icon}</div>
              <div style={{fontWeight:800,fontSize:13,marginTop:6}}>{c.label}</div>
              <div style={{fontSize:11,color:'var(--muted)',marginTop:5,lineHeight:1.4}}>Goes to {h?<b style={{color:'var(--accent-ink)'}}>{h.n} · {roleLabel(h)}, {h.dept}</b>:<b>the configured recipient</b>}{!h?<><br/>No recipient set — admins will handle it</>:null}</div>
            </button>;})}
        </div>
      </div>:null}
      {kind!=='task'?<div className="qc-attach">
        {[['camera','Camera',{accept:'image/*',capture:'environment'}],['image','Photos',{accept:'image/*',multiple:true}],['clip','Files',{multiple:true}]].map(([ic,l,at])=>
          <label key={l} className="btn soft"><I n={ic}/>{l}<input type="file" style={{display:'none'}} onChange={filePicked} {...at}/></label>)}
        {files.length?<div className="filelist">{files.map((x,ix)=><FileChip key={ix} x={x} onRemove={()=>{
          setFiles(files.filter((_,i)=>i!==ix));
          removeAttachment(x.path).catch(console.error);
        }}/>)}</div>:null}
      </div>:null}
      {kind!=='task'?<div className="qc-opts">
        <label>{kind==='issue'?'Extra details (optional)':'Why / for which class? (optional)'}</label>
        <textarea rows={2} value={note} onChange={e=>setNote(e.target.value)} placeholder="Any details…"/>
      </div>:null}
      {kind==='task'&&!isDir?<div className="selfseg">
        <button className={mode==='others'?'on':''} onClick={()=>setMode('others')}>For someone else</button>
        <button className={mode==='self'?'on':''} onClick={()=>setMode('self')}>For myself</button>
      </div>:null}
      {kind==='task'&&isDir?<div className="selfseg">
        <button className={mode==='others'&&deptTab==='within'?'on':''} onClick={()=>{setMode('others');if(deptTab!=='within'){setDeptTab('within');setWhos([]);setWhoWhy('');}}}>🏢 Within department</button>
        <button className={mode==='self'?'on':''} onClick={()=>setMode('self')}>🙋 Self</button>
        <button className={mode==='others'&&deptTab==='other'?'on':''} onClick={()=>{setMode('others');if(deptTab!=='other'){setDeptTab('other');setWhos([]);setWhoSugg(false);setWhoWhy('');}}}>🌐 Other department</button>
      </div>:null}
      {parsed?<div className="qc-parsed">
        <div className="aihead"><I n="spark" s={14}/> AI understood</div>
        <div className="fieldrow"><div className="k">Task</div><div className="v">{cleanTask(txt)}</div></div>
        <div className="fieldrow"><div className="k">Assign to</div><div className="v">
          <span className="editchip" onClick={()=>setPick(pick==='who'?null:'who')}>
            {mode==='self'?'You — '+ctx.viewer.n:(whos.length?whos.map(a=>(byShort(a)||{n:a}).n).join(' + '):'Choose a person')} <I n="chevd" s={13}/></span>
          {whoWhy&&mode!=='self'?<div className="whysm"><b>{whoSugg?'✦ Suggested':'✓'}</b> — {whoWhy}</div>:null}
          {pick==='who'&&mode!=='self'?<div className="pickrow">
            {canMulti?<label className="whysm" style={{display:'flex',alignItems:'center',gap:8,width:'100%',cursor:'pointer',fontWeight:600}}>
              <input type="checkbox" style={{width:15,height:15,accentColor:'var(--accent)'}} checked={joint} onChange={e=>setJointMode(e.target.checked)}/>
              Assign as a <b>joint task</b> (more than one person)</label>:null}
            <select className="fsel" style={{width:'100%'}} value={whoDept} onChange={e=>setWhoDept(e.target.value)} aria-label="Filter by department">
              <option value="">All departments</option>
              {pickerDepts.map(d=><option key={d} value={d}>{d}</option>)}
            </select>
            <input className="fsel" style={{width:'100%'}} placeholder="Search name…" value={whoQ} onChange={e=>setWhoQ(e.target.value)}/>
            {isDir&&deptTab==='other'?<div className="whysm" style={{width:'100%'}}>🌐 <b>Any department</b> — everyone except Administrators &amp; Management</div>:null}
            {joint?<div className="whysm">Tap each person to include — the task appears in everyone’s list</div>:null}
            {whoList.length?whoList.map(x=><button key={x.s} className={'pk'+(whos.includes(x.s)?' cur':'')} onClick={()=>toggleWho(x.s)}>{whos.includes(x.s)?'✓ ':''}{x.n} · {x.dept}</button>)
              :<div className="whysm">No one matches</div>}
          </div>:null}
        </div></div>
        <div className="fieldrow"><div className="k">Due</div><div className="v">
          <span className="editchip" onClick={()=>setPick(pick==='when'?null:'when')}>{fmtDate(when)}{dueTime?' · '+fmtTime(dueTime):''} <I n="chevd" s={13}/></span>
          {whenWhy?<div className="whysm"><b>{whenSugg?'✦ Suggested':'✓'}</b> — {whenWhy}</div>:null}
          {pick==='when'?<div className="pickrow">{dts.map(d=><button key={iso(d)} className={'pk'+(iso(d)===when?' cur':'')}
            onClick={()=>{setWhen(iso(d));setWhenSugg(false);setWhenWhy('you picked this date');}}>
            {d.toDateString()===TODAY.toDateString()?'Today':fmtDate(iso(d))}</button>)}
            <input type="date" className="fsel" style={{padding:'5px 9px',fontSize:12.5}} value={when||''} min={iso(TODAY)} aria-label="Pick any date"
              onChange={e=>{const v=e.target.value;if(!v)return;setWhen(v);setWhenSugg(false);setWhenWhy('you picked this date');}}/>
            <input type="time" className="fsel" style={{padding:'5px 9px',fontSize:12.5}} value={dueTime} aria-label="Due time (optional)"
              onChange={e=>setDueTime(e.target.value)}/>
            <button className="pk" onClick={()=>setPick(null)}>✓ Set</button></div>:null}
        </div></div>
        <div className="fieldrow"><div className="k">Type</div><div className="v">
          <span className="editchip" onClick={()=>setPick(pick==='type'?null:'type')}>{TYPES[type]} <I n="chevd" s={13}/></span>
          {pick==='type'?<div className="pickrow">{Object.keys(TYPES).map(k=><button key={k} className={'pk'+(k===type?' cur':'')}
            onClick={()=>{setType(k);if(whenSugg){const s=suggestDue(k);setWhen(s.date);setWhenWhy(s.why);}setPick(null);}}>{TYPES[k]}</button>)}</div>:null}
        </div></div>
        <div className="fieldrow"><div className="k">Department</div><div className="v">
          <span className="editchip" onClick={()=>setPick(pick==='bucket'?null:'bucket')}>{BUCKETS[bucket]||bucket} <I n="chevd" s={13}/></span>
          {deptMismatch?<div className="whysm" style={{color:'var(--red)',display:'flex',alignItems:'center',gap:8,flexWrap:'wrap',marginTop:4}}>
            <span><b>⚠ Mismatch</b> — {whos.length>1?'no assignee is':'the assignee isn’t'} in {BUCKETS[bucket]||bucket}.</span>
            {mmSuggest&&mmSuggest!==bucket?<button className="linkbtn" style={{fontSize:12}} onClick={()=>{setBucket(mmSuggest);setBucketSugg(true);}}>→ Set to {BUCKETS[mmSuggest]}</button>:null}
          </div>:null}
          {pick==='bucket'?<div className="pickrow">{realDeptKeys(ctx.scope).map(k=><button key={k} className={'pk'+(k===bucket?' cur':'')}
            onClick={()=>{setBucket(k);setBucketSugg(false);setPick(null);}}>{BUCKETS[k]}</button>)}</div>:null}
        </div></div>
        <div className="fieldrow"><div className="k">Priority</div><div className="v">
          <span className="editchip" onClick={()=>setPick(pick==='prio'?null:'prio')}>
            <span className="prio" style={{background:PRIOS[prio].c}}/>{PRIOS[prio].l} <I n="chevd" s={13}/></span>
          {pick==='prio'?<div className="pickrow">{Object.keys(PRIOS).map(k=><button key={k} className={'pk'+(k===prio?' cur':'')}
            onClick={()=>{setPrio(k);setPick(null);}}>{PRIOS[k].l}</button>)}</div>:null}
        </div></div>
        <div className="fieldrow"><div className="k">Repeat</div><div className="v">
          <span className="editchip" onClick={()=>setPick(pick==='recur'?null:'recur')}>{recur?'↻ '+recurLabel(recur,recurOn):"Doesn't repeat"} <I n="chevd" s={13}/></span>
          {recur?<div className="whysm">Next occurrence is scheduled automatically each time it's completed</div>:null}
          {pick==='recur'?<>
            <div className="pickrow">
              <button className={'pk'+(!recur?' cur':'')} onClick={()=>{setRecur(null);setRecurOn(null);setPick(null);}}>Doesn't repeat</button>
              {Object.keys(RECURS).map(k=><button key={k} className={'pk'+(k===recur?' cur':'')}
                onClick={()=>{setRecur(k);setRecurOn(defaultRecurOn(k,when||iso(TODAY)));if(k==='daily')setPick(null);}}>{RECURS[k]}</button>)}
            </div>
            {recur==='weekly'?<div className="pickrow"><div className="whysm" style={{width:'100%',marginTop:2}}>On which day of the week?</div>
              {[1,2,3,4,5,6,0].map(ix=><button key={ix} className={'pk'+(recurOn===ix?' cur':'')}
                onClick={()=>{setRecurOn(ix);const nd=nextAnchor('weekly',ix,iso(TODAY));setWhen(nd);setWhenSugg(false);setWhenWhy('first occurrence — every '+DOW[ix]);setPick(null);}}>{DOW[ix]}</button>)}</div>:null}
            {recur==='monthly'?<div className="pickrow"><div className="whysm" style={{width:'100%',marginTop:2}}>On which date of the month?</div>
              <select className="fsel" value={recurOn||1} onChange={e=>{const v=+e.target.value;setRecurOn(v);
                const nd=nextAnchor('monthly',v,iso(TODAY));setWhen(nd);setWhenSugg(false);setWhenWhy('first occurrence — the '+ord(v)+' of every month');setPick(null);}}>
                {Array.from({length:31},(_,i)=>i+1).map(n=><option key={n} value={n}>{ord(n)} of every month</option>)}</select></div>:null}
            {recur==='yearly'?<div className="pickrow"><div className="whysm" style={{width:'100%',marginTop:2}}>On which day and month?</div>
              <select className="fsel" value={(recurOn&&recurOn.d)||1} onChange={e=>{const v={d:+e.target.value,m:(recurOn&&recurOn.m)||0};setRecurOn(v);
                const nd=nextAnchor('yearly',v,iso(TODAY));setWhen(nd);setWhenSugg(false);setWhenWhy('first occurrence — every year on '+v.d+' '+MONTHS[v.m]);}}>
                {Array.from({length:31},(_,i)=>i+1).map(n=><option key={n} value={n}>{ord(n)}</option>)}</select>
              <select className="fsel" value={(recurOn&&recurOn.m)||0} onChange={e=>{const v={d:(recurOn&&recurOn.d)||1,m:+e.target.value};setRecurOn(v);
                const nd=nextAnchor('yearly',v,iso(TODAY));setWhen(nd);setWhenSugg(false);setWhenWhy('first occurrence — every year on '+v.d+' '+MONTHS[v.m]);}}>
                {MONTHS.map((mn,ix)=><option key={mn} value={ix}>{mn}</option>)}</select></div>:null}
          </>:null}
        </div></div>
      </div>:null}
      {kind==='task'?<>
        <button className="qc-opts-t" onClick={()=>setOpts(!opts)}><span>More options</span><I n="chevd"/></button>
        {opts?<div className="qc-opts">
          <label>On instruction of</label>
          <select value={boss} onChange={e=>setBoss(e.target.value)}>
            <option value="">No one — own initiative</option>
            {ctx.instructors.map(p=><option key={p.s} value={p.n}>{bossLabelOf(p.n)}</option>)}
          </select>
          <label>Note (optional)</label>
          <textarea rows={2} value={note} onChange={e=>setNote(e.target.value)} placeholder="Any details…"/>
        </div>:null}
      </>:null}
      <div className="qc-actions">
        <button className="btn soft" style={{flex:1}} onClick={close}>Cancel</button>
        <button className="btn primary" style={{flex:2,justifyContent:'center'}} onClick={go}>
          <I n={kind==='task'?'check':kind==='issue'?'tool':'box'}/>
          {kind==='task'?'Assign task':kind==='issue'?'Send to '+headFirst:'Send request'}
        </button>
      </div>
    </div>
  </div>;
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
