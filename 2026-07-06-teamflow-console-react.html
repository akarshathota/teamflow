/* per-column task list export: reuses the same CSV/print machinery as the old scope-wide
   exportCSV/printReport, just parameterized by an arbitrary row set + label instead of always
   being the whole scope. */
function exportRows(rows,label){
  const csvRows=[['Task','Type','Department','Priority','Repeats','Assignee','Due','Status','Overdue','Note']];
  rows.forEach(({t})=>csvRows.push([t.t,TYPES[t.type||'work'],BUCKETS[t.bucket]||'',PRIOS[t.prio||'med'].l,t.recur?recurLabel(t.recur,t.recurOn):'',
    assignees(t).map(a=>(byShort(a)||{n:a}).n).join(' + '),t.date+(t.time?' '+fmtTime(t.time):''),ST[t.status].l,isOverdue(t)?'Yes':'No',t.note||'']));
  csvDownload(iso(new Date())+'-teamflow-'+label.toLowerCase().replace(/\s+/g,'-')+'.csv',csvRows);
}
function printRows(rows,label,viewerName){
  let b='<h1 style="margin:0 0 4px;font-family:Bricolage Grotesque,sans-serif">TeamFlow — '+label+'</h1>';
  b+='<div style="color:#555;margin-bottom:18px">Prepared for '+viewerName+' · '+new Date().toDateString()+' · '+rows.length+' tasks</div>';
  b+='<table style="width:100%;border-collapse:collapse;font-size:12px"><tr style="border-bottom:2px solid #333"><th style="text-align:left;padding:6px">Task</th><th style="text-align:left;padding:6px">Assignee</th><th style="text-align:left;padding:6px">Type</th><th style="text-align:left;padding:6px">Due</th><th style="text-align:left;padding:6px">Status</th></tr>';
  rows.forEach(({t})=>{b+='<tr style="border-bottom:1px solid #ccc"><td style="padding:6px">'+t.t+'</td><td style="padding:6px">'+assignees(t).map(a=>(byShort(a)||{n:a}).n).join(' + ')+'</td><td style="padding:6px">'+TYPES[t.type||'work']+'</td><td style="padding:6px">'+t.date+(isOverdue(t)?' (overdue)':'')+'</td><td style="padding:6px">'+ST[t.status].l+'</td></tr>';});
  b+='</table>';
  const pr=document.getElementById('print-report');pr.innerHTML=b;pr.style.display='block';
  const ot=document.title;document.title=iso(new Date())+'-teamflow-'+label.toLowerCase().replace(/\s+/g,'-');
  window.print();
  setTimeout(()=>{pr.style.display='none';document.title=ot;},300);
}
function ExportKebab({label,rows,viewerName,onExport}){
  const [open,setOpen]=useState(false);
  const ref=useRef();
  useEffect(()=>{
    if(!open)return;
    const h=e=>{if(ref.current&&!ref.current.contains(e.target))setOpen(false);};
    document.addEventListener('click',h);
    return ()=>document.removeEventListener('click',h);
  },[open]);
  return <div className="kebab" ref={ref} onClick={()=>setOpen(o=>!o)}>
    <I n="dots3" s={16}/>
    {open?<div className="kebab-menu">
      <button onClick={e=>{e.stopPropagation();setOpen(false);onExport({label,rows,viewerName});}}><I n="dl" s={14}/>Export list</button>
      <button onClick={e=>{e.stopPropagation();setOpen(false);printRows(rows,label,viewerName);}}><I n="print" s={14}/>Print list</button>
    </div>:null}
  </div>;
}
function ExportFormatModal({target,close,say}){
  return <div className="modal-wrap" onClick={e=>{if(e.target===e.currentTarget)close();}}>
    <div className="modal" style={{width:320}}>
      <div className="qc-head"><h3>Export list</h3><button className="iconbtn" onClick={close}><I n="x"/></button></div>
      <div className="mf">
        <div className="whysm" style={{marginTop:0,marginBottom:14}}>Choose a format for "{target.label}"</div>
        <div style={{display:'flex',gap:10}}>
          <button className="btn ghost" style={{flex:1,flexDirection:'column',height:70,gap:6}}
            onClick={()=>{printRows(target.rows,target.label,target.viewerName);close();}}><I n="print"/>PDF</button>
          <button className="btn ghost" style={{flex:1,flexDirection:'column',height:70,gap:6}}
            onClick={()=>{exportRows(target.rows,target.label);say('Exported "'+target.label+'" — CSV, opens directly in Excel');close();}}><I n="dl"/>XLSX</button>
        </div>
      </div>
    </div>
  </div>;
}
function TasksView({ctx}){
  const [fb,setFb]=useState('all');
  const [fboss,setFboss]=useState('all');
  const [deptSeg,setDeptSeg]=useState('me');
  const [deptFb,setDeptFb]=useState('all');
  const [exportFor,setExportFor]=useState(null);

  const showDept=ctx.role==='srm'||ctx.role==='mgmt';
  const isManagerTier=ctx.role==='srm';
  const bossLabelOf=n=>BOSS_LABEL[n]||n;
  const myBossLabel=bossLabelOf(ctx.viewer.n);

  const rowsMine=tasks.map((t,i)=>({t,i})).filter(o=>hasWho(o.t,ctx.viewer.s)&&(fb==='all'||o.t.bucket===fb));
  const rowsBoss=tasks.map((t,i)=>({t,i})).filter(o=>hasWho(o.t,ctx.viewer.s)&&o.t.instructedBy&&(fboss==='all'||o.t.instructedBy===fboss));
  // Manager's own dept-lock is intentionally "show everything in my scope" rather than a specific
  // bucket — staff.department (org-chart HR field, e.g. "Academics") and task.bucket (e.g.
  // "academic") are separate vocabularies in this data model, not a 1:1 mapping, so guessing a
  // specific bucket for "their department" would silently misfilter. Management still gets the
  // real per-bucket dropdown.
  const effectiveDeptFb=isManagerTier?'all':deptFb;
  const rowsDept=showDept?tasks.map((t,i)=>({t,i})).filter(o=>inScope(o.t,ctx.shorts)&&!hasWho(o.t,ctx.viewer.s)
    &&(effectiveDeptFb==='all'||o.t.bucket===effectiveDeptFb)
    &&(deptSeg==='me'?o.t.instructedBy===myBossLabel:o.t.instructedBy!==myBossLabel)):[];

  const col=(label,rows,note)=><>
    <div className="col-head"><h3>{label}</h3>{note}<ExportKebab label={label} rows={rows} viewerName={ctx.viewer.n} onExport={setExportFor}/></div>
  </>;

  return <div className="view">
    <div className="cols3">
      <div className="panel colpanel">
        {col('My tasks',rowsMine)}
        <div className="col-toprow">
          <select className="fsel" style={{flex:1}} value={fb} onChange={e=>setFb(e.target.value)}>
            <option value="all">All departments</option>
            {Object.entries(BUCKETS).map(([k,v])=><option key={k} value={k}>{v}</option>)}
          </select>
        </div>
        <div className="scrollbox col-scroll">
          {rowsMine.length?rowsMine.map(o=><TaskRow key={o.i} t={o.t} i={o.i} ctx={ctx}/>):<Empty t="No tasks" s="Nothing here — try clearing the department filter."/>}
        </div>
      </div>

      <div className="panel colpanel">
        {col('Assigned to me by',rowsBoss)}
        <div className="col-toprow">
          <select className="fsel" style={{flex:1}} value={fboss} onChange={e=>setFboss(e.target.value)}>
            <option value="all">All</option>
            {ctx.bossChain.map(n=><option key={n} value={bossLabelOf(n)}>{bossLabelOf(n)}</option>)}
          </select>
        </div>
        <div className="scrollbox col-scroll">
          {rowsBoss.length?rowsBoss.map(o=><TaskRow key={o.i} t={o.t} i={o.i} ctx={ctx}/>):<Empty t="No tasks" s="Nothing assigned to you right now."/>}
        </div>
      </div>

      {showDept?<div className="panel colpanel">
        {col('Department tasks',rowsDept,<span className="col-note">Manager · Management</span>)}
        <div className="col-toprow" style={{flexDirection:'column',alignItems:'stretch',gap:8}}>
          <div className="segs">
            <button className={deptSeg==='me'?'on':''} onClick={()=>setDeptSeg('me')}>By me</button>
            <button className={deptSeg==='others'?'on':''} onClick={()=>setDeptSeg('others')}>By others</button>
          </div>
          <select className="fsel" disabled={isManagerTier} value={effectiveDeptFb} onChange={e=>setDeptFb(e.target.value)}>
            <option value="all">All departments</option>
            {Object.entries(BUCKETS).map(([k,v])=><option key={k} value={k}>{v}</option>)}
          </select>
        </div>
        {isManagerTier?<div className="col-empty-note">Fixed to your team — only Management can filter by department here.</div>:null}
        <div className="scrollbox col-scroll">
          {rowsDept.length?rowsDept.map(o=><TaskRow key={o.i} t={o.t} i={o.i} ctx={ctx}/>):<Empty t="No tasks" s="Nothing here — try switching By me/By others or the department filter."/>}
        </div>
      </div>:null}
    </div>
    {exportFor?<ExportFormatModal target={exportFor} close={()=>setExportFor(null)} say={ctx.say}/>:null}
  </div>;
}

/* ============ drawer ============ */
function Drawer({ctx,idx}){
  const t=tasks[idx];
  const [note,setNote]=useState('');
  const [reassign,setReassign]=useState(false);
  const [reDate,setReDate]=useState('');
  const [reNote,setReNote]=useState('');
  const [pendingDone,setPendingDone]=useState(false);
  useEffect(()=>{setNote('');setReassign(false);setReDate('');setReNote('');setPendingDone(tasks[idx]&&tasks[idx].status==='done');},[idx]);
  if(!t)return null;
  const p=byShort(t.who),od=isOverdue(t);
  const tl=[{w:'Assigned to '+assignees(t).map(a=>(byShort(a)||{n:a}).n).join(' + '),d:fmtDate(t.date)+' due date set'}];
  if(t.status==='inprogress'||t.status==='partial')tl.push({w:'Marked '+ST[t.status].l.toLowerCase(),d:'from mobile'});
  const logs=t.log||(t.note?[{by:'Earlier',when:'',text:t.note}]:[]);
  logs.forEach(x=>tl.push({w:'“'+x.text+'”',d:(x.by?x.by.split(' ')[0]:'')+(x.when?' · '+x.when:'')}));
  if(t.extReq)tl.push({w:'Extension requested → '+fmtDate(t.extReq.newDate),d:t.extReq.reason||'pending approval'});
  if(t.reopened)tl.push({w:'Reopened by '+t.reopened.by.split(' ')[0]+(t.reopened.comment?' — “'+t.reopened.comment+'”':''),d:'new due '+fmtDate(t.date)});
  if(t.coWho&&t.coWho.length&&(t.doneBy||[]).length&&t.status!=='done')tl.push({w:'Done by '+(t.doneBy||[]).map(a=>(byShort(a)||{n:a}).n.split(' ')[0]).join(', '),d:'waiting on '+assignees(t).filter(a=>!(t.doneBy||[]).includes(a)).map(a=>(byShort(a)||{n:a}).n.split(' ')[0]).join(', ')});
  if(t.status==='done')tl.push({w:'Completed',d:t.doneOn?fmtDate(t.doneOn):'closed'});
  return <div className="drawer">
    <div className="dr-head"><h3>{t.t}</h3>
      <button className="iconbtn" onClick={()=>ctx.setDrawerIdx(-1)}><I n="x"/></button></div>
    <div className="dr-body">
      <div className="dr-sec">Status</div>
      <div className="segs">{['open','inprogress','done'].map(s=>{
        const active=s==='done'?pendingDone:(!pendingDone&&(t.status===s||(s==='inprogress'&&t.status==='partial')));
        return <button key={s} className={active?'on':''} onClick={()=>{
          if(s==='done'){setPendingDone(true);return;}
          setPendingDone(false);t.status=s;delete t.doneOn;saveTask(t).catch(console.error);ctx.say('Status → '+ST[s].l);ctx.R();
        }}>{ST[s].l}</button>;})}</div>
      {pendingDone&&t.status!=='done'?<div className="whysm" style={{margin:'6px 20px 0'}}>Click OK below to close the task.</div>:null}
      {t.coWho&&t.coWho.length?<>
        <div className="dr-sec">Completion — each member confirms</div>
        {assignees(t).map(a=>{const q=byShort(a);const dn=(t.doneBy||[]).includes(a);
          return <div className="kv" key={a}>
            <div className="k"><span className="avex">{q?q.av:'?'}</span></div>
            <div className="v" style={{flex:1}}>{q?q.n:a}</div>
            <button className={'btn '+(dn?'primary':'ghost')} style={{padding:'6px 12px',minHeight:0}}
              onClick={()=>{t.doneBy=dn?(t.doneBy||[]).filter(x=>x!==a):[...(t.doneBy||[]),a];
                if(assignees(t).every(x=>(t.doneBy||[]).includes(x))){const nd=completeTask(t);persistComplete(t,nd);ctx.say(nd?'All done · next '+RECURS[t.recur].toLowerCase()+' occurrence '+fmtDate(nd):'All members done — task completed');}
                else{if(t.status==='done'){t.status='open';delete t.doneOn;}setPendingDone(false);saveTask(t).catch(console.error);}
                ctx.R();}}>{dn?'✓ Done':'Pending'}</button>
          </div>;})}
      </>:null}
      {t.status==='done'&&ctx.canApprove(t.who)?<>
        <div className="dr-sec" style={{color:'var(--red)'}}>Not up to the mark? Reopen</div>
        <div className="kv"><div className="k">New due</div><div className="v" style={{flex:1}}>
          <input type="date" className="fsel" style={{width:'100%'}} value={reDate} onChange={e=>setReDate(e.target.value)}/></div></div>
        <textarea className="dr-note" value={reNote} onChange={e=>setReNote(e.target.value)} placeholder="What needs to be fixed? (sent to the assignee)"/>
        <button className="btn ghost" style={{marginTop:9,color:'var(--red)'}} onClick={()=>{
          if(!reDate){ctx.say('Pick a new due date first');return;}
          setPendingDone(false);t.status='open';t.date=reDate;delete t.doneOn;t.doneBy=[];
          t.reopened={by:ctx.viewer.n,comment:reNote.trim()};
          t.log=t.log||(t.note?[{by:'Earlier',when:'',text:t.note}]:[]);
          t.log.push({by:ctx.viewer.n,when:fmtDate(iso(TODAY)),text:'Reopened — '+(reNote.trim()||'not up to the mark')});
          if(reNote.trim())t.note=reNote.trim();
          saveTask(t).catch(console.error);logTask(t,ctx.viewer.n,'Reopened — '+(reNote.trim()||'not up to the mark')).catch(console.error);
          ctx.R();ctx.say('Task reopened — new due '+fmtDate(t.date)+' · assignee notified');}}>
          <I n="redo"/>Reopen task</button>
      </>:null}
      <div className="dr-sec">Details</div>
      <div className="kv"><div className="k">Assignee{t.coWho&&t.coWho.length?'s':''}</div>
        <div className="v">{assignees(t).map(a=>{const q=byShort(a);return <React.Fragment key={a}><span className="avex">{q?q.av:'?'}</span>{q?q.n:a}</React.Fragment>;})}
        {t.coWho&&t.coWho.length?<span className="tag teal">joint</span>:<span className="roletag">{p?p.dept:''}</span>}</div></div>
      {reassign?<div className="kv"><div className="k">Move to</div><div className="v" style={{flex:1}}>
        <select className="fsel" style={{width:'100%'}} defaultValue="" onChange={e=>{if(!e.target.value)return;t.who=e.target.value;t.coWho=undefined;saveTask(t).catch(console.error);ctx.R();ctx.say('Reassigned to '+byShort(e.target.value).n);setReassign(false);}}>
          <option value="">Choose a person…</option>
          {ctx.scope.filter(x=>x.role==='Teacher').map(x=><option key={x.s} value={x.s}>{x.n} · {x.dept}</option>)}
        </select></div></div>:null}
      <div className="kv"><div className="k">Due</div><div className="v" style={{color:od?'var(--red)':undefined}}>{fmtDate(t.date)}{t.time?' · '+fmtTime(t.time):''}{od?' · '+overdueDays(t)+' days late':''}</div></div>
      <div className="kv"><div className="k">Type</div><div className="v"><span className="tag gray">{TYPES[t.type||'work']}</span></div></div>

          </label>)}
      </div>

function CalendarView({ctx}){
  const [base,setBase]=useState(new Date(2026,6,1));
  const [selDay,setSelDay]=useState(null);
  const [fw,setFw]=useState('all');
  const [fb,setFb]=useState('all');
  const y=base.getFullYear(),m=base.getMonth();
  const firstDow=new Date(y,m,1).getDay(),days=new Date(y,m+1,0).getDate();
  const vis=tasks.map((t,i)=>({t,i})).filter(o=>inScope(o.t,ctx.shorts)&&o.t.date&&(fb==='all'||o.t.bucket===fb)&&(fw==='all'||hasWho(o.t,fw)));
  const empOpts=ctx.scope.filter(p=>(p.role==='Teacher'||p.n===ctx.viewer.n)&&(fb==='all'||tasks.some(t=>hasWho(t,p.s)&&t.bucket===fb&&t.status!=='done')));
  const byDay={};vis.forEach(o=>{const d=new Date(o.t.date+'T00:00:00');if(d.getFullYear()===y&&d.getMonth()===m)(byDay[d.getDate()]=byDay[d.getDate()]||[]).push(o);});
  const monthEvs=Object.values(byDay).flat();
  const bks=[...new Set(monthEvs.map(o=>o.t.bucket).filter(Boolean))];
  const cells=[];
  for(let i=0;i<firstDow;i++)cells.push(<div key={'e'+i} className="calcell empty2"/>);
  for(let d=1;d<=days;d++){
    const dow=new Date(y,m,d).getDay();
    const isT=y===TODAY.getFullYear()&&m===TODAY.getMonth()&&d===TODAY.getDate();
    const evs=byDay[d]||[];
    cells.push(<div key={d} className={'calcell'+(isT?' today':'')+(dow===0||dow===6?' wkend':'')} onClick={()=>setSelDay(d)}>
      <div className="caldate"><span>{d}</span>{isT?<span className="tdy">TODAY</span>:null}</div>
      {evs.slice(0,3).map(o=>{const p=byShort(o.t.who),od=isOverdue(o.t),dn=o.t.status==='done';
        return <div key={o.i} className="calev" style={{background:bucketColor(o.t.bucket),opacity:dn?.55:1,boxShadow:od?'0 0 0 1.5px var(--red)':undefined,cursor:'pointer'}}
          title={dn?'Done — open task':'Open task'} onClick={e=>{e.stopPropagation();ctx.setDrawerIdx(o.i);}}>
          <span className="who2">{dn?'✓':p?p.av:''}</span><span className="txt" style={{textDecoration:dn?'line-through':undefined}}>{o.t.t}</span></div>;})}
      {evs.length>3?<div className="calmore">+{evs.length-3} more</div>:null}
    </div>);
  }
  return <div className="view">
    <div className="calhead">
      <button className="navb" onClick={()=>{setBase(new Date(y,m-1,1));setSelDay(null);}}><I n="chevl"/></button>
      <div className="calmon">{base.toLocaleString('en',{month:'long',year:'numeric'})}</div>
      <button className="navb" onClick={()=>{setBase(new Date(y,m+1,1));setSelDay(null);}}><I n="chevr"/></button>
      <div className="spacer"/>
      <select className="fsel" value={fb} onChange={e=>{setFb(e.target.value);setFw('all');}}>
        <option value="all">All departments</option>
        {Object.entries(BUCKETS).map(([k,v])=><option key={k} value={k}>{v}</option>)}</select>
      <select className="fsel" value={fw} onChange={e=>setFw(e.target.value)}>
        <option value="all">{fb==='all'?'All employees':'All in '+BUCKETS[fb]}</option>
        {empOpts.map(p=><option key={p.s} value={p.s}>{p.n}</option>)}</select>
    </div>
    <div className="panel">
      <div className="calgrid">
        {['Sun','Mon','Tue','Wed','Thu','Fri','Sat'].map(d=><div key={d} className="caldow">{d}</div>)}
        {cells}
      </div>
      {bks.length?<div className="callegend">
        {bks.map(b=><span key={b}><span className="ldot" style={{background:bucketColor(b)}}/>{BUCKETS[b]||b}</span>)}
        <span style={{marginLeft:'auto'}}><span className="ldot" style={{background:'#fff',boxShadow:'0 0 0 1.5px var(--red)'}}/>red ring = overdue</span>
      </div>:null}
    </div>
    {selDay!=null?<div className="panel">
      {byDay[selDay]?<>
        <div className="h-row"><h3><I n="cal"/>Due on {selDay} {base.toLocaleString('en',{month:'long'})} — {byDay[selDay].length} task{byDay[selDay].length!=1?'s':''}</h3></div>
        {byDay[selDay].map(o=><TaskRow key={o.i} t={o.t} i={o.i} ctx={ctx}/>)}
      </>:<Empty t={'Nothing due on '+selDay+' '+base.toLocaleString('en',{month:'long'})} s="Pick another day, or press N to schedule a task."/>}
    </div>:null}
  </div>;
}

const byId=id=>STAFF.find(p=>p.id===id);
const directReports=name=>STAFF.filter(p=>p.boss===name);
const orgDepts=()=>STAFF.filter(p=>p.role==='Manager'); // Sr. Manager rows = department heads

function orgDeepestOfType(rootName,dbRole){
  let last=null;
  (function walk(name){directReports(name).forEach(c=>{if(c.role===dbRole)last=c;walk(c.n);});})(rootName);
  return last;
}
function personLabel(p){
  const tier=TIER_LABEL[p.role]||p.role;
  if(p.role==='Manager')return tier+' — '+p.dept+' ('+p.n+')';
  if(p.role==='Management')return tier+' — '+p.n;
  return tier+' — '+p.n+' ('+p.dept+')';
}
async function createStaffAccount({name,role,department,boss,phone,email}){

/* exports every NOT-DONE task assigned to this person or anyone below them — one row per task,
   with status/due date/files/activity log, not just a headcount */
function exportPersonTasksCsv(root){
  const people=[root,...descendants(root.n)];
  const shorts=people.map(p=>p.s);
  const byShortName=Object.fromEntries(people.map(p=>[p.s,p]));
  const rows=[['Role','Name','Department','Task','Status','Due date','Files attached','Activity log']];
  tasks.filter(t=>t.status!=='done'&&assignees(t).some(a=>shorts.includes(a))).forEach(t=>{
    assignees(t).filter(a=>shorts.includes(a)).forEach(a=>{
      const p=byShortName[a];
      rows.push([p.role,p.n,p.dept,t.t,(ST[t.status]||{l:t.status}).l,t.date||'',
        (t.files||[]).map(f=>f.name).join('; ')||'—',
        (t.log||[]).map(l=>l.when+' — '+l.by+': '+l.text).join(' | ')||'—']);
    });
  });
  csvDownload(root.n.toLowerCase().replace(/\s+/g,'-')+'-pending-tasks-export.csv',rows);
}

/* single modal driving every People & roles action — Add x5, Remove/Replace/Promote/Revert,
   rename department, and the plain person-detail popup — mirrors the mockup's state machine,
   with real Supabase writes in place of in-memory mutation */
/* module-scope so its identity is stable across OrgActionModal re-renders — defining this inline
   inside OrgActionModal made React remount the whole modal (losing input focus) on every
   keystroke, since a fresh function reference each render is a "different component" to React */
function ModalShell({title,sub,children,close,err}){
  return <div className="modal-wrap" onClick={e=>{if(e.target===e.currentTarget)close();}}>
    <div className="modal" style={{width:460}}>
      <div className="qc-head"><h3>{title}</h3><button className="iconbtn" onClick={close}><I n="x"/></button></div>
      {sub?<div className="whysm" style={{margin:'0 20px'}}>{sub}</div>:null}
      {children}
      {err?<div style={{color:'var(--red)',fontSize:12.5,margin:'0 20px 10px'}}>{err}</div>:null}
    </div>
  </div>;
}
function OrgActionModal({ctx,step,setStep,oaCtx,setOaCtx,close}){
  const [f,setF]=useState({});
  const [err,setErr]=useState('');
  const [busy,setBusy]=useState(false);
  const [result,setResult]=useState(null); // {name,login,username,password} after a real account create
  const say=ctx.say;

  if(result)return <div className="modal-wrap" onClick={e=>{if(e.target===e.currentTarget)close();}}>
    <div className="modal" style={{width:440}}>
      <div className="qc-head"><h3>Account created</h3><button className="iconbtn" onClick={close}><I n="x"/></button></div>
      <div className="mf">
        <div className="whysm" style={{marginTop:0,marginBottom:14}}>Share these with {result.name.split(' ')[0]} — the password won't be shown again.</div>
        <label>{result.username?'Username':'Email'}</label>
        <input readOnly value={result.username||result.login} onFocus={e=>e.target.select()}/>
        <label>Password</label>
        <input readOnly value={result.password} onFocus={e=>e.target.select()}/>
      </div>
      <div className="qc-actions"><button className="btn primary" style={{flex:1,justifyContent:'center'}} onClick={close}><I n="check"/>Done</button></div>
    </div>
  </div>;

  /* ---------- Add flows ---------- */
  if(step==='add-mgmt'){
    return <ModalShell close={close} err={err} title="Add a Management member" sub="Joins Management alongside anyone already there — every Management member oversees every department jointly.">
      <div className="mf">
        <label>Name</label><input value={f.name||''} onChange={e=>setF({...f,name:e.target.value})} placeholder="e.g. Neha Kapoor" autoFocus/>
        <label>Email (their real login)</label><input value={f.email||''} onChange={e=>setF({...f,email:e.target.value})} placeholder="name@school.org"/>
      </div>
      <div className="qc-actions">
        <button className="btn soft" style={{flex:1}} onClick={close}>Cancel</button>
        <button className="btn primary" style={{flex:2,justifyContent:'center'}} disabled={busy} onClick={async()=>{
          const name=(f.name||'').trim();
          if(!name){setErr('Enter a name.');return;}
          if(!/^[^@\s]+@[^@\s]+\.[^@\s]+$/.test((f.email||'').trim())){setErr('Enter a valid email — Management needs a real login.');return;}
          setBusy(true);setErr('');
          try{
            const admin=STAFF.find(p=>p.role==='Administrator');
            const j=await createStaffAccount({name,role:'Management',department:(mgmtMembers()[0]||{}).dept||'Administration',boss:admin.n,email:f.email.trim()});
            STAFF.push({n:j.name,s:j.short_name,role:'Management',dept:(mgmtMembers()[0]||{}).dept||'Administration',boss:admin.n,bossId:admin.id,av:j.name.split(' ').map(x=>x[0]).join('').slice(0,2).toUpperCase(),id:j.id,authId:null});
            ctx.R();say('Added '+name+' to Management');setBusy(false);setResult(j);
          }catch(e){setBusy(false);setErr(e.message);}
        }}>{busy?'Adding…':'Add'}</button>
      </div>
    </ModalShell>;
  }
  if(step==='add-dept'){
    const takenDepts=new Set(orgDepts().map(d=>d.dept));
    const availDepts=Object.values(BUCKETS).filter(d=>!takenDepts.has(d));
    return <ModalShell close={close} err={err} title="Add a department" sub="Creates a new Sr. Manager department under Management — overseen jointly by every Management member.">
      <div className="mf">
        <label>Department name</label>
        {availDepts.length?<select value={f.dept||availDepts[0]} onChange={e=>setF({...f,dept:e.target.value})} autoFocus>
          {availDepts.map(d=><option key={d}>{d}</option>)}</select>
        :<div className="whysm" style={{margin:0}}>Every department already has a Sr. Manager.</div>}
        <label>Sr. Manager name</label><input value={f.name||''} onChange={e=>setF({...f,name:e.target.value})} placeholder="e.g. Priya Nair"/>
      </div>
      <div className="qc-actions">
        <button className="btn soft" style={{flex:1}} onClick={close}>Cancel</button>
        <button className="btn primary" style={{flex:2,justifyContent:'center'}} disabled={busy||!availDepts.length} onClick={async()=>{
          const dept=(f.dept||availDepts[0]||'').trim(),name=(f.name||'').trim();
          if(!dept||!name){setErr('Enter both a department name and a Sr. Manager name.');return;}
          if(orgDepts().some(d=>d.dept.toLowerCase()===dept.toLowerCase())){setErr('A department with that name already exists.');return;}
          setBusy(true);setErr('');
          try{
            const boss=mgmtMembers()[0];
            const j=await createStaffAccount({name,role:'Manager',department:dept,boss:boss.n});
            STAFF.push({n:j.name,s:j.short_name,role:'Manager',dept,boss:boss.n,bossId:boss.id,av:j.name.split(' ').map(x=>x[0]).join('').slice(0,2).toUpperCase(),id:j.id,authId:null});
            ctx.R();say('Added department "'+dept+'" with Sr. Manager '+name);setBusy(false);setResult(j);
          }catch(e){setBusy(false);setErr(e.message);}
        }}>{busy?'Adding…':'Add'}</button>
      </div>
    </ModalShell>;
  }
  if(step==='add-jrm'||step==='add-lead'||step==='add-staff'){
    const titles={'add-jrm':'Add Jr. Manager','add-lead':'Add Team Lead','add-staff':'Add Staff'};
    const subs={'add-jrm':"Attaches directly under that department's Sr. Manager.",
      'add-lead':"Attaches under that department's most recent Jr Manager — or directly under the Sr. Manager if it has none yet.",
      'add-staff':'Attaches under the most specific existing manager in that department (Team Lead, else Jr Manager, else the Sr. Manager).'};
    const depts=orgDepts();
    return <ModalShell close={close} err={err} title={titles[step]} sub={subs[step]}>
      <div className="mf">
        <label>Name</label><input value={f.name||''} onChange={e=>setF({...f,name:e.target.value})} placeholder="e.g. Deepa Iyer" autoFocus/>
        <label>Department</label>
        <select value={f.deptId||(depts[0]||{}).id||''} onChange={e=>setF({...f,deptId:e.target.value})}>
          {depts.map(d=><option key={d.id} value={d.id}>{d.dept}{d.n?' — '+d.n:''}</option>)}
        </select>
      </div>
      <div className="qc-actions">
        <button className="btn soft" style={{flex:1}} onClick={close}>Cancel</button>
        <button className="btn primary" style={{flex:2,justifyContent:'center'}} disabled={busy} onClick={async()=>{
          const name=(f.name||'').trim();
          const deptId=f.deptId||(depts[0]||{}).id;
          const deptHead=depts.find(d=>d.id===deptId);
          if(!name){setErr('Enter a name.');return;}
          if(!deptHead){setErr('Pick a department.');return;}
          const dbRole=step==='add-jrm'?'Team Member':step==='add-lead'?'Team Lead':'Teacher';
          const attachPoint=step==='add-jrm'?deptHead
            :step==='add-lead'?(orgDeepestOfType(deptHead.n,'Team Member')||deptHead)
            :(orgDeepestOfType(deptHead.n,'Team Lead')||orgDeepestOfType(deptHead.n,'Team Member')||deptHead);
          if(step==='add-jrm'||step==='add-lead'){
            const existing=orgDeepestOfType(deptHead.n,dbRole);
            const candidates=directReports(attachPoint.n);
            if(!existing&&candidates.length){
              setOaCtx({dbRole,name,deptHead,attachPoint,candidates});
              setStep('add-reassign');
              return;
            }
          }
          setBusy(true);setErr('');
          try{
            const j=await createStaffAccount({name,role:dbRole,department:deptHead.dept,boss:attachPoint.n});
            STAFF.push({n:j.name,s:j.short_name,role:dbRole,dept:deptHead.dept,boss:attachPoint.n,bossId:attachPoint.id,av:j.name.split(' ').map(x=>x[0]).join('').slice(0,2).toUpperCase(),id:j.id,authId:null});
            ctx.R();say('Added '+TIER_LABEL[dbRole]+' '+name+' under '+deptHead.dept);setBusy(false);setResult(j);
          }catch(e){setBusy(false);setErr(e.message);}
        }}>{busy?'Adding…':'Add'}</button>
      </div>
    </ModalShell>;
  }
  if(step==='add-reassign'){
    const {dbRole,name,deptHead,attachPoint,candidates}=oaCtx;
    const [checked,setChecked]=[f.checked||Object.fromEntries(candidates.map(c=>[c.id,true])),
      sel=>setF({...f,checked:sel})];
    return <ModalShell close={close} err={err} title={'Who reports to the new '+TIER_LABEL[dbRole]+'?'}
      sub={'This is the first '+TIER_LABEL[dbRole]+' in '+deptHead.dept+' — pick who moves from reporting to '+(TIER_LABEL[attachPoint.role]||attachPoint.role)+' to reporting to them instead.'}>
      <div className="org-checklist">{candidates.map(c=><label className="org-check-row" key={c.id}>
        <input type="checkbox" checked={checked[c.id]!==false} onChange={e=>setChecked({...checked,[c.id]:e.target.checked})}/>
        {TIER_LABEL[c.role]||c.role} — {c.n}
      </label>)}</div>
      <div className="qc-actions">
        <button className="btn soft" style={{flex:1}} onClick={close}>Back</button>
        <button className="btn primary" style={{flex:2,justifyContent:'center'}} disabled={busy} onClick={async()=>{
          setBusy(true);setErr('');
          try{
            const j=await createStaffAccount({name,role:dbRole,department:deptHead.dept,boss:attachPoint.n});
            const newPerson={n:j.name,s:j.short_name,role:dbRole,dept:deptHead.dept,boss:attachPoint.n,bossId:attachPoint.id,av:j.name.split(' ').map(x=>x[0]).join('').slice(0,2).toUpperCase(),id:j.id,authId:null};
            STAFF.push(newPerson);
            const moved=candidates.filter(c=>checked[c.id]!==false);
            for(const c of moved){await updateStaffFields(c.id,{boss_id:j.id});const local=byId(c.id);if(local){local.boss=j.name;local.bossId=j.id;}}
            ctx.R();
            say('Added '+TIER_LABEL[dbRole]+' '+name+' under '+deptHead.dept+(moved.length?' — '+moved.length+' report'+(moved.length===1?'':'s')+' now reporting to them':''));
            setBusy(false);setResult(j);
          }catch(e){setBusy(false);setErr(e.message);}
        }}>{busy?'Adding…':'Add'}</button>
      </div>
    </ModalShell>;
  }

  /* ---------- Remove / Replace / Promote / Revert ---------- */
  if(step==='remove-role'){
    return <ModalShell close={close} err={err} title="Remove someone" sub="Who do you want to remove?">
      <div className="org-role-grid">
        <button onClick={()=>{setOaCtx({dbRole:'Management'});setStep('remove-person');}}>Management</button>
        <button onClick={()=>{setOaCtx({dbRole:'Manager'});setStep('remove-person');}}>Sr. Manager</button>
        <button onClick={()=>{setOaCtx({dbRole:'Team Member'});setStep('remove-person');}}>Jr. Manager</button>
        <button onClick={()=>{setOaCtx({dbRole:'Team Lead'});setStep('remove-person');}}>Team Lead</button>
        <button style={{gridColumn:'1/-1'}} onClick={()=>{setOaCtx({dbRole:'Teacher'});setStep('remove-person');}}>Staff</button>
      </div>
      <div className="qc-actions"><button className="btn soft" style={{flex:1}} onClick={close}>Cancel</button></div>
    </ModalShell>;
  }
  if(step==='remove-person'){
    const {dbRole}=oaCtx;
    const entries=STAFF.filter(p=>p.role===dbRole);
    return <ModalShell close={close} err={err} title={'Remove — '+TIER_LABEL[dbRole]} sub={entries.length?'Which one?':'There are none of these to remove right now.'}>
      {entries.length?<div className="mf"><label>{TIER_LABEL[dbRole]}</label>
        <select value={f.targetId||entries[0].id} onChange={e=>setF({...f,targetId:e.target.value})}>
          {entries.map(e=><option key={e.id} value={e.id}>{personLabel(e)}</option>)}
        </select></div>:null}
      <div className="qc-actions">
        <button className="btn soft" style={{flex:1}} onClick={close}>Cancel</button>
        {entries.length?<button className="btn primary" style={{flex:2,justifyContent:'center'}} onClick={()=>{
          const target=byId(f.targetId||entries[0].id);
          exportPersonTasksCsv(target);
          setOaCtx({...oaCtx,target});
          setStep('remove-action');
        }}>Continue</button>:null}
      </div>
    </ModalShell>;
  }
  if(step==='remove-action'){
    const {target}=oaCtx;
    const openCount=tasks.filter(t=>t.status!=='done'&&assignees(t).includes(target.s)).length;
    const candidateCount=STAFF.filter(p=>p.role!=='Administrator'&&p.id!==target.id).length;
    return <ModalShell close={close} err={err} title="Replace or promote?">
      <div className="org-info-box">Exported {(TIER_LABEL[target.role]||target.role).toLowerCase()} data for "{target.n}" as a CSV — one row per pending task, with status, due date, attached files, and full activity log.
        {openCount?<> They have <b>{openCount} pending task{openCount===1?'':'s'}</b> — reassign those separately if they don't move with whoever fills this position.</>:null}</div>
      <div className="org-action-grid">
        <button onClick={()=>setStep('remove-replace-name')}>Replace<small>Bring in someone new</small></button>
        <button disabled={!candidateCount} onClick={()=>setStep('remove-promote-pick')}>Promote<small>{candidateCount?'Anyone in the org':'No one to promote'}</small></button>
      </div>
      <div className="qc-actions"><button className="btn soft" style={{flex:1}} onClick={close}>Cancel</button></div>
    </ModalShell>;
  }
  if(step==='remove-replace-name'){
    const {target}=oaCtx;
    const isAdminTier=target.role==='Administrator'||target.role==='Management';
    return <ModalShell close={close} err={err} title={'Replace '+target.n} sub="Enter the name of the person filling this position.">
      <div className="mf">
        <label>New {TIER_LABEL[target.role]} name</label><input value={f.name||''} onChange={e=>setF({...f,name:e.target.value})} placeholder="e.g. Deepa Iyer" autoFocus/>
        {isAdminTier?<><label>Email (their real login)</label><input value={f.email||''} onChange={e=>setF({...f,email:e.target.value})} placeholder="name@school.org"/></>:null}
      </div>
      <div className="qc-actions">
        <button className="btn soft" style={{flex:1}} onClick={()=>setStep('remove-action')}>Back</button>
        <button className="btn primary" style={{flex:2,justifyContent:'center'}} disabled={busy} onClick={async()=>{
          const name=(f.name||'').trim();
          if(!name){setErr('Enter a name for the replacement.');return;}
          if(isAdminTier&&!/^[^@\s]+@[^@\s]+\.[^@\s]+$/.test((f.email||'').trim())){setErr('Enter a valid email for this role.');return;}
          setBusy(true);setErr('');
          try{
            const j=await createStaffAccount({name,role:target.role,department:target.dept,boss:target.boss,email:isAdminTier?f.email.trim():undefined});
            const reports=directReports(target.n);
            for(const r of reports){await updateStaffFields(r.id,{boss_id:j.id});const local=byId(r.id);if(local){local.boss=name;local.bossId=j.id;}}
            await deleteStaffAccount(target.id);
            STAFF.splice(STAFF.indexOf(target),1);
            STAFF.push({n:j.name,s:j.short_name,role:target.role,dept:target.dept,boss:target.boss,bossId:target.bossId,av:j.name.split(' ').map(x=>x[0]).join('').slice(0,2).toUpperCase(),id:j.id,authId:null});
            ctx.R();say(name+' now fills the '+TIER_LABEL[target.role]+' position'+(target.dept?' ('+target.dept+')':''));setBusy(false);setResult(j);
          }catch(e){setBusy(false);setErr(e.message);}
        }}>{busy?'Replacing…':'Confirm replace'}</button>
      </div>
    </ModalShell>;
  }
  if(step==='remove-promote-pick'){
    const {target}=oaCtx;
    const candidates=STAFF.filter(p=>p.role!=='Administrator'&&p.id!==target.id);
    return <ModalShell close={close} err={err} title="Promote who?" sub="Anyone in the organization — the one you pick keeps their own team and absorbs whoever else reported to this position.">
      <div className="mf"><label>Promote</label>
        <select value={f.promotedId||candidates[0].id} onChange={e=>setF({...f,promotedId:e.target.value})}>
          {candidates.map(c=><option key={c.id} value={c.id}>{personLabel(c)}</option>)}
        </select></div>
      <div className="qc-actions">
        <button className="btn soft" style={{flex:1}} onClick={()=>setStep('remove-action')}>Back</button>
        <button className="btn primary" style={{flex:2,justifyContent:'center'}} onClick={()=>{
          setOaCtx({...oaCtx,promotedId:f.promotedId||candidates[0].id});
          setStep('remove-promote-mode');
        }}>Continue</button>
      </div>
    </ModalShell>;
  }
  if(step==='remove-promote-mode'){
    return <ModalShell close={close} err={err} title="Temporary or permanent?">
      <div className="org-action-grid">
        <button disabled={busy} onClick={()=>doPromote(true)}>Temporary<small>Covers the role — you can revert them later</small></button>
        <button disabled={busy} onClick={()=>doPromote(false)}>Permanent<small>Fills the role for good</small></button>
      </div>
      <div className="qc-actions"><button className="btn soft" style={{flex:1}} onClick={()=>setStep('remove-promote-pick')}>Back</button></div>
    </ModalShell>;
  }
  if(step==='revert-name'){
    const {person}=oaCtx;
    const snap=person.tempSnap;
    const newHireRole=person.role,newHireDept=person.dept;
    const isAdminTier=newHireRole==='Administrator'||newHireRole==='Management';
    return <ModalShell close={close} err={err} title={'Revert '+person.n} sub={person.n+' goes back to '+TIER_LABEL[snap.home_role]+(snap.home_department?' ('+snap.home_department+')':'')+'. Who fills '+TIER_LABEL[newHireRole]+' permanently now?'}>
      <div className="mf">
        <label>New {TIER_LABEL[newHireRole]} name</label><input value={f.name||''} onChange={e=>setF({...f,name:e.target.value})} placeholder="e.g. Priya Nair" autoFocus/>
        {isAdminTier?<><label>Email (their real login)</label><input value={f.email||''} onChange={e=>setF({...f,email:e.target.value})} placeholder="name@school.org"/></>:null}
      </div>
      <div className="qc-actions">
        <button className="btn soft" style={{flex:1}} onClick={close}>Cancel</button>
        <button className="btn primary" style={{flex:2,justifyContent:'center'}} disabled={busy} onClick={async()=>{
        const name=(f.name||'').trim();
        if(!name){setErr('Enter a name for the permanent replacement.');return;}
        if(isAdminTier&&!/^[^@\s]+@[^@\s]+\.[^@\s]+$/.test((f.email||'').trim())){setErr('Enter a valid email for this role.');return;}
        setBusy(true);setErr('');
        try{
          const bossOfNewHire=byId(person.bossId);
          const j=await createStaffAccount({name,role:newHireRole,department:newHireDept,boss:bossOfNewHire?bossOfNewHire.n:null,email:isAdminTier?f.email.trim():undefined});
          const homeTeam=snap.home_team_ids||[];
          const inherited=directReports(person.n).filter(c=>!homeTeam.includes(c.id));
          for(const c of inherited){await updateStaffFields(c.id,{boss_id:j.id});const local=byId(c.id);if(local){local.boss=name;local.bossId=j.id;}}
          // snap.home_boss_id can point at the very position just vacated (person was promoted
          // from within its own team) — that row no longer exists, so fall back to the new hire
          // taking over that position instead of leaving a dangling boss_id.
          const homeBossStillExists=byId(snap.home_boss_id);
          const resolvedHomeBossId=homeBossStillExists?snap.home_boss_id:j.id;
          const resolvedHomeBossName=homeBossStillExists?homeBossStillExists.n:name;
          await updateStaffFields(person.id,{role:snap.home_role,department:snap.home_department,boss_id:resolvedHomeBossId,temp_covering:false,temp_cover_snapshot:null});
          const localPerson=byId(person.id);
          Object.assign(localPerson,{role:snap.home_role,dept:snap.home_department,boss:resolvedHomeBossName,bossId:resolvedHomeBossId,tempCovering:false,tempSnap:null});
          STAFF.push({n:j.name,s:j.short_name,role:newHireRole,dept:newHireDept,boss:bossOfNewHire?bossOfNewHire.n:null,bossId:bossOfNewHire?bossOfNewHire.id:null,av:j.name.split(' ').map(x=>x[0]).join('').slice(0,2).toUpperCase(),id:j.id,authId:null});
          ctx.R();say(name+' now fills '+TIER_LABEL[newHireRole]+' — '+person.n+' is back to '+TIER_LABEL[snap.home_role]);setBusy(false);setResult(j);
        }catch(e){setBusy(false);setErr(e.message);}
      }}>{busy?'Reverting…':'Confirm revert'}</button>
      </div>
    </ModalShell>;
  }
  if(step==='rename-dept'){
    const {person}=oaCtx;
    const takenByOthers=new Set(orgDepts().filter(d=>d.n!==person.n).map(d=>d.dept));
    const renameOpts=Object.values(BUCKETS).filter(d=>d===person.dept||!takenByOthers.has(d));
    return <ModalShell close={close} err={err} title="Rename department" sub="Updates the department name for everyone in it.">
      <div className="mf"><label>Department name</label>
        <select value={f.dept!==undefined?f.dept:person.dept} onChange={e=>setF({...f,dept:e.target.value})} autoFocus>
          {renameOpts.map(d=><option key={d}>{d}</option>)}</select>
      </div>
      <div className="qc-actions">
        <button className="btn soft" style={{flex:1}} onClick={close}>Cancel</button>
        <button className="btn primary" style={{flex:2,justifyContent:'center'}} disabled={busy} onClick={async()=>{
          const newName=(f.dept!==undefined?f.dept:person.dept).trim();
          if(!newName){setErr('Enter a department name.');return;}
          if(newName!==person.dept&&orgDepts().some(d=>d.dept.toLowerCase()===newName.toLowerCase())){setErr('A department with that name already exists.');return;}
          setBusy(true);setErr('');
          try{
            const oldName=person.dept;
            const group=[person,...descendants(person.n)];
            for(const p of group){await updateStaffFields(p.id,{department:newName});p.dept=newName;}
            ctx.R();say(oldName===newName?'No change made':'Renamed "'+oldName+'" to "'+newName+'"');
            setBusy(false);close();
          }catch(e){setBusy(false);setErr(e.message);}
        }}>{busy?'Saving…':'Save'}</button>
      </div>
    </ModalShell>;
  }
  if(step==='person-detail'){
    const {person}=oaCtx;
    return <ModalShell close={close} err={err} title={person.n} sub={(TIER_LABEL[person.role]||person.role)+(person.dept?' · '+person.dept:'')}>
      <div className="mf" style={{display:'flex',flexDirection:'column',gap:8}}>
        {person.authId?<button className="btn soft" onClick={()=>{close();ctx.setResetTarget(person);}}><I n="key" s={15}/>Reset password</button>:null}
        {person.tempCovering?<button className="btn soft" onClick={()=>{setOaCtx({person});setStep('revert-name');}}>Revert to their original role</button>:null}
      </div>
      <div className="qc-actions"><button className="btn soft" style={{flex:1}} onClick={close}>Close</button></div>
    </ModalShell>;
  }
  return null;

  async function doPromote(temporary){
    const {target,promotedId}=oaCtx;
    const promoted=byId(promotedId);
    setBusy(true);setErr('');
    try{
      const homeTeamIds=directReports(promoted.n).map(c=>c.id);
      const homeSnapshot={home_role:promoted.role,home_department:promoted.dept,home_boss_id:promoted.bossId,home_team_ids:homeTeamIds};
      const others=directReports(target.n).filter(c=>c.id!==promoted.id);
      const fields={role:target.role,department:target.dept,boss_id:target.bossId};
      if(temporary){fields.temp_covering=true;fields.temp_cover_snapshot=homeSnapshot;}
      await updateStaffFields(promoted.id,fields);
      for(const o of others){await updateStaffFields(o.id,{boss_id:promoted.id});const local=byId(o.id);if(local){local.boss=promoted.n;local.bossId=promoted.id;}}
      await deleteStaffAccount(target.id);
      STAFF.splice(STAFF.indexOf(target),1);
      Object.assign(promoted,{role:target.role,dept:target.dept,boss:target.boss,bossId:target.bossId,
        tempCovering:temporary,tempSnap:temporary?homeSnapshot:null});
      ctx.R();
      say((promoted.n)+(temporary?' temporarily covering ':' promoted to ')+TIER_LABEL[target.role]+(target.dept?' ('+target.dept+')':''));
      setBusy(false);close();
    }catch(e){setBusy(false);setErr(e.message);}
  }
}

function PeopleView({ctx}){
  const [zoom,setZoom]=useState(1);
  const [step,setStep]=useState(null);
  const [oaCtx,setOaCtx]=useState({});
  const canM=ctx.role==='admin'||ctx.role==='mgmt';
  const open=(s,c)=>{setOaCtx(c||{});setStep(s);};
  const close=()=>{setStep(null);setOaCtx({});};
  const onNodeClick=(person,forceStep)=>{
    if(!canM)return;
    if(forceStep==='rename-dept'){open('rename-dept',{person});return;}
    open('person-detail',{person});
  };
  return <div className="view">
    {canM?<div className="org-toolbar">
      <button className="btn soft" onClick={()=>open('add-mgmt')}>+ Add Management</button>
      <button className="btn soft" onClick={()=>open('add-dept')}>+ Add a department</button>
      <button className="btn soft" onClick={()=>open('add-jrm')}>+ Add Jr. Manager</button>
      <button className="btn soft" onClick={()=>open('add-lead')}>+ Add Team Lead</button>
      <button className="btn soft" onClick={()=>open('add-staff')}>+ Add Staff</button>
      <button className="btn ghost" onClick={()=>ctx.setEmpModal(true)}><I n="plus"/>Add employee</button>
      <div className="spacer"/>
      <button className="btn soft" style={{background:'var(--red-soft)',color:'var(--red)'}} onClick={()=>open('remove-role')}>Remove</button>
    </div>:null}
    <div className="panel">
      <div className="zoom-bar">
        <button onClick={()=>setZoom(z=>Math.max(0.5,+(z-0.1).toFixed(2)))} title="Zoom out">−</button>
        <div className="pct">{Math.round(zoom*100)}%</div>
        <button onClick={()=>setZoom(z=>Math.min(1.5,+(z+0.1).toFixed(2)))} title="Zoom in">+</button>
        <button className="zreset" onClick={()=>setZoom(1)}>Reset</button>
      </div>
      <div className="chart-scroll"><div style={{zoom}}><OrgChart onNodeClick={onNodeClick}/></div></div>
    </div>
    {step?<OrgActionModal ctx={ctx} step={step} setStep={s=>setStep(s)} oaCtx={oaCtx} setOaCtx={setOaCtx} close={close}/>:null}
  </div>;
}

function ResetPwModal({ctx,staff,close}){
  const [busy,setBusy]=useState(false);

/* ============ reports ============ */
function ReportsView({ctx}){
  const [fw,setFw]=useState('all');
  const [fb,setFb]=useState('all');
  const mine=tasks.filter(t=>inScope(t,ctx.shorts)&&(fb==='all'||t.bucket===fb)&&(fw==='all'||hasWho(t,fw)));
  const dn=mine.filter(t=>t.status==='done').length,ov=mine.filter(isOverdue).length;
  const rate=mine.length?Math.round(dn/mine.length*100):0;
  const segs=deliveryStats(mine);const segTot=segs.reduce((a,x)=>a+x.v,0);
  const empOpts=ctx.scope.filter(p=>(p.role==='Teacher'||p.n===ctx.viewer.n)&&(fb==='all'||tasks.some(t=>hasWho(t,p.s)&&t.bucket===fb)));
  const workers=ctx.scope.filter(p=>p.role==='Teacher'&&(fw==='all'||p.s===fw)&&(fb==='all'||tasks.some(t=>hasWho(t,p.s)&&t.bucket===fb)));
  const load=workloadMap();
  const byEmp=fw==='all'
    ?workers.map(p=>{const tt=mine.filter(t=>hasWho(t,p.s));return [p.s,tt.length?Math.round(tt.filter(t=>t.status==='done').length/tt.length*100):0];})
    :Object.keys(BUCKETS).map(k=>({k,tt:mine.filter(t=>t.bucket===k)})).filter(o=>o.tt.length)
      .map(o=>[BUCKETS[o.k],Math.round(o.tt.filter(t=>t.status==='done').length/o.tt.length*100)]);
  const KP=[['Total tasks',mine.length,'var(--accent)','var(--accent-soft)','checkc'],
    ['Completed',dn,'var(--green)','var(--green-soft)','check'],
    ['Overdue',ov,'var(--red)','var(--red-soft)','alert'],
    ['Completion rate',rate+'%','var(--blue)','var(--blue-soft)','chart']];
  return <div className="view">
    <div className="filters">
      <select className="fsel" value={fb} onChange={e=>{setFb(e.target.value);setFw('all');}}>
        <option value="all">All departments</option>
        {Object.entries(BUCKETS).map(([k,v])=><option key={k} value={k}>{v}</option>)}</select>
      <select className="fsel" value={fw} onChange={e=>setFw(e.target.value)}>
        <option value="all">{fb==='all'?'All staff':'All in '+BUCKETS[fb]}</option>
        {empOpts.map(p=><option key={p.s} value={p.s}>{p.n}</option>)}</select>
      <div className="spacer"/>
      <button className="btn soft" onClick={()=>ctx.exportCSV('tasks')}><I n="dl"/>Tasks CSV</button>
      <button className="btn soft" onClick={()=>ctx.exportCSV('workload')}><I n="dl"/>Workload CSV</button>
      <button className="btn primary" onClick={()=>ctx.printReport(fw,fb)}><I n="print"/>Export PDF</button>
    </div>
    <div className="kpis">{KP.map(([l,n,c,cs,ic])=><div className="kpi" key={l}>
      <div className="top"><span className="l">{l}</span><span className="ic" style={{background:cs,color:c}}><I n={ic}/></span></div>
      <div className="n" style={{color:c}}>{n}</div></div>)}</div>
    <div className="panel">
      <div className="h-row"><h3>Delivery performance</h3><span className="tag gray">{segTot?Math.round(segs[0].v/segTot*100)+'% completed on time':'no data yet'}</span></div>
      <div style={{display:'flex',gap:30,alignItems:'center',flexWrap:'wrap'}}>
        <div dangerouslySetInnerHTML={{__html:donutSVG(segs,150,26)}}/>
        <div style={{flex:1,minWidth:230}}>{segs.map(x=>{const tot=segTot||1;
          return <div className="leg" key={x.l}><span className="dot2" style={{background:x.c}}/>{x.l}<b>{x.v} · {Math.round(x.v/tot*100)}%</b></div>;})}</div>
      </div>
    </div>
    <div className="grid2">
      <div className="panel"><h3>{fw==='all'?'Completion by employee':'Completion by department — '+(byShort(fw)||{n:fw}).n}</h3><Bars rows={byEmp}/></div>
      <div className="panel"><h3>Tasks by type</h3>
        <Bars rows={Object.keys(TYPES).map(k=>[TYPES[k],mine.filter(t=>(t.type||'work')===k).length]).filter(r=>r[1]>0)}/></div>
    </div>
    <div className="panel"><h3>Workload — open tasks per employee</h3>
      <table><thead><tr><th>Employee</th><th>Department</th><th>Open</th><th>Overdue</th><th>Done</th></tr></thead>
      <tbody>{workers.map(p=>{const tt=mine.filter(t=>hasWho(t,p.s));
        return <tr key={p.s}><td><span className="avex" style={{marginRight:8,background:avColor(p.n),color:'#fff'}}>{p.av}</span>{p.n}</td>
          <td>{p.dept}</td><td><b>{load[p.s]}</b></td>
          <td style={{color:tt.filter(isOverdue).length?'var(--red)':undefined}}>{tt.filter(isOverdue).length}</td>
          <td>{tt.filter(t=>t.status==='done').length}</td></tr>;})}</tbody></table>
    </div>
  </div>;
}

/* ============ quick capture ============ */
const QC_SAMPLES=[
  "Ask Hari to fix the broken projector in the science lab by 10 am tomorrow",
  "We are running low on chalk and markers, order more this week",
  "Ask Meena and Kavya to prepare the annual day schedule by friday",
  "Ask Suresh to service the water purifiers every month"
];
function QuickCapture({ctx,close}){
  const [kind,setKind]=useState('task');
  const [txt,setTxt]=useState('');
  const [mode,setMode]=useState('others');
  const [whos,setWhos]=useState([]);const [whoSugg,setWhoSugg]=useState(true);const [whoWhy,setWhoWhy]=useState('');
  const [when,setWhen]=useState(null);const [whenSugg,setWhenSugg]=useState(true);const [whenWhy,setWhenWhy]=useState('');
  const [dueTime,setDueTime]=useState('');
  const [type,setType]=useState('work');const [prio,setPrio]=useState('med');
  const [recur,setRecur]=useState(null);
  const [recurOn,setRecurOn]=useState(null);
  const [bucket,setBucket]=useState('administration');const [bucketSugg,setBucketSugg]=useState(true);
  const [pick,setPick]=useState(null);
  const [whoQ,setWhoQ]=useState('');
  const [opts,setOpts]=useState(false);
  const [boss,setBoss]=useState('');const [note,setNote]=useState('');
  const [files,setFiles]=useState([]);
  const [rec,setRec]=useState(false);
  const canMulti=ctx.role!=='jrm'&&ctx.role!=='lead';
  const parsed=kind==='task'&&txt.trim().length>=6;

  function parse(text){
    setTxt(text);
    if(kind!=='task'||text.trim().length<6)return;
    const low=text.toLowerCase();
    const named=ctx.scope.filter(p=>p.role==='Teacher'&&new RegExp('\\b'+p.s.toLowerCase()+'\\b').test(low)).map(p=>p.s);
    if(named.length){setWhos(named);setWhoSugg(false);setWhoWhy(named.length>1?'all named in your sentence — joint task':'named in your sentence');}
    else{const s=suggestWho(guessType(low),ctx.scope);if(s&&(whoSugg||!whos.length)){setWhos([s.s]);setWhoSugg(true);setWhoWhy(s.why);}}
    const gt=guessType(low);setType(gt);
    if(bucketSugg)setBucket(guessBucket(low));
    const gd=guessDate(low);
    if(gd){setWhen(gd.date);setWhenSugg(false);setWhenWhy(gd.why);}
    else if(whenSugg||!when){const s=suggestDue(gt);setWhen(s.date);setWhenSugg(true);setWhenWhy(s.why);}
    if(/\burgent|asap|immediately|critical\b/.test(low))setPrio('high');
    const wm=low.match(/\bevery\s+(sunday|monday|tuesday|wednesday|thursday|friday|saturday)s?\b/);
    if(wm){const on={sunday:0,monday:1,tuesday:2,wednesday:3,thursday:4,friday:5,saturday:6}[wm[1]];
      setRecur('weekly');setRecurOn(on);
      const nd=nextAnchor('weekly',on,iso(TODAY));setWhen(nd);setWhenSugg(false);setWhenWhy('every '+DOW[on]+' — first on '+fmtDate(nd));}
    else{const gr=guessRecur(low);if(gr){setRecur(gr);setRecurOn(defaultRecurOn(gr,when||iso(TODAY)));}}
    const gtm=guessTime(low);if(gtm)setDueTime(gtm.time);
  }
  function record(){
    setRec(true);const sample=QC_SAMPLES[Math.floor(Math.random()*QC_SAMPLES.length)];
    let i=0;const tick=setInterval(()=>{i+=3;parse(sample.slice(0,i));
      if(i>=sample.length){clearInterval(tick);setRec(false);parse(sample);}},40);
  }
  function toggleWho(v){
    let next;
    if(!canMulti)next=[v];
    else{next=whos.slice();const ix=next.indexOf(v);
      if(ix>-1){if(next.length>1)next.splice(ix,1);}else next.push(v);}
    setWhos(next);setWhoSugg(false);
    setWhoWhy(next.length>1?'joint task — it appears in each person’s list':'you picked '+(byShort(next[0])||{n:''}).n.split(' ')[0]);
    if(!canMulti)setPick(null);
  }
  async function filePicked(e){
    const picked=[...e.target.files];
    if(!picked.length)return;
    ctx.say('Uploading '+picked.length+' file'+(picked.length>1?'s':'')+'…');
    try{
      const nf=await Promise.all(picked.map(x=>uploadFile(x,'issues')));
      setFiles(files.concat(nf));
    }catch(err){console.error(err);ctx.say('Upload failed — try again');}
  }
  function go(){
    const clean=txt.trim();
    if(kind!=='task'){
      if(!clean){ctx.say(kind==='issue'?'Describe the issue first':'Say what you need first');return;}
      const nr={kind:kind==='issue'?'issue':'request',t:clean.charAt(0).toUpperCase()+clean.slice(1),
        from:ctx.viewer.s,date:iso(TODAY),note:note.trim(),files:kind==='issue'&&files.length?files.slice():undefined};
      requests.unshift(nr);
      close();ctx.R();
      saveRequest(nr).catch(console.error);
      ctx.say(kind==='issue'?'Issue sent to Vikram (maintenance head)':'Request sent to your department boss for approval');
      return;
    }
    if(!clean||clean.length<3){ctx.say('Type or speak the task first');return;}
    let list=whos;
    if(mode==='self')list=[ctx.viewer.s];
    if(!list.length){ctx.say('Pick at least one person');return;}
    const nt={t:cleanTask(clean),who:list[0],coWho:list.length>1?list.slice(1):undefined,
      type,bucket,prio,recur,recurOn:recur?recurOn:null,date:when||iso(TODAY),time:dueTime||null,status:'open',note:note.trim(),
      selfAssigned:mode==='self',instructedBy:boss||null};
    tasks.unshift(nt);
    close();ctx.R();
    saveTask(nt).catch(console.error);
    const names=list.map(a=>(byShort(a)||{n:a}).n).join(' + ');
    ctx.say((mode==='self'?'Added to your list':'Assigned '+(list.length>1?'jointly to ':'to ')+names+' · sent on WhatsApp')+(recur?' · '+recurLabel(recur,recurOn):'')+(boss?' · as per '+boss:''));
  }
  const dts=[0,1,7].map(n=>{const d=new Date(TODAY);d.setDate(d.getDate()+n);return d;});
  const whoList=ctx.scope.filter(x=>x.role==='Teacher'&&(!whoQ||x.n.toLowerCase().includes(whoQ.toLowerCase())||x.dept.toLowerCase().includes(whoQ.toLowerCase())));
  const hints={task:<span>Type or speak in plain words — <b>AI fills in who, when and what type</b>. Tap any value to change it.</span>,
    issue:<span>Goes straight to <b>Vikram (maintenance head)</b> — he assigns the right person, no approval needed.</span>,
    request:<span>Goes to <b>your department boss</b> for one-tap approval, then to procurement (Accounts department).</span>};
  const phs={task:'Try: "Ask Hari to fix the lab projector by Friday"',issue:"What's broken? e.g. Projector in Lab 2 not working",request:'What do you need? e.g. 2 boxes of chalk for Class 5'};
  return <div className="modal-wrap" onClick={e=>{if(e.target===e.currentTarget)close();}}>
    <div className="modal">
      <div className="qc-head"><h3>New</h3><button className="iconbtn" onClick={close}><I n="x"/></button></div>
      <div className="selfseg" style={{marginTop:12}}>
        {[['task','Task'],['issue','Report issue'],['request','Request supplies']].map(([k,l])=>
          <button key={k} className={kind===k?'on':''} onClick={()=>setKind(k)}>{l}</button>)}
      </div>
      <div className="qc-input-row">
        <input className="qc-input" autoFocus placeholder={phs[kind]} value={txt} onChange={e=>parse(e.target.value)}/>
        <button className={'micbtn'+(rec?' rec':'')} onClick={record} title="Speak"><I n="mic"/></button>
      </div>
      <div className="qc-hint">{hints[kind]}</div>
      {kind==='issue'?<div className="qc-attach">
        {[['camera','Camera',{accept:'image/*',capture:'environment'}],['image','Photos',{accept:'image/*',multiple:true}],['clip','Files',{multiple:true}]].map(([ic,l,at])=>
          <label key={l} className="btn soft"><I n={ic}/>{l}<input type="file" style={{display:'none'}} onChange={filePicked} {...at}/></label>)}
        {files.length?<div className="filelist">{files.map((x,ix)=><FileChip key={ix} x={x}/>)}</div>:null}
      </div>:null}
      {kind!=='task'?<div className="qc-opts">
        <label>{kind==='issue'?'Extra details (optional)':'Why / for which class? (optional)'}</label>
        <textarea rows={2} value={note} onChange={e=>setNote(e.target.value)} placeholder="Any details…"/>
      </div>:null}
      {kind==='task'?<div className="selfseg">
        <button className={mode==='others'?'on':''} onClick={()=>setMode('others')}>For someone else</button>
        <button className={mode==='self'?'on':''} onClick={()=>setMode('self')}>For myself</button>
      </div>:null}
      {parsed?<div className="qc-parsed">
        <div className="aihead"><I n="spark" s={14}/> AI understood</div>
        <div className="fieldrow"><div className="k">Task</div><div className="v">{cleanTask(txt)}</div></div>
        <div className="fieldrow"><div className="k">Assign to</div><div className="v">
          <span className="editchip" onClick={()=>setPick(pick==='who'?null:'who')}>
            {mode==='self'?'You — '+ctx.viewer.n:whos.map(a=>(byShort(a)||{n:a}).n).join(' + ')||'—'} <I n="chevd" s={13}/></span>
          {whoWhy&&mode!=='self'?<div className="whysm"><b>{whoSugg?'✦ Suggested':'✓'}</b> — {whoWhy}</div>:null}
          {pick==='who'&&mode!=='self'?<div className="pickrow">
            <input className="fsel" style={{width:'100%'}} placeholder="Search name or department…" value={whoQ} onChange={e=>setWhoQ(e.target.value)}/>
            {canMulti?<div className="whysm">Tap more than one person to assign jointly</div>:null}
            {whoList.length?whoList.map(x=><button key={x.s} className={'pk'+(whos.includes(x.s)?' cur':'')} onClick={()=>toggleWho(x.s)}>{whos.includes(x.s)?'✓ ':''}{x.n} · {x.dept}</button>)
              :<div className="whysm">No one matches “{whoQ}”</div>}
          </div>:null}
        </div></div>
        <div className="fieldrow"><div className="k">Due</div><div className="v">
          <span className="editchip" onClick={()=>setPick(pick==='when'?null:'when')}>{fmtDate(when)}{dueTime?' · '+fmtTime(dueTime):''} <I n="chevd" s={13}/></span>
          {whenWhy?<div className="whysm"><b>{whenSugg?'✦ Suggested':'✓'}</b> — {whenWhy}</div>:null}
          {pick==='when'?<div className="pickrow">{dts.map(d=><button key={iso(d)} className={'pk'+(iso(d)===when?' cur':'')}
            onClick={()=>{setWhen(iso(d));setWhenSugg(false);setWhenWhy('you picked this date');}}>
            {d.toDateString()===TODAY.toDateString()?'Today':fmtDate(iso(d))}</button>)}
            <input type="date" className="fsel" style={{padding:'5px 9px',fontSize:12.5}} value={when||''} min={iso(TODAY)} aria-label="Pick any date"
              onChange={e=>{const v=e.target.value;if(!v)return;setWhen(v);setWhenSugg(false);setWhenWhy('you picked this date');}}/>
            <input type="time" className="fsel" style={{padding:'5px 9px',fontSize:12.5}} value={dueTime} aria-label="Due time (optional)"
              onChange={e=>setDueTime(e.target.value)}/>
            <button className="pk" onClick={()=>setPick(null)}>✓ Set</button></div>:null}
        </div></div>
        <div className="fieldrow"><div className="k">Type</div><div className="v">
          <span className="editchip" onClick={()=>setPick(pick==='type'?null:'type')}>{TYPES[type]} <I n="chevd" s={13}/></span>
          {pick==='type'?<div className="pickrow">{Object.keys(TYPES).map(k=><button key={k} className={'pk'+(k===type?' cur':'')}
            onClick={()=>{setType(k);if(whoSugg&&mode!=='self'){const s=suggestWho(k,ctx.scope);if(s){setWhos([s.s]);setWhoWhy(s.why);}}if(whenSugg){const s=suggestDue(k);setWhen(s.date);setWhenWhy(s.why);}setPick(null);}}>{TYPES[k]}</button>)}</div>:null}
        </div></div>
        <div className="fieldrow"><div className="k">Department</div><div className="v">
          <span className="editchip" onClick={()=>setPick(pick==='bucket'?null:'bucket')}>{BUCKETS[bucket]||bucket} <I n="chevd" s={13}/></span>
          {pick==='bucket'?<div className="pickrow">{Object.keys(BUCKETS).map(k=><button key={k} className={'pk'+(k===bucket?' cur':'')}
            onClick={()=>{setBucket(k);setBucketSugg(false);setPick(null);}}>{BUCKETS[k]}</button>)}</div>:null}
        </div></div>
        <div className="fieldrow"><div className="k">Priority</div><div className="v">
          <span className="editchip" onClick={()=>setPick(pick==='prio'?null:'prio')}>
            <span className="prio" style={{background:PRIOS[prio].c}}/>{PRIOS[prio].l} <I n="chevd" s={13}/></span>
          {pick==='prio'?<div className="pickrow">{Object.keys(PRIOS).map(k=><button key={k} className={'pk'+(k===prio?' cur':'')}
            onClick={()=>{setPrio(k);setPick(null);}}>{PRIOS[k].l}</button>)}</div>:null}
        </div></div>
        <div className="fieldrow"><div className="k">Repeat</div><div className="v">
          <span className="editchip" onClick={()=>setPick(pick==='recur'?null:'recur')}>{recur?'↻ '+recurLabel(recur,recurOn):"Doesn't repeat"} <I n="chevd" s={13}/></span>
          {recur?<div className="whysm">Next occurrence is scheduled automatically each time it's completed</div>:null}
          {pick==='recur'?<>
            <div className="pickrow">
              <button className={'pk'+(!recur?' cur':'')} onClick={()=>{setRecur(null);setRecurOn(null);setPick(null);}}>Doesn't repeat</button>
              {Object.keys(RECURS).map(k=><button key={k} className={'pk'+(k===recur?' cur':'')}
                onClick={()=>{setRecur(k);setRecurOn(defaultRecurOn(k,when||iso(TODAY)));if(k==='daily')setPick(null);}}>{RECURS[k]}</button>)}
            </div>
            {recur==='weekly'?<div className="pickrow"><div className="whysm" style={{width:'100%',marginTop:2}}>On which day of the week?</div>
              {[1,2,3,4,5,6,0].map(ix=><button key={ix} className={'pk'+(recurOn===ix?' cur':'')}
                onClick={()=>{setRecurOn(ix);const nd=nextAnchor('weekly',ix,iso(TODAY));setWhen(nd);setWhenSugg(false);setWhenWhy('first occurrence — every '+DOW[ix]);setPick(null);}}>{DOW[ix]}</button>)}</div>:null}
            {recur==='monthly'?<div className="pickrow"><div className="whysm" style={{width:'100%',marginTop:2}}>On which date of the month?</div>
              <select className="fsel" value={recurOn||1} onChange={e=>{const v=+e.target.value;setRecurOn(v);
                const nd=nextAnchor('monthly',v,iso(TODAY));setWhen(nd);setWhenSugg(false);setWhenWhy('first occurrence — the '+ord(v)+' of every month');setPick(null);}}>
                {Array.from({length:31},(_,i)=>i+1).map(n=><option key={n} value={n}>{ord(n)} of every month</option>)}</select></div>:null}
            {recur==='yearly'?<div className="pickrow"><div className="whysm" style={{width:'100%',marginTop:2}}>On which day and month?</div>
              <select className="fsel" value={(recurOn&&recurOn.d)||1} onChange={e=>{const v={d:+e.target.value,m:(recurOn&&recurOn.m)||0};setRecurOn(v);
                const nd=nextAnchor('yearly',v,iso(TODAY));setWhen(nd);setWhenSugg(false);setWhenWhy('first occurrence — every year on '+v.d+' '+MONTHS[v.m]);}}>
                {Array.from({length:31},(_,i)=>i+1).map(n=><option key={n} value={n}>{ord(n)}</option>)}</select>
              <select className="fsel" value={(recurOn&&recurOn.m)||0} onChange={e=>{const v={d:(recurOn&&recurOn.d)||1,m:+e.target.value};setRecurOn(v);
                const nd=nextAnchor('yearly',v,iso(TODAY));setWhen(nd);setWhenSugg(false);setWhenWhy('first occurrence — every year on '+v.d+' '+MONTHS[v.m]);}}>
                {MONTHS.map((mn,ix)=><option key={mn} value={ix}>{mn}</option>)}</select></div>:null}
          </>:null}
        </div></div>
      </div>:null}
      {kind==='task'?<>
        <button className="qc-opts-t" onClick={()=>setOpts(!opts)}><span>More options</span><I n="chevd"/></button>
        {opts?<div className="qc-opts">
          <label>On instruction of</label>
          <select value={boss} onChange={e=>setBoss(e.target.value)}>
            <option value="">No one — own initiative</option>
            {ctx.bossChain.map(n=><option key={n} value={BOSS_LABEL[n]}>{BOSS_LABEL[n]}</option>)}
          </select>
          <label>Note (optional)</label>
          <textarea rows={2} value={note} onChange={e=>setNote(e.target.value)} placeholder="Any details…"/>
        </div>:null}
      </>:null}
      <div className="qc-actions">
        <button className="btn soft" style={{flex:1}} onClick={close}>Cancel</button>
        <button className="btn primary" style={{flex:2,justifyContent:'center'}} onClick={go}>
          <I n={kind==='task'?'check':kind==='issue'?'tool':'box'}/>
          {kind==='task'?'Assign task':kind==='issue'?'Send to maintenance head':'Send request'}
        </button>
      </div>
    </div>
  </div>;
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
