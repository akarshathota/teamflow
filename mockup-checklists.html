<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>TeamFlow — Checklists (mockup)</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:wght@500;600;700;800&family=IBM+Plex+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#f6f5f0; --card:#ffffff; --ink:#1b1e21; --ink2:#43494f; --muted:#71797f;
  --line:#e7e5dc;
  --accent:#0e7a6f; --accent-ink:#0a5c54; --accent-soft:#e2f1ee; --accent-border:#bcdcd6;
  --red:#c43a53; --red-soft:#f9e9ed;
  --amber:#9a6a10; --amber-soft:#f6efdb;
  --blue:#39638f; --blue-soft:#e8eef5;
  --sh-sm:0 1px 2px rgba(20,20,20,.04),0 1px 3px rgba(20,20,20,.04);
}
*{box-sizing:border-box}
body{margin:0;font-family:'IBM Plex Sans',-apple-system,"Segoe UI",Roboto,sans-serif;background:var(--bg);color:var(--ink);-webkit-font-smoothing:antialiased}
h1,h2,h3,.brand{font-family:'Bricolage Grotesque','IBM Plex Sans',sans-serif}
button{font-family:inherit}
.app{display:flex;min-height:100vh}

/* sidebar */
.sidebar{width:230px;background:var(--card);border-right:1px solid var(--line);display:flex;flex-direction:column;
  padding:18px 12px 16px;position:sticky;top:0;height:100vh;flex:0 0 auto}
.brand{display:flex;align-items:center;gap:10px;padding:4px 10px 4px;font-weight:700;font-size:19px;letter-spacing:-.2px}
.brand .logo{width:34px;height:34px;border-radius:9px 9px 9px 2px;background:var(--accent);display:flex;align-items:center;justify-content:center;color:#fff;flex:0 0 auto;font-weight:700}
.org{font-family:'Bricolage Grotesque',sans-serif;font-size:15px;font-weight:800;color:var(--accent-ink);letter-spacing:.3px;padding:0 10px 16px 54px;margin-top:-2px}
.navitem{display:flex;align-items:center;gap:11px;padding:10px 12px;border-radius:8px;cursor:pointer;border:none;background:none;width:100%;
  font-size:13.5px;font-weight:600;color:var(--ink2);margin-bottom:2px;transition:background .15s,color .15s;position:relative;text-align:left}
.navitem:hover{background:#f3f2ec;color:var(--ink)}
.navitem.on{background:var(--accent-soft);color:var(--accent-ink)}
.navitem.on::before{content:"";position:absolute;left:-12px;top:8px;bottom:8px;width:3px;background:var(--accent)}
.navitem .ic{width:18px;text-align:center;opacity:.8}
.navitem .kbd{margin-left:auto;font-size:10px;color:var(--muted);border:1px solid var(--line);border-radius:4px;padding:1px 5px;font-weight:600}
.side-foot{margin-top:auto;padding-top:14px;border-top:1px solid var(--line)}
.side-lab{font-size:10.5px;text-transform:uppercase;letter-spacing:.8px;color:var(--muted);margin:2px 6px 8px;font-weight:700}
.roleSel{width:100%;background:#f3f2ec;color:var(--ink);border:1px solid var(--line);
  border-radius:8px;padding:10px;font-family:inherit;font-size:13px;font-weight:600;outline:none;cursor:pointer}
.companion{font-size:11px;color:var(--muted);margin-top:12px;line-height:1.5;padding:0 6px}

/* main */
.main{flex:1;min-width:0;display:flex;flex-direction:column}
.topbar{display:flex;align-items:center;gap:16px;padding:15px 26px;background:var(--card);border-bottom:1px solid var(--line);position:sticky;top:0;z-index:10}
.topbar h1{font-size:19px;margin:0;font-weight:700}
.topbar .sub{font-size:12.5px;color:var(--muted);margin-top:1px}
.pill{margin-left:auto;font-size:11px;font-weight:700;color:var(--accent-ink);background:var(--accent-soft);border:1px solid var(--accent-border);padding:5px 11px;border-radius:999px;letter-spacing:.3px}
.content{padding:22px 26px 60px;max-width:1080px}

/* tabs */
.tabs{display:flex;gap:4px;margin-bottom:18px;border-bottom:1px solid var(--line)}
.tab{border:none;background:none;padding:10px 14px;font-size:13.5px;font-weight:600;color:var(--muted);cursor:pointer;border-bottom:2.5px solid transparent;margin-bottom:-1px;display:flex;align-items:center;gap:8px}
.tab:hover{color:var(--ink)}
.tab.on{color:var(--accent-ink);border-bottom-color:var(--accent)}
.tab .cnt{font-size:11px;background:#f0efe8;color:var(--ink2);border-radius:999px;padding:1px 7px;font-weight:700}
.tab.on .cnt{background:var(--accent-soft);color:var(--accent-ink)}

.panel{background:var(--card);border:1px solid var(--line);border-radius:12px;padding:18px;box-shadow:var(--sh-sm);margin-bottom:16px}
.panel-h{display:flex;align-items:center;gap:12px;margin-bottom:4px}
.panel-h h2{font-size:16px;margin:0;font-weight:700}
.muted{color:var(--muted);font-size:12.5px}

/* team layout */
.teamwrap{display:grid;grid-template-columns:270px 1fr;gap:16px;align-items:start}
@media(max-width:820px){.teamwrap{grid-template-columns:1fr}}
.memcard{display:flex;align-items:center;gap:11px;padding:11px;border:1px solid var(--line);border-radius:10px;cursor:pointer;background:var(--card);width:100%;text-align:left;margin-bottom:8px;transition:border-color .15s,background .15s}
.memcard:hover{background:#faf9f5}
.memcard.on{border-color:var(--accent-border);background:var(--accent-soft)}
.av{width:36px;height:36px;border-radius:50%;color:#fff;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:14px;flex:0 0 auto}
.memcard .nm{font-weight:600;font-size:13.5px}
.memcard .rl{font-size:11.5px;color:var(--muted)}
.memcard .prog{margin-left:auto;text-align:right}
.memcard .prog b{font-size:13px;font-weight:700}
.memcard .prog .lab{font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:.4px}

/* checklist */
.clhead{display:flex;align-items:center;gap:14px;margin-bottom:14px;flex-wrap:wrap}
.clhead .who{display:flex;align-items:center;gap:11px}
.setby{font-size:12px;color:var(--muted);margin-top:2px}
.btn{border:1px solid var(--line);background:var(--card);color:var(--ink);border-radius:8px;padding:8px 13px;font-size:12.5px;font-weight:600;cursor:pointer;display:inline-flex;align-items:center;gap:7px}
.btn:hover{background:#f6f5f0}
.btn.primary{background:var(--accent);border-color:var(--accent);color:#fff}
.btn.primary:hover{background:#0c6a60}
.btn.ghost{border-color:transparent;color:var(--muted);padding:8px 10px}
.btn.ghost:hover{color:var(--red);background:var(--red-soft)}
.spacer{margin-left:auto}

.progbar{height:8px;background:#eeece4;border-radius:999px;overflow:hidden;margin:2px 0 16px}
.progbar>span{display:block;height:100%;background:var(--accent);border-radius:999px;transition:width .25s}
.progtxt{font-size:12.5px;color:var(--ink2);font-weight:600;margin-bottom:4px;display:flex;gap:8px;align-items:center}

.clrow{display:flex;align-items:center;gap:12px;padding:11px 6px;border-bottom:1px solid var(--line)}
.clrow:last-child{border-bottom:none}
.grip{color:#c9c6ba;cursor:grab;font-size:15px;line-height:1;display:none}
.editing .grip{display:inline}
.chk{width:22px;height:22px;border-radius:6px;border:2px solid #cfccbf;flex:0 0 auto;cursor:pointer;display:flex;align-items:center;justify-content:center;background:#fff;transition:.12s}
.chk.done{background:var(--accent);border-color:var(--accent)}
.chk.done::after{content:"✓";color:#fff;font-size:13px;font-weight:700}
.chk.ro{cursor:default;opacity:.9}
.cltext{flex:1;font-size:13.5px;color:var(--ink)}
.clrow.done .cltext{color:var(--muted);text-decoration:line-through}
.cltext-in{flex:1;font-size:13.5px;font-family:inherit;color:var(--ink);border:1px solid var(--line);border-radius:7px;padding:7px 9px;outline:none}
.cltext-in:focus{border-color:var(--accent-border);box-shadow:0 0 0 3px var(--accent-soft)}
.freq{font-size:10.5px;font-weight:700;letter-spacing:.3px;text-transform:uppercase;padding:3px 8px;border-radius:999px;border:1px solid var(--line);color:var(--ink2);background:#f6f5f0;cursor:default;white-space:nowrap}
.freq.d{color:var(--accent-ink);background:var(--accent-soft);border-color:var(--accent-border)}
.freq.w{color:var(--blue);background:var(--blue-soft);border-color:#cdddee}
.freq.m{color:var(--amber);background:var(--amber-soft);border-color:#e6d7ad}
.freq.y{color:#7a4b7d;background:#f3e9f4;border-color:#e2cde4}
.editing .freq{cursor:pointer}
.reorder{display:none;gap:2px}
.editing .reorder{display:inline-flex}
.reorder button{border:none;background:none;color:#b7b3a6;cursor:pointer;font-size:13px;padding:2px 4px;border-radius:5px;line-height:1}
.reorder button:hover{color:var(--ink);background:#f0efe8}
.del{display:none}
.editing .del{display:inline-flex}

.addrow{display:flex;gap:9px;margin-top:14px;padding-top:14px;border-top:1px dashed var(--line)}
.addrow input{flex:1;font-family:inherit;font-size:13.5px;padding:10px 12px;border:1px solid var(--line);border-radius:9px;outline:none}
.addrow input:focus{border-color:var(--accent-border);box-shadow:0 0 0 3px var(--accent-soft)}
.addrow select{font-family:inherit;font-size:12.5px;font-weight:600;padding:0 10px;border:1px solid var(--line);border-radius:9px;background:#f6f5f0;color:var(--ink2);outline:none;cursor:pointer}

.empty{text-align:center;color:var(--muted);padding:46px 20px}
.empty .big{font-size:34px;margin-bottom:8px}
.empty h3{margin:0 0 4px;color:var(--ink2);font-size:15px}
.note{font-size:12px;color:var(--muted);background:#faf9f5;border:1px solid var(--line);border-radius:9px;padding:10px 13px;margin-bottom:16px;display:flex;gap:9px;align-items:flex-start}
.badge{font-size:10.5px;font-weight:700;color:var(--amber);background:var(--amber-soft);border:1px solid #e6d7ad;padding:3px 8px;border-radius:999px}
.today{font-size:11px;font-weight:700;color:var(--ink2);background:#f0efe8;border:1px solid var(--line);padding:4px 11px;border-radius:999px;white-space:nowrap}
.resetline{font-size:12px;color:var(--muted);margin:0 0 14px;display:flex;gap:8px;align-items:flex-start;line-height:1.5}
.resetline b{color:var(--ink2);font-weight:700}
.resetline .r{color:var(--accent);font-size:14px;line-height:1.3}
.clfilter{display:flex;flex-direction:column;gap:8px;margin-bottom:12px}
.clfilter input,.clfilter select{font-family:inherit;font-size:13px;padding:9px 11px;border:1px solid var(--line);border-radius:9px;outline:none;background:var(--card);color:var(--ink);width:100%}
.clfilter input:focus,.clfilter select:focus{border-color:var(--accent-border);box-shadow:0 0 0 3px var(--accent-soft)}
.clfilter select{background:#f6f5f0;font-weight:600;color:var(--ink2);cursor:pointer}
.clsec+.clsec{margin-top:16px}
.clsec-h{display:flex;align-items:center;gap:9px;font-size:11px;font-weight:800;letter-spacing:.7px;text-transform:uppercase;color:var(--ink2);padding:8px 4px 6px;border-bottom:1.5px solid var(--line);margin-bottom:2px}
.clsec-c{color:var(--muted);font-weight:700;letter-spacing:0;font-size:11.5px}
.clsec-hint{color:var(--muted);font-weight:500;letter-spacing:.2px;text-transform:none;font-size:11px}
.feeds{font-size:12.5px;color:var(--accent-ink);background:var(--accent-soft);border:1px solid var(--accent-border);border-radius:10px;padding:9px 13px;margin:0 0 14px;display:flex;gap:9px;align-items:flex-start;line-height:1.5}
.feeds b{font-weight:700}
.addhint{font-size:11.5px;color:var(--muted);margin-top:8px;padding-left:2px}
.whenctl{display:flex;gap:6px}
.whenctl select{font-family:inherit;font-size:12.5px;font-weight:600;padding:0 9px;border:1px solid var(--line);border-radius:9px;background:#f6f5f0;color:var(--ink2);outline:none;cursor:pointer}
.datectx{font-size:12px;color:var(--muted);margin:-2px 0 12px}
.datectx b{color:var(--ink2)}
.datepick{display:inline-flex;align-items:center;gap:5px}
.datepick button{border:1px solid var(--line);background:var(--card);border-radius:7px;width:30px;height:32px;cursor:pointer;color:var(--ink2);font-size:11px}
.datepick button:hover:not(:disabled){background:#f3f2ec}
.datepick button:disabled{opacity:.35;cursor:default}
.datepick input{font-family:inherit;font-size:12.5px;font-weight:600;padding:7px 9px;border:1px solid var(--line);border-radius:8px;color:var(--ink);outline:none;background:var(--card)}
.datepick input:focus{border-color:var(--accent-border);box-shadow:0 0 0 3px var(--accent-soft)}
.absentbar{display:flex;align-items:center;gap:12px;margin:0 0 14px;flex-wrap:wrap}
.abschk{display:inline-flex;align-items:center;gap:8px;font-size:13px;font-weight:700;color:var(--amber);background:var(--amber-soft);border:1px solid #e6d7ad;border-radius:9px;padding:8px 12px;cursor:pointer;white-space:nowrap}
.abschk input{width:17px;height:17px;accent-color:var(--amber);cursor:pointer;margin:0}
.absentbar .muted{font-size:11.5px;flex:1;min-width:180px}
.absent-b{display:flex;align-items:flex-start;gap:12px;background:var(--amber-soft);border:1px solid #e6d7ad;border-radius:11px;padding:15px 16px;color:var(--amber);font-size:13.5px;line-height:1.5;margin-bottom:6px}
.absent-b b{color:#7a5410}
.mockbar{background:#fff8e6;border-bottom:1px solid #f0e2b8;color:#8a6d15;font-size:12px;font-weight:600;text-align:center;padding:6px}

/* ---- snapshot ---- */
#snapOverlay{position:fixed;inset:0;background:rgba(30,32,34,.5);z-index:200;display:flex;flex-direction:column;align-items:center;overflow:auto;padding:20px}
.snap-toolbar{width:100%;max-width:1000px;display:flex;align-items:center;gap:9px;margin-bottom:14px}
.seg{display:inline-flex;background:var(--card);border:1px solid var(--line);border-radius:9px;overflow:hidden}
.seg button{border:none;background:none;padding:8px 16px;font-family:inherit;font-size:13px;font-weight:600;color:var(--ink2);cursor:pointer}
.seg button.on{background:var(--accent);color:#fff}
.snap-page{width:100%;max-width:1000px;background:#fff;border-radius:12px;padding:30px 32px;box-shadow:0 12px 40px rgba(0,0,0,.25)}
.snap-h{display:flex;align-items:baseline;gap:14px;border-bottom:2px solid var(--ink);padding-bottom:10px;margin-bottom:12px}
.snap-org{font-family:'Bricolage Grotesque',sans-serif;font-weight:800;font-size:23px;color:var(--accent-ink)}
.snap-title{font-family:'Bricolage Grotesque',sans-serif;font-weight:700;font-size:15px;color:var(--ink2)}
.snap-sub{font-size:14px;color:var(--ink);margin-bottom:12px}
.snap-stats{display:flex;gap:26px;margin-bottom:16px;font-size:13px;color:var(--ink2)}
.snap-stats b{font-family:'Bricolage Grotesque',sans-serif;font-size:16px;color:var(--ink)}
.snap-scroll{overflow-x:auto;border:1px solid var(--line);border-radius:9px}
.snapgrid{border-collapse:collapse;font-size:12px;width:100%}
.snapgrid th,.snapgrid td{border:1px solid #ecebe3;text-align:center;padding:0}
.snapgrid .itemcol{text-align:left;padding:8px 11px;min-width:230px;position:sticky;left:0;background:#fff;z-index:1}
.snapgrid thead .itemcol{background:#faf9f5}
.it-b{font-weight:600;color:var(--ink);font-size:12.5px}
.it-s{font-size:10.5px;color:var(--muted);margin-top:1px}
.dcol{min-width:30px;padding:5px 2px;background:#faf9f5;font-weight:700;color:var(--ink2)}
.dcol.wknd{background:#f1efe7;color:var(--muted)}
.dh-w{display:block;font-size:9px;letter-spacing:.3px;color:var(--muted);font-weight:700}
.dh-n{display:block;font-size:12px}
.grow td{background:#f6f5f0;font-weight:800;font-size:10px;letter-spacing:.6px;text-transform:uppercase;color:var(--ink2);height:24px}
.grow .itemcol{background:#f0efe8}
.cell{height:30px;font-weight:700;font-size:13px}
.cell.done{color:#1a7a48;background:#e7f4ec}
.cell.miss{color:var(--red);background:#fbeef1;font-size:16px}
.cell.abs{color:var(--amber);background:var(--amber-soft);font-size:11px}
.cell.nd{color:#cdcabd}
.cell.future{background:#fbfbf9}
.snap-legend{display:flex;gap:20px;margin-top:14px;font-size:12px;color:var(--ink2)}
.snap-legend i{display:inline-flex;align-items:center;justify-content:center;width:20px;height:20px;border-radius:5px;font-style:normal;font-weight:700;font-size:12px;margin-right:5px}
.snap-legend .sw.done{color:#1a7a48;background:#e7f4ec}
.snap-legend .sw.miss{color:var(--red);background:#fbeef1;font-size:16px}
.snap-legend .sw.abs{color:var(--amber);background:var(--amber-soft);font-size:11px}
.snap-legend .sw.nd{color:#b7b3a6;background:#f2f1ea}
.snap-foot{font-size:11px;color:var(--muted);margin-top:16px;border-top:1px solid var(--line);padding-top:10px}
@media print{
  @page{size:A4 landscape;margin:9mm}
  .mockbar,.sidebar,.topbar,.tabs,.note,.teamwrap{display:none!important}
  #snapOverlay{position:static;background:#fff;padding:0;display:block;overflow:visible}
  .snap-toolbar{display:none!important}
  .snap-page{box-shadow:none;border-radius:0;max-width:none;padding:0;width:100%}
  /* shrink the grid so the whole week/month fits the landscape page — no clipping */
  .snap-scroll{overflow:visible!important;border:none}
  .snapgrid{width:100%;font-size:8.5px;table-layout:fixed}
  .snapgrid .itemcol{min-width:0;width:150px;padding:4px 6px}
  .it-b{font-size:8.5px}.it-s{font-size:7px}
  .dcol{min-width:0;padding:3px 1px}.dh-w{font-size:7px}.dh-n{font-size:8.5px}
  .cell{height:18px;font-size:9px}.cell.miss{font-size:11px}
  .grow td{height:16px;font-size:8px}
}
</style>
</head>
<body>
<div class="mockbar">✦ MOCKUP — Checklists feature concept. Not wired to the live app. Use “Preview as” to switch between the boss and staff experience.</div>
<div class="app">
  <aside class="sidebar">
    <div class="brand"><span class="logo">✓</span> TeamFlow</div>
    <div class="org">JHPS</div>
    <button class="navitem"><span class="ic">▦</span> Dashboard <span class="kbd">1</span></button>
    <button class="navitem"><span class="ic">✓</span> Tasks <span class="kbd">2</span></button>
    <button class="navitem on"><span class="ic">☑</span> Checklists <span class="kbd">3</span></button>
    <button class="navitem"><span class="ic">▤</span> Calendar <span class="kbd">4</span></button>
    <button class="navitem"><span class="ic">◎</span> People &amp; roles <span class="kbd">5</span></button>
    <button class="navitem"><span class="ic">▥</span> Reports <span class="kbd">6</span></button>
    <div class="side-foot">
      <div class="side-lab">Preview as</div>
      <select class="roleSel" id="roleSel"></select>
      <div class="companion">Switch persona to see both sides: a boss curating their team’s checklists, and a staff member ticking off their own.</div>
    </div>
  </aside>

  <main class="main">
    <div class="topbar">
      <div>
        <h1>Checklists</h1>
        <div class="sub" id="subtitle"></div>
      </div>
      <span class="pill" id="rolepill"></span>
    </div>
    <div class="content">
      <div class="tabs" id="tabs"></div>
      <div id="view"></div>
    </div>
  </main>
</div>

<script>
/* ---------- mock org (subset, mirrors the real hierarchy shape) ---------- */
const C={red:'#c43a53',amber:'#9a6a10',blue:'#39638f',teal:'#0e7a6f',plum:'#7a4b7d',slate:'#5a6b7a'};
const PEOPLE={
  akarsh:{name:'Akarsh',role:'Management',dept:'Management',av:'A',color:C.teal,boss:null,reports:['chandu','sridhar','prashant','prabhakar','krishna']},
  chandu:{name:'Chandu',role:'Manager',dept:'Construction',av:'C',color:C.red,boss:'akarsh',reports:['imran','suresh','deepa','kiran']},
  sridhar:{name:'Sridhar',role:'Manager',dept:'Maintenance',av:'S',color:C.amber,boss:'akarsh',reports:['ravi','anitha']},
  prashant:{name:'Prashant',role:'Manager',dept:'IT & Systems',av:'P',color:C.blue,boss:'akarsh',reports:['vamsi','hari','srinivas','rama']},
  prabhakar:{name:'Prabhakar P',role:'Manager',dept:'Accounts',av:'P',color:C.plum,boss:'akarsh',reports:['latha','ganesh']},
  krishna:{name:'SM Krishna',role:'Manager',dept:'Transport',av:'K',color:C.slate,boss:'akarsh',reports:['naveen']},
  imran:{name:'Imran',role:'Team Member',dept:'Construction',av:'I',color:C.amber,boss:'chandu',reports:[]},
  suresh:{name:'Suresh',role:'Team Member',dept:'Construction',av:'S',color:C.slate,boss:'chandu',reports:[]},
  deepa:{name:'Deepa',role:'Team Member',dept:'Construction',av:'D',color:C.blue,boss:'chandu',reports:[]},

const MON=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
const ord=n=>{const s=['th','st','nd','rd'],v=n%100;return n+(s[(v-20)%10]||s[v]||s[0]);};
/* an item carries a frequency + its schedule anchor:
   D = daily · W = weekly (dow) · M = monthly (dom) · Y = yearly (day+mon) */
const mk=(text,freq,done,a)=>{const it={id:++uid,text,freq,done:!!done};a=a||{};
  if(freq==='W')it.dow=a.dow||'Mon';
  if(freq==='M')it.dom=a.dom||1;
  if(freq==='Y'){it.day=a.day||1;it.mon=a.mon||1;}
  return it;};
const FREQMETA={D:{label:'Daily',hint:'resets every morning'},W:{label:'Weekly',hint:'resets on the set weekday'},M:{label:'Monthly',hint:'resets on the set date'},Y:{label:'Yearly',hint:'resets on the set day'}};
const FREQORDER=['D','W','M','Y'];
function schedLabel(it){
  if(it.freq==='D')return 'Daily';
  if(it.freq==='W')return 'Every '+it.dow;
  if(it.freq==='M')return 'Monthly · '+ord(it.dom);
  return 'Yearly · '+it.day+' '+MON[(it.mon||1)-1];
}

function isoLocal(d){return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');}
const todayISO=isoLocal(new Date());
let viewDate=todayISO;
const absentMap={}; // absentMap[personId][dateISO] = true when marked absent
(function(){const d=new Date();d.setDate(d.getDate()-3);(absentMap.imran=absentMap.imran||{})[isoLocal(d)]=true;})();
function absentOf(id,date){return (absentMap[id]||{})[date]||null;}
function hashB(s){let h=0;for(let i=0;i<s.length;i++)h=(h*31+s.charCodeAt(i))>>>0;return h;}
/* today = live tick state; past dates = deterministic demo history; absent day = nothing done */
function itemDoneOn(id,date,it){if(absentOf(id,date))return false;if(date===todayISO)return !!it.done;return hashB(id+date+it.id)%100<68;}
function doneOnDate(id,date){return (LISTS[id]||[]).filter(it=>itemDoneOn(id,date,it)).length;}
function fmtDay(iso){return new Date(iso+'T00:00:00').toLocaleDateString('en',{weekday:'short',day:'numeric',month:'short'});}
function shiftDate(delta){const d=new Date(viewDate+'T00:00:00');d.setDate(d.getDate()+delta);const ni=isoLocal(d);if(ni<=todayISO)viewDate=ni;}

/* ---- snapshot: is an item due on a date, and its cell state ---- */
const lastDom=(y,m)=>new Date(y,m,0).getDate(); // m 1-based
const weekdayName=iso=>DOW[(new Date(iso+'T00:00:00').getDay()+6)%7];
function dueOn(it,iso){const d=new Date(iso+'T00:00:00');
  if(it.freq==='D')return true;
  if(it.freq==='W')return weekdayName(iso)===it.dow;
  if(it.freq==='M')return d.getDate()===Math.min(it.dom,lastDom(d.getFullYear(),d.getMonth()+1));
  return (d.getMonth()+1)===it.mon && d.getDate()===Math.min(it.day,lastDom(d.getFullYear(),it.mon));}
const CELLSYM={done:'✓',miss:'·',abs:'A',nd:'–',future:''};
function cellState(id,iso,it){
  if(!dueOn(it,iso))return 'nd';
  if(iso>todayISO)return 'future';
  if(absentOf(id,iso))return 'abs';
  return itemDoneOn(id,iso,it)?'done':'miss';}
function periodDates(mode,anchorISO){const a=new Date(anchorISO+'T00:00:00'),out=[];
  if(mode==='week'){const dow=(a.getDay()+6)%7,mon=new Date(a);mon.setDate(a.getDate()-dow);
    for(let i=0;i<7;i++){const d=new Date(mon);d.setDate(mon.getDate()+i);out.push(isoLocal(d));}}
  else{const y=a.getFullYear(),m=a.getMonth(),last=new Date(y,m+1,0).getDate();
    for(let i=1;i<=last;i++)out.push(isoLocal(new Date(y,m,i)));}
  return out;}

function avatar(p){return '<span class="av" style="background:'+p.color+'">'+p.av+'</span>';}
function progress(d,n){const p=n?Math.round(d/n*100):0;
  return '<div class="progtxt"><span>'+d+' of '+n+' done</span><span style="color:var(--muted);font-weight:500">·</span><span style="color:var(--muted);font-weight:500">'+p+'%</span></div>'
    +'<div class="progbar"><span style="width:'+p+'%"></span></div>';}
function esc(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}

/* ---------- events ---------- */
function wire(){
  document.querySelectorAll('[data-tab]').forEach(b=>b.onclick=()=>{tab=b.dataset.tab;editing=false;snapshot=null;viewDate=todayISO;render();});
  document.querySelectorAll('[data-sel]').forEach(b=>b.onclick=()=>{sel=b.dataset.sel;editing=false;snapshot=null;viewDate=todayISO;render();});
  document.querySelectorAll('[data-edit]').forEach(b=>b.onclick=()=>{editing=b.dataset.edit==='on';render();});
  document.querySelectorAll('[data-tick]').forEach(b=>b.onclick=()=>{const id=+b.dataset.tick,list=b.dataset.list;const it=(LISTS[list]||[]).find(x=>x.id===id);if(it){it.done=!it.done;render();}});
  document.querySelectorAll('[data-del]').forEach(b=>b.onclick=()=>{LISTS[sel]=LISTS[sel].filter(x=>x.id!==+b.dataset.del);touchEdit(sel);render();});
  document.querySelectorAll('[data-cycle]').forEach(b=>b.onclick=()=>{const it=LISTS[sel].find(x=>x.id===+b.dataset.cycle);
    const order={D:'W',W:'M',M:'Y',Y:'D'};it.freq=order[it.freq];
    // give the new frequency a sensible default anchor
    if(it.freq==='W'&&!it.dow)it.dow='Mon'; if(it.freq==='M'&&!it.dom)it.dom=1; if(it.freq==='Y'&&!it.day){it.day=1;it.mon=1;}
    touchEdit(sel);render();});
  document.querySelectorAll('[data-rename]').forEach(inp=>inp.oninput=()=>{const it=LISTS[sel].find(x=>x.id===+inp.dataset.rename);if(it){it.text=inp.value;touchEdit(sel);}});
  document.querySelectorAll('[data-move]').forEach(b=>b.onclick=()=>{
    const id=+b.dataset.id,dir=b.dataset.move,arr=LISTS[sel],it=arr.find(x=>x.id===id);
    const sameF=arr.filter(x=>x.freq===it.freq),p=sameF.indexOf(it),swap=dir==='up'?sameF[p-1]:sameF[p+1];
    if(!swap)return;const i=arr.indexOf(it),j=arr.indexOf(swap);[arr[i],arr[j]]=[arr[j],arr[i]];touchEdit(sel);render();});
  const freqSel=document.getElementById('newFreq');
  if(freqSel){renderWhen();freqSel.onchange=renderWhen;}
  const addBtn=document.querySelector('[data-add]');
  if(addBtn)addBtn.onclick=()=>{const t=document.getElementById('newItem').value.trim();if(!t)return;
    const f=document.getElementById('newFreq').value,a={};
    if(f==='W')a.dow=(document.getElementById('wDow')||{}).value||'Mon';
    if(f==='M')a.dom=+((document.getElementById('wDom')||{}).value||1);
    if(f==='Y'){a.day=+((document.getElementById('wYd')||{}).value||1);a.mon=+((document.getElementById('wYm')||{}).value||1);}
    LISTS[sel].push(mk(t,f,0,a));touchEdit(sel);render();
    const ni=document.getElementById('newItem');if(ni)ni.focus();};
  const fn=document.getElementById('fName');
  if(fn)fn.oninput=()=>{fName=fn.value;render();const el=document.getElementById('fName');if(el){el.focus();el.setSelectionRange(el.value.length,el.value.length);}};
  const fd=document.getElementById('fDept');
  if(fd)fd.onchange=()=>{fDept=fd.value;render();};
  // date look-back + absence marking (boss view)
  document.querySelectorAll('[data-day]').forEach(b=>b.onclick=()=>{shiftDate(+b.dataset.day);render();});
  const vd=document.getElementById('viewDate');
  if(vd)vd.onchange=()=>{if(vd.value&&vd.value<=todayISO){viewDate=vd.value;render();}};
  const absChk=document.getElementById('absChk');
  if(absChk)absChk.onchange=()=>{if(absChk.checked)(absentMap[sel]=absentMap[sel]||{})[viewDate]=true;else if(absentMap[sel])delete absentMap[sel][viewDate];render();};
  // snapshot (weekly/monthly print)
  document.querySelectorAll('[data-snap]').forEach(b=>b.onclick=()=>{snapshot={mode:b.dataset.snap};render();});
  document.querySelectorAll('[data-snapmode]').forEach(b=>b.onclick=()=>{snapshot={mode:b.dataset.snapmode};render();});
  const sc=document.querySelector('[data-snapclose]');if(sc)sc.onclick=()=>{snapshot=null;render();};
  const sp=document.querySelector('[data-snapprint]');if(sp)sp.onclick=()=>window.print();
  const sd=document.querySelector('[data-snapdownload]');if(sd)sd.onclick=()=>window.print();
}

/* ---------- role switcher ---------- */
const rs=document.getElementById('roleSel');
rs.innerHTML=PERSONAS.map(id=>{const p=PEOPLE[id];const kind=p.reports.length?'boss':'staff';
  return '<option value="'+id+'">'+p.name+' · '+p.role+' ('+kind+' view)</option>';}).join('');
rs.value=me;
rs.onchange=()=>{me=rs.value;sel=null;editing=false;fDept='all';fName='';snapshot=null;viewDate=todayISO;tab=descendantsOf(me).length?'team':'mine';render();};

render();
</script>
</body>
</html>
